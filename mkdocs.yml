site_name: "NEMA SWARM"
site_description: "Multi-Agent Elemental Coordination Framework"
site_url: ""
docs_dir: docs
site_dir: _site

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
  font:
    text: "IBM Plex Mono"
    code: "IBM Plex Mono"
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate
  icon:
    logo: material/atom-variant
  favicon: images/favicon.png

extra_css:
  - stylesheets/cyberpunk.css

extra_javascript:
  - javascripts/cyberpunk.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search

extra:
  generator: false

nav:
  - Home: index.md
  - Elements:
    - Overview: elements/index.md
    - "✶ Aether — NEMA": elements/aether.md
    - "∴ Air — Aerunik": elements/air.md
    - "≈ Water — Sentaria": elements/water.md
    - "▲ Fire — Jvalion": elements/fire.md
    - "𐂷 Wood — Arboriel": elements/wood.md
    - "☷ Earth — Humavita": elements/earth.md
    - "⛨ Metal — Ferrosid": elements/metal.md
  - Core Specs:
    - Elemental Daemons: core/daemons.md
    - NEMA Lattice Keeper: core/nema.md
    - Pathology Matrix: core/pathology.md
  - SIML Database:
    - Overview: siml/index.md
    - Specification: siml/specification.md
    - Hex Registry: siml/registry.md
    - Encoding Guide: siml/encoding-guide.md
    - Term Browser: siml/term-browser.md
  - Daemon Ecology:
    - Manifesto: daemon-ecology/index.md
  - Blog:
    - blog/index.md
  - Threads:
    - threads/index.md
  - Reference:
    - Daemon Reference: DAEMON_REFERENCE.md
    - Dedup Protocol: CONCEPT_DEDUP_PROTOCOL.md
