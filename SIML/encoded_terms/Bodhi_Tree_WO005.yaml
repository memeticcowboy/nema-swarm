context_note: "The Bodhi Tree represents Wood as enlightenment site—not just any tree but THE tree where Siddhartha became Buddha. Key insight: Ficus religiosa is common, but THIS tree is sacred through event (Buddha's awakening), not essence. This is μ (structure) as historical specificity—place matters. The resonance (ρ) draws seekers across centuries. Other sacred Indian trees (Banyan, Panchavati) show Wood as distributed sacred network, not single site."
