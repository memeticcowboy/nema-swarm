## Source Content

```
# Lifestyle Factors Impacting Metacognitive Abilities in Young Adults

Created at 2025/04/07 4:39 AM

## Summary
Physical activity, diet, and sleep quality are linked to different aspects of metacognitive abilities in young adults. Physical activity is associated with knowledge and offline regulation of cognition, diet with online regulation during tasks, and sleep quality with metacognitive worry.
## Overarching Themes
- **Lifestyle Behaviors and Metacognition**: The impact of physical activity
