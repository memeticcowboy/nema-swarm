description: The meta-crisis as an interconnected web of overlapping global crises — ecological, psychological, cultural, economic, spiritual — that cannot be reduced to any single issue. Encompasses both visible external crises (climate, inequality, institutional failure) and the invisible internal crisis of understanding, perception, and meaning-making. Sub-crises include sense-making (inability to determine what is true), capability (inability to respond effectively), legitimacy (institutional trust collapse), meaning (existential disorientation), and epistemic (breakdown of shared knowledge frameworks). Requires addressing external and internal dimensions simultaneously.
