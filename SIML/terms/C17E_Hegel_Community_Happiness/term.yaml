elemental_emphasis:
  ∴: How does Hegel distinguish between abstract freedom (doing whatever one wants) and concrete freedom (being at home in ethical community)?
  ≈: What flows between individuals that constitutes mutual recognition? How do social relationships create rather than constrain identity?
  ▲: Where is the drive toward happiness directed? Toward endless consumption of desires or toward integration with ethical life?
  𐂷: What forms of community enable true freedom? What institutional structures support Sittlichkeit versus Moralität?
  ☷: What's the metabolic cost of abstract individualism? What sustains the integration of self and community?
  ⛨: What boundaries separate ethical community from mere conformity? How does integration avoid becoming absorption?
