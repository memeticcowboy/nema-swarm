context_note: 'Sleep Paralysis is a REM sleep phenomenon where individuals experience temporary motor atonia while maintaining conscious awareness, often accompanied by vivid hallucinations. Common hallucination types include sense of presence, shadow figures, auditory sensations, chest pressure, and vestibular disruption. Cultural interpretation dramatically shapes the experience: Western modern (alien abduction), historical European (demonic visitation), East Asian (ghost oppression), indigenous (spiritual visitation). Approximately 8% lifetime prevalence in general population, higher in narcolepsy, anxiety disorders, and PTSD. The phenomenon is physiologically benign but often terrifying; education about mechanisms reduces distress and prevents misinterpretation.'
