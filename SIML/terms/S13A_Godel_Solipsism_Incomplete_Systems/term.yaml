description: Gödel's incompleteness theorems applied to consciousness and co-solipsism. Any sufficiently powerful system has truths it cannot prove from within — paralleling how no mind can step outside its own perceptual frame. External proof requires a meta-system; in co-solipsism, another person's agreement acts as pseudo-oracle but is still processed inside one's own mind. Confirmation is structurally analogous to importing an axiom — stabilizes reality model but never guarantees completeness.
