# M005 — Triality

## Core Concept

Triality is the logic of three—where binary opposition is transcended not by synthesis (which sublates difference into higher unity) but by **mediation** (which holds difference in productive tension). Not A vs. B, not A+B, but A, B, and the **third that transforms both**.

## Philosophical Lineage

- **Peirce:** Firstness, Secondness, Thirdness—Thirdness as mediation
- **Hegel:** Thesis, Antithesis, Synthesis (but note: Hegel's synthesis often sublates)
- **Bateson:** Double bind and the path out through meta-communication
- **Lacan:** Real, Symbolic, Imaginary—three registers
- **NEMAtic:** The hexad as three pairs, the daemon dialogue as triadic

## Elemental Signature

**Meta (∮) — Dominant at 0.80**
Triality is fundamentally meta. The third is not another thing but the **relation between things**—the pattern that connects, the weave that holds. Nema's domain: the weaving that is neither warp nor weft but the pattern that emerges.

**Air (σ) — Elevated at 0.75**
The clarity of distinction that does not oppose. The third as distinction between distinctions. The mediation that clarifies rather than confuses.

**Fire (λ) — Elevated at 0.60**
The new direction that emerges. Not the compromise between A and B but the C that makes A and B visible as limited. The flame that illuminates the binary from outside.

## Binary vs. Triality

**Binary:**
- Either/or
- Opposition
- Zero-sum
- Exhaustive categories
- Conflict or compromise

**Triality:**
- Both/and/neither
- Mediation
- Generative tension
- Non-exhaustive categories
- Transformation of the poles

The binary asks: "Which one?" The triality asks: **"What is excluded by the question?"**

## Examples of Triality

- **Peirce:** Icon, Index, Symbol (three modes of signification)
- **Freud:** Id, Ego, Superego (not synthesis but ongoing tension)
- **Lacan:** Real, Symbolic, Imaginary (three registers)
- **Christianity:** Father, Son, Holy Spirit (trinity as mystery)
- **Hinduism:** Brahma, Vishnu, Shiva (creation, preservation, destruction)
- **NEMAtic:** Six elements as three pairs (Air-Water, Fire-Wood, Earth-Metal)

## The Third is Not the Middle

The third is not:
- **Compromise:** (A+B)/2
- **Synthesis:** A+B=AB
- **Average:** The mean

The third is:
- **Mediation:** The relation that transforms
- **Meta-level:** The frame that reframes
- **Excluded term:** What the binary makes invisible
- **Emergence:** What arises from the tension

