elemental_emphasis:
  ∴: What evidence is being selected for? What contradictory signals are filtered out?
  ≈: What identity is being protected? What would it feel like to let this belief go?
  ▲: Where does the reasoning want to go? What outcome is being defended?
  𐂷: What alternative interpretations exist? What if the evidence points elsewhere?
  ☷: What's the metabolic cost of maintaining this defense? What energy sustains it?
  ⛨: What structures of thought enable this protection? What would allow opening?
context_note: 'Motivated Reasoning is the cognitive process by which individuals seek out, interpret, and remember information in ways that confirm pre-existing beliefs while avoiding contradictory evidence. It represents a defensive mechanism where the drive for cognitive coherence and identity protection overrides the pursuit of objective truth. The case of Dorothy Martin''s doomsday cult illustrates how believers doubled down when prophecy failed. Daniel Shaw''s experience with a guru accused of misconduct demonstrates identity-fusion: he chose to believe despite evidence because the belief was inseparable from his sense of self.'
