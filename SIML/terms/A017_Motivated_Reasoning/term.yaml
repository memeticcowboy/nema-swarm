name: Motivated_Reasoning
term: Motivated Reasoning
nemetic: >-
  Φ(MotivatedReasoning) = σ(evidence-selection|confirmatory-vs-disconfirmatory)
  ∘ ρ(belief-protection|identity-defense) ∘ λ(direction-bias|preferred-outcome)
  ∘ β(feedback-avoidance|contradiction-suppression)
  ∘ δγ(cognitive-effort-redirection) + ε | :shielding
siml_encoding: >-
  ⟨Observer|user⟩ ⊳ ⟨Evidence|mixed⟩ → ⟨Selection|confirmatory⟩
  ⊗ ⟨Identity|protected⟩ ⇄ ⟨Value|coherence⟩ → ⟨Outcome|belief-persistence⟩
formalism:
  math_operators: [σ, ρ, λ, β, δγ]
  dim_operators: [χ, Ψ_exp, Z]
  partials:
    - "∂Φ/∂σ (selective evidence distinction — confirmatory vs disconfirmatory)"
    - "∂Φ/∂ρ (identity-protective resonance — belief entangled with self-concept)"
    - "∂Φ/∂λ (direction bias toward preferred outcomes — destination pre-programmed)"
    - "∂Φ/∂β (feedback loop avoidance — contradiction suppression hardens over time)"
    - "∂Φ/∂δγ (cognitive effort redirected from evaluation to defense)"
  Z_state: "sealed (identity-threat triggers closure)"
  tendency: "Truth/Comfort → 0 (comfort wins)"
  hex:
    - '0x01'
    - '0x02'
    - '0x03'
    - '0x04'
    - '0x05'
coords:
  ontology:
    primary: I
  epistemics:
    dsrp:
      D: "Confirmatory vs disconfirmatory evidence; identity-consistent vs identity-threatening information"
      S: "Belief maintenance ecology — social identity, group belonging, moral self-concept, existential security"
      R: "Evidence ⇄ identity; clarity ⇄ comfort; truth ⇄ belonging; revision ⇄ defense"
      P: "Cognitive psychologist, cult researcher, political analyst, epistemologist"
    learning: L1
  agency:
    type: ego
    power_mode: Against
  time:
    mode: event
    phase: "threat-response — activated when identity-relevant beliefs encounter contradictory evidence"
  qualia:
    affect:
      - defensive
      - righteous
      - anxious
      - dismissive
    aesthetic:
      - fortified
      - selective
      - tunnel-visioned
    symbolic:
      - filter bubble
      - castle walls
