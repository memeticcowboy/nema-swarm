elemental_emphasis:
  ∴: "How does Gardner's theory categorically distinguish eight intelligences from unified general intelligence? What criteria separate linguistic, logical-mathematical, spatial, musical, bodily-kinesthetic, interpersonal, intrapersonal, and naturalist capacities?"
