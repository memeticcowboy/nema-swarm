context_note: "Multiple Intelligences Theory proposes that human intelligence is not a singular entity but comprises eight distinct cognitive capacities: linguistic, logical-mathematical, spatial, musical, bodily-kinesthetic, interpersonal, intrapersonal, and naturalist. Each intelligence meets specific criteria including potential isolation by brain damage, evolutionary history, and distinct developmental trajectories. This framework challenges IQ-centric education and calls for personalized learning that honors cognitive diversity. Cultural contexts shape which intelligences are valued and developed, suggesting that educational reform must embrace pluralistic recognition of human capability."
