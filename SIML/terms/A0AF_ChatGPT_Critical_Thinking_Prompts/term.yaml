elemental_emphasis:
  ∴: How is genuine self-examination distinguished from comfortable self-talk?
  ≈: What flows between the AI prompt and the human's hidden assumptions?
  ▲: Where does provoked discomfort lead — toward growth or defensive retreat?
  𐂷: What beliefs might dissolve if systematically challenged by external inquiry?
  ☷: What habitual patterns of thought does structured AI questioning disrupt?
  ⛨: What boundaries between bias and awareness do these prompts enforce?
context_note: Five ChatGPT prompt archetypes function as cognitive mirrors — the Excuse Interrogator, Belief Assumption, Fear Visualizer, Perspective Shifter, and Attachment Dissolver — using AI-mediated inquiry to extend the range and depth of self-examination.
source: Forbes — 5 Hard-Hitting ChatGPT Prompts That Will Change The Way You Think (Jodie Cook)
