### The Four Components

| Component | Function | Capacity | Nemetic Mapping |
|-----------|----------|----------|-----------------|
| **Central Executive** | Attentional control, coordination, manipulation | Very limited | μ (structure/metal) — the controller |
| **Phonological Loop** | Verbal/speech-based information maintenance | ~2 seconds | σ (distinction/air) — verbal clarity |
| **Visuospatial Sketchpad** | Visual and spatial information maintenance | Limited | σ (distinction/air) — visual clarity |
| **Episodic Buffer** | Integration across domains, conscious access | Limited | ✶ (harmonic/child) — integration |

