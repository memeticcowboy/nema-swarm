## Core Definition

**Working Memory (WM)**, proposed by Alan Baddeley and Graham Hitch in 1974 and refined by Baddeley in 2000, is a limited-capacity cognitive system responsible for temporarily **holding** information available for processing and **manipulating** that information for complex cognitive tasks. Unlike the earlier concept of "short-term memory" as passive storage, working memory is an active system essential for reasoning, comprehension, and learning.

