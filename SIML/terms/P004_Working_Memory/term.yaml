### Key Phenomena

| Phenomenon | Description | Implication |
|------------|-------------|-------------|
| **Phonological similarity** | Similar-sounding items interfere | Acoustic confusion, not semantic |
| **Word length effect** | Longer words = fewer remembered | Rehearsal time is the bottleneck |
| **Articulatory suppression** | Verbal interference blocks loop | Can't rehearse while speaking |

