## Core Insight

> Working Memory is the stage upon which conscious cognition performs. Its severe capacity limitations (~4 chunks, not 7) are not a bug but a feature — constraints force compression, abstraction, and intelligent prioritization. The multi-component architecture reveals that the mind doesn't just "store" information temporarily; it actively maintains, manipulates, and integrates across representational formats. Understanding WM transforms how we design instruction: every element that enters working memory competes for limited resources, so extraneous load must be minimized, intrinsic load managed, and germane load optimized. The episodic buffer's role as integrator suggests that deep learning happens when information from multiple sources binds into coherent, consciously accessible representations.

## One-Sentence Insight

> Working Memory is a limited-capacity, multi-component system where a central executive controls specialized subsystems for verbal and visual information, with an episodic buffer integrating across domains to enable complex cognition and learning.

## Three-Bullet Expansion

- **What:** A cognitive system for temporary storage and manipulation of information, replacing the passive "short-term memory" concept with an active, multi-component architecture (Central Executive, Phonological Loop, Visuospatial Sketchpad, Episodic Buffer) proposed by Baddeley & Hitch (1974) and refined by Baddeley (2000)
- **How it works:** The Central Executive directs attention and coordinates two domain-specific slave systems (Phonological Loop for verbal, Visuospatial Sketchpad for visual/spatial), while the Episodic Buffer integrates information across modalities and connects to long-term memory — all operating within severe capacity limits (~4 chunks) that necessitate compression and strategic allocation
- **Where it aims:** Toward complex cognition, learning, and problem-solving — by holding and manipulating information, working memory enables reading comprehension, mathematical reasoning, following instructions, and the integration of new knowledge with existing understanding

