### Executive Functions

| Function | Description | Learning Application |
|----------|-------------|---------------------|
| **Attention focusing** | Select relevant, ignore irrelevant | Staying on task amid distractions |
| **Attention dividing** | Split attention between tasks | Taking notes while listening |
| **Attention switching** | Shift between task demands | Multi-step problem solving |
| **Manipulation** | Transform held information | Mental arithmetic, reasoning |

## The Episodic Buffer

Added to the model in **2000**, the episodic buffer addresses limitations:

