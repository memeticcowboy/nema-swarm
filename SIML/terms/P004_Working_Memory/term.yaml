### Visual vs. Spatial Separation

Research shows the sketchpad has **two subcomponents**:
- **Visual cache**: Stores visual features (color, shape)
- **Inner scribe**: Handles spatial and movement information

This explains why you can hold a visual image while performing a spatial task (limited interference).

