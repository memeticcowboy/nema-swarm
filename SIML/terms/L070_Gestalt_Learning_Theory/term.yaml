## The Laws of Perceptual Organization

Gestalt psychology identified fundamental principles by which humans organize sensory information into meaningful wholes:

| Law | Description | Learning Application |
|-----|-------------|---------------------|
| **Proximity** | Elements close together are perceived as belonging together | Group related concepts spatially |
| **Similarity** | Similar elements are perceived as belonging together | Use consistent visual coding for related ideas |
| **Closure** | Incomplete figures are perceived as complete | Let learners complete partial patterns |
| **Continuity** | Elements arranged in lines/curves are perceived as related | Present information in flowing sequences |
| **Figure-Ground** | We distinguish objects (figure) from background (ground) | Make key concepts stand out clearly |
| **Common Fate** | Elements moving in same direction are perceived as unit | Show processes and transformations |
| **Prägnanz** | We perceive the simplest form possible ("good form") | Design learning for clarity and simplicity |

