## Core Definition

**Gestalt Learning Theory**, developed by **Max Wertheimer**, **Wolfgang Köhler**, and **Kurt Koffka** in the early 20th century as part of the broader Gestalt psychology movement, posits that learning occurs through **sudden insight** rather than incremental trial-and-error. The learner perceives the **structure of the whole situation** — the relationships between parts — and through this holistic grasp, experiences a sudden "aha!" moment of understanding. Learning is not about accumulating stimulus-response associations but about **restructuring the perceptual field** to reveal new possibilities.

