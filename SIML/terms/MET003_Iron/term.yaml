elemental_emphasis:
  ∴: How is iron distinguished from precious metals?
  ≈: What resonance does the forge's heat carry?
  ▲: What direction does martial strength aim?
  𐂷: What possibilities does iron toolmaking enable?
  ☷: How does iron sustain agricultural civilization?
