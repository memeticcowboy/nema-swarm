## One-Sentence Insight

> Liquid Democracy reframes citizenship from choosing power to curating trust — transforming democracy from punctual ritual into rhythmic relational sovereignty, where every delegation is an act of symbolic synchrony and every revocation is civic immune response.

## Three-Bullet Expansion

- **What:** A recursive systemic reflection on liquid democracy emphasizing trust as resonance field, delegation as symbolic encoding, and governance as rhythmic attunement — characterized by per-issue delegation, chain-delegation networks, transparent logs, and revocability as civic immune function
