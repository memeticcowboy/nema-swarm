## Elemental Pattern Analysis

### Air/σ Dominance

Problem-Based Learning is fundamentally an **Air theory**:
- **Problem clarity:** The entire process begins with understanding the problem
- **Distinction-making:** Separating relevant from irrelevant information
- **Hypothesis generation:** Creating and testing possible explanations
- **Learning issues:** Precise identification of knowledge gaps
- **Critical thinking:** Analysis, evaluation, and synthesis throughout

### Supporting Elements

| Element | Role in PBL |
|---------|-------------|
| **Water/ρ** | Small group collaboration, peer learning, discussion dynamics |
| **Wood/β** | Self-directed inquiry, exploration of multiple pathways |
| **Fire/λ** | Problem ownership, motivation through authentic challenge |
| **Metal/μ** | Tutorial structure, process scaffolding, systematic approach |
| **Earth/δγ** | Iterative cycles of inquiry, returning to problem with new knowledge |
| **Child/✶** | Integration of multiple perspectives, emergent understanding |

