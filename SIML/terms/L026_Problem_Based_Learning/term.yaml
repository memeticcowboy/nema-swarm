### The Seven Steps of PBL (Maastricht Model)

| Step | Activity | Nemetic Mapping |
|------|----------|-----------------|
| **1. Clarify terms** | Identify unfamiliar concepts in the problem | σ (distinction/air) |
| **2. Define problem** | Articulate what the problem is asking | σ (clarity/distinction) |
| **3. Analyze problem** | Brainstorm possible explanations/hypotheses | β (exploration/wood) |
| **4. Draw systematic inventory** | Organize analyses into coherent framework | μ (structure/metal) |
| **5. Formulate learning issues** | Identify what group needs to learn | σ (gap analysis/air) |
| **6. Self-study** | Individual research on learning issues | β (inquiry/wood) + λ (direction/fire) |
| **7. Report & synthesize** | Share findings and construct solution | ρ (collaboration/water) + κ (knowledge) |

