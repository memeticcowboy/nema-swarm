| **Anchored Instruction** | Problems presented via video/media narratives | ✶ (immersion) + σ (analysis) |

## Critiques and Nuances

### Valid Concerns

1. **Cognitive overload:** Poorly designed problems can overwhelm learners
2. **Knowledge gaps:** Self-directed study may lead to incomplete understanding
3. **Facilitator dependency:** Quality varies dramatically with tutor skill
4. **Time intensive:** Requires more time than traditional instruction
5. **Assessment challenges:** Harder to standardize evaluation
6. **Cultural fit:** May not align with all educational cultures

