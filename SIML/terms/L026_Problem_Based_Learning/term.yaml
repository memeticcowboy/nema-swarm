## Core Definition

**Problem-Based Learning (PBL)** is an instructional method where students learn through facilitated problem solving. Developed by Howard Barrows and Robyn Tamblyn at McMaster University in the 1960s for medical education, PBL presents learners with complex, ill-structured problems that mirror real-world challenges. Students work in small collaborative groups to analyze the problem, identify learning issues, conduct self-directed research, and synthesize solutions—developing both subject knowledge and problem-solving skills simultaneously.

