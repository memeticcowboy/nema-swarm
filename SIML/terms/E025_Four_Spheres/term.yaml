etymology: >
  Standard Earth science terminology for the four major subsystems of the 
  planet: geosphere (solid Earth), hydrosphere (water), atmosphere (gases), 
  and biosphere (life). Adapted through NEMAtic lens as overlapping habitat 
  constraints rather than separate systems—emphasizing co-presence over 
  boundaries.

definition: >
  The four planetary substrates reconceptualized as circulation contexts 
  that constrain how Φ(t) becomes observable. In NEMA terms, these are not 
  inputs to be engineered but habitat constraints that shape pattern-agent 
  viability. The spheres overlap (habitat nesting, not system boundaries)—
  soil contains minerals (geosphere), moisture (hydrosphere), air pockets 
  (atmosphere), and insects/plants (biosphere) co-present. Each sphere 
  manifests distinct NEMA habitat characteristics: Geosphere = It-Field 
  density + Metal boundary conditions (rigidity, structural memory); 
  Hydrosphere = Water/ρ dominant + flow topology (connectivity, dissipation); 
  Atmosphere = Air/σ gaseous + Q-forward dynamics (mixing, diffusion); 
  Biosphere = Wood/β + Earth/δγ entangled (metabolic cycling, generative range, 
  symbiosis). Operating across spheres requires specific SelfMesh poseability 
  calibrated to each substrate's constraint character.

