context_note: >-
  The emerging practice of using AI-powered conversational agents to provide
  mental health support, existing in the liminal space between technological
  promise and human need. AI chatbots can offer CBT-based interventions and
  immediate accessibility while raising concerns about therapeutic depth,
  dependency risk, and the irreducibility of embodied human connection in healing.
