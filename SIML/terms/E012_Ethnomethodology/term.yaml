# E012 вЂ” Ethnomethodology

## Core Concept

Ethnomethodology is the study of **members' methods** for producing and recognizing social order through situated action. Founded by Harold Garfinkel (1967), developed through Harvey Sacks' conversation analysis, and extended through Wittgensteinian lenses by Hutchinson (2022).

## Key Contributions

**Indexicality:** All expressions depend on context for meaning. Not a problem to solve but a feature of practical reasoning.

**Sequential Organization:** Turn-taking, adjacency pairs, repairвЂ”social facts produced through methodical interaction.

**Reflexivity:** The practices that produce social order are themselves part of that order.

## NEMAtic Translation

**Air (Пѓ) at 0.80:** Indexical expressions as practical achievements. The cut is made visible through interaction, not cognition.

**Water (ПЃ) at 0.75:** Contexture as woven meaning. Not passive context but active weaving.

**Metal (Ој) at 0.70:** Sequential organization as boundary regulation. Turn-taking enforces structure in discourse time.

## The Gap: Thermodynamics

Ethnomethodology describes how order is accomplished but lacks:
- Thermodynamic cost (what fuels the accomplishment?)
- Multi-scale pattern-agency (stops at interaction)
- Elemental pathology (can't distinguish healthy from captured situatedness)

