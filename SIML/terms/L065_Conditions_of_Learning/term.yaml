## Internal vs. External Conditions

### Internal Conditions (Learner State)

```
INTERNAL PROCESSING REQUIREMENTS
│
├─ Cognitive Readiness
│   └─ Prerequisite knowledge activated
│   └─ Working memory capacity available
│
├─ Motivational State
│   └─ Expectancy for success
│   └─ Value for learning outcome
│
└─ Processing Capability
    └─ Attention allocation
    └─ Encoding strategies
    └─ Retrieval mechanisms
```

### External Conditions (Instructional Design)

```
EXTERNAL INSTRUCTIONAL SUPPORTS
│
├─ Stimulus Presentation
│   └─ Signal-to-noise optimization
│   └─ Feature highlighting
│
├─ Guidance Provision
│   └─ Procedural scaffolding
│   └─ Conceptual organization
│
└─ Feedback Mechanisms
    └─ Knowledge of results
    └─ Knowledge of performance
    └─ Reinforcement schedules
```

