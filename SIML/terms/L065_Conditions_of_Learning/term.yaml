## Core Definition

**Conditions of Learning**, developed by Robert Gagné (1965, 1985), presents a comprehensive framework that identifies different types of learning outcomes and the specific internal and external conditions required for each. The theory proposes that learning is hierarchical — complex capabilities build upon simpler ones — and that instruction must be designed to provide the optimal conditions for learning to occur.

### The Five Categories of Learning Outcomes

```
LEARNING OUTCOMES HIERARCHY
│
├─ Intellectual Skills (σ+μ)
│   ├─ Discriminations → Concepts → Rules → Higher-order Rules
│   └─ "Knowing how" — procedural knowledge
│
├─ Cognitive Strategies (λ+β)
│   └─ Self-regulated learning, problem-solving approaches
│   └─ "Managing one's own learning"
│
├─ Verbal Information (σ)
│   └─ Declarative knowledge, facts, principles
│   └─ "Knowing that"
│
├─ Motor Skills (δγ+✶)
│   └─ Physical execution, muscle coordination
│   └─ "Physical performance"
│
└─ Attitudes (ρ+λ)
    └─ Affective orientation toward objects/persons
    └─ "Choosing to behave"
```

### The Learning Hierarchy Principle

```
                    ┌─────────────────────────┐
                    │  HIGHER-ORDER RULES     │
                    │  (problem solving)      │
                    └───────────┬─────────────┘
                                │ requires
                    ┌───────────▼─────────────┐
                    │  RULES                  │
                    │  (applying principles)  │
                    └───────────┬─────────────┘
                                │ requires
                    ┌───────────▼─────────────┐
                    │  CONCEPTS               │
                    │  (classifying objects)  │
                    └───────────┬─────────────┘
                                │ requires
                    ┌───────────▼─────────────┐
                    │  DISCRIMINATIONS        │
                    │  (distinguishing        │
                    │   differences)          │
                    └─────────────────────────┘

Learning builds cumulatively — each level requires mastery of prerequisites
```

## The Nine Events of Instruction

Gagné identified nine instructional events that support the internal learning process:

| Event | Internal Process | External Condition | Element |
|-------|-----------------|-------------------|---------|
| **1. Gain attention** | Reception | Stimulus change | σ (Air) |
| **2. Inform objectives** | Expectancy | Performance description | λ (Fire) |
| **3. Stimulate recall** | Retrieval to WM | Prior learning cues | δγ (Earth) |
| **4. Present content** | Selective perception | Stimulus with features | σ (Air) |
| **5. Provide guidance** | Semantic encoding | Organized content | μ (Metal) |
| **6. Elicit performance** | Responding | Practice opportunity | β (Wood) |
| **7. Provide feedback** | Reinforcement | Knowledge of results | δγ (Earth) |
| **8. Assess performance** | Retrieval | Testing | σ (Air) |
| **9. Enhance retention** | Generalization | Varied practice | β+δγ (Wood+Earth) |

