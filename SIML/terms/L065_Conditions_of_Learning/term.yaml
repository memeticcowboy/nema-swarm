## Instructional Design Applications

### The ADDIE Model Connection

```
ADDIE PHASES ↔ GAGNÉ EVENTS

Analysis → Identify learning outcomes (which of 5 types?)
    ↓
Design → Plan the 9 events for each outcome
    ↓
Develop → Create materials for each event
    ↓
Implement → Deliver the instructional sequence
    ↓
Evaluate → Assess against intended outcomes
```

### Designing for Each Learning Outcome

**Intellectual Skills:**
- Present examples and non-examples
- Provide guided practice with feedback
- Ensure prerequisite discriminations/concepts

**Cognitive Strategies:**
- Model expert problem-solving
- Provide varied practice contexts
- Encourage self-monitoring

**Verbal Information:**
- Organize into meaningful chunks
- Link to existing knowledge
- Provide retrieval cues

**Motor Skills:**
- Demonstrate correct performance
- Provide physical practice
- Give immediate feedback

**Attitudes:**
- Present human model
- Demonstrate consequences
- Provide success experience

## Core Insight

> Gagné's Conditions of Learning reveals that effective instruction is not accidental — it requires systematic attention to both what is being learned (the outcome categories) and how learning is supported (the nine events). The theory bridges learning psychology and instructional design by specifying the precise conditions under which different types of learning occur, creating a metal-structure that enables educators to engineer learning experiences with predictable outcomes.

## One-Sentence Insight

> Conditions of Learning demonstrates that different learning outcomes require different instructional conditions — by understanding the hierarchical structure of capabilities and systematically providing the nine events of instruction, educators can engineer predictable learning experiences.

## Three-Bullet Expansion

- **What:** A comprehensive framework identifying five categories of learning outcomes (intellectual skills, cognitive strategies, verbal information, motor skills, attitudes) and the specific internal and external conditions required for each, organized hierarchically from simple to complex
- **How it works:** Learning builds cumulatively through prerequisite mastery → instruction provides nine sequenced events (gain attention, inform objectives, stimulate recall, present content, provide guidance, elicit performance, provide feedback, assess performance, enhance retention) → each event supports specific internal cognitive processes
- **Where it aims:** Toward systematic instructional design — enabling educators to engineer learning experiences by specifying outcomes, analyzing prerequisites, and delivering the precise conditions needed for each type of learning to occur

