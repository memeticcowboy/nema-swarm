## The Cumulative Learning Principle

```
CUMULATIVE CAPABILITY BUILDING

Level 5: Problem Solving
    "Using rules to solve novel problems"
         ▲
         │ builds upon
Level 4: Rule Learning
    "Applying principles to cases"
         ▲
         │ builds upon
Level 3: Concept Learning
    "Classifying by defining features"
         ▲
         │ builds upon
Level 2: Discrimination Learning
    "Distinguishing between stimuli"
         ▲
         │ builds upon
Level 1: Signal Learning
    "Responding to specific cues"

Each level requires mastery of all previous levels
```

