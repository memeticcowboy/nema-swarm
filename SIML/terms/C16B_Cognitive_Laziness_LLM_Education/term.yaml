elemental_emphasis:
  ∴: How do we distinguish AI as cognitive partner from AI as cognitive substitute?
  ≈: What flows between learner and AI that either scaffolds or offloads thinking?
  ▲: What engagement is lost when the productive struggle of learning is removed?
  𐂷: How does metacognitive self-awareness grow when AI handles cognitive labor?
  ☷: What grounds critical thinking against the complacency of unexamined AI output?
  ⛨: What structural boundaries in educational design preserve cognitive development?
context_note: The phenomenon wherein reliance on LLMs in education enhances short-term performance while fostering metacognitive laziness — the erosion of critical thinking and deep cognitive engagement. This creates a paradox where efficient AI tools supplant rather than scaffold human intellectual development, demanding hybrid intelligence frameworks.
