  epistemics:
    dsrp:
      D: The pilgrimage draws a sharp distinction between political borders and watershed logic, reframing land by water flow
        rather than human jurisdiction. This cut is essential to reorient identity and movement.
      S: The pilgrimage forms a system where participants, routes, hydrology, and the river basin interact to produce ecological-cultural
        reconnection. The system is organized by the watershed as a unifying frame.
      R: Key relationships include the mapping of pilgrimage routes onto the basin, the resonance between sacred journey and
        participant, and the constraint of political borders on route design. These relationships create a dynamic tension
        between flow and boundary.
      P: The pilgrimage adopts the perspective of the watershed itself, seeing land from the viewpoint of water flow. It also
        integrates the participant's embodied perspective, transforming personal experience into basin-level stewardship.
