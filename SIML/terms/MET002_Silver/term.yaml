context_note: 'Silver represents Metal''s lunar, mysterious aspect—resonance (ρ) with
  moon rather than sun, exploration (β) of magical possibilities rather than directed
  purpose. The mirror as portal (μ) is key: silver reflects but also opens. Cross-cultural:
  Greek Selene, Incan Mama Killa, Aztec Tezcatlipoca''s smoking mirror. Silver is
  often rarer than gold in nature, making its symbolic economy complex.'
source: Symbolic Meaning of Metal in Ancient Philosophical and Indigenous Traditions
  — Memetic Cowboy
