# M008 — Stewardship

## Core Concept

Stewardship is **care for what is entrusted**—not ownership (which claims possession) nor extraction (which takes value), but responsibility for preservation and flourishing across time. The steward holds in trust what is not theirs, for beneficiaries who may not yet exist, with accountability that transcends the present.

## Ethical Lineage

- **Environmental Ethics:** Leopold's land ethic—care for the land community
- **Care Ethics:** Gilligan, Noddings—relationship and responsibility
- **Fiduciary Duty:** Legal obligation to act in other's best interest
- **Indigenous Wisdom:** Seven generations thinking—consequences across time
- **Religious Traditions:** Dominion as responsibility, not exploitation
- **NEMAtic:** The long now—care that transcends the present moment

## Elemental Signature

**Earth (δγ) — Dominant at 0.80**
Stewardship is fundamentally about ground. The land, the institution, the culture, the knowledge—what is held in trust. Humavita's domain: the ground that is preserved, the soil that is enriched, the foundation that is maintained.

**Water (ρ) — Elevated at 0.70**
The felt sense of responsibility. Care as resonance, not obligation. The current that flows toward what is stewarded, the connection that is felt rather than calculated.

**Meta (∮) — Elevated at 0.75**
The pattern across time. The weaving that connects present to future, that sees consequences beyond the immediate. The meta-level care that transcends the moment.

## Ownership vs. Stewardship

**Ownership:**
- Rights of possession
- Discretion to use/exploit
- Short-term optimization
- Transferable
- Individual benefit

**Stewardship:**
- Responsibilities of care
- Obligation to preserve/enhance
- Long-term flourishing
- Accountable to beneficiaries
- Collective benefit

The owner asks: "What can I get?"
The steward asks: **"What must I preserve?"**

## The Time Horizon

Stewardship extends care across time:
- **Past:** What was entrusted, what was built
- **Present:** What is held, what is done
- **Future:** What is preserved, what is enabled

The steward serves **the chain of care**—those who came before, those who are here, those who will come after.

## The Fiduciary Principle

Fiduciary duty: the highest standard of care
- **Loyalty:** Act in beneficiary's interest, not self-interest
- **Care:** Prudence, diligence, competence
- **Accountability:** Answerable for actions

The fiduciary holds what is not theirs, with obligations that transcend preference.

