description: 'Playable defined as systems engineered for learnability, agency, and experiential iteration. Four dimensions: feedback density (immediate, granular, actionable), affordance clarity (explicit and discoverable), experiential iteration (safe sandbox for failure), and embodied knowledge (skills become felt rather than merely known). Games as optimized feedback machines versus work as unstructured swamp. Proposes Memetic Simulation Engine, real-time feedback overlays, A/B meme testing, and dynamic AI guidance. Bridges game-optimized learning with traditional sensemaking.'
