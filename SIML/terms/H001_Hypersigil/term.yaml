hex: H001
term: Hypersigil
category: Pattern
family: Sigil
status: active
created: 2026-03-19
author: Bert, the Memetic Cowboy

etymology: >
  Coined by Grant Morrison from "hyper-" (beyond, excessive) + "sigil" (magical sign).
  Extends the traditional sigil—a compressed intention-into-symbol—into extended 
  narrative duration, creating recursive feedback between fiction and reality.

definition: >
  An immersive, extended work of art (comic, novel, performance, world) created with
  specific intent, designed to function as a "sigil containing sigils" that unfolds
  over time. The hypersigil establishes a recursive loop: creator projects into proxy
  character, narrative influences reality, changed creator feeds back into narrative.
  Unlike standard sigils (compress, charge, forget), hypersigils maintain λ-aim across
  years, using narrative duration to transform both the work and the worker.

