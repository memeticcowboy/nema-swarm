name: Spiral_of_Silence
term: Spiral of Silence
nemetic: >-
  Φ(SpiralSilence) = σ(majority|minority) ∘ ρ(conformity|isolation)
  ∘ λ(dominance|suppression) ∘ β(self-censorship|feedback)
  ∘ δγ(anxiety|belonging) ∘ μ(boundary|policed) + ε | :silencing
siml_encoding: >-
  ⟨Opinion|minority⟩ ⊳ ⟨Fear|isolation⟩ → ⟨Silence|self-censored⟩
  ⊗ ⟨Narrative|dominant⟩ ⇄ ⟨Consensus|illusory⟩
formalism:
  math_operators: [σ, ρ, λ, β, δγ, μ]
  dim_operators: [χ, Q_in, Ψ_exp, Z]
  partials:
    - "∂Φ/∂σ (how the distinction between majority and minority is constructed and maintained)"
    - "∂Φ/∂ρ (relational dynamics that make isolation feel like a credible threat)"
    - "∂Φ/∂λ (directionality of suppression — how discourse gets channeled)"
    - "∂Φ/∂β (feedback loop where silence begets more silence)"
    - "∂Φ/∂δγ (metabolic trade-off between authenticity and belonging)"
    - "∂Φ/∂μ (boundary work that determines whose speech is protected)"
  Z_state: "sealing (dominant narrative becomes invisible as construction, treated as natural consensus)"
  tendency: "Conformity/Dissent → 0.8 (strong pressure toward conformity)"
