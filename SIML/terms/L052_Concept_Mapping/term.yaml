## Expert vs. Novice Maps

```
EXPERT MAP CHARACTERISTICS          NOVICE MAP CHARACTERISTICS
────────────────────────────        ────────────────────────────
• Dense cross-links                 • Few or no cross-links
• Hierarchical depth                • Flat structure
• Accurate propositions             • Misconceptions visible
• Multiple organizing               • Single perspective
  principles                        
• Integration across domains        • Siloed knowledge
• Dynamic, evolving structure       • Static, unchanging

Element: β (Wood) highly developed  Element: μ (Metal) underdeveloped
```

## Core Insight

> Concept Mapping reveals that knowledge is not a collection of isolated facts but a web of meaningful relationships. By making these relationships visible, concept maps transform abstract cognitive structures into manipulable objects. The act of mapping is itself a learning process — as we decide where concepts belong and how they connect, we are actively organizing our understanding. The hierarchy is not just a visual convenience; it mirrors how the mind actually stores and retrieves information, with inclusive concepts serving as anchors for more specific knowledge.

## One-Sentence Insight

> Concept Mapping transforms abstract knowledge into visible hierarchical structures, enabling learners to organize concepts meaningfully, identify relationships through linking phrases, and integrate understanding through cross-connections that mirror the architecture of human cognition.

## Three-Bullet Expansion

- **What:** A visual knowledge representation tool using hierarchical node-link diagrams where concepts are connected by labeled relationships (linking words), developed by Novak and Gowin (1984) based on Ausubel's Subsumption Theory
- **How it works:** Learners identify key concepts, arrange them hierarchically (most general at top), connect them with relationship-defining phrases, and add cross-links between branches to reveal integrative connections — creating propositional networks that make knowledge structures explicit and manipulable
- **Where it aims:** Toward meaningful learning and knowledge integration — by externalizing cognitive structures, concept maps enable learners to see gaps in understanding, correct misconceptions, build on prior knowledge, and develop increasingly sophisticated mental models of complex domains

