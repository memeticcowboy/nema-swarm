## Core Definition

**Concept Mapping**, developed by Joseph Novak and Bob Gowin in 1984, is a visual tool for organizing and representing knowledge. Based on David Ausubel's Subsumption Theory, concept maps use **nodes** (concepts) connected by **labeled links** (relationships) to create hierarchical diagrams that make knowledge structures visible and explicit.

### The Anatomy of a Concept Map

```
CONCEPT MAP STRUCTURE
│
┌─────────────────────────────────────────────────────────────────┐
│                                                                 │
│                    [FOCUS QUESTION]                             │
│                         ↓                                       │
│                                                                 │
│                    ┌─────────┐                                  │
│                    │CONCEPT A│ ←── Most general, inclusive       │
│                    │(Root)   │     concept at the top            │
│                    └────┬────┘                                  │
│                         │ is a                                  │
│            ┌────────────┼────────────┐                          │
│            │ is a       │            │ is a                    │
│            ▼            ▼            ▼                          │
│       ┌─────────┐  ┌─────────┐  ┌─────────┐                    │
│       │CONCEPT B│  │CONCEPT C│  │CONCEPT D│                    │
│       │(Branch) │  │(Branch) │  │(Branch) │                    │
│       └────┬────┘  └────┬────┘  └────┬────┘                    │
│            │            │            │                          │
│            │ leads to   │ contains  │ results in               │
│            ▼            ▼            ▼                          │
│       ┌─────────┐  ┌─────────┐  ┌─────────┐                    │
│       │CONCEPT E│  │CONCEPT F│  │CONCEPT G│                    │
│       │(Leaf)   │  │(Leaf)   │  │(Leaf)   │                    │
│       └─────────┘  └─────────┘  └─────────┘                    │
│                                                                 │
│       ═══════════════════════════════════════                   │
│                    CROSS-LINKS                                  │
│       CONCEPT E ←────influences────→ CONCEPT G                  │
│                                                                 │
│  • Hierarchical: Most general at top, specific below            │
│  • Linking words: Define relationships (is a, leads to, etc.)   │
│  • Cross-links: Show connections between different branches     │
│  • Examples: Specific instances at the bottom                   │
│                                                                 │
└─────────────────────────────────────────────────────────────────┘
```

