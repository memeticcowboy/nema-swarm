## The Concept Mapping Process

```
CONCEPT MAPPING WORKFLOW

┌─────────────────────────────────────────────────────────┐
│                                                         │
│  1. DEFINE FOCUS QUESTION                               │
│     "What is the key question this map should answer?"  │
│                      ↓                                  │
│  2. BRAINSTORM CONCEPTS                                 │
│     Generate 10-20 key concepts related to the topic    │
│                      ↓                                  │
│  3. RANK CONCEPTS BY INCLUSIVENESS                      │
│     Most general → Most specific                        │
│                      ↓                                  │
│  4. CONSTRUCT HIERARCHY                                 │
│     Place most general concept at top                   │
│     Arrange subordinate concepts below                  │
│                      ↓                                  │
│  5. ADD LINKING WORDS                                   │
│     Connect concepts with relationship phrases          │
│                      ↓                                  │
│  6. IDENTIFY CROSS-LINKS                                │
│     Find meaningful connections between branches        │
│                      ↓                                  │
│  7. REVISE AND REFINE                                   │
│     Iterate, seek feedback, improve structure           │
│                      ↓                                  │
│  8. ADD EXAMPLES                                        │
│     Include specific instances at appropriate levels    │
│                                                         │
└─────────────────────────────────────────────────────────┘
```

## Connection to Ausubel's Subsumption Theory

Concept Mapping directly operationalizes Ausubel's theory of meaningful learning:

```
SUBSUMPTION THEORY ←→ CONCEPT MAPPING

Ausubel's Principle          Concept Map Element
─────────────────────────────────────────────────────────
Advance Organizers     →     Root concept at top
Subsumption            →     Hierarchical arrangement
Progressive            →     Branching structure
  Differentiation
Integrative            →     Cross-links between
  Reconciliation           branches
Meaningful Learning    →     Propositional structure
                              (concept-link-concept)
```

> **"The most important single factor influencing learning is what the learner already knows."**
> — David Ausubel

Concept maps make this prior knowledge **visible and manipulable**.

## Elemental Pattern Analysis

### Metal/μ + Water/ρ Coalition (Primary)

Concept Mapping is fundamentally a **Metal-Wood** theory with strong Water elements:

**Metal/μ (Structure/Hierarchy):**
- **Hierarchical organization:** The top-down structure reflects cognitive organization
- **Anchor concepts:** The most inclusive concepts serve as anchors for subordinate learning
- **Framework provision:** The map provides a structural framework for new knowledge

**Water/ρ (Relational/Connection):**
- **Linking phrases:** Define the nature of relationships between concepts
- **Cross-links:** Reveal unexpected connections, fostering integrative thinking
- **Propositional units:** Each concept-link-concept triad forms a meaningful proposition

**Wood/β (Branching/Generation):**
- **Network growth:** Maps grow through branching from central concepts
- **Multiple pathways:** Cross-links create multiple routes through knowledge space
- **Emergent insight:** New connections often reveal unexpected relationships

