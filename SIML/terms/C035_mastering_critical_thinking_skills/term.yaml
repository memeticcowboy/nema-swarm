## Etymology & Conceptual History

**Critical** derives from Greek *kritikos* (able to discern, judge), from *krinein* (to separate, decide, judge). This root emphasizes the active process of distinguishing truth from falsehood, signal from noise.

**Thinking** comes from Old English *thencan*, related to Proto-Germanic *thankjan* (to think, consider). The term encompasses both conscious cognitive processing and the underlying neural activities that generate understanding.

**Skills** derives from Old English *scield* (distinction, difference), evolving to mean practical abilities developed through practice. Critical thinking as a "skill" emerged in the 20th century, shifting focus from innate intelligence to learnable, improvable capabilities.

The modern framework of critical thinking skills crystallized through educational reform movements of the 1980s-90s, emphasizing transferable competencies over rote memorization.

## The Six Core Skills

### 1. Identification (σ)
The foundation of critical thinking: clearly defining the problem, situation, or question at hand. Without proper identification, all subsequent analysis targets the wrong objective.

**Key Practices:**
- Ask "What is actually happening here?"
- Distinguish symptoms from root causes
- Clarify stakeholders and their interests

### 2. Research (ρ)
Independent verification of claims and active information gathering. Research transforms passive reception into active knowledge construction.

**Key Practices:**
- Seek primary sources over secondary interpretations
- Distinguish scholarly from popular sources
- Verify unsourced claims before accepting them

### 3. Identifying Biases (β)
Recognition of cognitive distortions in oneself and others. Bias awareness creates the mental space for more objective evaluation.

**Key Practices:**
- Evaluate arguments like a judge, not an advocate
- Challenge your own most cherished beliefs
- Assess source credibility and potential conflicts of interest

### 4. Inference (λ)
Drawing logical conclusions from available evidence. Inference bridges the gap between data and understanding.

**Key Practices:**
- Gather comprehensive information before concluding
- Distinguish correlation from causation
- Recognize when conclusions exceed available evidence

### 5. Determining Relevance (δγ)
Filtering information to focus on what matters. Relevance determination prevents cognitive overload and analysis paralysis.

**Key Practices:**
- Rank data points by importance to the decision
- Eliminate distracting but irrelevant details
- Establish clear criteria for what counts as relevant

### 6. Curiosity (μ)
The motivational engine of critical thinking. Curiosity transforms routine observation into active inquiry.

**Key Practices:**
- Ask open-ended questions about everyday phenomena
- Follow up on initial questions with deeper probes
- Maintain intellectual humility about what you don't know

## Integration and Mastery

These six skills operate as an integrated system:
- **Identification** sets the direction
- **Research** provides the raw material
- **Bias awareness** cleanses the lens
- **Inference** builds the bridge
- **Relevance filtering** maintains focus
- **Curiosity** sustains the journey

Mastery emerges not from perfect execution of individual skills but from their fluid integration—knowing which skill to apply when, and transitioning seamlessly between them.

## Applications

**Academic Success**: Critical thinking skills predict academic performance more reliably than raw intelligence, enabling students to engage deeply with complex material.

**Professional Excellence**: In knowledge work, the ability to evaluate information, identify problems, and make reasoned decisions distinguishes high performers.

**Civic Engagement**: Democratic participation requires citizens who can evaluate claims, recognize manipulation, and form independent judgments.

**Personal Decision-Making**: From health choices to financial planning, critical thinking enables more informed, less regrettable decisions.

