## Cross-Elemental Synthesis

### The "It [Verb]" Construction

The Living Curriculum uses a **phenomenological grammar** — each element is not a noun (subject) but a verb (process):
- Not "Air is clarity" but "Air **finds**"
- Not "Water is emotion" but "Water **feels**"
- Not "Fire is vision" but "Fire **focuses**"

This shifts from **substantive ontology** (things have properties) to **process ontology** (things do actions).

