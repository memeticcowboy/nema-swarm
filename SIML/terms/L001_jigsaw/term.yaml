## Elemental Emphasis Questions

- **∴ (Distinction):** How does individual expertise remain distinct within collective synthesis?
- **≈ (Resonance):** What is the felt-quality of "needing each other" versus "helping each other"?
- **▲ (Direction):** Where does the jigsaw method aim — understanding, empathy, or both?
- **𐂷 (Possibility):** What new forms of knowledge emerge from the jigsaw structure that individual study cannot produce?
