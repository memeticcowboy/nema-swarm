## One-Sentence Insight

> The Jigsaw technique reveals that prejudice dissolves not through contact alone but through *structured necessity* — the discovery that one's own success is materially dependent on the competence of the other.

## Three-Bullet Expansion

- **What:** A cooperative learning method where students become "experts" on distinct topics, then teach peers, creating interdependence (μ-structure) that generates social resonance (ρ-connection)
- **How it feels:** Initially anxious (individual accountability), then collaborative (group synthesis), finally integrated (ownership of whole)
- **Where it aims:** Toward reduced prejudice through functional interdependence — not "liking" the other but *needing* the other

