taxonomy:
  ontology_position: "Process ontology of perpetual becoming; being is always relational, defined by what it is becoming rather than what it statically is."
  epistemic_stance: "Non-dual knowing; truth is held in the tension between opposites rather than resolution of either."
  temporal_orientation: "Cyclic and eternal; time is not linear progression but rhythmic return with difference."
  qualia_signature: "The calm of centered motion—stillness at the center of a turning wheel, peace that does not depend on stasis."
  agency_gradient: "Minimal and distributed; the sage acts through wu wei, aligning with the pattern rather than forcing against it."
  coherence_topology: "Toroidal and self-containing—each pole flows into its opposite through the central channel, forming a closed loop that is never exactly the same twice."
  ce_potential: "Maximum—the symbol encodes the generative paradox from which all complexity emerges; it is the meta-frame for any system requiring dynamic equilibrium."

