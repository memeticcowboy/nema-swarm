## Core Insight

> The CAMIL causal architecture reveals that immersive learning is not a simple technology-to-outcome pipeline but a **layered transformation**: technological features (immersion, control, fidelity) create psychological affordances (presence, agency), which activate affective-cognitive processes (interest, motivation, efficacy, embodiment, load, regulation), which produce diverse knowledge types (factual, conceptual, procedural, transfer).

## One-Sentence Insight

> The full CAMIL model shows that immersive virtual reality learning flows through four causal levels — technology creates affordances, affordances activate processes, processes produce outcomes — with presence and agency as the critical bridge between what the system provides and what the learner experiences.

## Three-Bullet Expansion

- **What:** The complete CAMIL causal architecture — a four-level model from technological factors through psychological affordances and affective-cognitive processes to learning outcomes
- **How it works:** Immersion/control/fidelity → presence/agency → interest/motivation/efficacy/embodiment/load/regulation → factual/conceptual/procedural/transfer knowledge
- **Where it aims:** Toward evidence-based IVR design that addresses each causal level, not just technological features

