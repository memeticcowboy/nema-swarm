## The Four-Level Causal Architecture

### Level 1: Technological Factors
| Factor | Element | Operator | Function |
|--------|---------|----------|----------|
| **Immersion** | Fire/▲ | λ (direction) | Sensory vividness, engagement |
| **Control Factors** | Metal/⛨ | μ (structure) | Interaction fidelity, system response |
| **Representational Fidelity** | Water/≈ | ρ (resonance) | Realism, believability |

### Level 2: Psychological Affordances
| Affordance | Element | Operator | Dimensions |
|------------|---------|----------|------------|
| **Presence** | Air/∴ | σ (distinction) | Physical, Social, Self |
| **Agency** | Wood/𐂷 | β (exploration) | Control, freedom, generation |

**Three Dimensions of Presence (Lee 2004):**
- **Physical presence** — "being there" in the virtual space
- **Social presence** — virtual others experienced as actual social actors
- **Self-presence** — virtual self experienced as actual self

### Level 3: Affective & Cognitive Factors
| Factor | Element | Operator | Outcome Contribution |
|--------|---------|----------|---------------------|
| **Interest** | Fire/▲ | λ (direction) | Engagement, spark |
| **Intrinsic Motivation** | Fire/▲ | λ (direction) | Sustained effort |
| **Self-Efficacy** | Metal/⛨ | μ (structure) | Confidence, belief |
| **Embodiment** | Earth/☷ | δγ (cycling) | Grounded presence |
| **Cognitive Load** | Air/∴ | σ (distinction) | Clarity management |
| **Self-Regulation** | Metal/⛨ | μ (structure) | Metacognitive control |

### Level 4: Learning Outcomes
| Outcome | Element | Type | Description |
|---------|---------|------|-------------|
| **Factual Knowledge** | Metal/⛨ | Declarative | "What" — information recall |
| **Conceptual Knowledge** | Air/∴ | Relational | "Why" — understanding principles |
| **Procedural Knowledge** | Fire/▲ | Skill-based | "How" — performing actions |
| **Transfer** | Wood/𐂷 | Adaptive | Applying to new contexts |

