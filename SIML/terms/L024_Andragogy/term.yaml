## Critiques and Nuances

### Valid Concerns

1. **Cultural specificity:** Andragogy reflects Western, individualistic values
2. **Digital natives:** Some question whether younger adults fit the model
3. **Context dependency:** Not all adult learning situations suit self-direction
4. **Expertise development:** Novices in a domain may need more structure
5. **Power dynamics:** "Self-direction" can mask institutional control

