## Core Insight

> Andragogy reveals that adult learning is not merely pedagogy for older students—it is a fundamentally different phenomenon rooted in self-concept, experience, and intrinsic motivation. The adult learner is not an empty vessel to fill but a self-directing being whose learning is inseparable from their identity, life tasks, and search for meaning. The facilitator's role is not to transmit knowledge but to create conditions where adults can learn from and with each other.

## One-Sentence Insight

> Andragogy posits that adults learn best when treated as self-directing beings whose rich experience serves as learning resource, whose readiness aligns with life tasks, and whose motivation springs from intrinsic purpose rather than external pressure.

## Three-Bullet Expansion

- **What:** A theory of adult learning based on six assumptions—self-concept as autonomous, experience as resource, readiness aligned with life tasks, problem-centered orientation, intrinsic motivation, and need to know why learning matters
- **How it works:** Facilitators create collaborative climates, involve learners in planning, diagnose needs, design problem-centered programs, conduct active learning experiences, and support self-assessment
- **Where it aims:** Toward self-actualization through learning—developing adults who are capable of self-directed inquiry, collaborative problem-solving, and continuous growth throughout life

