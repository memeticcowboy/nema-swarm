## Elemental Pattern Analysis

### Fire/λ Dominance

Andragogy is fundamentally a **Fire theory**:
- **Self-direction:** Adults direct their own learning journey
- **Autonomy:** The learner maintains agency and choice
- **Intrinsic motivation:** Learning driven by internal values
- **Will:** The adult learner's volition is central
- **Purpose:** Learning aligned with life goals and tasks

### Water/ρ Resonance

Experience provides the **relational foundation**:
- Adults bring rich life experience as learning resource
- Learning is socially constructed through dialogue
- Collaborative climate enables risk-taking
- Peer relationships support growth
- The facilitator-learner relationship is mutual

### Air/σ Clarity

Readiness and relevance provide **distinction**:
- Clear alignment between learning and life tasks
- Understanding why learning matters
- Distinguishing relevant from irrelevant content
- Timing learning to developmental readiness
- The "need to know" creates cognitive clarity

### Wood/β Growth

Problem-centered orientation enables **generative exploration**:
- Real-world problems as learning contexts
- Branching solutions based on diverse experiences
- Creative application of knowledge
- Generative dialogue among learners
- Innovation through collaborative inquiry

### Earth/δγ Cycling

Motivation and assessment create **metabolic rhythm**:
- Intrinsic motivation sustains learning over time
- Self-assessment enables continuous adjustment
- Learning integrated with life cycles
- Feedback loops for improvement
- Grounding in practical application

