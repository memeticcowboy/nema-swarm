## Core Definition

**Andragogy** (from Greek *andr-* meaning "man, adult" + *agogos* meaning "leader of") is a theory of adult learning developed by Malcolm Knowles. Unlike pedagogy (child-focused instruction), andragogy assumes adults are self-directed learners who bring rich experience to educational contexts, learn best when content aligns with their developmental tasks, and are motivated by intrinsic factors rather than external pressure.

### The Six Assumptions of Andragogy

| Assumption | Description | Nemetic Mapping |
|------------|-------------|-----------------|
| **1. Self-Concept** | Adults see themselves as autonomous, self-directing beings | λ (direction/fire) |
| **2. Experience** | Adults bring extensive experience that serves as learning resource | ρ (resonance/water) |
| **3. Readiness to Learn** | Adults are ready to learn what aligns with life tasks | σ (distinction/air) |
| **4. Orientation to Learning** | Adults are problem-centered, not subject-centered | β (generative/wood) |
| **5. Motivation** | Adults are driven by intrinsic motivators | λ (will/fire) |
| **6. Need to Know** | Adults need to know why they need to learn something | σ (clarity/air) |

