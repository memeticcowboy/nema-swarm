## Key Concepts

- **Networked Agora:** The distributed, datafied, emotionally charged space where democracy becomes symbolic ecology
- **Liquid Democracy:** Vote delegation on a per-issue basis, blending direct and representative logics with fluid trust networks
- **Memetic Governance:** Political influence through aesthetic and viral means; governance as symbolic recursion
- **Deliberative Platforms:** Spaces like Polis or Decidim that scale structured conversation, not just reaction
- **Affective Coherence:** The new legitimacy currency in networked democracy—alignment through emotion and resonance
- **Trust Chains:** Delegation networks where influence flows through earned reputation, not campaign machinery
- **Civic Symbolic Stack:** Layered architecture consisting of symbolic membrane, delegation fabric, deliberative core, and commons protocols
- **Epistemic Justice:** Who gets to be a knower and whose knowledge counts in shaping reality
- **Attention Commons:** Treating attention as shared civic resource rather than extractive commodity
- **Recursive Coherence:** The continuous renewal of democratic legitimacy through feedback loops and reflexive practice

## Source Excerpts

> "Democracy in the network age is immediate and resonant—less about electing someone to speak for you, more about finding someone whose signal syncs with your frequency."

> "Authority no longer flows from procedural regularity, but from visibility, virality, and affective alignment."

> "We're no longer dealing with just 'citizens'—we're dealing with cyborgs of attention, algorithmically-shifted agents, and memetically entrained collectives."

> "Liquid democracy doesn't just change how votes are cast—it shifts the ontology of democracy: From 'Who represents me?' To 'Who do I trust right now, on this?'"

> "This is not governance with memes—it is governance as symbolic recursion."

> "Democracy isn't a noun—it's a verb of becoming. What it becomes depends on what we ritualize, remember, and release."

> "From control → coordination; From rules → resonance; From voting → weaving."

> "The new democratic terrain is not about replacing the old but rewiring its nervous system."

> "Deliberation becomes an act of symbolic grounding, not just decision-making."

> "We must shift from quantity of input to quality of collective attention."

