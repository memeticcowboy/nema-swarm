## Contemporary Applications

### Dialogic Teaching (Alexander, 2008)

```
DIALOGIC TEACHING PRINCIPLES

1. Collective: Teachers and children address learning tasks together
2. Reciprocal: Teachers and children listen to each other and share ideas
3. Supportive: Children articulate their ideas freely without fear
4. Cumulative: Teachers and children build on their own and each other's ideas
5. Purposeful: Teachers plan and steer classroom talk with educational goals

→ All five principles operate within the ZPD
```

### Reciprocal Teaching (Palincsar & Brown, 1984)

A scaffolded reading comprehension strategy:
1. **Teacher models** comprehension strategies (summarizing, questioning, clarifying, predicting)
2. **Teacher and students** practice together
3. **Students take turns** being the "teacher"
4. **Teacher fades** support as students internalize strategies

