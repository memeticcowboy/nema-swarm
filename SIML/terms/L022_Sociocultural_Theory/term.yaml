## Cultural Tools and Mediation

```
MEDIATED ACTION (vs. Direct Response)

Direct Response:          Mediated Response (Human):
┌──────────┐             ┌──────────┐    ┌──────────┐
│ Stimulus │ ──► Response│ Stimulus │───►│ Cultural │───► Response
└──────────┘             └──────────┘    │  Tools   │
                                         │(language,│
                                         │ symbols) │
                                         └──────────┘

Humans don't respond directly to stimuli—we respond 
through culturally mediated meaning-making systems.
```

### Types of Cultural Tools

| Category | Examples | Function |
|----------|----------|----------|
| **Psychological** | Language, concepts, schemas | Mental organization |
| **Technical** | Writing, calculators, computers | External cognition |
| **Social** | Rituals, norms, institutions | Coordination |
