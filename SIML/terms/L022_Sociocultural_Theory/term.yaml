## The Scaffolding Process

```
SCAFFOLDING DYNAMICS

Phase 1: Recruitment          Phase 2: Reduction
┌─────────────────┐           ┌─────────────────┐
│ MKO establishes │           │ Support fades as│
│ inter-subjectivity│    →    │ learner takes   │
│ and gains buy-in│           │ more control    │
└─────────────────┘           └─────────────────┘
         │                              │
         ▼                              ▼
Phase 4: Transfer             Phase 3: Maintenance
┌─────────────────┐           ┌─────────────────┐
│ Learner applies │    ←      │ Learner practices│
│ skill independently         │ with decreasing │
│ in new contexts │           │ assistance      │
└─────────────────┘           └─────────────────┘

Goal: Fading scaffolding until learner is autonomous
```

