## Core Definition

**Sociocultural Theory**, developed by Lev Vygotsky (1896-1934), posits that human learning is inherently social and mediated by cultural tools (language, symbols, artifacts). The **Zone of Proximal Development (ZPD)** is the distance between what a learner can do independently and what they can achieve with guidance from a more knowledgeable other (MKO).

### The Zone of Proximal Development

```
COMPETENCE SPECTRUM

Cannot do ──────────────────────────────────── Can do
    │                                           │
    │    ╔═══════════════════════════════════╗   │
    │    ║     ZONE OF PROXIMAL              ║   │
    │    ║        DEVELOPMENT                ║   │
    │    ║                                   ║   │
    │    ║  What learner CAN do with         ║   │
    │    ║  guidance from MKO                ║   │
    │    ╚═══════════════════════════════════╝   │
    │                                           │
    └────────── ZPD ────────────────────────────┘
              (Site of learning)
```

