distinction_from_memetics:
  classical_memetics: Units of cultural transmission that replicate via imitation
  nemetic_patterns: Fields of constraints, affordances, tendencies that structure many local events at once
key_characteristics:
- 'Distributed: across minds, infrastructures, ecologies'
- 'Non-replicable as such: you never copy ''climate change''; you add another emission/mitigation event'
- 'Indirectly knowable: via footprints in local practices, artifacts, affects'
why_not_replicable:
- No bounded unit to replicate—only already-ongoing entity
- To 'replicate' climate change would require instantiating 'the whole' again—nonsensical
- Local acts perturb/amplify/resist, never exhaust the pattern
coordination_verb: Coordinate with pressure
pressure_mechanism: Hyperobjects constrain future possibilities, shape institutions, generate recurring motifs
agent_response: Mitigation policies, design shifts, archival practices—all adjusting to and modulating ongoing hyperobject
examples:
- 'Climate change: not a meme we pass on, but long-duration pattern of atmospheric composition, energy flows, feedback loops'
- 'All Styrofoam: material-semiotic field structuring logistics, packaging norms, waste infrastructures, future ecologies'
- 'Sum of recorded sound: ever-expanding archive conditioning culture and perception'
balkin_insight: 'Cultural evolution: exact copying is rare, transformation is constant; memes persist through families of related variants'
morton_mapping: Hyperobjects are not merely big things, but nemetic fields in which countless local acts are situated
key_insight: Nemetic patterns are not discrete replicators but fields we inhabit and are shaped by—no individual act exhausts them
