### The Peer Instruction Cycle

```
PEER INSTRUCTION CYCLE
═══════════════════════════════════════════════════════════

    ┌─────────────────────────────────────────────────┐
    │                                                 │
    │   1. PRE-CLASS READING                          │
    │      (Earth δγ — Preparation)                   │
    │                                                 │
    │   Students read material before class           │
    │   ─────────────────────────────────             │
    │                                                 │
    │   • Establishes common foundation               │
    │   • Identifies areas of confusion               │
    │   • Shifts content delivery outside class       │
    │                                                 │
    └──────────────────┬──────────────────────────────┘
                       │
                       ▼
    ┌─────────────────────────────────────────────────┐
    │                                                 │
    │   2. CONCEPT TEST (ConcepTest)                  │
    │      (Air σ — Distinction/Diagnosis)            │
    │                                                 │
    │   Multiple choice question targeting            │
    │   common misconceptions                         │
    │   ─────────────────────────────────             │
    │                                                 │
    │   • Short (1-2 minutes)                         │
    │   • Focuses on concepts, not calculations       │
    │   • Distractors reflect known misconceptions    │
    │   • Students answer individually                │
    │                                                 │
    │   Example Physics ConcepTest:                   │
    │   "A heavy truck collides with a light car.     │
    │   Which experiences greater force?"             │
    │   A) Truck  B) Car  C) Same  D) Can't tell      │
    │   [Many students incorrectly choose A]          │
    │                                                 │
    └──────────────────┬──────────────────────────────┘
                       │
                       ▼
    ┌─────────────────────────────────────────────────┐
    │                                                 │
    │   3. RESPONSE DISTRIBUTION                      │
    │      (Water ρ — Resonance/Feedback)             │
    │                                                 │
    │   Show histogram of class responses             │
    │   ─────────────────────────────────             │
    │                                                 │
    │   • Students see they're not alone              │
    │   • Creates productive cognitive dissonance     │
    │   • Signals that something needs attention      │
    │                                                 │
    │   If 30-70% correct: Continue to peer discussion│
    │   If >70% correct: Brief explanation, move on   │
    │   If <30% correct: Re-teach concept             │
    │                                                 │
    └──────────────────┬──────────────────────────────┘
                       │
                       ▼
    ┌─────────────────────────────────────────────────┐
    │                                                 │
    │   4. PEER DISCUSSION (Turn to Your Partner)     │
    │      (Water ρ + Wood β — Resonance/Generation)  │
    │                                                 │
    │   Students discuss answers with neighbors       │
    │   ─────────────────────────────────             │
    │                                                 │
    │   • 2-4 minutes of active discussion            │
    │   • Must commit to an answer and reasoning      │
    │   • Try to convince neighbor of your answer     │
    │   • Listen to neighbor's reasoning              │
    │                                                 │
    │   The magic happens here:                       │
    │   • Students must articulate their thinking     │
    │   • Exposure to different perspectives          │
    │   • Social pressure to resolve disagreement     │
    │   • Teaching is the best way to learn           │
    │                                                 │
    └──────────────────┬──────────────────────────────┘
                       │
                       ▼
    ┌─────────────────────────────────────────────────┐
    │                                                 │
    │   5. SECOND VOTE                                │
    │      (Metal μ — Convergence/Structure)          │
    │                                                 │
    │   Students answer the same question again       │
    │   ─────────────────────────────────             │
    │                                                 │
    │   • Often shows dramatic shift to correct       │
    │   • Demonstrates learning in real-time          │
    │   • Validates the peer discussion process       │
    │                                                 │
    └──────────────────┬──────────────────────────────┘
                       │
                       ▼
    ┌─────────────────────────────────────────────────┐
    │                                                 │
    │   6. WHOLE-CLASS DEBRIEF                        │
    │      (Fire λ — Direction/Transformation)        │
    │                                                 │
    │   Instructor facilitates class discussion       │
    │   ─────────────────────────────────             │
    │                                                 │
    │   • Students explain their reasoning            │
    │   • Instructor clarifies and extends            │
    │   • Addresses remaining misconceptions          │
    │   • Connects to broader concepts                │
    │                                                 │
    └─────────────────────────────────────────────────┘
```

