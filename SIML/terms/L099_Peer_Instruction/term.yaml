│         THE PARADOX OF UNDERSTANDING                    │
│                                                         │
│   Traditional Assessment:                               │
│   ┌─────────────┐      ┌─────────────┐                 │
│   │ Student can │─────►│  Teacher    │                 │
│   │ solve       │      │  assumes    │                 │
│   │ problems    │      │  understanding                 │
│   └─────────────┘      └─────────────┘                 │
│          │                                              │
│          ▼                                              │
│   ┌─────────────────────────────────────────┐            │
