│      • "You're not teaching us!" complaint              │
│      • Solution: Explain rationale, show evidence       │
│                                                         │
│   4. DOMINANT PEERS                                     │
│      • Some students dominate discussions               │
│      • Wrong answers can spread                         │
│      • Solution: Structured protocols, instructor       │
│        monitoring                                       │
│                                                         │
│   5. SUBJECT SUITABILITY                                │
│      • Works best for conceptual subjects               │
│      • Harder to apply in skills-based domains          │
│      • Solution: Adapt to case-based or scenario        │
│        questions                                        │
│                                                         │
