## Core Definition

**Peer Instruction** is an interactive teaching method developed by physicist Eric Mazur at Harvard University in the 1990s. It addresses a fundamental problem in education: students can solve algorithmic problems while still holding fundamental misconceptions. Peer Instruction uses structured peer discussion to expose and resolve these misconceptions through social knowledge construction.

