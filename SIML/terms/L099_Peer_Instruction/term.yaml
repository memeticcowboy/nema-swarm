## Connections to Other Theories

### Direct Lineages

- **Constructivism:** Knowledge is built, not transmitted (L017/L093)
- **Social Learning Theory:** Learning through interaction (L013/L089)
- **Cognitive Dissonance:** Productive discomfort drives learning (P005)
- **Vygotsky's ZPD:** Peers operate within each other's zones (L043)

### Related Methods

- **Think-Pair-Share:** Simpler version without ConcepTests
- **Jigsaw Method:** More complex peer teaching structure (L001/L002)
- **Flipped Classroom:** PI is often used in flipped contexts
- **Team-Based Learning:** Extended version with permanent teams
- **Peer Tutoring:** One-on-one version of peer instruction

## Critiques and Limitations

```
┌─────────────────────────────────────────────────────────┐
