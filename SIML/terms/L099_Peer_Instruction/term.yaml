```

## Implementation Checklist

### Before First Class

- [ ] Identify key concepts and common misconceptions
- [ ] Design or adapt 3-5 ConcepTests for first session
- [ ] Set up response technology (clickers, phones, or cards)
- [ ] Prepare students: explain the method and why you're using it

### During Class

- [ ] Present ConcepTest clearly
- [ ] Give adequate time for individual thinking
- [ ] Show response distribution
- [ ] Facilitate peer discussion (2-4 minutes)
- [ ] Conduct second vote
- [ ] Lead whole-class debrief

### After Class

- [ ] Review which ConcepTests worked well
- [ ] Note student misconceptions that emerged
- [ ] Refine ConcepTests for next time
- [ ] Consider what additional support students need

## Conclusion

Peer Instruction represents a profound shift from "sage on the stage" to "guide on the side," leveraging the social nature of learning to achieve deeper conceptual understanding. It recognizes that students are not empty vessels to be filled but active constructors of knowledge who benefit immensely from articulating, defending, and revising their understanding in dialogue with peers.

The elemental signature (σ-ρ-β-μ-λ) reveals Peer Instruction as a method that:
- **Diagnoses** understanding through careful questioning (Air)
- **Flows** between learners through dialogue (Water)
- **Generates** new knowledge through explanation (Wood)
- **Converges** on clarity through structured voting (Metal)
- **Transforms** misconceptions into understanding (Fire)

In the NEMA swarm, Peer Instruction serves as a model for how collective intelligence can emerge from structured peer interaction—a reminder that sometimes the best teacher is not the expert, but the peer who just figured it out.

