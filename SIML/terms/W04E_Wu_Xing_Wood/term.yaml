elemental_emphasis:
  ∴: How is Wood distinguished from Metal's contraction?
  ≈: What resonance does benevolence (Ren) carry in growth?
  ▲: What direction does upward expansion aim?
  𐂷: What possibilities emerge from flexible strength?
  ☷: How does Wood cycle through the seasons?
  ⛨: What boundaries does Wood's growth respect or push?
context_note: 'Chinese Wood represents expansion and growth—not substance but directional process. Key insight: Wood is born from Water (nourishment), creates Fire (fuel), and is controlled by Metal (cutting). This is β (exploratory generation) as seasonal force, not material. The association with benevolence (Ren) and Lesser Yang shows Wood''s ethical dimension—growth as virtuous, not just biological. Flexibility (bending without breaking) is structural virtue.'
source: Wood in Ancient Philosophical and Indigenous Worldviews — Memetic Cowboy
