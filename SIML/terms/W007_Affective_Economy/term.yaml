ahmed_thesis: Emotions are not private internal contents but movements that circulate
economic_metaphor: Affect does not reside positively inside person or sign; produced
  as effect of circulation
sticking_mechanism: Feelings 'stick' to certain figures/objects over time, accruing
  value through circulation
saturation_process: Some signs/bodies become saturated with fear, love, hate through
  repeated attachment
pattern_metabolism: As affects move, they transform both the affect and the bodies
  they pass through
constitution_effect: Who is constituted as 'us,' 'them,' safe, dangerous, lovable
examples:
- Fear of the migrant
- National pride
key_insight: Affective economies are the pattern metabolism—circulation transforms
  both feeling and felt
