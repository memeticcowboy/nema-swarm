## The ⚡ Dopamine Spike — Neuroscientific Grounding

Recent research from UCSF (Namboodiri & Burke, 2025) reveals the biological mechanism behind the ⚡ operator:

> **"When rewards are spaced further apart, the brain requires significantly fewer repetitions before releasing dopamine in anticipation."**

**The ⚡ Signature:**
- **Temporal scale:** Milliseconds–seconds
- **Neurochemical basis:** Dopamine anticipatory release (not reward-response)
- **Trigger:** Q-gradient resolution — tension finding direction
- **Phenomenology:** Chill, awe, thrill, dread-pleasure
- **Cognitive state:** Recognition before explanation
- **Ecological role:** Accelerates Thread → Knot compression

**⚡ as Q-Gradient Resolution:**
The dopamine spike occurs when unresolved relational tension (Q-gradient) finds a pathway. This explains why:
- **Spaced intervals** create stronger frisson (steeper Q-gradients)
- **Sparse rewards (10%)** produce more intense ⚡ than frequent rewards
- **The moment of "Aha!"** coincides with dopamine release *before* the answer

