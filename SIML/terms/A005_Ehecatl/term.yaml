context_note: 'Ehecatl represents Air as change-agent and life-bringer—wind that brings
  rain. Key distinction: conch shell (symbol of breath) and duck-bill mask (beak for
  wind-blowing). Unlike Shu''s cosmic separation or Pneuma''s individual soul, Ehecatl
  is agricultural—wind for rain for crops. The Ik'' sign (Mayan) adds: communication,
  intuition, catalyst. Air as messenger between divine and human, nature and culture.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic
  Cowboy
