description: "Spinoza's Ethics proposes that every emotion composes from three foundational affects: joy (laetitia), sadness (tristitia), and desire (cupiditas). Using geometric proof methodology where each proposition is rigorously derived from prior propositions, the Ethics builds a complete emotional taxonomy. Data visualization on the Observable platform maps these relationships spatially, revealing structural patterns invisible in text. Neuroscientist Antonio Damasio confirms that modern emotion science substantially aligns with Spinoza's 1677 framework, validating the triadic model as a durable foundation for understanding affective complexity."
