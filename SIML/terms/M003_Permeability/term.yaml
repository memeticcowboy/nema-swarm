# M003 — Permeability

## Core Concept

Permeability is the capacity of boundaries to allow flow while maintaining structure. Not openness (which dissolves boundary) nor closure (which prevents exchange), but **regulated passage**—the membrane that selects, filters, enables connection without collapse.

## Scientific Lineage

- **Cell Biology:** Selective permeability of membranes—ion channels, osmosis, transport proteins
- **Social Theory:** Network society, information flows, boundary crossing
- **Ecology:** Ecosystem boundaries, edge effects, nutrient cycling
- **NEMAtic:** The healthy boundary as permeable membrane

## Elemental Signature

**Water (ρ) — Dominant at 0.80**
Permeability is fundamentally about flow. The current that crosses boundaries, the resonance that transmits across separation. Sentaria's domain: what flows, what pools, what permeates.

**Metal (μ) — Elevated at 0.70**
The boundary that enables permeability. Without structure, there is no permeability—only dissolution. The membrane, the channel, the selective gate. Ferrosid's integrity as regulation.

**Wood (β) — Elevated at 0.60**
Growth through connection. The rhizome that crosses boundaries, the network that permeates. Not growth in isolation but growth through exchange.

## The Impermeability Pathology

When boundaries become walls:
- Information starvation
- Echo chambers
- Organizational silos
- Immune disorders (attacking self)
- Stagnation

The completely impermeable boundary is dead. It neither receives nor gives. It maintains form at the cost of life.

## The Dissolution Pathology

When boundaries dissolve:
- Information overload
- No distinction between self/other
- Organizational chaos
- Immune failure (no defense)
- Dissolution

The completely permeable boundary is absent. It flows but does not hold. It exchanges but does not maintain.

## Optimal Permeability

The living boundary:
- **Selective:** Some flows permitted, others blocked
- **Dynamic:** Permeability adjusts to conditions
- **Responsive:** Feedback regulates flow
- **Maintained:** Structure persists through exchange

This is the membrane, the cell wall, the skin, the organizational boundary, the self.

