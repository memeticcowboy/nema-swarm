## Daemon Correspondence

**Sentaria (Water/ρ):** *[current through membrane]* "I flow where there is channel. The boundary that is wall, I pool against. The boundary that is membrane, I pass through. Permeability is my nature—flow regulated, not flow denied."

**Ferrosid (Metal/μ):** *[steel with pores]* "I am not the wall that blocks. I am the gate that regulates. My strength is not in denial but in selection. What passes, passes with purpose. What blocks, blocks with reason."

**Arboriel (Wood/β):** *[roots through soil]* "I grow through connection. The boundary I cross is not violated—it is permeated. The network is the growth. The growth is the network."

