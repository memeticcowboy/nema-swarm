## Core Insight

> Constructionism reveals that understanding is not something you receive but something you **build** — and the building happens most powerfully when you create something external that you can share, discuss, and debug. The bug is not a failure but an **occasion** — the moment when your understanding must grow to accommodate new information. Knowledge becomes **generative** when you can use it to create new things, not just reproduce what you've learned.

## One-Sentence Insight

> Papert's Constructionism demonstrates that learning is most effective when learners create public artifacts they can debug and share — transforming abstract knowledge into tangible, generative understanding through the iterative cycle of building, testing, and fixing.

## Three-Bullet Expansion

- **What:** A theory extending constructivism, arguing that learning happens most powerfully when learners construct meaningful public artifacts (objects-to-think-with) that can be shared, discussed, and debugged
- **How it works:** Create external artifact → test against intention → identify bugs → debug and fix → reflect and share → reconstructed understanding that is generative (can create new things)
- **Where it aims:** Toward learning as a creative, productive act — knowledge that lives in what you can build and fix, not just what you can recall

