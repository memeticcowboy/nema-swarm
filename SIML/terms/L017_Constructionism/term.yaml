```

## Elemental Pattern Analysis

### Wood/β Dominance

Constructionism is fundamentally a **Wood theory**:
- **Branching:** Multiple paths to solution; exploration through creation
- **Generation:** Knowledge emerges through making, not receiving
- **Growth:** Understanding develops like a living thing — iteratively, organically
- **Debugging:** Pruning what doesn't work; cultivating what does

### Supporting Elements

| Element | Role in Constructionism |
|---------|------------------------|
| **Air/σ** | Debugging — distinguishing working from broken; clarity through testing |
| **Water/ρ** | Sharing — social construction, collaborative debugging |
| **Fire/λ** | Purpose — the drive to create, the vision of what to build |
| **Metal/μ** | Structure — the grammar of programming, the rules of the microworld |
| **Earth/δγ** | Iteration — the cyclical nature of create-test-fix-reflect |

## Constructionism vs. Constructivism

| Dimension | Constructivism (Piaget) | Constructionism (Papert) |
|-----------|------------------------|--------------------------|
| **Focus** | Mental structures | External artifacts |
| **Mechanism** | Accommodation/assimilation | Building and debugging |
| **Knowledge location** | In the mind | In the mind + in artifacts |
| **Learning trigger** | Cognitive disequilibrium | Bugs, failed expectations |
| **Social role** | Secondary | Primary (public entities) |
| **Element** | Metal/Air (structures) | Wood/Air (creation/debugging) |

