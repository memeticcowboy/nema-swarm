## Debugging: The Heart of Constructionist Learning

| Stage | Activity | Learning Mechanism | Element |
|-------|----------|-------------------|---------|
| **Create** | Build initial artifact | Externalize thinking | Wood/β |
| **Test** | Observe behavior | Compare intention vs. result | Air/σ |
| **Diagnose** | Identify discrepancy | Distinguish working from broken | Air/σ |
| **Fix** | Modify and retry | Reconstruct understanding | Wood/β |
| **Reflect** | Share and discuss | Social knowledge construction | Water/ρ |

**Key Insight:** The bug is not an obstacle — it is the occasion for learning.

```
The Debugging Cycle:

    ┌──────────┐
    │  Create  │ ←──────┐
