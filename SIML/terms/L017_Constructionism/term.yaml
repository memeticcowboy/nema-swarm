## Papert's LOGO and Turtle Geometry

The paradigmatic example of constructionism in action:

```
Turtle Geometry (Body-Syntonic Learning):
    
    The Learner ←→ The Turtle ←→ The Program
         │             │             │
         │             │             │
         └─────────────┴─────────────┘
               
    • The turtle moves as the child might move
    • The child identifies with the turtle's position
    • Programming becomes embodied, not abstract
    • Debugging is natural — "what would I do?"
    
Example: Drawing a Circle
    Traditional: "A circle is the locus of points..."
    
    Constructionist: REPEAT 360 [FORWARD 1 RIGHT 1]
                   → The learner builds the circle
                   → The circle emerges from action
                   → Understanding is in the making
```

