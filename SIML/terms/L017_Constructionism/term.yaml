## Core Definition

**Constructionism** (Papert, 1980) extends constructivism with a crucial insight: learning happens most effectively when learners are **actively engaged in constructing meaningful public artifacts** — things they can share, discuss, and reflect upon. While constructivism says knowledge is constructed in the mind, constructionism says this construction happens most powerfully when externalized.

### Key Principles

1. **Objects-to-Think-With:** Physical and digital artifacts that make abstract concepts tangible
2. **Debugging as Learning:** The process of finding and fixing errors is where deep learning occurs
3. **Public Entity:** Externalized creations enable reflection, discussion, and social learning
4. **Generative Knowledge:** Understanding that enables creating new things, not just reproducing
5. **Learning by Making:** The hand and mind work together in knowledge construction

