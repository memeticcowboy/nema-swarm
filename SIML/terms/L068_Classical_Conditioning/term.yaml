## Biological Preparedness

Not all associations are learned equally easily:

```
EASY TO CONDITION (Biologically Prepared):
├── Taste + Nausea (Garcia Effect)
│   └── One pairing often sufficient
│   └── Long delay (hours) still effective
├── Sound + Shock (Defensive conditioning)
│   └── Rapid acquisition
│   └── Strong, resistant to extinction
└── Visual cues + Food
    └── Natural foraging associations

DIFFICULT TO CONDITION (Contraprepared):
├── Taste + Shock
│   └── Unnatural association
├── Visual cue + Nausea
│   └── Less effective than taste
└── Arbitrary combinations
    └── Require many more trials
```

## Classical Conditioning in Human Learning

### Emotional Conditioning
```
PHOBIA FORMATION:
Neutral stimulus (spider) + Aversive experience (pain/fear)
                    ↓
           Conditioned fear response
                    ↓
           Generalization to similar stimuli
           Avoidance behaviors

PHOBIA TREATMENT (Systematic Desensitization):
CS (spider) → Relaxation (incompatible with fear)
         ↓
    Extinction of fear response
```

### Advertising Applications
```
PRODUCT + POSITIVE FEELINGS (attractive people, music, happiness)
                    ↓
         Conditioned positive association
                    ↓
         Product preference/brand loyalty
```

### Educational Applications

| Application | Mechanism | Example |
|-------------|-----------|---------|
| **Test anxiety** | Conditioned fear to testing situations | Past failure + test context |
| **Positive classroom associations** | Pair learning with positive experiences | Subject + engaging activities |
| **Aversion to subjects** | Negative experiences with content | Math + public embarrassment |
| **Conditioned reinforcers** | Neutral stimuli gain motivating power | Grades, praise as conditioned rewards |

## Connection to Related Theories

### Classical vs. Operant Conditioning

| Aspect | Classical Conditioning | Operant Conditioning |
|--------|------------------------|----------------------|
| **Response type** | Involuntary, reflexive | Voluntary, operant |
| **Association** | Stimulus-stimulus | Response-consequence |
| **Timing** | CS must precede US | Consequence follows response |
| **Element** | Earth (δγ-cycling) | Earth (δγ-contingency) |
| **Focus** | What predicts what | What follows what |
| **Example** | Bell → salivation | Lever press → food |

### Classical Conditioning and Behaviorism

Classical conditioning forms the foundation of **Watson's Behaviorism**:
```
WATSON'S POSITION:
"Give me a dozen healthy infants, well-formed, and my own 
specified world to bring them up in and I'll guarantee to 
take any one at random and train him to become any type 
of specialist I might select..."

Based on: Classical conditioning can shape any behavior
Reality: Biological constraints on conditioning (preparedness)
```

