## The Rescorla-Wagner Model (1972)

A mathematical model of classical conditioning:

```
ΔV = αβ(λ - ΣV)

Where:
ΔV = Change in associative strength
α  = Salience of CS (0 to 1)
β  = Learning rate parameter (0 to 1)
λ  = Maximum possible associative strength
ΣV = Sum of all current associative strengths

Key Insights:
- Learning is driven by SURPRISE (λ - ΣV)
- When US is fully predicted, no more learning occurs
- Explains blocking, overshadowing, and relative validity
```

### Phenomena Explained by Rescorla-Wagner

| Phenomenon | Description | Model Explanation |
|------------|-------------|-------------------|
| **Blocking** | CS1+US learning blocks CS2 learning | US already predicted, no surprise |
| **Overshadowing** | Strong CS dominates weak CS | Strong CS absorbs most associative strength |
| **Overexpectation** | Two CSs together then separately | Combined strength exceeds λ, leads to extinction |

## Core Insight

> Classical Conditioning reveals that learning is fundamentally predictive — organisms automatically extract statistical regularities from their environment, forming associations between co-occurring events. The "dumb" mechanism of temporal contiguity creates the "smart" capacity to anticipate the future, transforming neutral stimuli into meaningful signals that prepare the organism for what comes next.

## One-Sentence Insight

> Classical conditioning demonstrates how involuntary learning emerges from the temporal pairing of stimuli — transforming neutral signals into predictive cues through the cyclical mechanism of association, extinction, and recovery.

## Three-Bullet Expansion

- **What:** A fundamental learning process where a neutral stimulus becomes associated with a biologically significant stimulus through repeated temporal pairing, resulting in an involuntary conditioned response that anticipates the unconditioned stimulus
- **How it works:** Neutral stimulus + Unconditioned stimulus (repeated) → Association formation → Conditioned response; the CS comes to predict the US, preparing the organism through anticipatory responses
- **Where it aims:** Toward predictive adaptation — organisms automatically learn environmental regularities to prepare for significant events before they occur, creating involuntary response patterns that enhance survival

