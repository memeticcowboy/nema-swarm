## Core Definition

**Classical Conditioning**, discovered by Russian physiologist Ivan Pavlov (1897, 1927), is a fundamental learning mechanism where an organism learns to associate a **neutral stimulus** with a **biologically significant stimulus**, resulting in an **involuntary conditioned response**. Originally studied through dogs' salivation responses to food, the theory reveals how organisms automatically form predictive associations through temporal pairing.

### The Classical Conditioning Architecture

```
BEFORE CONDITIONING:
┌─────────────────────────────────────────────────────────┐
│  Food (US) ───────────────► Salivation (UR)            │
│     ↑                      (unlearned, automatic)       │
│  (naturally elicits)                                    │
│                                                         │
│  Bell (NS) ───────────────► No response                │
│     ↑                                                   │
│  (neutral, no meaning)                                  │
└─────────────────────────────────────────────────────────┘

DURING CONDITIONING:
┌─────────────────────────────────────────────────────────┐
│  Bell (NS) + Food (US) ───► Salivation (UR)            │
│     ↑         ↑                                         │
│  (presented together, repeatedly, with temporal         │
│   contiguity — the neutral stimulus predicts the US)    │
└─────────────────────────────────────────────────────────┘

AFTER CONDITIONING:
┌─────────────────────────────────────────────────────────┐
│  Bell (CS) ───────────────► Salivation (CR)            │
│     ↑                      (learned, anticipatory)      │
│  (now predicts food)                                    │
│                                                         │
│  Food (US) ───────────────► Salivation (UR)            │
│     ↑                      (still automatic)            │
└─────────────────────────────────────────────────────────┘
```

### Key Components

| Component | Symbol | Definition | Example |
|-----------|--------|------------|---------|
| **Unconditioned Stimulus (US)** | US | Naturally triggers response | Food → salivation |
| **Unconditioned Response (UR)** | UR | Automatic, unlearned reaction | Salivation to food |
| **Neutral Stimulus (NS)** | NS | Initially produces no response | Bell before conditioning |
| **Conditioned Stimulus (CS)** | CS | Learned predictor of US | Bell after conditioning |
| **Conditioned Response (CR)** | CR | Learned response to CS | Salivation to bell |

## The Pavlov Experiments (1890s-1920s)

### The Discovery

```
ORIGINAL SETUP:
    Pavlov studying digestive physiology in dogs
    Measured salivation via surgically implanted fistula
    
ACCIDENTAL OBSERVATION:
    Dogs began salivating BEFORE food arrived
    Response triggered by lab sounds, footsteps, bell
    
SYSTEMATIC INVESTIGATION:
    Controlled pairing of neutral stimulus (bell) with food
    Documented the acquisition curve
    Discovered extinction, spontaneous recovery, generalization
```

### The Acquisition Curve

```
Trials
  │
  │    CR Strength
  │         ╭─────── Asymptote (maximum conditioning)
  │        ╱
  │       ╱
  │      ╱  Rapid initial learning
  │     ╱
  │    ╱
  │   ╱ Slow start (first associations)
  │  ╱
  │_╱_________________________________
  0    5   10   15   20   25   30
                    Trials

The conditioned response strengthens with repeated CS-US pairings,
following a negatively accelerated learning curve.
```

## Fundamental Phenomena

### 1. Acquisition
The initial learning phase where the CS-US association is formed:
```
CS (bell) → brief delay → US (food) → UR (salivation)
         ↑_________________________↓
              Association strengthens
```

### 2. Extinction
When the CS is presented without the US, the CR gradually weakens:
```
CS (bell) → no US → CR decreases → eventual absence

Note: Extinction is NEW learning, not unlearning
The original association remains, suppressed by inhibitory learning
```

### 3. Spontaneous Recovery
After a rest period following extinction, the CR reappears:
```
Conditioning → Extinction → Rest Period → Spontaneous Recovery
                                                    ↓
                                            CR returns (weaker)
                                            Demonstrates extinction
                                            is not forgetting
```

### 4. Stimulus Generalization
The CR occurs to stimuli similar to the CS:
```
CS: 1000 Hz tone → CR (salivation)
     Similar tones also elicit CR (weaker for less similar)
     
Generalization Gradient:
    500 Hz ──●──────────────────────── (weak CR)
    750 Hz ─────●───────────────────── (moderate CR)
   1000 Hz ───────●─────────────────── (strongest CR) ← Original CS
   1250 Hz ─────●───────────────────── (moderate CR)
   1500 Hz ──●──────────────────────── (weak CR)
```

### 5. Stimulus Discrimination
Learning to respond only to the specific CS, not similar stimuli:
```
CS+ (1000 Hz + food) → CR
CS- (750 Hz + no food) → no CR

Result: Organism discriminates between similar stimuli
        Responds only to predictive cue
```

### 6. Higher-Order Conditioning
A previously conditioned CS can condition a new neutral stimulus:
```
Phase 1: Bell (CS1) + Food (US) → Salivation

Phase 2: Light (NS) + Bell (CS1) → Salivation
         (no food presented)

Result: Light (CS2) alone → Salivation
        Second-order conditioning established
```

## Temporal Relationships

### Optimal Timing

| Temporal Pattern | Description | Effectiveness |
|------------------|-------------|---------------|
| **Short-delay** | CS starts, US follows shortly | Most effective |
| **Simultaneous** | CS and US begin together | Less effective |
| **Trace** | CS ends before US begins | Moderate (requires memory) |
| **Backward** | US before CS | Least effective |

```
Short-Delay (Optimal):
CS │██████│     
      US │██████│
   
Simultaneous:
CS │██████│
US │██████│

Trace:
CS │██████│    (gap)    │US│

Backward:
US │██████│
      CS │██████│
```

