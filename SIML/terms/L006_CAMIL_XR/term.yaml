| **Therapy** | Exposure Therapy | Safe immersion reduces anxiety, builds efficacy |
| **Training** | Flight Simulators | Procedural learning through embodied repetition |
| **Gaming** | Serious Games | Motivation + learning through immersive challenge |
| **Anthropology** | Field Immersion | Learning through being there, not reading about |

## Core Insight

> CAMIL/XR reveals that immersive learning works not by delivering better content but by **transforming the learner's state** — from detached recipient to embodied participant, where interest, confidence, presence, and clarity converge.

## One-Sentence Insight

> Extended Reality enhances language learning by creating immersive presence that reduces cognitive load, increases embodiment, and transforms learning from information delivery to embodied participation.

## Three-Bullet Expansion

- **What:** CAMIL (Cognitive Affective Model of Immersive Learning) applied to XR technology — six factors (interest, motivation, self-efficacy, embodiment, cognitive load, self-regulation) that enable immersive learning outcomes
- **How it feels:** Present, grounded, engaged — the learner is "there" rather than studying "about"
- **Where it aims:** Toward factual, conceptual, and procedural knowledge transfer through embodied experience

