## Practical Applications

### Educational Design Principles

```
DUAL CODING PRINCIPLES FOR INSTRUCTION

1. PAIR WORDS WITH IMAGES
   ❌ "The mitochondria is the powerhouse of the cell"
   ✓  Text + diagram showing ATP production

2. AVOID COGNITIVE OVERLOAD
   ❌ Text + identical narration + decorative images
   ✓  Complementary text and visuals (not redundant)

3. SPATIAL CONTIGUITY
   ❌ Text on page 1, image on page 5
   ✓  Text integrated with relevant image

4. SIGNALING
   Use visual cues (arrows, highlighting) to direct attention
   between text and relevant image components

5. TEMPORAL CONTIGUITY
   Present narration and animation simultaneously
   (not sequentially)
```

