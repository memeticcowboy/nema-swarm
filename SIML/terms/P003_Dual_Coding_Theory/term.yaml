## Core Insight

> Dual Coding Theory reveals that human cognition is inherently multimodal — we don't just think in words or just think in images, but in the dynamic interplay between symbolic and analog representations. The power of dual coding lies not merely in presenting information twice, but in creating referential bridges that enable richer, more flexible, and more durable mental models. When we see and hear, label and visualize, abstract and concretize — we learn more deeply than either mode alone could achieve.

## One-Sentence Insight

> Dual Coding Theory demonstrates that human cognition operates through separate but interconnected verbal and nonverbal systems, and that learning is enhanced when information is encoded in both modalities simultaneously, creating referential connections that produce additive memory and comprehension effects.

## Three-Bullet Expansion

- **What:** A cognitive theory proposing that humans process information through two separate but interconnected systems — a verbal system for language-based information and a nonverbal system for imagery — with referential connections between them enabling richer mental representations
- **How it works:** Information enters through either verbal or nonverbal channels, activating representational units (logogens or imagens); referential processing creates bidirectional connections between the systems; associative processing builds networks within each system; the result is additive — dual-coded information is remembered better than single-coded information
- **Where it aims:** Toward optimized learning and communication — by presenting information in complementary verbal and visual formats, educators and communicators can leverage both processing systems, creating multiple retrieval pathways and deeper conceptual understanding

