## Core Definition

**Dual Coding Theory (DCT)**, developed by Allan Paivio in 1971 and elaborated in his 1986 book *Mental Representations*, proposes that human cognition involves two separate but interconnected processing systems: a **verbal system** for processing language-based information and a **nonverbal system** (primarily visual/spatial) for processing imagery and nonverbal information. These systems can operate independently but also form connections that enhance learning and memory.

