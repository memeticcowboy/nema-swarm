## Elemental Pattern Analysis

### Air/σ and Water/ρ Co-Dominance

Dual Coding Theory is fundamentally a theory of **distinction and resonance**:

- **Air/σ (Distinction):** The verbal system operates through symbolic abstraction — words as arbitrary signs distinct from their referents. This is the realm of clear categories, definitions, and sequential processing.

- **Water/ρ (Resonance):** The nonverbal system operates through holistic, analog processing — images that resonate with sensory experience and emotional tone.

- **Wood/β (Branching):** Referential connections create branching pathways between the two systems, enabling richer mental models.

- **Metal/μ (Structure):** The overall architecture provides a structured framework for understanding how multimodal information is organized.

### Elemental Mapping

| Element | Role in Dual Coding Theory |
|---------|---------------------------|
| **Air/σ** | Verbal system, logogens, symbolic processing, sequential decoding |
| **Water/ρ** | Nonverbal system, imagens, holistic processing, analog representation |
