## Critiques and Nuances

### Valid Concerns

1. **Individual differences:** Not everyone has equal imagery ability ("vividness" varies)
2. **Domain specificity:** More effective for concrete vs. abstract content
3. **Developmental factors:** Young children may have less developed verbal system
4. **Cultural factors:** Symbol systems vary across cultures
5. **Redundancy risk:** Poorly designed dual coding can increase load rather than aid processing

### The Expert-Novice Difference

> Experts have richer, more interconnected referential links. Novices may process verbal and visual information separately without making meaningful connections. Instruction must explicitly support referential processing for novices.

**Element:** Wood/β (branching) — experts have more developed referential pathways

