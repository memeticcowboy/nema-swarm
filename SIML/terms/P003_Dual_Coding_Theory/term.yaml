## The Three Types of Processing

### 1. Representational Processing

Activating the appropriate verbal or nonverbal representations directly:

```
REPRESENTATIONAL PROCESSING

Verbal Input → [Logogen Activation] → Verbal Representation
                    ↑
              (symbolic decoding)

Nonverbal Input → [Imagene Activation] → Nonverbal Representation
                       ↑
                 (pattern recognition)
```

### 2. Referential Processing

Making connections between the two systems:

```
REFERENTIAL PROCESSING (β — Wood/branching)

    Verbal Representation ←────────→ Nonverbal Representation
           (word)          bidirectional      (image)
                              ↕
                         "cat"
                           ↕
                    ┌───────────────┐
                    │  /\_/\        │
                    │ ( o.o )       │
                    │  > ^ <        │
                    └───────────────┘

The word "cat" activates the image of a cat
The image of a cat activates the word "cat"
```

### 3. Associative Processing

Making connections within each system:

```
ASSOCIATIVE PROCESSING

Within Verbal System:
"cat" → "feline" → "mammal" → "animal" → "living thing"

Within Nonverbal System:
[cat image] → [furry texture] → [whiskers] → [purr sound]
```

