## Core Definition

**Cognitive Dissonance** is the psychological tension that occurs when a person holds two or more contradictory beliefs, ideas, or values, or when their behavior conflicts with their beliefs. First proposed by Leon Festinger in 1957, the theory posits that this tension creates a motivational drive to reduce the dissonance and achieve cognitive consonance (consistency).

