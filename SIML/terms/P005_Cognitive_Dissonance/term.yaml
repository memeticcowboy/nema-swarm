## Core Insight

> Cognitive Dissonance Theory reveals that the mind is not a neutral information processor but a **coherence-seeking system**. The discomfort of inconsistency is not merely unpleasantвҖ”it is a motivational force that drives belief change, behavior change, or creative rationalization. In learning contexts, dissonance is both a danger (triggering defensive denial) and an opportunity (catalyzing conceptual change). The educator's art lies in creating **productive dissonance**вҖ”enough tension to motivate change, within a safe enough container to allow growth rather than defense.

## One-Sentence Insight

> Cognitive Dissonance Theory demonstrates that the recognition of inconsistency between beliefs and behavior creates psychological tension that drives toward resolutionвҖ”through belief change, behavior change, or rationalizationвҖ”revealing that learning often requires the discomfort of unlearning.

## Three-Bullet Expansion

- **What:** A theory of psychological tension arising from inconsistent cognitions (beliefs, behaviors, values), creating a motivational drive to restore consistency through belief change, behavior change, adding consonant cognitions, or reducing importance
- **How it works:** Inconsistency detected вҶ’ psychological discomfort (dissonance) aroused вҶ’ drive to reduce dissonance activated вҶ’ resolution strategy selected вҶ’ consonance restored (with effort justification strengthening commitment to chosen paths)
- **Where it aims:** Toward cognitive consonance and psychological harmonyвҖ”though the path taken (rationalization vs. genuine change) determines whether the result is growth or defensive self-deception

