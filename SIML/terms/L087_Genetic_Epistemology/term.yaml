### Developmentally Appropriate Practice

- **Sensorimotor:** Provide sensory experiences, object permanence games
- **Preoperational:** Use concrete props, visual aids, reduce egocentrism through perspective-taking
- **Concrete operational:** Hands-on materials, classification activities, conservation tasks
- **Formal operational:** Abstract problems, hypothetical scenarios, scientific reasoning

## Criticisms and Limitations

1. **Stage rigidity:** Evidence suggests more gradual, continuous development
2. **Underestimation of children:** Later research shows earlier competencies
3. **Cultural bias:** Stages may reflect Western educational experiences
4. **Individual variation:** Developmental timing varies significantly
5. **Social factors minimized:** Less emphasis on social/cultural context than Vygotsky

