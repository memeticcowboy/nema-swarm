## Core Definition

**Genetic Epistemology**, developed by Jean Piaget (1896-1980), is a theory of knowledge development that explains how humans construct cognitive structures (schemas) through interaction with their environment. The term "genetic" refers to the genesis/origin of knowledge, not heredity. Piaget proposed that cognitive development proceeds through invariant stages, with each stage representing qualitatively different ways of thinking.

