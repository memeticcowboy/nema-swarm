|--------|-------------|------------------------|
| **Knowledge source** | External environment | Active construction |
| **Learner role** | Passive recipient | Active agent |
| **Learning mechanism** | Stimulus-response conditioning | Assimilation/accommodation |
| **Development view** | Continuous | Stage-based, qualitative shifts |
| **Element** | Earth/ОҙОі (conditioning) | Wood/ОІ (growth) + Earth/ОҙОі (structure) |

### vs. Vygotsky's Sociocultural Theory

| Aspect | Piaget | Vygotsky |
|--------|--------|----------|
| **Primary driver** | Individual maturation | Social interaction |
| **Role of language** | Reflection of thought | Tool for thought |
| **Learning vs. development** | Development precedes learning | Learning leads development |
| **Focus** | Universal stages | Cultural variation |
| **Element** | Earth/ОҙОі (individual structure) | Water/ПҒ (social relations) |

## Educational Implications

### Discovery Learning

Piaget's work inspired **discovery learning** approaches:
- Learners construct knowledge through exploration
- Cognitive conflict (disequilibrium) drives learning
- Manipulatives support concrete operational thinking
- Readiness is determined by developmental stage, not age

