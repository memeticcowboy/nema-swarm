### 2. Operations

**Operations** are internalized, reversible mental actions:
- **Concrete operations:** Mental actions on actual objects (conservation, classification)
- **Formal operations:** Mental actions on ideas and abstractions (hypothetical reasoning)

### 3. The Role of Play

| Play Type | Age | Function | Cognitive Process |
|-----------|-----|----------|-------------------|
| **Practice play** | Sensorimotor | Repeat actions for mastery | Assimilation |
| **Symbolic play** | Preoperational | Represent world through symbols | Accommodation |
| **Games with rules** | Concrete+ | Social coordination, rule following | Equilibration |

## Elemental Pattern Analysis

### Earth/ОҙОі Dominance (Primary)

Genetic Epistemology is fundamentally an **Earth theory**:
- **Structural grounding:** Knowledge built on sensorimotor foundations
- **Cyclical development:** Stages proceed in invariant sequence
- **Embodied cognition:** Intelligence begins in physical action
- **Conservation:** Understanding that quantity remains constant despite appearance changes

### Wood/ОІ as Secondary (Adaptation)

The twin processes of adaptation:
- **Assimilation:** Growing within existing structure (like a tree adding rings)
- **Accommodation:** Branching in new directions when existing structure insufficient

