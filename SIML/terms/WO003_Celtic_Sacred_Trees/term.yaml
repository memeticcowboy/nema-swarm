context_note: 'Celtic sacred trees represent Wood as specific virtue-embodiment—not
  generic ''tree'' but particular species carrying particular meanings. Key insight:
  Oak (strength, Zeus), Ash (world bridge, Yggdrasil connection), Birch (renewal,
  Beltane). This is σ (distinction) as spiritual taxonomy—each tree has its role,
  its season, its teaching. The Ogham alphabet extends this: letters are tree-names,
  making Wood the medium of writing and memory.'
source: Wood in Ancient Philosophical and Indigenous Worldviews — Memetic Cowboy
