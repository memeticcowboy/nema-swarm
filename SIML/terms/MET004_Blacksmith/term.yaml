context_note: 'The blacksmith is not merely a technician but a ritual transformer—exploration
  (β) of metal''s possibilities, structure (μ) of power-objects (Fon asen, Kongo bocio),
  resonance (ρ) with ancestral lineage, direction (λ) of creative-destructive skill.
  Cross-cultural: African Ògún, Kongo royal smiths, Pre-Columbian sacred artisans.
  The smith bridges raw earth and spiritual world.'
source: Symbolic Meaning of Metal in Ancient Philosophical and Indigenous Traditions
