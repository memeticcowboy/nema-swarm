elemental_emphasis:
  ∴: How is the smith distinguished from other makers?
  ≈: What resonance flows between smith, metal, and ancestor?
  ▲: What direction does the transformative craft aim?
  𐂷: What possibilities emerge from fire meeting ore?
  ☷: How does smithing wisdom cycle through generations?
  ⛨: What boundaries protect the sacred craft?
context_note: 'The blacksmith is not merely a technician but a ritual transformer—exploration (β) of metal''s possibilities, structure (μ) of power-objects (Fon asen, Kongo bocio), resonance (ρ) with ancestral lineage, direction (λ) of creative-destructive skill. Cross-cultural: African Ògún, Kongo royal smiths, Pre-Columbian sacred artisans. The smith bridges raw earth and spiritual world.'
source: Symbolic Meaning of Metal in Ancient Philosophical and Indigenous Traditions — Memetic Cowboy
