    - "∂Φ/∂δγ (metabolic cost of absorption and dissociation in memory construction)"
    - "∂Φ/∂μ (boundary permeability between memory and imagination)"
  Z_state: "sealed (false memory becomes indistinguishable from genuine experience)"
  tendency: "Fantasy/Reality → 0.7 (strong drift toward narrative construction over accurate recall)"
