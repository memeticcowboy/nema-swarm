elemental_emphasis:
  ∴: "How is genuine memory distinguished from confabulated experience? What cut separates remembered from imagined?"
  ≈: "What flows between experience and the narrative constructed around it? Is this resonance or source monitoring error?"
  ▲: "Where does the false memory want to go? Does it serve truth or emotional need?"
  𐂷: "What forms of memory haven't been normalized? What if the frame of 'recovered memory' itself enables fabrication?"
  ☷: "What's the metabolic cost of maintaining false beliefs? What sustains the absorption that fuels confabulation?"
  ⛨: "What structures enable or prevent false memory formation? What boundaries would restore source monitoring?"
context_note: >-
  False Memory Formation describes how vivid but inaccurate memories emerge through
  psychological mechanisms including source monitoring errors, dissociation, absorption, and
  cultural narrative influence. The brain constructs coherent narratives from fragmented
  inputs — when emotional needs align with cultural availability, false memories can become
  subjectively indistinguishable from genuine experience. Key contributing factors include
  sleep paralysis hallucinations, dissociative experiences, magical ideation, and therapeutic
  suggestion. The recovered memory therapy scandals of the 1990s demonstrated how therapeutic
  frameworks can generate elaborate false memories.
