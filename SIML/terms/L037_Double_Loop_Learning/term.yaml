## Model I vs. Model II Theories-in-Use

### Model I (Defensive)

**Governing Variables:**
1. Achieve your intended purpose
2. Maximize winning, minimize losing
3. Suppress negative feelings
4. Be rational (appear so)

**Action Strategies:**
- Advocate your position
- Evaluate others' ideas (and your own)
- Attribute causes
- Exercise unilateral control

**Consequences:**
- Defensive relationships
- Low freedom of choice
- Reduced production of valid information
- Self-sealing processes

### Model II (Productive)

**Governing Variables:**
1. Valid information
2. Free and informed choice
3. Internal commitment

**Action Strategies:**
- Advocate with illustration
- Inquiry into others' views
- Public testing of attributions
- Joint control

**Consequences:**
- Minimally defensive relationships
- High freedom of choice
- Increased production of valid information
- Double-loop learning enabled

## Elemental Pattern Analysis

### Air/Пғ + Earth/ОҙОі Coalition (Primary)

Double-Loop Learning is fundamentally an **Air-Earth** theory:

**Air/Пғ (Distinction/Clarity):**
- **Surface assumptions:** Making visible what is normally invisible
- **Inquiry:** Questions that penetrate defensive routines
- **Distinction-making:** Separating espoused theory from theory-in-use
- **Clarity:** Valid information as foundation

**Earth/ОҙОі (Cycling/Metabolism):**
- **Deep reflection:** Not just "what happened" but "why did we think that way"
- **Digestion of assumptions:** Processing the governing variables
- **Grounded transformation:** Changes rooted in examined experience
- **Iterative inquiry:** Cycling through layers of assumption

### Supporting Elements

| Element | Role in Double-Loop Learning |
|---------|------------------------------|
| **Fire/О»** | Courage to question assumptions; commitment to transformation |
| **Water/ПҒ** | Emotional safety for vulnerability; relational trust |
| **Wood/ОІ** | New governing variables; transformed possibilities |
| **Metal/Ој** | Structure of inquiry; discipline of public testing |

