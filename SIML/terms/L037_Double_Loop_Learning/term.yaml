## Core Definition

**Double-Loop Learning** is a theory of learning developed by Chris Argyris and Donald SchГ¶n (1978) that distinguishes between two levels of learning:

1. **Single-Loop Learning:** Changing actions to correct errors while keeping governing values/assumptions constant (like a thermostat that turns heat on/off to maintain a set temperature)

2. **Double-Loop Learning:** Questioning and transforming the underlying assumptions, values, and policies that govern actions (like a thermostat that asks "Why am I set to 72В°F? Should I be set differently?")

