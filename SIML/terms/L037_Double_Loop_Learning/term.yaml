## Pathologies of Learning

### Organizational Defensive Routines

```
DEFENSIVE ROUTINES
в”ңв”Җв”Җ Bypass (avoid the issue)
в”Ӯ   в””в”Җв”Җ "Let's not go there"
в”ңв”Җв”Җ Cover-up (hide the bypass)
в”Ӯ   в””в”Җв”Җ "We're being strategic"
в”ңв”Җв”Җ Make bypass undiscussable
в”Ӯ   в””в”Җв”Җ "That's not how we do things here"
в””в”Җв”Җ Make the undiscussability undiscussable
    в””в”Җв”Җ "You're being difficult"
```

### Self-Sealing Systems

Organizations often create systems where:
1. Errors are detected
2. Errors are corrected (single-loop)
3. The fact that only single-loop occurred is hidden
4. The hiding is itself hidden
5. **Learning becomes impossible**

## Core Insight

> Double-Loop Learning reveals that most organizations (and individuals) are trapped in single-loop cycles, fixing symptoms while the underlying disease progresses. The courage to question our most basic assumptions вҖ” to ask "Why do we think this way?" rather than just "How do we fix this?" вҖ” is the difference between maintenance and transformation. But this requires vulnerability: our governing variables are defended for a reason. They protect us from anxiety, from loss of control, from the unknown. Double-loop learning asks us to lower our defenses in service of learning.

## One-Sentence Insight

> Double-Loop Learning demonstrates that true transformation requires questioning the assumptions that govern our actions вҖ” not just correcting errors within our existing framework, but courageously examining and changing the framework itself.

## Three-Bullet Expansion

- **What:** A theory of learning that distinguishes between correcting errors within existing assumptions (single-loop) and transforming the underlying assumptions themselves (double-loop) вҖ” enabling fundamental change in how we think and act
- **How it works:** Detect error вҶ’ Question governing variables (not just actions) вҶ’ Surface defensive routines вҶ’ Test assumptions publicly вҶ’ Transform theory-in-use вҶ’ New governing variables enable new action possibilities
- **Where it aims:** Toward organizations and individuals capable of detecting and correcting errors in their own learning systems вҖ” meta-learning capacity that enables continuous adaptation and transformation

