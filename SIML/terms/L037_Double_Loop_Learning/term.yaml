## Espoused Theory vs. Theory-in-Use

Argyris and SchГ¶n distinguished between:

| Concept | Definition | Learning Implication |
|---------|------------|---------------------|
| **Espoused Theory** | What we say we believe and do | Often idealized, socially desirable |
| **Theory-in-Use** | What our actions reveal we actually believe | Often defensive, protective |
| **The Gap** | The difference between the two | Source of organizational dysfunction |

