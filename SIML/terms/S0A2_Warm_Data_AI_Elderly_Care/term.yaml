description: Role of warm data in AI companionship for elderly care — warm data as relational, contextual, qualitative insights capturing lived experience of loneliness beyond statistical prevalence; limitations of AI companions in fulfilling deep relational and intimacy needs due to absence of mutual understanding, shared experience, and physical presence; practical applications of warm data in tailoring AI design to elderly preferences including life story conversations and reminiscence prompts; ethical considerations including privacy, surveillance, and elder autonomy; decision-maker implications for balancing technology with genuine human connection; warm data informing caregiving strategies that complement rather than replace human interaction.
