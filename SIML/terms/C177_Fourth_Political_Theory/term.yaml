context_note: >-
  Aleksandr Dugin's Fourth Political Theory aims to transcend liberalism,
  Marxism, and fascism through synthesis centered on Dasein (existence) and
  ethnos (cultural identity). It critiques liberal exhaustion, advocates
  multipolarity, and has connections to Russian geopolitical strategy, while
  drawing criticism for perceived authoritarian tendencies.
