## Meaning Schemes vs. Meaning Perspectives

| Concept | Definition | Example | Change |
|---------|------------|---------|--------|
| **Meaning Scheme** | Specific beliefs, feelings, judgments about particular situations | "I am bad at public speaking" | Can change without transformation |
| **Meaning Perspective** | The broad frame through which meaning schemes are interpreted | "My worth depends on others' approval" | Requires transformative learning |

**Key Insight:** Transformative learning changes the *frame*, not just the *content*.

## The Emancipatory Dimension

Mezirow was influenced by critical theory (Habermas) and emphasized that transformative learning is **emancipatory**:

```
Forces That Limit Awareness:
    ┌─────────────────────────────────────────────┐
    │  • Cultural norms and social expectations   │
    │  • Institutional power structures           │
    │  • Psychological defense mechanisms         │
    │  • Unexamined assumptions from upbringing   │
    │  • Ideologies that serve dominant interests │
    └─────────────────────────────────────────────┘
                      ↓
    Transformative Learning as Liberation:
    ┌─────────────────────────────────────────────┐
    │  • Recognizing these constraints            │
    │  • Examining their validity                 │
    │  • Choosing more autonomous perspectives    │
    │  • Acting from transformed awareness        │
    └─────────────────────────────────────────────┘
```

