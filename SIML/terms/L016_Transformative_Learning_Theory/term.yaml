## Elemental Pattern Analysis

### Fire/λ Dominance

Transformative Learning Theory is fundamentally a **Fire theory**:
- **Direction:** The shift from one meaning perspective to another
- **Purpose:** Emancipation from oppressive, limiting assumptions
- **Transformation:** The burning away of old structures to make way for new
- **Agency:** The learner as autonomous, self-directed meaning-maker

### Supporting Elements

| Element | Role in TLT |
|---------|-------------|
| **Air/σ** | Critical reflection — the clarity to see assumptions; the disorienting dilemma as signal |
| **Water/ρ** | Rational discourse — the social process of testing perspectives with others |
| **Metal/μ** | Habits of mind — the rigid structures that both constrain and enable meaning |
| **Earth/δγ** | The cyclical nature of transformation — ongoing revision of meaning structures |

