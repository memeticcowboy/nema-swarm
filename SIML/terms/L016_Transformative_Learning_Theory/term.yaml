## Meaning Perspectives and Meaning Schemes

### Habits of Mind (Broad Frames)
The underlying assumptions that shape how we interpret experience:
- **Epistemic habits:** How we know what we know
- **Sociolinguistic habits:** Cultural norms and language patterns
- **Psychological habits:** Self-concept and emotional patterns
- **Moral-ethical habits:** Values and ethical frameworks

### Meaning Schemes (Specific Beliefs)
Particular beliefs, feelings, judgments about specific situations:
- "I am bad at public speaking"
- "Leaders should be decisive"
- "Conflict is destructive"

### The Critical Distinction

| Aspect | Meaning Scheme | Meaning Perspective |
|--------|---------------|---------------------|
| **Scope** | Specific belief about particular situations | Broad frame through which schemes are interpreted |
| **Example** | "I am bad at public speaking" | "My worth depends on others' approval" |
| **Change** | Can change without transformation | Requires transformative learning |
| **Element** | Metal/μ (structure) | Fire/λ (direction/transformation) |

**Key Insight:** Transformative learning changes the *perspective* (frame), not just the *scheme* (content).

