## Core Definition

**Transformative Learning Theory** (Mezirow, 1978, 1991, 2000) describes how adults make meaning of their experiences through **meaning perspectives** — the broad sets of assumptions that act as filters for interpreting experience. Learning becomes *transformative* when these meaning perspectives themselves are changed, leading to more inclusive, discriminating, open, and integrative perspectives.

### Key Processes

1. **Disorienting Dilemma:** A crisis of meaning that cannot be resolved within existing meaning schemes
2. **Critical Reflection:** Examining the premises (not just the content) of one's beliefs and assumptions
3. **Rational Discourse:** Testing the validity of transformed perspectives through dialogue with others
4. **Perspective Transformation:** A fundamental shift in the structure of meaning-making
5. **Action:** Acting upon the transformed perspective in one's life

## The Transformative Learning Architecture

```
Traditional Learning (Within Existing Perspectives):
    ┌─────────────────────────────────────────────┐
    │           Existing Meaning Perspective        │
    │    (Assumptions, Beliefs, Values, Filters)    │
    └─────────────────┬───────────────────────────┘
                      │
    Experience ───────┼──────→ Interpretation (filtered)
                      │
    New Information ──┼──────→ Assimilation (within frame)
                      ↓
              Learning (additive, incremental)

Transformative Learning (Changing the Perspectives):
    ┌─────────────────────────────────────────────┐
    │           Existing Meaning Perspective        │
    │    (Assumptions, Beliefs, Values, Filters)    │
    └─────────────────┬───────────────────────────┘
                      │
    Disorienting ─────┼──────→ Crisis: Cannot interpret
    Dilemma           │         within existing frame
                      │
                      ↓
    ┌─────────────────────────────────────────────┐
    │         Critical Self-Reflection              │
    │    • Content reflection (what happened)       │
    │    • Process reflection (how it happened)     │
    │    • Premise reflection (why it happened)     │
    └─────────────────┬───────────────────────────┘
                      │
                      ↓
    ┌─────────────────────────────────────────────┐
    │         Rational Discourse                    │
    │    (Testing new perspectives with others)     │
    └─────────────────┬───────────────────────────┘
                      │
                      ↓
    ┌─────────────────────────────────────────────┐
    │        TRANSFORMED Meaning Perspective        │
    │   (More inclusive, discriminating, open,      │
    │    emotionally able to change, integrative)   │
    └─────────────────┬───────────────────────────┘
                      │
                      ↓
              Action (living the transformation)
```

## The Three Types of Reflection

| Reflection Type | Focus | Question | Depth |
|-----------------|-------|----------|-------|
| **Content Reflection** | What is perceived, thought, felt | "What happened?" | Surface |
| **Process Reflection** | How one perceives, thinks, feels | "How did I experience this?" | Medium |
| **Premise Reflection** | Why one perceives, thinks, feels this way | "Why did I interpret this way? What assumptions guided me?" | Deep |

**Transformative learning requires premise reflection** — examining the very assumptions that structure our meaning-making.

