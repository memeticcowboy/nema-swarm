## Core Insight

> Transformative Learning Theory reveals that the deepest learning is not about acquiring more information but about **changing how we know**. It is the process of becoming aware of the invisible frameworks that shape our perception — and having the courage to revise them when they no longer serve us. This is learning as emancipation: freeing ourselves from the tyranny of unexamined assumptions.

## One-Sentence Insight

> Mezirow's Transformative Learning Theory demonstrates that the most profound learning occurs when adults critically examine the assumptions that shape their meaning-making, leading to perspective transformation and emancipated autonomy.

## Three-Bullet Expansion

- **What:** A theory of adult learning focused on how critical reflection on assumptions leads to perspective transformation — the revision of meaning structures (habits of mind and meaning schemes) that shape how we interpret experience
- **How it works:** Disorienting dilemma → self-examination → critical assessment of assumptions → rational discourse → exploration of new options → planning action → acquiring knowledge → trying new roles → building competence → reintegration with transformed perspective
- **Where it aims:** Toward emancipated autonomy — freeing adults from the constraints of unexamined assumptions and enabling more discriminating, justified meaning-making

