## Meaning Structures

### Habits of Mind vs. Meaning Schemes

| Level | Definition | Example | Transformation |
|-------|------------|---------|----------------|
| **Habit of Mind** | Broad, abstract predispositions for interpreting experience | "People are fundamentally untrustworthy" | Revision of entire worldview |
| **Meaning Scheme** | Specific expectations about particular situations | "My boss will micromanage me" | Adjustment of specific belief |

```
HABIT OF MIND (broad interpretive filter)
    │
    ├── Meaning Scheme A (specific expectation)
    ├── Meaning Scheme B (specific expectation)
    ├── Meaning Scheme C (specific expectation)
    └── ...
    
TRANSFORMATION can occur at:
    • Meaning scheme level (easier, more common)
    • Habit of mind level (deeper, more difficult, more transformative)
```

