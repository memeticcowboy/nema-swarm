## Transformative vs. Instrumental Learning

| Dimension | Instrumental Learning | Transformative Learning |
|-----------|----------------------|------------------------|
| **Focus** | Task-oriented, problem-solving | Meaning-oriented, perspective-changing |
| **Question** | "How do I do this better?" | "Why do I see things this way?" |
| **Reflection** | Content and process | Premise (assumptions) |
| **Outcome** | Improved performance | Changed meaning structures |
| **Element** | Air/σ (clarity, skill) | Fire/λ (purpose, transformation) |
| **Analogy** | Sharpening a tool | Changing which tools you use and why |

