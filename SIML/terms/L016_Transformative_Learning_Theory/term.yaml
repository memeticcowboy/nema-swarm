## Core Definition

**Transformative Learning Theory**, developed by Jack Mezirow (1978, 1991, 2000), describes how adults critically examine their **meaning perspectives** — the broad sets of assumptions (habits of mind) and specific beliefs (meaning schemes) that act as filters for interpreting experience. Learning becomes *transformative* when these meaning perspectives themselves are transformed, leading to more inclusive, discriminating, open, emotionally able to change, and integrative perspectives.

### Key Processes

1. **Disorienting Dilemma:** A crisis of meaning that cannot be resolved within existing meaning schemes — the catalyst for transformation
2. **Critical Reflection:** Examining assumptions at three levels — content, process, and premise
3. **Rational Discourse:** Testing the validity of transformed perspectives through dialogue with others
4. **Perspective Transformation:** A fundamental shift in the structure of meaning-making
5. **Action:** Immediate or delayed action upon the transformed perspective

