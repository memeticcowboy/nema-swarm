## Core Definition

**Transformative Learning Theory** (Mezirow, 1978, 1991, 2000) is a theory of adult learning that focuses on how adults make meaning of their experiences through critical reflection on assumptions. The theory posits that transformative learning occurs when individuals critically examine their "meaning perspectives" (habits of mind) and "meaning schemes" (specific expectations) that shape how they interpret experience.

The transformative process involves:
1. **A disorienting dilemma** — an experience that doesn't fit existing meaning structures
2. **Critical reflection** — examination of assumptions, beliefs, and values
3. **Rational discourse** — dialogue with others to test new perspectives
4. **Perspective transformation** — revision of meaning structures
5. **Action** — acting on transformed perspectives

