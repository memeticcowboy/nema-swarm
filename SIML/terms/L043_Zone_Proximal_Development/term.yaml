## Scaffolding: The Mechanism of ZPD

**Scaffolding** (Wood, Bruner, & Ross, 1976) is the temporary support structure that enables learners to operate within their ZPD:

| Scaffolding Function | Description | Element |
|---------------------|-------------|---------|
| **Recruitment** | Engaging learner's interest | λ (Fire) |
| **Reduction** | Simplifying task demands | σ (Air) |
| **Direction** | Maintaining focus on goals | λ (Fire) |
| **Marking** | Highlighting critical features | σ (Air) |
| **Control** | Managing frustration/risk | μ (Metal) |
| **Demonstration** | Modeling expert performance | ρ (Water) |

