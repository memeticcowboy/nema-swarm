           Initial    Guided    Supported Independent
           Modeling   Practice  Practice  Mastery

As competence increases, support gradually fades
```

## Elemental Pattern Analysis

### Water/ρ Dominance

ZPD is fundamentally a **Water/Relational theory**:
- **Interdependence:** Learning occurs between people, not in isolation
- **Scaffolding:** Temporary support that enables growth
- **Flow:** Knowledge and skill transfer from expert to novice
- **Resonance:** The attunement between learner's readiness and appropriate challenge

### Supporting Elements

| Element | Role in ZPD |
|---------|-------------|
| **Water/ρ** | Scaffolding, social interaction, relational learning |
| **Wood/β** | Growth potential, developmental expansion |
| **Metal/μ** | Structured support, clear boundaries of capability |
| **Fire/λ** | Direction from expert, motivation to learn |
| **Air/σ** | Distinction between independent and supported performance |
| **Earth/δγ** | Cyclical nature of scaffolding and fading |

