Scaffolding is the **mechanism**; ZPD is the **space** where it operates.

### ZPD and Situated Learning (L014)

Both emphasize **context and social participation**:
- ZPD: Learning through interaction with more knowledgeable others
- Situated Learning: Learning through legitimate peripheral participation in communities

Together they form: **Social → Contextual → Developmental** learning.

### ZPD and Cognitive Apprenticeship (L028)

Cognitive Apprenticeship applies ZPD principles to cognitive skills:
- **Modeling** (expert demonstrates)
- **Coaching** (expert guides in ZPD)
- **Scaffolding** (support tailored to learner)
- **Fading** (gradual withdrawal)
- **Articulation** (learner verbalizes understanding)
- **Reflection** (learner compares approaches)
- **Exploration** (learner works independently)

