## Core Definition

The **Zone of Proximal Development (ZPD)**, introduced by Lev Vygotsky in 1978, refers to the distance between a learner's **actual developmental level** (what they can do independently) and their **potential developmental level** (what they can achieve with guidance from more knowledgeable others). The ZPD represents the dynamic space where learning occurs through social interaction and scaffolded support.

### The ZPD Model

```
ZONE OF PROXIMAL DEVELOPMENT

    Capability Level
         │
    High ┤────────────────────────────────────── Potential Level
         │                                    ╱ (with guidance)
         │                                ╱
         │                            ╱
         │                        ╱    ★ ZONE OF PROXIMAL
         │                    ╱        DEVELOPMENT (ZPD)
         │                ╱
         │            ╱
    Med  ┤────────●──────────────────────── Actual Level
         │    (independent)                 (independent)
         │
         │
    Low  ┤
         └───────────────────────────────────────────────
              Novice                    Expert
                    Knowledgeable Other Support
```

## The Three Developmental Levels

| Level | Description | Element | Function |
|-------|-------------|---------|----------|
| **Actual** | What learner can do alone | μ (Metal) | Current structured capability |
| **Potential** | What learner can do with guidance | β (Wood) | Growth possibility |
| **ZPD** | The gap between actual and potential | ρ (Water) | Relational learning space |

