### Three Modes of Representation (Bruner)

Bruner identified three ways learners represent knowledge, progressing from concrete to abstract:

```
REPRESENTATIONAL DEVELOPMENT

┌─────────────────────────────────────────────────────────┐
│                                                         │
│   ENACTIVE (Action-Based)                               │
│   ═══════════════════════                               │
│   • Learning through doing — physical manipulation      │
│   • "Muscle memory," procedural knowledge               │
│   • Example: Learning to ride a bicycle                 │
│                                                         │
│   Element: Earth (δγ) — embodied action                 │
│                                                         │
│   ↓                                                     │
│                                                         │
│   ICONIC (Image-Based)                                  │
│   ═══════════════════════                               │
│   • Learning through visual representations             │
│   • Mental images, diagrams, pictures                   │
│   • Example: Visualizing a map                          │
│                                                         │
│   Element: Water (ρ) — fluid, imagistic                 │
│                                                         │
│   ↓                                                     │
│                                                         │
│   SYMBOLIC (Language-Based)                             │
│   ═════════════════════════                             │
│   • Learning through abstract symbols                   │
│   • Language, mathematical notation, codes              │
│   • Example: Understanding algebraic equations          │
│                                                         │
│   Element: Air (σ) — abstract, categorical              │
│                                                         │
└─────────────────────────────────────────────────────────┘

Note: All three modes remain available to expert learners;
the progression represents developmental readiness, not replacement.
```

## The Spiral Curriculum

```
BRUNER'S SPIRAL CURRICULUM

Knowledge revisited at increasing levels of complexity:

Level 1 (Concrete)          Level 2 (Intermediate)      Level 3 (Abstract)
┌─────────────────┐         ┌─────────────────┐         ┌─────────────────┐
│ Basic concepts  │   →     │ Expanded        │   →     │ Theoretical     │
│ through         │         │ relationships   │         │ frameworks      │
│ direct          │         │ through         │         │ through         │
│ experience      │         │ guided inquiry  │         │ self-directed   │
│                 │         │                 │         │ discovery       │
└─────────────────┘         └─────────────────┘         └─────────────────┘

Example: "The American Revolution"
• Level 1: Stories about colonists, basic timeline
• Level 2: Causes and effects, key figures' motivations  
• Level 3: Political philosophy, historiographical debates

Element: δγ (Earth) — cyclical return with deepening
```

## Elemental Pattern Analysis

### Wood/β Dominance

Discovery Learning is fundamentally a **Wood theory**:
- **Generative exploration:** Learners branch into multiple inquiry pathways
- **Hypothesis generation:** Creating possibilities, not following prescriptions
- **Knowledge construction:** Building understanding rather than receiving it
- **Growth through inquiry:** Each discovery opens new branching questions
- **Organic unfolding:** Learning follows the learner's curiosity

### Fire/λ Direction

Curiosity and purpose provide the **directional energy**:
- Intrinsic motivation drives the inquiry
- Problem presentation creates focused challenge
- The "need to know" directs exploration
- Self-directed investigation requires will

### Air/σ Structure

Cognitive scaffolding provides the **distinction-making** framework:
- Problem structure guides without constraining
- Hypothesis testing requires logical clarity
- Pattern recognition depends on categorical thinking
- Symbolic representation enables abstraction

### Child/✶ Integration

Insight moments represent **harmonic emergence**:
- The "aha!" experience of discovery
- Integration of disparate observations
- Self-transcendence through understanding
- Play-like engagement with ideas

