## Connection to Related Theories

### Discovery Learning and Constructivism

| Aspect | General Constructivism | Discovery Learning |
|--------|------------------------|-------------------|
| **Core principle** | Knowledge is constructed | Knowledge is discovered through inquiry |
| **Learner role** | Active meaning-maker | Investigator/explorer |
| **Teacher role** | Facilitator | Problem-poser, scaffold-provider |
| **Element** | Wood (β-generative) | Wood+Fire (β+λ — directed exploration) |
| **Relationship** | Discovery Learning is a specific constructivist methodology |

### Discovery Learning and Inquiry-Based Learning

```
INQUIRY SPECTRUM

Level 1: CONFIRMATION INQUIRY
• Teacher provides question, procedure, expected result
• Learner confirms known principle
• Element: Metal (μ) — structured verification

Level 2: STRUCTURED INQUIRY
• Teacher provides question and procedure
• Learner generates explanation from results
• Element: Metal+Wood (μ+β) — guided exploration

Level 3: GUIDED INQUIRY (Bruner's Discovery)
• Teacher provides question only
• Learner designs procedure and generates explanation
• Element: Wood+Fire (β+λ) — directed discovery

Level 4: OPEN INQUIRY
• Learner generates question, designs procedure, explains
• Element: Wood↑↑ (β) — autonomous exploration
```

### Discovery Learning and Problem-Based Learning (PBL)

| Aspect | Discovery Learning | Problem-Based Learning |
|--------|-------------------|------------------------|
| **Starting point** | Structured problem | Ill-structured, authentic problem |
| **Process** | Hypothesis testing | Collaborative problem-solving |
| **Context** | Often disciplinary | Cross-disciplinary, real-world |
| **Element** | Wood+Fire (β+λ) | Wood+Water (β+ρ) — collaborative |
| **Relationship** | Discovery emphasizes individual insight; PBL emphasizes collaborative inquiry |

