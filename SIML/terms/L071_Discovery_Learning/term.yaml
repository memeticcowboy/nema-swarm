## Core Definition

**Discovery Learning**, developed by **Jerome Bruner** (1961), is a constructivist approach positing that learning is most effective when learners **actively discover** principles and relationships for themselves rather than receiving them through direct instruction. Rather than being told facts, learners engage with structured problems, generate hypotheses, explore possibilities, and construct their own understanding through guided inquiry.

