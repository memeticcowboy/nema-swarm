elemental_emphasis:
  ∴: What conflicting beliefs are you holding simultaneously? Where is the cut between them?
  ≈: What does the discomfort feel like? Where in your body does the tension live?
  ▲: Which belief is pulling stronger? Where does the resolution want to go?
  𐂷: What third option exists beyond change vs rationalization? What integration is possible?
  ☷: What's the metabolic cost of holding this tension? What energy sustains the conflict?
  ⛨: What structure would hold both beliefs without collapse? What container allows paradox?
context_note: Cognitive Dissonance is the psychological tension that occurs when an individual holds two or more contradictory beliefs, values, or attitudes simultaneously, or when behavior conflicts with beliefs. Developed by Leon Festinger in 1957, the theory describes the uncomfortable state of mental inconsistency and the powerful drive to reduce this discomfort through belief change, rationalization, or behavior modification. The classic case of Dorothy Martin's doomsday cult illustrates how believers doubled down when prophecy failed — the social and psychological investment had become too great to permit belief revision.
