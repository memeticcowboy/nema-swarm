elemental_emphasis:
  ∴: "How does the caste system enforce boundaries between social classes? What separates the conditioned from the authentic?"
  ≈: "What flows between the World State and the Savage Reservation? How does soma mediate emotional experience?"
  ▲: "Where does John's rebellion want to go? What transformation is possible within total control?"
  𐂷: "What forms of individuality escape the hatchery's efficiency? What has not been conditioned away?"
  ☷: "What is the metabolic cost of sustained happiness? What sustains a society without struggle?"
  ⛨: "What structures contain human potential? What boundaries separate stability from stagnation?"
context_note: "Huxley's dystopia in Brave New World differs from Orwell's in that control
  is achieved through pleasure rather than pain. Citizens are complicit in their own
  subjugation through pursuit of superficial happiness. The Bokanovsky Process,
  hypnopaedia, and soma eliminate the interior space from which authentic selfhood
  might emerge. John the Savage's tragic arc illustrates the impossibility of
  authentic individuality within a system designed to eliminate it."
source: "Aldous Huxley, Brave New World (1932)"
