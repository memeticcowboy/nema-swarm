context_note: "Legalese Conveys Authority reveals how the convoluted language of legal documents serves not merely to communicate rules but to signal power and authority. MIT research demonstrates that center-embedded clauses and archaic structures function like 'magic spells'—implicitly understood markers of special status that even non-lawyers adopt when drafting laws. This creates a tension between comprehensibility and authority: lawyers prefer plain language versions, yet the complex style persists due to its sociolinguistic function. The phenomenon reflects deep cultural transmission of writing norms, raising questions about reform efforts since the 1970s and the possibility of making legal documents accessible without sacrificing their perceived legitimacy."
