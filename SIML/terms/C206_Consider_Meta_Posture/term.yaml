nemetic:
  string: "Φ(⊙) = ∮(open-holding|pre-operator) ∘ σ(partial-context|unframed) ∘ ρ(observer-in-field|generative) ∘ λ(tension-gradient|data) ∘ β(delayed-collapse|one-beat) + ε | :open [∧ :emergent]"
