dsrp:
  Distinction: "⊙ (the meta-posture of open holding) is distinguished from the operators (σ, ρ, λ, β, δγ, μ) that follow it, from procedural checklists, and from identity itself. ε ≠ 0 (living field open) is distinguished from ε = 0 (death by meta-capture)."
  System: "The whole is ⊙(Φ), a pre-operator field-holding posture. Its parts are the eight co-factors c₁–c₈ (Context partiality, Observer-in-field, Tension gradient, Delayed collapse, Load-bearing assumptions, Field-vs-habit probability, Unlocked doors, Release of self-defending closure) and the three failure modes (⊙-capture, ⊙-identity, ⊙-theater)."
  Relationship: "⊙ precedes and enables all operators without being one itself. The eight cᵢ components act as a product (not a sequence) to hold Φ open. If closure.defends(closure), the posture demands release(closure). When ⊙ becomes audible as a checklist, it has failed. Preparation must be set down when the field demands action."
  Perspective: "From the viewpoint of an observer who is inside Φ, generating meaning rather than discovering it, who must hold the field open one beat longer than habitual, and who can test whether they can act without ⊙."

