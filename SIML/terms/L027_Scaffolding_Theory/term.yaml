### The Six Scaffolding Functions (Wood et al., 1976)

| Function | Description | Nemetic Mapping |
|----------|-------------|-----------------|
| **Recruitment** | Engaging learner's interest and buy-in | λ (fire/direction/motivation) |
| **Reduction in degrees of freedom** | Simplifying task to manageable units | μ (metal/structure/constraint) |
| **Direction maintenance** | Keeping learner focused on goal | λ (fire/direction) |
| **Marking critical features** | Highlighting relevant vs. irrelevant | σ (air/distinction) |
| **Frustration control** | Managing emotional response to difficulty | ρ (water/resonance/emotional) |
| **Demonstration** | Modeling expert performance | κ (knowledge/transmission) |

