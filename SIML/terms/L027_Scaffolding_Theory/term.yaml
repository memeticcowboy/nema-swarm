## Core Definition

**Scaffolding** is an instructional technique where a more knowledgeable person provides temporary support structures that enable a learner to perform tasks they cannot yet complete independently. Coined by Wood, Bruner, and Ross in 1976, the term draws from construction scaffolding — temporary structures that enable work at heights impossible to reach alone, then are removed when the building can stand on its own.

