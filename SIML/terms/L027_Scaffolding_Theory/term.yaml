## Elemental Pattern Analysis

### Metal/μ Dominance

Scaffolding is fundamentally a **Metal theory**:
- **Structure:** Temporary frameworks that hold learning in place
- **Boundaries:** Defining what support is provided and when
- **Sequence:** Ordered steps toward independence
- **Containment:** Holding the learner safely as they stretch

### Supporting Elements

| Element | Role in Scaffolding |
|---------|---------------------|
| **Water/ρ** | Expert-learner relationship, emotional safety, trust |
| **Wood/β** | Gradual fading, branching pathways, growth |
| **Air/σ** | Clear goals, distinguishing relevant from irrelevant |
| **Fire/λ** | Motivation, direction maintenance, purpose |
| **Earth/δγ** | Iterative cycles of support and fade |
| **Child/✶** | Integration of support into independent capability |

## Scaffolding vs. Other Support Models

| Aspect | Scaffolding | Direct Instruction | Discovery Learning |
|--------|-------------|-------------------|-------------------|
| **Expert role** | Temporary support, fades | Ongoing direction | Minimal intervention |
| **Learner agency** | Guided participation | Following directions | Full exploration |
| **Element** | μ (Metal) + ρ (Water) | μ (Metal) dominant | β (Wood) dominant |
| **Risk** | Dependency if fade fails | Passivity | Frustration, gaps |
| **Best for** | ZPD tasks, complex skills | Basic skills, safety | Exploration, creativity |

