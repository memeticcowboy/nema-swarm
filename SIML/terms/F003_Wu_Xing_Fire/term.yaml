context_note: 'Chinese Fire represents the prosperity phase—not substance but energetic
  peak. Key insight: Fire is ''prosper of the matter'' (the flourishing stage), not
  just combustion. As Great Yang (σ), Fire opposes Water''s Great Yin. The imbalance
  pattern is crucial: Fire out of control = restlessness, hatred, impulsivity. This
  is λ (direction) as upward expression, not just heat. The heart association shows
  Fire as emotional, not just physical.'
source: Fire's Symbolic Meaning in Ancient Philosophical and Indigenous Traditions
