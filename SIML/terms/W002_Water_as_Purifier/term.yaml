context_note: 'Water as Purifier represents the universal cross-cultural pattern of
  water in ritual cleansing—baptism, ablution, sacred springs, ritual baths. Key insight:
  water doesn''t just clean physically but spiritually; the boundary (μ) is between
  states of being (impure/pure), not just dirt/clean. This is δγ (cycling) as spiritual
  renewal, not just material washing.'
source: Water Symbolism in Ancient and Indigenous Worldviews — Memetic Cowboy
