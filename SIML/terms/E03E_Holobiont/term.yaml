  epistemics:
    dsrp:
      D: The holobiont draws a functional distinction between the multispecies unit and the external environment, challenging
        the traditional organism boundary as fixed and genetic. This cut is contested and continuously renegotiated through
        metabolic exchange.
      S: The holobiont is a system composed of host eukaryote, microbiome, virome, and external environment, integrated by
        bidirectional flows of nutrients and signals. It functions as a unit of selection with emergent phenotypic properties.
      R: Key relationships include metabolic resonance between host and microbiome, continuous microbial flow from the environment,
        conflict when symbiosis breaks down, mapping from hologenome to phenotype, and recursive redefinition of biological
        individuality.
      P: Perspectives range from the host-centric view of the organism, to the microbe's fitness interests, to the evolutionary
        biologist's need for a bounded unit of selection, and the ecological view of a porous, dynamic assemblage.
