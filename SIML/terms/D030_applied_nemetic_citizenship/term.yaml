## The Six Practices of Nemetic Citizenship

### 1. Attention Stewardship (σ-Air as Practice)
**From D001:** Network democracy is immediate and resonant—less about electing someone to speak for you, more about finding someone whose signal syncs with your frequency.

**Praxis:**
- Audit your information diet weekly: What sources? What emotions do they produce? Who profits from your attention?
- Practice "slow scrolling" — pause before sharing, feel the resonance/dissonance
- Distinguish signal from noise not just cognitively but somatically: Where do you feel alignment in your body?

**Competency Marker:** Can recognize manipulation in real-time, not just retrospectively

### 2. Trust Calibration (ρ-Water as Practice)
**From D002:** Liquid democracy thrives on real-time, digital platforms... trust flows and civic reputation networks.

**Praxis:**
- Map your trust networks: Who do you delegate to implicitly? Explicitly?
- Practice "trust conversations" — explicitly discuss delegation with those you trust
- Develop "liquid awareness" — know when to hold, when to flow, when to freeze

**Competency Marker:** Can navigate delegation decisions with situational appropriateness

### 3. Symbolic Responsibility (σ-Air + ρ-Water as Practice)
**From D003:** Memetic governance recognizes that power operates through symbolic metabolism—meaning-making as the primary site of political contestation.

**Praxis:**
- Before sharing political content: What world does this meme create? Who benefits?
- Practice "memetic hygiene" — clean up misinformation even when it's "on your side"
- Create resonance intentionally: Craft messages that align without manipulating

**Competency Marker:** Can create and circulate civic content that resonates ethically

### 4. Deliberative Presence (δγ-Earth + λ-Fire as Practice)
**From D004:** Can deliberation survive in an attention economy? The question is not rhetorical—it is existential for democratic legitimacy.

**Praxis:**
- Enter deliberative spaces with "cognitive empathy" — genuine curiosity about different reality tunnels
- Practice "slow response" — pause between stimulus and reaction
- Hold space for complexity: Resist the urge to simplify prematurely

**Competency Marker:** Can sustain productive disagreement without fragmentation

### 5. Polycentric Navigation (β-Wood as Practice)
**From D005:** The network polity is not a single system but an ecology of overlapping jurisdictions, scales, and modes of governance.

**Praxis:**
- Map the governance ecosystems you inhabit: workplace, neighborhood, online communities, nation-state
- Practice "scale-shifting" — knowing when local action is sufficient, when global coordination is necessary
- Navigate between systems without demanding they conform to single logic

**Competency Marker:** Can operate effectively across multiple governance scales

### 6. Epistemic Humility (σ-Air + δγ-Earth as Practice)
**From D007:** Epistemic justice requires not just including marginalized voices but transforming the very standards of what counts as knowledge.

**Praxis:**
- Regularly seek out "cognitive diversity" — perspectives that challenge your reality tunnel
- Practice "not-knowing" — hold expertise lightly, remain open to correction
- Amplify voices that the system renders inaudible

**Competency Marker:** Can participate in knowledge-creation without dominating epistemic space

