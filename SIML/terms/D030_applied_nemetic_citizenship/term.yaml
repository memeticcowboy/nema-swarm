## Core Concept

Applied Nemetic Citizenship translates the 29-term democracy archive (D001-D029) from cognitive framework to embodied practice. Where D001-D007 analyzed governance models, D008-D011 synthesized them, D012-D028 proliferated variants, and D029 achieved meta-awareness — D030 asks the practical question: **How does one live as a nemetic citizen?**

This is the praxis term: theory becoming action, archive becoming habit, understanding becoming competence.

