### Instructional Implications

| Principle | Application | Rationale |
|-----------|-------------|-----------|
| **Advance Organizers** | Present overview before detailed content | Activates relevant schemas |
| **Concept Mapping** | Visual representation of schema structure | Makes schema organization explicit |
| **Analogies** | Connect new material to familiar schemas | Bridges known to unknown |
| **Elaborative Interrogation** | Ask "why" and "how" questions | Deepens schema connections |
| **Worked Examples** | Show expert schema application | Models effective schema use |
| **Schema Contrasts** | Compare and contrast cases | Highlights schema boundaries |

## Elemental Pattern Analysis

### Metal/μ Dominance

Schema Theory is fundamentally a **Metal/Structure theory**:
- **Organization:** Knowledge exists in structured, hierarchical forms
- **Containment:** Schemas have boundaries (what fits, what doesn't)
- **Pattern Recognition:** Schemas enable rapid categorization
- **Efficiency:** Structured knowledge reduces cognitive load
- **Constraint:** Schemas both enable and limit perception

