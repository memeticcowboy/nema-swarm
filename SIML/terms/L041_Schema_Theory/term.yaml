### Schema Types

| Schema Type | Description | Example |
|-------------|-------------|---------|
| **Object Schemas** | Knowledge about physical objects | What makes a "chair" a chair |
| **Event Schemas (Scripts)** | Knowledge about routine activities | Going to a restaurant, visiting a doctor |
| **Role Schemas** | Knowledge about social roles | Expectations about "teacher" or "doctor" |
| **Self-Schemas** | Knowledge about oneself | "I am an introvert," "I am good at math" |
| **Content Schemas** | Domain-specific knowledge structures | Understanding of evolution, democracy, economics |
| **Text Schemas** | Knowledge about discourse structures | Story grammar, essay structure |

## The Schema Dynamics: Assimilation and Accommodation

### Piaget's Cognitive Adaptation

```
                    NEW INFORMATION
                         │
                         ▼
              ┌─────────────────────┐
              │  DOES IT FIT        │
              │  EXISTING SCHEMA?   │
              └─────────────────────┘
                     /        \
                   YES          NO
                   /              \
                  ▼                ▼
        ┌───────────────┐   ┌─────────────────┐
        │  ASSIMILATION │   │  ACCOMMODATION  │
        │     β →       │   │      δγ ⇄       │
        │               │   │                 │
        │ Add to schema │   │ Modify schema   │
        │ (expansion)   │   │ (restructuring) │
        └───────┬───────┘   └────────┬────────┘
                │                    │
                └────────┬───────────┘
                         ▼
              ┌─────────────────────┐
              │   SCHEMA EVOLUTION  │
              │   (cognitive growth)│
              └─────────────────────┘
```

| Process | Mechanism | Outcome | Element |
|---------|-----------|---------|---------|
| **Assimilation** | New information fits existing schema | Schema expands (β-branching) | Wood — growth within structure |
| **Accommodation** | New information doesn't fit | Schema transforms (δγ-cycling) | Earth — restructuring, return to equilibrium |
| **Equilibration** | Balance between assimilation and accommodation | Cognitive development | Child/Aether — harmonic integration |

## Schema Theory and Memory

### Bartlett's Remembering

Frederic Bartlett's research demonstrated that memory is **reconstructive**, not reproductive:

```
RECONSTRUCTIVE MEMORY PROCESS

ENCODING                    STORAGE                    RETRIEVAL
   │                           │                          │
   ▼                           ▼                          ▼
┌─────────┐              ┌─────────┐                ┌─────────┐
│  Input  │─────────────►│ Schema  │───────────────►│ Schema  │
│  Event  │   Filtered   │  Store  │   Activated    │ Guides  │
└─────────┘   through    └─────────┘   by cues      │ Recall  │
              schema                                 └────┬────┘
                                                        │
                                                        ▼
                                              ┌─────────────────┐
                                              │  RECONSTRUCTED  │
                                              │    MEMORY       │
                                              │ (schema-        │
                                              │  consistent)    │
                                              └─────────────────┘
```

**Key Findings:**
- People remember schema-consistent information better than schema-inconsistent details
- People often "remember" schema-typical details that never occurred
- Memory errors follow predictable patterns based on schema expectations
- Cultural schemas shape what and how people remember

### The War of the Ghosts Experiment

Bartlett's famous study showed how cultural schemas transform memory:
- Participants read a Native American folk tale (unfamiliar schema)
- Over repeated recalls, the story became:
  - Shorter and more coherent
  - More consistent with Western cultural schemas
  - Rationalized (ghosts became "something black")

