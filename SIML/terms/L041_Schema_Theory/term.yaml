## Core Definition

**Schema Theory** posits that human cognition operates through **mental structures** called schemas — organized patterns of thought, behavior, or action that categorize information and guide processing. First articulated by Jean Piaget in his work on child development (1926) and elaborated by Frederic Bartlett in memory research (1932), schema theory explains how prior knowledge shapes perception, comprehension, and recall.

