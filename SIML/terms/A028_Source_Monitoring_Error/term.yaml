term: Source Monitoring Error
nemetic: >-
  Φ(SourceMonitor) = σ(internal|external) ∘ ρ(memory-origin|confused)
  ∘ λ(attribution|misdirected) ∘ β(belief|reinforced)
  ∘ δγ(absorption|heightened) ∘ μ(reality-boundary|permeable) + ε | :open
siml_encoding: >-
  ⟨Memory|formed⟩ ⊳ ⟨Source|ambiguous⟩ → ⟨Origin|misattributed⟩
  ⊗ ⟨Experience|internal⟩ ⇄ ⟨Content|external⟩ → ⟨Belief|false⟩
formalism:
  math_operators: [σ, ρ, λ, β, δγ, μ]
  dim_operators: [χ, Q_in, Ψ_exp, Z]
  partials:
    - "∂Φ/∂σ (distinction between internally and externally generated content)"
    - "∂Φ/∂ρ (confusion about the relational origin of memories)"
    - "∂Φ/∂λ (direction of attribution toward personal experience)"
    - "∂Φ/∂β (feedback loop reinforcing false beliefs)"
    - "∂Φ/∂δγ (heightened absorption enabling vivid imagination)"
    - "∂Φ/∂μ (permeable boundary between reality and imagination)"
  Z_state: "permeable (can be corrected through source verification)"
  tendency: "Imagination/Reality → 0.6 (strong imagination, weaker reality monitoring)"
