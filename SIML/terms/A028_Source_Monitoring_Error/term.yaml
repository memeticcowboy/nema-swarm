elemental_emphasis:
  ∴: How is a genuine memory distinguished from an imagined one? What cut reveals the true source?
  ≈: What flows between internal imagination and external media? What resonance blurs their boundaries?
  ▲: Where does the drive for meaning direct memory attribution? What direction does the need for explanation take?
  𐂷: What if source confusion reveals creative capacity rather than deficit? What narratives might be consciously constructed?
  ☷: What's the metabolic cost of maintaining vigilance against memory distortion? What sustains reality monitoring?
  ⛨: What structures enable accurate source monitoring? What boundaries protect memory integrity?
context_note: Source Monitoring Error is a cognitive failure in which the origin of a memory is incorrectly identified — confusing internally generated content (imagination, dreams, thoughts) with externally derived information (perception, media, others' narratives). This error underlies phenomena from alien abduction beliefs to false eyewitness testimony. The error follows predictable patterns shaped by absorption, dissociation, emotional needs, and cultural narrative availability. In AI contexts, source monitoring errors become increasingly dangerous as AI-generated content becomes indistinguishable from human creation.
