elemental_emphasis:
  ∴: What separates humans from other conscious beings? Is the boundary defensible?
  ≈: How does recognizing animal consciousness change our felt relationship with other species?
  ▲: Where does moral evolution lead as understanding of animal cognition grows?
  𐂷: What forms of human-animal relationship become possible when we recognize shared consciousness?
