context_note: "The social context of cognition recognizes that thinking is not merely an individual brain process but is fundamentally shaped by social interactions and environments. Clinical evidence shows that social support can mask cognitive impairments while isolation exacerbates them. Vygotsky's developmental psychology demonstrates that individual thought emerges from internalizing social interactions. This challenges the machine metaphor of brain-as-hardware and cognition-as-software, emphasizing that fostering supportive social networks is as crucial as medical interventions for cognitive health."
