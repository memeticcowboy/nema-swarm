context_note: MIT's latent inference budget model represents a breakthrough in predicting human behavior by explicitly modeling the computational constraints that lead to sub-optimal decision-making. Unlike traditional models that assume rationality, this approach infers the 'inference budget'—the cognitive resources available for decision-making—to predict when and how humans will make mistakes. The model outperforms older approaches in predicting both human and machine behavior, with applications ranging from AI assistants that prevent errors before they occur to robotic helpers that adapt to individual decision-making styles. This research raises profound ethical questions about the balance between helpful prediction and potential manipulation, as the ability to anticipate human behavior could be used to enhance autonomy or undermine it.
