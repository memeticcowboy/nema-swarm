    - "∂Φ/∂δγ (metabolic cost of masking neurodivergence versus institutional cost of accommodation — the energy spent performing neurotypicality produces burnout and attrition in talented thinkers; the institution that cannot see this cost distributes it invisibly onto those least able to bear it)"
    - "∂Φ/∂μ (boundary permeability of philosophical norms to cognitive diversity — the question of what counts as legitimate philosophical reasoning is simultaneously a boundary question about whose cognitive style is recognized as rational)"
  Z_state: "Tendency toward opening — moving from sealed neurotypical default toward explicit inclusion of cognitive diversity. Z-Closure Risk: λ-lock — 'diversity' becomes a performance rather than genuine transformation; accommodation is demanded in neurotypical form, recreating the exclusion it claims to address."
