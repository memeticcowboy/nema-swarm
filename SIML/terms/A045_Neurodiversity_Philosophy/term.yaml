  partials:
    - "∂Φ/∂σ (distinction between typical and divergent cognition that philosophy claims to transcend but actually enforces — the field claims universal rational intuition while practicing neurotypical intuition universalized; the cut itself carries the weight of institutional history)"
    - "∂Φ/∂ρ (relational tension between neurotypical institutional power and neurodiverse perspectives — what flows between cognitive styles is often not genuine dialogue but assimilation pressure; the neurodivergent philosopher must translate their intuitions into dominant cognitive frames or be untranslatable)"
    - "∂Φ/∂λ (direction of philosophical intuition when shaped by diverse cognitive processing — an autistic philosopher approaching personal identity with less attachment to narrative continuity, an ADHD philosopher questioning sustained attention as a cognitive virtue: cognitive style shapes not just conclusions but methods)"
