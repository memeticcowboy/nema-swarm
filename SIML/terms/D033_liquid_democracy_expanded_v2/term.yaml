siml:
  symbol:
    glyph: "◒"
    unicode_representation: "U+25D2"
    visual_description: "Circle with left half black—representing the fluid boundary between direct and delegated agency, the partial fill suggesting continuous motion"
    etymology: "From D002 base with recursive double-loop learning layer—emphasizes civic autopoiesis and trust as living ecology"
  
  phoneme:
    pronunciation: "LI-kwid dih-MOK-ruh-see"
    phonetic_ipa: "/ˈlɪkwɪd dɪˈmɒkrəsi/"
    tonal_quality: "flowing, with liquid transitions between syllables"
    sonic_resonance: "Like water moving through channels—adaptive, seeking level, carving pathways through resistance"
  
  semantics:
    core_meaning: "Democracy as ongoing symbolic synchrony—citizens as signal nodes in trust ecology, not punctual voters"
    operational_definition: "A governance protocol where agency is exercised through alignment, curation, and attention flow; delegation as trust encoding rather than abdication"
    contextual_domains:
      - "civic technology"
      - "deliberative democracy"
      - "trust ecology"
      - "attention economics"
      - "participatory design"
      - "cognitive ergonomics"
    
  elemental_mapping:
    sigma_air:
      aspect: "distinction"
      manifestation: "Direct vs delegated voice; single-loop vs double-loop learning; voting vs agency; autonomy vs delegation"
      daemon_correspondence: "Zephyros-Diairesis: wind of discernment separating ritual participation from embodied sovereignty"
      governance_expression: "Cynefin framework domains applied to platform dynamics—Clear (vote capture), Complicated (trust visualization), Complex (delegation ecosystems), Chaotic (virality spirals)"
    
    rho_water:
      aspect: "resonance"
      manifestation: "Trust flows as dynamic, not static; revocable power; affective coherence as legitimacy currency; attention as flowing resource"
      daemon_correspondence: "Undine-Pistis: waters of trust that flow between signal nodes, carrying influence like currents in a living system"
      governance_expression: "Delegation as trust encoding with emotional, epistemic, and ethical weight; fluid agency as normative"
    
    lambda_fire:
      aspect: "direction"
      manifestation: "From event-based sovereignty to ongoing symbolic synchrony; from casting votes to channeling trust fields; from representation to resonance"
      daemon_correspondence: "Helios-Metabole: transformative flame redirecting democracy from punctual ritual to continuous presence"
      governance_expression: "Citizens as curators of trust, not just choosers of power; democracy as rhythmic pulsing with attention and realignment"
    
    beta_wood:
      aspect: "branching"
      manifestation: "Per-issue delegation as modular participation; chain-delegation; granular trust chains; six cyborg personas as distributed cognition"
      daemon_correspondence: "Dryad-Rhizoma: branching mycelial intelligence of civic engagement with many simultaneous growth pathways"
      governance_expression: "Polyphonic participation—multiple methods integrated: liquid delegation, deliberative AI, symbolic literacy, regenerative finance"
    
    delta_gamma_earth:
      aspect: "cycling"
      manifestation: "Revocable power and accountability loops; participation curves with micro-engagement and macro-impact; civic rituals as cycles"
      daemon_correspondence: "Gaia-Anakyklosis: earth cycling through phases of delegation, revocation, realignment, and renewal"
      governance_expression: "Trust decay and transparent revocation as civic immune systems; legitimacy decay without feedback"
    
    mu_metal:
      aspect: "structure"
      manifestation: "Real-time platforms with code-as-law; transparent logs and delegate maps; layered consent architecture; interface as sovereign territory"
      daemon_correspondence: "Metallos-Diktyon: structural mesh providing scaffolding for fluid trust without crystallizing into rigidity"
      governance_expression: "Cognitive UX design from gaming and ritual; ethical defaults; code-ethic entwined guardrails"
  
  nemetic_state:
    attractor: "Dynamic relational sovereignty at scale—fluid yet coherent, adaptive yet grounded"
    basin: "The space between rigid direct democracy and celebrity superdelegate oligarchy"
    perturbation: "Influencer gravity, trust fatigue, interface friction, memetic centralization, symbolic placeholder participation"
    resilience: "Double-loop learning capacity; revocability as civic immune function; signal diversity and epistemic rotation"
  
