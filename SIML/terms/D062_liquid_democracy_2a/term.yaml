## Emphasis Questions

1. **σ-Air**: How do we maintain the boundary between delegation as empowerment vs. outsourcing?
2. **ρ-Water**: Can trust flows be designed to prevent superdelegate gravity wells?
3. **λ-Fire**: What rituals of revocation and realignment anchor fluid agency?
4. **β-Wood**: How do we cultivate epistemic rotation in delegation networks?
5. **δγ-Earth**: What feedback mechanisms prevent influence accumulation in silence?
6. **μ-Metal**: How do we embed ethical defaults in civic interface design?

