## The Gestalt Laws of Perceptual Organization

Insight learning rests on how humans naturally organize perception:

```
GESTALT PRINCIPLES

Proximity:
    ● ● ● ● ● ●
    ● ● ● ● ● ●
    → Grouped by nearness

Similarity:
    ○ △ ○ △ ○ △
    → Grouped by likeness

Continuity:
    ~~~~~~>
    → Perceived as continuous flow

Closure:
    ◠◡ (incomplete circle)
    → Perceived as complete form

Figure-Ground:
    ▓▓▓▓
    ▓  ▓  ← figure emerges from ground
    ▓▓▓▓
```

## Productive Thinking (Wertheimer)

Wertheimer distinguished two types of thinking:

```
REPRODUCTIVE THINKING:
    ┌─────────────────────────────────────────┐
    │  Apply learned procedures to familiar  │
    │  problem types                         │
    │  "What method worked before?"          │
    │  Routine, algorithmic, safe            │
    └─────────────────────────────────────────┘

PRODUCTIVE THINKING:
    ┌─────────────────────────────────────────┐
    │  See structural relationships in new   │
    │  situations                            │
    │  "What is the deep structure here?"    │
    │  Creative, insightful, transformative  │
    └─────────────────────────────────────────┘
```

## Connection to Related Theories

### Insight vs. Operant Conditioning

| Aspect | Operant Conditioning | Insight Learning |
|--------|---------------------|------------------|
| **Mechanism** | Reinforcement of behavior | Perceptual reorganization |
| **Speed** | Gradual, incremental | Sudden, complete |
| **Transfer** | Context-dependent | Immediately transferable |
| **Awareness** | May be unconscious | Conscious comprehension |
| **Element** | Earth/δγ (cycling) | Air/σ (pattern) |

### Insight vs. Discovery Learning

| Aspect | Discovery Learning | Insight Learning |
|--------|-------------------|------------------|
| **Process** | Active exploration | Perceptual reorganization |
| **Timing** | Can be gradual or sudden | Emphasizes suddenness |
| **Focus** | Hypothesis testing | Pattern recognition |
| **Theorist** | Bruner | Köhler, Wertheimer |
| **Element** | Wood/β (branching) | Air/σ (pattern) |

### Insight and Cognitive Load Theory

- **Connection:** Both emphasize the importance of how information is structured
- **Difference:** CLT focuses on managing limited capacity; Insight focuses on restructuring for comprehension
- **Integration:** Reducing extraneous load may facilitate insight by clearing the perceptual field

