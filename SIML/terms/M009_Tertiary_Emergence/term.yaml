- **Biology:** Life from chemistry, consciousness from neurons
- **Society:** Culture from individuals, institutions from interactions
- **Economics:** Markets from transactions, value from exchange
- **Technology:** AI capabilities from training, networks from nodes
- **Cognition:** Mind from brain, meaning from symbols
