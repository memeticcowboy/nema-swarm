## Connection to Related Theories

### Situated Learning vs. Social Learning Theory

| Aspect | Social Learning Theory | Situated Learning |
|--------|------------------------|-------------------|
| **Focus** | Individual learning from models | Collective learning through participation |
| **Unit of analysis** | Observer-model dyad | Community of practice |
| **Key mechanism** | Observation and imitation | Legitimate peripheral participation |
| **Identity** | Less emphasized | Central to the theory |
| **Time frame** | Specific learning episodes | Sustained engagement over time |
| **Element** | Water/ρ (observation) | Water/ρ + Metal/μ (relationship + structure) |

### Situated Learning vs. Cognitive Apprenticeship

| Aspect | Situated Learning | Cognitive Apprenticeship |
|--------|-------------------|-------------------------|
| **Origin** | Anthropology (Lave & Wenger) | Cognitive science (Collins, Brown, Newman) |
| **Focus** | Social participation | Cognitive skill development |
| **Setting** | Authentic communities | School-based approximations |
| **Emphasis** | Identity transformation | Skill scaffolding |
| **Element** | Water/ρ dominant | Wood/β + Metal/μ dominant |

