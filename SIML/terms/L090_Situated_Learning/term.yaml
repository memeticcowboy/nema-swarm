## Core Definition

**Situated Learning**, developed by Jean Lave and Etienne Wenger (1991), fundamentally challenges the assumption that learning is the acquisition of abstract, decontextualized knowledge. Instead, they argue that **learning is inherently social and situated** — it occurs through participation in the practices of a community, and knowledge exists not "in heads" but in the **relations between people and their activities** in specific contexts.

The central concept of **Legitimate Peripheral Participation (LPP)** describes how newcomers become full participants in communities of practice. Learning is not transmission from expert to novice, but a **trajectory of increasing participation** in socially situated activities. Knowledge is not a commodity to be acquired but a **mode of engagement** with the world.

