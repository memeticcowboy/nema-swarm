## Core Insight

> Situated Learning reveals that **knowledge is not a thing to be acquired but a way of being in the world**. We do not learn abstract concepts and then apply them; we learn by becoming practitioners, by gradually moving from the edges of communities toward their centers. The apprentice does not learn tailoring and then become a tailor — learning tailoring and becoming a tailor are the same process. Identity, knowledge, and practice are inseparable.

## One-Sentence Insight

> Lave and Wenger's Situated Learning demonstrates that learning is not the acquisition of abstract knowledge but the process of legitimate peripheral participation in communities of practice, where newcomers gradually become full practitioners through social engagement, and knowledge exists not in individual minds but in the relations between people and their shared activities.

## Three-Bullet Expansion

- **What:** A theory showing that learning is fundamentally social and situated — it occurs through participation in authentic communities of practice, with newcomers entering through legitimate peripheral participation (low-risk, genuine engagement at the edges) and gradually moving toward full membership
- **How it works:** Communities of practice form around shared domains with mutual engagement, joint enterprise, and shared repertoires → newcomers are granted legitimate access to peripheral but real tasks → through increasing participation, they develop competence and transform their identities → full participants eventually become the old-timers who guide newcomers, completing the generational cycle
- **Where it aims:** Toward understanding learning as identity transformation and enculturation rather than information transmission, with applications in education (apprenticeships, authentic learning), organizational development (communities of practice), and understanding how professional expertise develops through social participation

