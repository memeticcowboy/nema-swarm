### Examples of Communities of Practice

| Domain | Peripheral Participation | Full Participation |
|--------|-------------------------|-------------------|
| **Tailors** (Lave's study) | Apprentices sew pockets, linings | Master tailors cut garments, fit clients |
| **Midwives** | Assist, observe deliveries | Lead deliveries independently |
| **Alcoholics Anonymous** | New members share minimally | Sponsors guide newcomers |
| **Insurance claims processors** | Handle simple cases | Handle complex, exceptional cases |
| **Research labs** | Graduate students run experiments | PIs design studies, secure funding |
| **Online forums** | Lurkers read posts | Moderators shape community norms |

