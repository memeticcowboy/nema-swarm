## Criticisms and Limitations

1. **Transfer problem:** If all learning is situated, how does knowledge transfer to new contexts?
2. **Informal focus:** May neglect the value of formal, abstract learning
3. **Access inequities:** Not everyone has access to legitimate peripheral participation in desirable communities
4. **Power dynamics:** Communities may reproduce existing inequalities
5. **Boundary definition:** Difficult to define where one community ends and another begins

## Connection to CAMIL and IVR

Situated Learning has strong implications for immersive learning:
- **Authentic virtual contexts:** IVR can create situated learning environments
- **Embodied participation:** Embodied interaction supports enculturation
- **Safe peripherality:** Learners can participate peripherally without real-world risk
- **Identity play:** Virtual environments allow identity exploration
- **Community simulation:** AI agents can simulate community membership

