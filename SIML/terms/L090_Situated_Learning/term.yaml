## Elemental Pattern Analysis

### Water/ρ Dominance (Primary)

Situated Learning is fundamentally **relational and participatory**:
- **Resonance:** Learning occurs through attunement to community practices
- **Flow:** Knowledge circulates through social interaction
- **Coupling:** Learners are bound to communities through participation
- **Vicariousness:** Understanding emerges from witnessing and participating

### Metal/μ as Secondary (Structure/Community)

The scaffolding that enables participation:
- **Structure:** Communities have boundaries, roles, hierarchies
- **Containment:** The community holds and shapes learning
- **Valuation:** What counts as competence is communally defined
- **Exchange:** Knowledge flows through social relationships

### Earth/δγ as Tertiary (Cycling/Identity)

The temporal dimension of becoming:
- **Accumulation:** Competence builds through repeated participation
- **Cycling:** Generational reproduction of practice (experts were once novices)
- **Grounding:** Knowledge is tied to specific material practices
- **Rhythm:** The pace of learning follows community rhythms

### Fire/λ as Quaternary (Direction/Purpose)

The motivational force:
- **Purpose:** Joint enterprise gives direction to participation
- **Aspiration:** Novices aim toward full participation
- **Transformation:** Identity transformation drives engagement
- **Value:** What matters is defined by the community

### Air/σ as Supporting (Distinction/Meaning)

The cognitive dimension:
- **Distinction:** Making sense of practice requires parsing complex situations
- **Negotiation:** Meaning is constructed through interaction
- **Clarity:** Understanding emerges through engagement, not instruction

