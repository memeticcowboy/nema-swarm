context_note: 'Red Cedar represents Wood as total generosity—the ''Tree of Life'' where every part serves: bark (baskets), wood (canoes, houses), roots (rope), branches (smudging). Key insight: this is δγ (cycling) as giving, not just growing. The resonance (ρ) is with Creator''s gift, making cedar use an act of gratitude, not extraction. Sweat lodge purification and smudging show μ (structure) as spiritual technology—cedar creates the container for transformation.'
source: Wood in Ancient Philosophical and Indigenous Worldviews — Memetic Cowboy
