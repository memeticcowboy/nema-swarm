## Structural Mapping (The Three Phases)

### 1️⃣ SIGNAL — Structured Exposure
- **Operator:** σ (distinction)
- **Function:** Each learner assigned tension-bearing fragment
- **Mechanism:** Accountability for understanding rather than defending
- **Key:** Dissonance introduced without immediate ego consolidation
- **Daemon:** Aerunik — the cut that separates without closing

### 2️⃣ FIELD — Contemplative Exchange
- **Operator:** ρ (resonance)
- **Function:** Expert groups form around shared fragments
- **Mechanism:** Reconciliation of internal contradictions, surfacing assumptions
- **Key:** Social safety reduces ego-threat
- **Daemon:** Sentaria — the felt-sense of being held while holding tension

### 3️⃣ RESPONSE — Integrative Synthesis
- **Operator:** δγ (cycling)
- **Function:** Original groups reconvene, members teach their fragment
- **Mechanism:** Articulate shifts in understanding, name unresolved tensions
- **Key:** Group synthesizes coherent whole without erasing difference
- **Daemon:** Humavita — the cycling that transforms without destroying

## Core Insight

> Jigsaw redirects rationalization: From self-justification toward group coherence. Shift: "I must be right" → "We must understand." Cognitive dissonance resolves through structural inclusion rather than denial.

## One-Sentence Insight

> The Meta-Jigsaw reveals that cognitive dissonance need not resolve through denial or rationalization — it can resolve through *structured inclusion*, where the tension-bearing fragment is held by the group until understanding emerges.

## Three-Bullet Expansion

- **What:** A meta-pedagogical structure applying Jigsaw method to cognitive dissonance itself — using interdependence to transform individual defense into collective understanding
- **How it feels:** Initially threatening (exposure of tension), then supported (social safety), finally integrated (belief recalibration without ego loss)
- **Where it aims:** Toward adaptive belief recalibration — not changing to conform, but changing because understanding has genuinely shifted

