## Connection to Related Theories

### Generative Learning and Schema Theory

| Aspect | Schema Theory | Generative Learning Theory |
|--------|---------------|---------------------------|
| **Core focus** | Structure of prior knowledge | Process of building connections |
| **Key mechanism** | Assimilation/accommodation | Generation of relations |
| **Element** | Metal (μ-structure) | Wood (β-generation) |
| **Relationship** | Schemas are what you have | Generation is what you do with them |

Generative learning explains **how schemas are actively used and expanded** during learning.

### Generative Learning and Constructivism

Generative Learning is a specific instantiation of constructivist principles:
- Both emphasize active learner construction
- Both reject passive information transmission
- Generative Learning provides specific mechanisms (four processes) for how construction occurs

### Generative Learning and Cognitive Load Theory

| Aspect | Cognitive Load Theory | Generative Learning Theory |
|--------|----------------------|---------------------------|
| **Focus** | Managing limited capacity | Maximizing active processing |
| **Element** | Air (σ-clarity) | Wood (β-generation) |
| **Integration** | Generative activities must respect working memory limits |

Effective generative learning requires **sufficient cognitive resources** — extraneous load must be minimized so germane load (generative processing) can be maximized.

