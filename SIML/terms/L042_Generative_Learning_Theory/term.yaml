## Core Definition

**Generative Learning Theory**, developed by Merlin C. Wittrock in 1974, posits that learning is not a passive reception of information but an **active generative process** in which learners construct meaning by building relationships between new information and their existing knowledge. The theory emphasizes that comprehension and retention are enhanced when learners actively generate connections, summaries, inferences, and applications rather than merely receiving and storing information.

