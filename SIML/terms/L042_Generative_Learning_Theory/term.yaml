## The Four Generative Processes

| Process | Description | Element | Function |
|---------|-------------|---------|----------|
| **Generation of Relations** | Connecting new info to prior knowledge | ρ (Water) | Relational weaving between known and new |
| **Generation of Organized Knowledge** | Structuring information hierarchically | μ (Metal) | Creating coherent mental structures |
| **Generation of Elaborations** | Adding details, examples, extensions | β (Wood) | Branching outward from core concepts |
| **Generation of Inferences** | Drawing conclusions beyond given info | λ (Fire) | Directional extension of understanding |

