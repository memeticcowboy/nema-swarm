## Bjork's "Desirable Difficulties"

Robert Bjork's research reveals that learning is enhanced by introducing **appropriate challenges**:

```
DESIRABLE DIFFICULTIES IN SPACED REPETITION
═══════════════════════════════════════════════════════════════════

1. SPACING (vs. Massing)
   Massed:    ████████████████████ (all at once)
   Spaced:    ████    ████    ████    ████ (distributed)
   
   Effect: Creates retrieval difficulty → stronger encoding

2. INTERLEAVING (vs. Blocking)
   Blocked:   A-A-A-A-B-B-B-B-C-C-C-C (one topic at a time)
   Interleaved: A-B-C-A-B-C-A-B-C-A (mixed topics)
   
   Effect: Discriminative contrast → better discrimination

3. RETRIEVAL PRACTICE (vs. Re-reading)
   Re-reading: Passive exposure to content
   Retrieval:  Active effortful recall attempt
   
   Effect: Testing effect → memory strengthening

4. VARIABLE PRACTICE (vs. Constant)
   Constant:   Same problem type repeatedly
   Variable:   Mixed problem types
   
   Effect: Transfer enhancement → flexible application

THE PARADOX: Conditions that make learning feel harder
           in the short term produce better long-term retention
```

