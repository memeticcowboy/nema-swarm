## Core Definition

**Spaced Repetition** is a learning technique that incorporates increasing intervals of time between subsequent review of previously learned material in order to exploit the **spacing effect** — the phenomenon whereby learning is greater when studying is spread out over time, as opposed to studying the same amount of content in a single session (massed practice).

The theory emerges from two foundational research streams:
- **Ebbinghaus (1885):** Discovered the "forgetting curve" — memory decays exponentially over time, but the rate of decay slows with each successful retrieval
- **Bjork (1994):** Developed "desirable difficulties" — introducing challenges that require effortful processing enhances long-term retention

