## Core Insight

> Spaced Repetition reveals that memory is not a storage problem but a **timing problem**. The forgetting curve is inevitable, but navigable. By working with (not against) natural memory decay — retrieving information just as it begins to fade — we transform fragile short-term memories into durable long-term knowledge. The technique is metabolic: rhythmic cycles of encoding, forgetting, and effortful retrieval that strengthen memory traces with each iteration. Mastery emerges not from intensity but from consistency — the compound interest of learning.

## One-Sentence Insight

> Spaced Repetition demonstrates that optimal learning follows a metabolic rhythm — strategically timed reviews at expanding intervals transform the inevitable forgetting curve into a staircase of durable long-term memory through the paradoxical power of effortful retrieval.

## Three-Bullet Expansion

- **What:** A learning technique based on the spacing effect and forgetting curve research, using algorithmically scheduled reviews at expanding intervals to maximize long-term retention
- **How it works:** Initial learning → natural forgetting begins → effortful retrieval just before complete decay → memory reconsolidation at stronger baseline → intervals expand as memory becomes more durable → cycle continues until mastery
- **Where it aims:** Toward durable, lifelong knowledge retention — converting fragile short-term memories into robust long-term knowledge that resists decay and enables cumulative learning

