## Technology Implementations

### Algorithms

**SM-2 (SuperMemo 2):** The most widely used algorithm
```
Interval_n = Interval_{n-1} × EF

Where:
- Interval_n = days until next review
- EF = Ease Factor (starts at 2.5, adjusts based on performance)
- Correct answer: EF increases slightly, interval expands
- Incorrect answer: EF decreases, interval contracts or resets
```

**FSRS (Free Spaced Repetition Scheduler):** Machine learning optimized
- Uses neural networks to predict optimal intervals
- Adapts to individual forgetting curves
- Accounts for same-day reviews, sleep, and other factors

### Popular Tools

| Tool | Approach | Best For |
|------|----------|----------|
| **Anki** | Open-source, highly customizable | Power users, large decks |
| **RemNote** | Integrated note-taking + SRS | Students, researchers |
| **Memrise** | Gamified, multimedia | Language learning |
| **Duolingo** | Structured courses + SRS | Beginner language learners |
| **Quizlet** | Simple, social | Quick study sessions |
| **SuperMemo** | Original algorithm | Purists, long-term users |

## Critiques and Limitations

1. **Maintenance burden** — Requires consistent daily practice
2. **Shallow processing risk** — Can become mechanical without understanding
3. **Context isolation** — Cards divorced from meaningful context
4. **Transfer limitations** — Retention ≠ application in novel situations
5. **Motivation challenges** — Daily review can feel tedious
6. **Not for all content** — Procedural skills, complex understanding need different approaches

