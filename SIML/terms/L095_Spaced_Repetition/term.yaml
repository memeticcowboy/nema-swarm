### The Spacing Effect: Why Spacing Beats Cramming

```
MASSED PRACTICE vs. SPACED REPETITION
═══════════════════════════════════════════════════════════════════

MASSED PRACTICE (Cramming)          SPACED REPETITION
─────────────────────────           ─────────────────

Study Study Study Study             Study    Study    Study
███████████████████████             ████     ████     ████
1hr   1hr   1hr   1hr               1hr      1hr      1hr
                                    (day 1)  (day 3)  (day 7)

Short-term performance: HIGH        Short-term performance: LOWER
Long-term retention: POOR           Long-term retention: EXCELLENT

Why? The brain interprets massed practice as:
- "This information is available now"
- "No need to encode deeply"
- "Surface processing sufficient"

The brain interprets spaced repetition as:
- "This information was hard to retrieve"
- "Must encode more deeply"
- "Create multiple retrieval pathways"
```

