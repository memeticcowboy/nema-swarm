## The Development of Metacognition

```
METACOGNITIVE DEVELOPMENT STAGES

Level 1: Tacit (Ages 3-5)
├── Can use strategies but unaware of doing so
├── No conscious control over thinking
└── Example: Uses rehearsal but can't explain why

Level 2: Aware (Ages 6-8)
├── Recognizes thinking strategies
├── Can describe what they did
└── Limited control over strategy selection

Level 3: Strategic (Ages 9-11)
├── Deliberately selects strategies
├── Plans approach to problems
└── Monitors effectiveness

Level 4: Reflective (Ages 12+)
├── Evaluates strategy effectiveness
├── Transfers strategies across domains
├── Reflects on thinking about thinking
└── Full self-regulated learning
```

## Practical Applications

### Teaching Metacognitive Strategies

```
RECIPROCAL TEACHING (Palincsar & Brown)

Teacher models → Students practice → Students lead
     │               │               │
     ▼               ▼               ▼
  Summarizing    Summarizing    Summarizing
  Questioning    Questioning    Questioning
  Clarifying     Clarifying     Clarifying
  Predicting     Predicting     Predicting

Scaffolded release of metacognitive responsibility
```

### Metacognitive Prompts

| Phase | Prompts |
|-------|---------|
| **Planning** | "What do I already know about this?"<br>"What's my goal?"<br>"What strategy should I use?" |
| **Monitoring** | "Do I understand this?"<br>"Is my strategy working?"<br>"Should I adjust my approach?" |
| **Evaluating** | "Did I achieve my goal?"<br>"What worked well?"<br>"What would I do differently?" |

### The Think-Aloud Protocol

```
THINK-ALOUD FOR METACOGNITIVE DEVELOPMENT

Learner verbalizes thoughts while problem-solving:

"Okay, I need to find the main idea...
 Let me look at the first sentence...
 No, that seems to be an example...
 Maybe I should check the last paragraph...
 Actually, let me try summarizing each section first..."

Externalizes internal monitoring process
Makes metacognition visible and teachable
```

