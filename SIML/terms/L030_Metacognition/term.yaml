## The Three Phases of SRL

### Phase 1: Forethought (Before Learning)

```
FORETHOUGHT PROCESSES
│
├── TASK ANALYSIS
│   ├── Goal setting: What do I want to achieve?
│   └── Strategic planning: How will I get there?
│
└── SELF-MOTIVATION BELIEFS
    ├── Self-efficacy: Can I do this?
    ├── Outcome expectations: What's the value?
    ├── Intrinsic interest: Do I enjoy this?
    └── Goal orientation: Mastery vs. performance
```

### Phase 2: Performance (During Learning)

```
PERFORMANCE PROCESSES
│
├── SELF-CONTROL
│   ├── Task strategies: Methods for completing work
│   ├── Imagery: Mental rehearsal
│   ├── Attention focusing: Concentration techniques
│   └── Self-instruction: Talking oneself through steps
│
└── SELF-OBSERVATION
    ├── Metacognitive monitoring: "Do I understand?"
    └── Self-recording: Tracking progress, time, errors
```

### Phase 3: Self-Reflection (After Learning)

```
SELF-REFLECTION PROCESSES
│
├── SELF-JUDGMENT
│   ├── Self-evaluation: Comparing performance to goals
│   └── Causal attribution: Why did I succeed/fail?
│
└── SELF-REACTION
    ├── Self-satisfaction: How do I feel about results?
    └── Adaptive/defensive: Will I adjust or protect ego?
```

