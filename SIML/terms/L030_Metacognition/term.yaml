## Core Definition

**Metacognition** refers to "cognition about cognition" — the knowledge and regulation of one's own cognitive processes. First coined by John Flavell in 1979, metacognition encompasses both **metacognitive knowledge** (what we know about our own thinking) and **metacognitive regulation** (how we control our learning). Self-Regulated Learning (SRL), developed by Barry Zimmerman and others, operationalizes metacognition into a cyclical model of forethought, performance, and self-reflection.

### The Two Dimensions of Metacognition

```
METACOGNITIVE ARCHITECTURE
│
├── METACOGNITIVE KNOWLEDGE (Declarative)
│   ├── Person variables: "I learn better in the morning"
│   ├── Task variables: "This concept is complex"
│   └── Strategy variables: "Mind maps help me organize"
│
└── METACOGNITIVE REGULATION (Procedural)
    ├── Planning: Setting goals, selecting strategies
    ├── Monitoring: Checking understanding, tracking progress
    ├── Evaluating: Assessing outcomes against goals
    └── Debugging: Correcting errors, adjusting strategies
```

