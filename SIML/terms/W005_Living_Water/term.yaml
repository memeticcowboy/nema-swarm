elemental_emphasis:
  ∴: How is living water distinguished from dead/commodified water?
  ≈: What resonance flows between humans and water-beings?
  ▲: What direction does reciprocal stewardship aim?
  𐂷: What possibilities emerge from water-as-kin?
  ☷: How does water's gift cycle through generations?
  ⛨: What boundaries protect sacred waters?
context_note: 'Living Water represents Indigenous water cosmology—water not as resource but as relative (North American: ''blood of the Earth'', Oceanian: Tangaroa, Andean: Yacuruna). Key insight: water has personhood, agency, requires reciprocity. Pollution = harm to relative, not resource waste. This is ρ (resonance) as ethical foundation, same pattern as Sacred Relative (Earth) but specific to water. The ''living'' distinction marks water that maintains relational connection vs. ''dead'' commodified water.'
source: Water Symbolism in Ancient and Indigenous Worldviews — Memetic Cowboy
