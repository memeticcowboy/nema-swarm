term: "Subconscious Games in Decision-Making"
hex_tag: "#C012"
nemetic: "Φ(SubconsciousGames) = σ(hidden|manifest) ∘ ρ(automatic|deliberate) ∘ λ(avoidance|awareness) ∘ β(pattern|choice) ∘ δγ(repetition|growth) ∘ μ(illusion|reality) + ε | :illuminating"
siml_encoding: "⟨Game|subconscious⟩ ⊳ ⟨Decision|influenced⟩ → ⟨Pattern|repeated⟩ ⊗ ⟨Awareness|emerging⟩ ⇄ ⟨Agency|reclaimed⟩"
formalism:
  math_operators: [σ, ρ, λ, β, δγ, μ]
  dim_operators: [χ, Q_in, Ψ_exp, Z]
  partials: ["∂Φ/∂σ (distinction between hidden subconscious patterns and manifest conscious choices; categorical separation of automatic from deliberate behavior)", "∂Φ/∂ρ (relational flow between automatic subconscious reactions and deliberate conscious decision-making)", "∂Φ/∂λ (directional tension between the drive to avoid uncomfortable awareness and the transformative potential of illumination)", "∂Φ/∂β (feedback loop between recognizing subconscious patterns and exercising genuine choice)", "∂Φ/∂δγ (cyclical nature of repeating subconscious games versus the spiral of growth through awareness)", "∂Φ/∂μ (boundary permeability between the illusion of conscious choice and the reality of subconscious influence)"]
  Z_state: "porous (boundaries between conscious and subconscious processes are permeable and require continuous examination)"
  tendency: "Automatic/Deliberate → 0.3 (default toward automatic subconscious patterns, but cultivable toward conscious awareness)"
  hex: ["0x01", "0x02", "0x03", "0x04", "0x05", "0x06"]
coords:
  ontology:
    primary: I
    secondary: We
  agency:
    type: individual
    power_mode: Within
