## Bandura's Social Learning Theory (1977)

### The Four Processes of Modeling

| Process | Description | Element | Function |
|---------|-------------|---------|----------|
| **Attention** | Noticing the model's behavior | Air/∴ | σ (distinction) — what to observe |
| **Retention** | Remembering the observed behavior | Metal/⛨ | μ (structuring) — encoding for memory |
| **Reproduction** | Physically/intellectually replicating | Wood/𐂷 | β (branching) — attempting the action |
| **Motivation** | Willingness to perform the behavior | Fire/λ | λ (direction) — purpose and drive |

### Vicarious Learning

```
Direct Experience:        I act → I experience consequences → I learn
                                ↓
Vicarious Experience:     They act → They experience consequences → I observe → I learn
                                ↓
Advantage: Learn from others' successes and failures without personal risk
```

## Lave & Wenger's Communities of Practice (1991)

### Legitimate Peripheral Participation (LPP)

| Stage | Position | Participation | Identity |
|-------|----------|---------------|----------|
| **Newcomer** | Peripheral | Legitimate but limited tasks | Aspiring member |
| **Journeyer** | Moving inward | Increasing responsibility | Developing competence |
| **Old-timer** | Central | Full participation | Master/mentor |

### Three Dimensions of CoP

```
         ┌─────────────────┐
         │  Joint Enterprise │
         │ (mutual engagement)│
         └────────┬────────┘
                  │
    ┌─────────────┼─────────────┐
    ↓             ↓             ↓
┌───────┐   ┌───────────┐   ┌───────────┐
│Shared │   │  Shared   │   │  Shared   │
│Repertoire│  │  Practice  │   │  Identity  │
└───────┘   └───────────┘   └───────────┘
    │             │             │
    └─────────────┴─────────────┘
                  │
         Community of Practice
```

1. **Mutual Engagement:** People interact, establishing norms and relationships
2. **Joint Enterprise:** Collective negotiation of shared purpose
3. **Shared Repertoire:** Resources for communication and action (routines, tools, stories)

## Elemental Pattern Analysis

### Water/ρ Dominance

Social Learning is fundamentally a **Water theory**:
- **Resonance:** Learning through attunement to others
- **Flow:** Knowledge circulates through social networks
- **Coupling:** The learner is coupled to the community
- **Relationality:** Understanding emerges between people, not just within them

### Supporting Elements

