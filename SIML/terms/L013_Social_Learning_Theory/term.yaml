## Core Insight

> Social Learning Theory reveals that learning is not an individual achievement but a **relational resonance** — we learn by attuning to others, participating in shared practices, and gradually becoming the kind of person who belongs. The community is not just the context for learning; it **is** the curriculum.

## One-Sentence Insight

> Bandura and Lave & Wenger demonstrate that learning is fundamentally social — we acquire knowledge not through isolated study but through observing models, participating in communities, and transforming our identities through relational practice.

## Three-Bullet Expansion

- **What:** A family of theories (Social Learning, Communities of Practice) arguing that learning occurs through observation, modeling, and participation in social communities — not through individual information processing alone
- **How it works:** Attention to models → retention of observed behaviors → reproduction attempts → motivational reinforcement → legitimate peripheral participation → identity transformation → full community membership
- **Where it aims:** Toward learning as social becoming — the transformation of identity through participation in communities of shared practice

