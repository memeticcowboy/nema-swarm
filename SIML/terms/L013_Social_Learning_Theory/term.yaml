## Core Definition

**Social Learning Theory** (Bandura, 1977) and **Communities of Practice** (Lave & Wenger, 1991) represent complementary perspectives on learning as fundamentally social:

1. **Observational Learning:** Learning by watching others (models) and vicariously experiencing consequences
2. **Modeling:** The four processes — attention, retention, reproduction, motivation
3. **Legitimate Peripheral Participation:** Entering a community through low-stakes, scaffolded participation
4. **Identity Formation:** Learning as becoming a certain kind of person through social participation

