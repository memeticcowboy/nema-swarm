## Connection to CAMIL and IVR

Social Learning transforms immersive learning:
- **Social Presence:** Virtual others as models and mentors
- **Collaborative IVR:** Multi-user environments for joint practice
- **Virtual Communities:** Online communities of practice in immersive spaces
- **Avatar Modeling:** Observing and learning from virtual representations

**Evidence:** Bandura's work on media modeling extends to virtual environments; avatar appearance affects behavior (Proteus effect)

