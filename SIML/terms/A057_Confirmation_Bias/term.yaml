nemetic: >-
  Φ(Confirm) = σ(confirming|disconfirming) ∘ ρ(belief|evidence) ∘ λ(validation|truth)
  ∘ β(reinforcement|feedback) ∘ δγ(comfort|certainty)
  ∘ μ(boundary|selective) + ε | :closed
