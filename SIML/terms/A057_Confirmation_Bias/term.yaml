elemental_emphasis:
  ∴: "How is confirming evidence distinguished from disconfirming evidence pre-consciously?"
  ≈: "What is the felt sense when encountering confirming vs. disconfirming information?"
  ▲: "Does the search serve truth or comfort? Who benefits from belief maintenance?"
  𐂷: "What experiments have been refused? What narratives remain ungrown?"
  ☷: "What is the true cost of wrong certainty compounding over time?"
  ⛨: "What structures would make disconfirmation welcome rather than threatening?"
context_note: >-
  Confirmation Bias describes the tendency to favor information that confirms existing
  beliefs while ignoring contradictory evidence. Operates through selective exposure,
  selective interpretation, and selective memory.
source: "Navigating the Quirky World of Cognitive Biases"
