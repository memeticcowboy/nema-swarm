## Core Definition

**Attribution Theory**, developed by Bernard Weiner (1985), examines how individuals explain the causes of events and behaviors—particularly their own successes and failures. These causal explanations (attributions) profoundly influence emotions, motivation, and future behavior. The theory identifies three primary dimensions along which attributions vary:

### The Three Attribution Dimensions

| Dimension | Description | Element | Learning Impact |
|-----------|-------------|---------|-----------------|
| **Locus** | Internal vs. External | λ (Fire) | Self-efficacy, pride/shame |
| **Stability** | Stable vs. Unstable | δγ (Earth) | Expectancy for future success |
| **Controllability** | Controllable vs. Uncontrollable | μ (Metal) | Effort allocation, guilt/anger |

