## Attribution Patterns and Their Consequences

### Mastery-Oriented Pattern (Adaptive)

```
SUCCESS → Internal attribution (ability/effort)
        → Stable attribution (ability)
        → Controllable attribution (effort)
        → Pride, confidence
        → High motivation, persistence
        → Continued success-seeking

FAILURE → Internal attribution (effort - not ability)
        → Unstable attribution (can change)
        → Controllable attribution (try harder)
        → Guilt (motivating), hope
        → Increased effort, strategy change
        → Persistence and eventual success
```

### Helpless Pattern (Maladaptive)

```
SUCCESS → External attribution (luck, easy task)
        → Unstable attribution (won't last)
        → Uncontrollable attribution
        → Relief (not pride)
        → Anxiety about future failure
        → Avoidance of challenge

FAILURE → Internal attribution (lack of ability)
        → Stable attribution (can't change)
        → Uncontrollable attribution
        → Shame, humiliation
        → Low motivation, giving up
        → Learned helplessness
```

## Elemental Pattern Analysis

### Air/σ Dominance

Attribution Theory is fundamentally an **Air theory**:
- **Distinction-making:** Separating internal from external causes
- **Causal analysis:** Identifying why events occurred
- **Cognitive clarity:** The mental process of explanation
- **Information processing:** Evaluating evidence for causes
- **Pattern recognition:** Connecting outcomes to perceived causes

### Supporting Elements

| Element | Role in Attribution Theory |
|---------|---------------------------|
| **Fire/λ** | Direction through locus of causality; internal attributions fuel self-concept |
| **Earth/δγ** | Stability dimension—temporal patterns of cause and effect |
| **Metal/μ** | Controllability—structure of agency and responsibility |
| **Water/ρ** | Emotional consequences flowing from attributions |
| **Wood/β** | Growth through revised attributions; branching explanations |
| **Child/✶** | Integration of dimensions into holistic causal understanding |

