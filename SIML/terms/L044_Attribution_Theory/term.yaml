## Attribution in Educational Practice

### Teacher Feedback and Attributions

```
FEEDBACK TYPE          ATTRIBUTION PROMOTED          OUTCOME
─────────────────────────────────────────────────────────────
"You're so smart!"     Ability (stable, internal)    Helpless pattern
                       → Fear of challenging tasks

"You worked hard!"     Effort (unstable, internal,   Mastery pattern
                       controllable) → Persistence

"Great strategy!"      Process (controllable)        Mastery pattern
                       → Strategy-seeking behavior

"This is easy for      Task ease (external)          Helpless pattern
you, right?"           → Shame when difficulty arises
```

### Creating Mastery-Oriented Classrooms

**To promote adaptive attributions:**

1. **Emphasize effort and strategy over ability**
   - "Your strategy worked" > "You're smart"
   - Process praise builds resilience

2. **Normalize difficulty and failure**
   - Frame challenges as growth opportunities
   - Share stories of struggle before success

3. **Teach attribution explicitly**
   - Help students recognize their explanations
   - Provide alternative interpretations

4. **Model adaptive attributions**
   - Teachers demonstrate productive self-talk
   - "That didn't work—let me try a different approach"

## Core Insight

> Attribution Theory reveals that the meaning we assign to our experiences shapes our future more than the experiences themselves. Success and failure are not objective events but interpreted phenomena—how we explain outcomes determines whether we persist or give up, approach or avoid, grow or stagnate. The most powerful intervention is not changing outcomes but changing the causal stories we tell about them.

## One-Sentence Insight

> Attribution Theory demonstrates that how learners explain their successes and failures—along dimensions of locus, stability, and controllability—shapes their emotions, motivation, and future behavior more profoundly than the outcomes themselves.

## Three-Bullet Expansion

- **What:** A theory examining how individuals explain the causes of events and behaviors, particularly their own successes and failures, along three dimensions: locus (internal/external), stability (stable/unstable), and controllability (controllable/uncontrollable)
- **How it works:** Outcomes trigger causal search → attributions form along three dimensions → emotional consequences (pride, shame, guilt, anxiety) → motivational consequences (effort, persistence) → future behavior patterns (mastery vs. helpless orientation)
- **Where it aims:** Toward adaptive attribution patterns that promote resilience, persistence, and growth—where success is attributed to internal, stable, controllable causes and failure to internal, unstable, controllable causes (effort/strategy rather than ability)

