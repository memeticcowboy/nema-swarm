### Attribution and Self-Efficacy (Bandura)

| Aspect | Self-Efficacy | Attribution Theory |
|--------|---------------|-------------------|
| **Core concept** | Belief in capability | Belief about causes |
| **Source** | Mastery experiences, modeling, persuasion | Interpretation of outcomes |
| **Element** | Water (ρ-resonance) | Air (σ-distinction) |
| **Relationship** | Attributions shape efficacy beliefs | Efficacy influences attributions |

**Recursive relationship:**
```
High Self-Efficacy → Internal, stable success attributions
                   → Increased effort → Success
                   → Reinforced efficacy

Low Self-Efficacy → External, unstable success attributions
                  → Decreased effort → Failure
                  → Confirmed low efficacy
```

