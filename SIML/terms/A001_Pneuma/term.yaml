context_note: 'Pneuma represents Air as vital principle—not just gas but animating
  force. Key distinction: Greek tripartite air (Aer: lower air, Pneuma: breath/soul,
  Aether: upper divine air). Pneuma is middle term—connecting body and spirit. The
  octahedron (Platonic solid) symbolizes this mediation. Later Stoic philosophy extends
  Pneuma to cosmic scale—the universe breathes.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic
