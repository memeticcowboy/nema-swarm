## One-Sentence Insight

> Democracy in the networked age trades the stability of representation for the vitality of resonance — transforming legitimacy from procedural regularity to affective alignment, from ballots to bandwidth, from authority to authenticity.

## Three-Bullet Expansion

- **What:** A framework for understanding how network technologies transform democratic legitimation — from mediated representation to immediate resonance, from institutional authority to viral visibility, creating both new participatory possibilities and epistemic vulnerabilities
- **How it feels:** Energizing yet destabilizing — the thrill of immediate connection mixed with the anxiety of information overload, the empowerment of being a knowledge producer mixed with the vertigo of competing realities
- **Where it aims:** Toward a post-representational democracy where participation is continuous and resonant — but with risks of digital divide, attention inequality, and interface capture by corporate or manipulative forces

