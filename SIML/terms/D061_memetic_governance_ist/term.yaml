# SIML Formalism

## Core Definition
Memetic Governance IST (Integrated Systemic Thinking) recodes memetic governance into a living symbolic ecology operating through recursive symbolic care rather than viral manipulation. It treats memes not as epistemic truths but as affect-laden semiotic vehicles requiring ritual friction for epistemic integrity.

