elemental_emphasis:
  ∴: "How do we distinguish genuine attention from the illusion of multitasking? What signal is lost when the noise floor rises?"
  ≈: "What happens to relational depth when attention never dwells? How does fragmentation erode empathy and presence?"
  ▲: "Where does purpose go when attention has no sustained direction? What aims are sacrificed to the scroll?"
  𐂷: "What forms of thought become impossible under fragmented attention? What creative possibilities require sustained focus to emerge?"
  ☷: "What is the metabolic cost of constant context-switching? How does cognitive depletion accumulate invisibly?"
  ⛨: "What boundaries protect sustained attention? What structures — digital, social, personal — enable or prevent deep focus?"
context_note: >-
  Attention fragmentation describes the systematic degradation of sustained cognitive focus
  in environments designed to capture and redirect attention. Unlike simple distraction
  (a temporary interruption), fragmentation is structural — the attention system itself
  reorganizes around interruption as its default mode. The distinction matters: distraction
  assumes a baseline of focus that gets disrupted; fragmentation suggests the baseline
  itself has shifted. This is an Air-primary pathology where σ (distinction-making) degrades
  under information overload.
source: "Attention ecology analysis — Memetic Cowboy"
