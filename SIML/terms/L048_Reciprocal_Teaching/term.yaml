## Elemental Pattern Analysis

### Water/ρ Dominance (Primary)

Reciprocal Teaching is fundamentally a **Water theory**:
- **Dialogue as learning mechanism:** Understanding emerges through social interaction
- **Collaborative construction:** Knowledge is built together, not transmitted
- **Resonance:** Students attune to each other's thinking and the text
- **Relational:** The teacher-student relationship transforms through reciprocal exchange

### Air/σ Secondary (Strategic Clarity)

- **Comprehension monitoring:** Metacognitive awareness of understanding
- **Distinction-making:** Separating main ideas from details
- **Clarification:** Resolving ambiguity and confusion
- **Explicit strategies:** Making thinking visible and structured

### Metal/μ Tertiary (Scaffolding Structure)

- **Predictable routine:** The four strategies provide consistent structure
- **Gradual release:** Systematic transfer of responsibility
- **Structured dialogue:** Turn-taking and role definition
- **Instructional framework:** Clear procedures for implementation

### Earth/δγ (Cycling)

- **Text segments:** Material is broken into manageable chunks
- **Repeated practice:** Strategies applied across multiple segments
- **Feedback loops:** Dialogue creates ongoing assessment
- **Spiral development:** Skills deepen through repeated cycles

### Wood/β (Growth)

- **Generative questions:** Students create new inquiries
- **Predictions:** Forward-looking hypotheses about text
- **Expanding competence:** Growing independence over time

### Fire/λ (Direction)

- **Purposeful reading:** Goal-directed comprehension
- **Motivation:** Engagement through active participation
- **Agency:** Student ownership of learning process

