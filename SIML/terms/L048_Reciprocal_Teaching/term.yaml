## Core Insight

> Reciprocal Teaching reveals that reading comprehension is not a solitary cognitive act but a **social achievement**—understanding emerges through the water/ρ space of collaborative dialogue scaffolded by metal/μ structure. The four strategies provide air/σ clarity to the comprehension process, while the gradual release of responsibility enables students to internalize expert practices. The method demonstrates that the path to independent expertise runs through structured interdependence.

## One-Sentence Insight

> Palincsar and Brown's Reciprocal Teaching demonstrates that reading comprehension develops through structured collaborative dialogue where teachers and students take turns leading discussions using four metacognitive strategies—summarizing, questioning, clarifying, and predicting—gradually transferring responsibility until students become independent strategic readers.

## Three-Bullet Expansion

- **What:** An instructional approach where teachers and students engage in collaborative dialogues about text using four comprehension strategies (summarizing, questioning, clarifying, predicting), with students gradually taking on the teacher role as they develop expertise
- **How it works:** Teacher models strategies through think-alouds → students practice with scaffolded support → students lead dialogues independently; the social interaction creates a zone where comprehension strategies become internalized through repeated practice
- **Where it aims:** Toward the development of independent, strategic readers who can monitor their own comprehension and deploy appropriate strategies when understanding breaks down

