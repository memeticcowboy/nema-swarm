## Research Evidence

### Key Findings

- **Significant comprehension gains:** Effect sizes typically 0.4-0.8 standard deviations
- **Maintenance over time:** Skills persist after instruction ends
- **Transfer to new contexts:** Students apply strategies independently
- **Benefits for diverse learners:** Effective with struggling readers, English learners, and students with learning disabilities
- **Improved metacognition:** Students become more aware of their own understanding

### Critical Success Factors

1. **Explicit strategy instruction:** Students must understand what, when, why, and how to use strategies
2. **Sufficient scaffolding:** Gradual release must match student readiness
3. **Quality of dialogue:** Rich, authentic discussion—not scripted recitation
4. **Teacher expertise:** Skillful facilitation and knowing when to intervene
5. **Sustained practice:** Multiple sessions needed for internalization

