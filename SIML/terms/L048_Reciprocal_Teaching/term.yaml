## The Reciprocal Teaching Process

### Phase 1: Teacher Modeling

```
TEHER MODELING PHASE
│
┌─────────────────────────────────────────────────────────────────────┐
│                                                                     │
│  Teacher reads text segment aloud                                   │
│       │                                                             │
│       ▼                                                             │
│  Teacher THINKS ALOUD using four strategies:                        │
│       │                                                             │
│       ├─ "Let me summarize: The main idea is..."                    │
│       ├─ "A good question about this section would be..."           │
│       ├─ "I need to clarify this word—I think it means..."          │
│       └─ "I predict that next, the author will..."                  │
│       │                                                             │
│       ▼                                                             │
│  Students observe the strategic thinking process                    │
│                                                                     │
│  Element: Metal/μ (structured demonstration)                        │
│                                                                     │
└─────────────────────────────────────────────────────────────────────┘
```

### Phase 2: Guided Practice

```
GUIDED PRACTICE PHASE
│
┌─────────────────────────────────────────────────────────────────────┐
│                                                                     │
│  Teacher and students read next segment together                    │
│       │                                                             │
│       ▼                                                             │
│  Teacher invites students to try strategies:                        │
│       │                                                             │
│       ├─ "Who would like to summarize?"                             │
│       ├─ "What question do you have about this part?"               │
│       ├─ "Is there anything we need to clarify?"                    │
│       └─ "What do you think will happen next?"                      │
│       │                                                             │
│       ▼                                                             │
│  Teacher provides feedback and support (scaffolding)                │
│                                                                     │
│  Element: Water/ρ (social dialogue) + Metal/μ (scaffold)            │
│                                                                     │
└─────────────────────────────────────────────────────────────────────┘
