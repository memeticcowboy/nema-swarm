## Core Definition

**Reciprocal Teaching** is an instructional approach developed by Annemarie Palincsar and Ann Brown (1984) that engages students in collaborative dialogues about text to improve reading comprehension. The method involves **four comprehension strategies** practiced through structured conversations where the teacher and students take turns being the "teacher"—leading the group in discussing and understanding the text.

