  epistemics:
    dsrp:
      D: The Consider Meta-Posture is distinguished from both premature closure and from meta-capture paralysis. It marks
        a distinct, pre-operator state of holding a concept (Φ) open, separate from the act of encoding or applying procedural
        operators.
      S: The system comprises the observer embedded within Φ, the eight consideration conditions (c₁–c₈), the field openness
        value (ε), the tension gradient providing data, and the delayed SIML operators waiting to fire. It is a structured
        yet open field of partial perspectives.
      R: Relationships are defined by constraint (holding Φ open), mapping (conditions specify the posture), flow (openness
        ε ≠ 0 from posture), transformation (observer generates meaning), and conflict (against meta-capture death). The posture
        mediates between observer, concept, and potential action.
      P: The perspective is inherently partial and generative; the observer does not discover but constructs meaning from
        within the open field. It is a first-person stance of deliberate, suspended agency aimed at avoiding both procedural
        checklist mentality and identity collapse.
