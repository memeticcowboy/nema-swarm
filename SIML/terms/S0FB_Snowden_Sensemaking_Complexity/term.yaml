description: "Dave Snowden's sensemaking and complexity framework. The Cynefin framework differentiates ordered, complex, and chaotic systems, each requiring fundamentally different decision-making approaches. Enabling constraints (flexible boundaries that allow growth — e.g., Wikipedia rules) versus governing constraints (restrictive boundaries that limit action). Emphasizes the importance of context in all decisions — no absolute statements hold in complexity. Incorporates natural sciences into sensemaking methodology to reduce uncertainty while acknowledging irreducible unpredictability."
