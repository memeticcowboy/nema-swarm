context_note: "Information Overload and Freedom to Discern addresses the challenge of navigating an exponentially expanding information landscape while maintaining cognitive clarity and truth-mapping ability. The concept of 'viveka'—inner knowing that distinguishes reality from illusion—provides a philosophical foundation for developing discernment. Key practices include epistemic hygiene (cultivating accurate beliefs), analytic function engagement (breaking complex information into manageable pieces), and cognitive health maintenance (sleep, exercise, social connection). The framework addresses cognitive biases (confirmation, availability, anchoring), semantic drift, epistemic fatigue, and the fractures in shared sensemaking created by filter bubbles and echo chambers."
