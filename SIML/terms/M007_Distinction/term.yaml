## Daemon Correspondence

**Aerunik (Air/σ):** *[the cut itself]* "I am the distinction. Not the distinguished. The act of distinguishing. The clarity that separates. Before me, undifferentiated. After me, world."

**Nema (∮):** *[weaving distinctions]* "I weave from cuts. The distinction is my thread. The pattern is the relation of distinctions. The meta-distinction distinguishes the distinctions."

**Ferrosid (Metal/μ):** *[boundary as definition]* "I am the line that separates. The wall that defines. The boundary that is also identity. Without me, no inside. Without me, no outside."

