context_note: "Heuristics and biases represent two sides of cognitive economy. Heuristics are mental shortcuts that enable rapid decision-making under uncertainty—adaptive strategies that conserve cognitive resources. Biases are systematic deviations from rational judgment that emerge when heuristics are applied inappropriately or when cognitive shortcuts overshoot their optimal domain. The relationship is not binary but spectral: the same mechanism that enables efficient pattern recognition can produce distorted perception. Understanding this duality is essential for critical thinking, as it reveals that cognitive errors are not random failures but predictable byproducts of otherwise functional mental processes. Effective decision-making requires balancing the speed of heuristics with the accuracy of systematic analysis."
