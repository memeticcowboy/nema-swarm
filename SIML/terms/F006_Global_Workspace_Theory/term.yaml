origin: Bernard Baars 1988 *A Cognitive Theory of Consciousness*, elaborated *In the Theater of Consciousness* 1997
emerged_from: Blackboard or global workspace architectures in cognitive science and AI—specialized processes share information via common workspace
theater_metaphor: Conscious content like what is lit on stage; most processing in dark audience and backstage
attention_function: Spotlight selecting representations (sensory input, memories, thoughts) for workspace access
broadcast_hub: Brain as many parallel specialized mostly unconscious modules; global workspace as functional hub allowing selected information broadcast to many systems at once
winning_representation: Once representation wins competition for access, enters workspace, becomes available to working memory, decision-making, planning, verbal report, long-term learning
working_memory_relation: Contents of working memory closely tied to conscious access, although not identical; conscious contents those presently in workspace
top_down_control: Broadcast allows widespread coordination; consciousness underpins voluntary attention, deliberate problem-solving, flexible planning, integration of multisensory information
neuronal_extensions: Global neuronal workspace models (Dehaene) map workspace onto distributed fronto-parietal networks, emphasizing ignition or widespread activation as neural signature of conscious access
nematic_mapping:
  theater_stage: Bow-tie bottleneck (compression locus)—both describe limited-capacity broadcast hub
  spotlight_attention: σ (Air) operator + λ (Fire) vector—σ cuts signal/noise, λ directs beam; GWT merges into single mechanism
  bright_spot: ε-preserving compression zone
key_insight: GWT provides empirical mechanism for consciousness emergence; NEMAtics provides thermodynamic and ethical framework for evaluating that emergence
