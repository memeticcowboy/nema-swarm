## Types of Mental Models

### 1. Models of Systems

```
SYSTEM MENTAL MODEL (Example: Thermostat)

External System:
┌─────────────────────────────────────┐
│  Room → Sensor → Controller → Heater│
│   ↑                              │  │
│   └──────────────────────────────┘  │
│         (feedback loop)             │
└─────────────────────────────────────┘

Mental Model (Naive):
┌─────────────────────────────────────┐
│  Cold → Turn up → Warmer            │
│       thermostat                    │
│  (linear, no feedback)              │
└─────────────────────────────────────┘

Mental Model (Expert):
┌─────────────────────────────────────┐
│  Setpoint → Comparator → Output    │
│      ↑          │          │        │
│   Sensor ← Room Temp ← Heat Output │
│  (feedback loop understood)         │
└─────────────────────────────────────┘

Element: Air/σ (distinction between models)
Element: Water/ρ (flow of feedback)
```

