## Core Insight

> Mental Models Theory reveals that human reasoning is fundamentally **simulative** — we understand the world not through abstract rules but by constructing and manipulating internal analogues. The accuracy of our mental models determines the accuracy of our predictions, explanations, and decisions. Learning, from this perspective, is the progressive refinement of these internal representations through feedback and experience.

## One-Sentence Insight

> Mental Models Theory demonstrates that humans reason by constructing structural analogues of reality that enable simulation, prediction, and inference — with learning representing the progressive refinement of these internal representations through feedback and experience.

## Three-Bullet Expansion

- **What:** A theory of reasoning proposing that humans understand and predict the world through internal mental models — structural analogues that mirror external reality and enable simulation-based inference
- **How it works:** Perception triggers model construction → working memory simulates model dynamics → predictions emerge from simulation → feedback drives model revision → increasing representational accuracy over time
- **Where it aims:** Toward accurate, flexible mental representations that enable effective reasoning, prediction, and action across diverse domains and situations

