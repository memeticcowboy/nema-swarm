## Core Definition

**Mental Models Theory**, developed by Philip Johnson-Laird, proposes that humans reason not through formal logic or abstract rules, but by constructing **mental models** — structural analogues of the world that represent objects, situations, and processes. These models:

1. **Are Structural Analogues:** They mirror the structure of what they represent
2. **Enable Simulation:** We can "run" models to predict outcomes
3. **Support Inference:** New information emerges from model manipulation
4. **Are Limited:** Working memory constraints affect model complexity
5. **Are Revised:** Feedback updates and refines models

