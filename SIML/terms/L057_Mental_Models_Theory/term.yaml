## Reasoning Through Model Manipulation

### Deductive Reasoning Example

```
SYLLOGISM: "All humans are mortal. Socrates is human. Therefore..."

Mental Model Construction:
┌─────────────────────────────────────────┐
│                                         │
│  [humans] ⊂ [mortals]                   │
│     ↑                                   │
│  [socrates]                             │
│                                         │
│  Spatial: Socrates inside Humans        │
│           Humans inside Mortals         │
│                                         │
│  Therefore: Socrates inside Mortals     │
│                                         │
└─────────────────────────────────────────┘

Element: Air/σ (containment relations)
Element: Metal/μ (structural hierarchy)
```

### Inductive Reasoning Example

```
INDUCTION: "Every swan I've seen is white..."

Mental Model Development:
┌─────────────────────────────────────────┐
│  Observation 1: Swan A ──→ White       │
│  Observation 2: Swan B ──→ White       │
│  Observation 3: Swan C ──→ White       │
│         ...                             │
│                                         │
│  Model: [Swan] ──→ [White]             │
│         (default property)              │
│                                         │
│  Until: Swan D ──→ Black               │
│                                         │
│  Model Revision: [Swan] ──→ [Variable] │
│                                         │
└─────────────────────────────────────────┘

Element: Wood/β (model generation)
Element: Water/ρ (model revision)
```

## Elemental Pattern Analysis

### Air/σ Dominance (Distinction/Representation)

Mental Models Theory is fundamentally an **Air theory**:

**Air/σ (Distinction/Clarity):**
- **Structural representation:** Creating analogues that mirror reality
- **Possibility representation:** Distinguishing between what is and what could be
- **Explicit representation:** Making implicit knowledge visible
- **Model discrimination:** Choosing between competing models

**Water/ρ (Resonance/Flow):**
- **Analogical mapping:** Seeing similarities across domains
- **Model revision:** Flowing from inaccurate to accurate representations
- **Transfer:** Applying models to new situations
- **Feedback integration:** Resonance between prediction and observation

**Wood/β (Growth/Exploration):**
- **Model generation:** Creating new representations
- **Possibility exploration:** What-if simulations
- **Inferential extension:** Growing knowledge from models
- **Creative reasoning:** Novel model combinations

**Child/✶ (Integration/Harmony):**
- **Unified understanding:** Integrating multiple models
- **Coherent comprehension:** When models align with reality
- **Expertise development:** Integration of domain models

