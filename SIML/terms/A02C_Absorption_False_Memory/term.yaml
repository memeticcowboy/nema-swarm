name: absorption_false_memory
term: Absorption and False Memory
nemetic: "Φ(AbsorptionMemory) = σ(internal|external)\n                    ∘ ρ(imagination|reality)\n                    ∘ λ(narrative|cultural)\n                    ∘ β(belief|reinforced)\n                    ∘ δγ(absorption|heightened)\n                    ∘ μ(source-boundary|permeable)\n                    + ε | :open"
siml_encoding: "⟨Experience|ambiguous⟩\n    ⊳ ⟨Trait|absorption⟩\n    → ⟨Memory|constructed⟩\n    ⊗ ⟨Source|confused⟩\n    ⇄ ⟨Belief|entrenched⟩\n    → ⟨Narrative|abduction⟩"
formalism:
  math_operators:
  - σ
  - ρ
  - λ
  - β
  - δγ
  - μ
  dim_operators:
  - ∴Air
  - ≈Water
