  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between internally generated and externally experienced events — source monitoring is the cognitive capacity to tag memories with their origin; when absorption is high, this cut becomes unreliable, and the failure is not stupidity but a specific vulnerability in memory encoding)
  - ∂Φ/∂ρ (relational resonance between ambiguous sensation and cultural narrative — the sleep paralysis experience carries emotional weight that flows toward the abduction narrative not because it fits evidence but because the narrative transforms mundane suffering into extraordinary significance)
  - ∂Φ/∂λ (directional pull of cultural availability — the path from sensation to interpretation follows cultural templates; the alien narrative is ready-to-hand in a media-saturated world, directing interpretation before conscious evaluation)
  - ∂Φ/∂β (feedback loop of belief reinforcement — when the narrative satisfies emotional needs for meaning and specialness, belief becomes resistant to counter-evidence not despite coherence but because of it)
  - ∂Φ/∂δγ (heightened metabolic engagement of high-absorption states — dissociation requires energy to maintain; over time the boundary management between imagination and reality exhausts cognitive resources)
  - ∂Φ/∂μ (permeable source boundary enabling memory contamination — the μ-structure that should tag experience origins becomes porous; imagination inflation occurs when rehearsal of events raises their felt familiarity to the level of memory)
  Z_state: permeable
  z_note: 'Currently :open — false memories can be corrected through source monitoring training and metacognitive awareness, provided belief has not become central to identity and social belonging. Z-Sealing Risk: if the abduction narrative becomes the organizing structure of self, the boundary becomes defended rather than merely permeable.'
  tendency: permeable/sealed → :open
  hex:
