  epistemics:
    dsrp:
      D: The critical distinction is between what happened in the body and what was interpreted by the mind — sleep paralysis produces physiologically real sensations that are not externally caused, but the experiencer has no reliable internal marker to make this cut
      S: Memory is reconstructive, not reproductive — the system that retrieves experience is the same system that constructs narrative, making source attribution an active inference rather than a simple readout
      R: The relation between high absorption and false memory risk is not causal determinism but conditional vulnerability — the same trait that increases false memory susceptibility also enables deep creative and spiritual engagement
      P: The perspective of the experiencer is locked inside the constructed memory — the construction is invisible, experienced as direct recall rather than active confabulation
