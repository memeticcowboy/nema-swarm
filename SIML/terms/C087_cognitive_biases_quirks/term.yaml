context_note: 'Cognitive biases are systematic patterns of deviation from rational judgment, functioning as ''funhouse mirrors'' that distort perception and decision-making. Key categories include: memory biases (hindsight bias, rosy retrospection), decision-making under pressure (snap judgments, heuristic overreliance), information overload (paralysis by analysis, simplification errors), and finding meaning (apophenia, confirmation bias). The confirmation bias leads us to favor information supporting existing beliefs while ignoring contradictory evidence. Hindsight bias creates overconfidence by convincing us we ''knew it all along'' after events unfold. Apophenia drives pattern-seeking in random data. Under pressure, these biases amplify as stress triggers mental shortcuts. Correction strategies include seeking diverse perspectives, questioning assumptions, and cultivating metacognitive awareness. Understanding cognitive biases is essential for personal growth, improved decision-making, and navigating an information-saturated world.'
