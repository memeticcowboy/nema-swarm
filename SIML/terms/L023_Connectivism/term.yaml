## Core Definition

**Connectivism** is a learning theory for the digital age, proposed by George Siemens (2005) and Stephen Downes (2007). It posits that knowledge is distributed across networks of connections, and learning is the ability to construct and traverse these networks. In a world where information is constantly changing and knowledge is too complex for any individual to hold, learning becomes the capacity to find, filter, and connect information across distributed systems.

