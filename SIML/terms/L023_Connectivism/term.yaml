## The Pipe vs. Content Debate

> "Know-how and know-what is being supplemented with know-where (the understanding of where to find knowledge needed)." — George Siemens

```
THE PIPE IS MORE IMPORTANT THAN THE CONTENT

Traditional Education:              Connectivist Learning:
┌─────────────────────┐            ┌─────────────────────────────┐
│ Fill the bucket     │            │ Build the pipeline          │
│ (content acquisition)│           │ (connection capacity)       │
│                     │            │                             │
│ Focus: What you     │            │ Focus: How to find,         │
│ know at graduation  │            │ verify, and connect         │
│                     │            │ knowledge throughout life   │
└─────────────────────┘            └─────────────────────────────┘

In a world where:
• Knowledge decays rapidly (half-life of technical knowledge: ~5 years)
• Information grows exponentially
• Facts are instantly searchable

The capacity to navigate, evaluate, and connect 
matters more than memorized content.
```

