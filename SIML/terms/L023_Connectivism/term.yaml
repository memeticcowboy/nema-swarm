### Types of Connections

| Connection Type | Description | Example |
|-----------------|-------------|---------|
| **Strong ties** | Close, frequent connections | Mentor relationship, core team |
| **Weak ties** | Occasional, distant connections | Conference contacts, LinkedIn |
| **Latent ties** | Potential connections not yet activated | Shared interest, common group |
| **Structural holes** | Gaps between disconnected groups | Bridge between disciplines |
| **Hubs** | Highly connected nodes | Influencers, central databases |

