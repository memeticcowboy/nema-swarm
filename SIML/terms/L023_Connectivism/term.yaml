### Learning in the Age of AI

Connectivism becomes even more relevant with AI:
- **Human-AI networks:** Learning now includes AI nodes in our networks
- **Augmented cognition:** AI extends our capacity to process information
- **New connection types:** Human-AI, AI-AI, Human-Human-AI triads
- **Currency challenge:** AI changes rapidly; maintaining currency is harder

