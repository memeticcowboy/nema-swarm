## Core Insight

> Connectivism reveals that in a world of information abundance, learning is not about what you know but about how well you're connected. Knowledge lives in the network — between people, devices, and databases — and learning is the capacity to navigate, filter, and synthesize across these distributed nodes. The pipe truly matters more than the content.

## One-Sentence Insight

> Connectivism posits that learning in the digital age is the capacity to construct and traverse networks of connections — where knowledge is distributed across nodes rather than contained within individuals, and the ability to find, filter, and synthesize information matters more than memorized facts.

## Three-Bullet Expansion

- **What:** A learning theory for the digital age that views knowledge as distributed across networks of connections (people, devices, organizations) rather than residing solely in individual minds
- **How it works:** Learners aggregate information from diverse nodes, remix and repurpose it for their context, share back to the network, and receive feedback — with pattern recognition and connection maintenance as core skills
- **Where it aims:** Toward networked literacy and distributed cognition — the capacity to navigate information abundance, maintain currency in rapidly changing fields, and leverage technology as an extension of cognitive capability

