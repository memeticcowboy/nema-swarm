## Core Definition

**Achievement Goal Theory** explains how individuals define success in achievement contexts and how these definitions shape motivation, affect, and performance. The theory distinguishes between:

1. **Mastery Goals:** Focus on developing competence, learning, understanding
2. **Performance Goals:** Focus on demonstrating competence relative to others

Each goal type creates distinct **cognitive, affective, and behavioral patterns**.

