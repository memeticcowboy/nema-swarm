## Goal Orientation Patterns

### Mastery-Approach Goals

```
MASTERY-APPROACH PATTERN

Definition of Success: "I understand this deeply"
Reference Standard:    Self-improvement, task mastery

COGNITIVE PATTERNS:
┌─────────────────────────────────────────┐
│ • Deep processing strategies            │
│ • Effort attribution for success        │
│ • Challenge-seeking behavior            │
│ • Error framing as learning opportunities│
│ • Interest-driven engagement            │
└─────────────────────────────────────────┘

AFFECTIVE PATTERNS:
┌─────────────────────────────────────────┐
│ • Intrinsic motivation                  │
│ • Positive affect during difficulty     │
│ • Resilience after setbacks             │
│ • Satisfaction from understanding       │
└─────────────────────────────────────────┘

BEHAVIORAL PATTERNS:
┌─────────────────────────────────────────┐
│ • Help-seeking when needed              │
│ • Time investment in learning           │
│ • Exploration of alternative strategies │
│ • Long-term persistence                 │
└─────────────────────────────────────────┘

Element: Fire/λ (direction toward growth) + Wood/β (generative learning)
```

### Performance-Approach Goals

```
PERFORMANCE-APPROACH PATTERN

Definition of Success: "I outperform others"
Reference Standard:    Normative comparison, grades, recognition

COGNITIVE PATTERNS:
┌─────────────────────────────────────────┐
│ • Surface processing strategies         │
│ • Ability attribution for success       │
│ • Success-seeking in visible tasks      │
│ • Error avoidance                       │
│ • Outcome-focused monitoring            │
└─────────────────────────────────────────┘

AFFECTIVE PATTERNS:
┌─────────────────────────────────────────┐
│ • Pride from high grades                │
│ • Anxiety about evaluation              │
│ • Shame from poor comparison            │
│ • Excitement from winning               │
└─────────────────────────────────────────┘

BEHAVIORAL PATTERNS:
┌─────────────────────────────────────────┐
│ • Strategic help-seeking (impression)   │
│ • Time investment in graded work        │
│ • Avoidance of challenging tasks        │
│ • Cheating risk when failure threatens  │
└─────────────────────────────────────────┘

Element: Fire/λ (direction toward status) + Metal/μ (structured achievement)
```

### Performance-Avoidance Goals

```
PERFORMANCE-AVOIDANCE PATTERN

Definition of Success: "I don't look stupid"
Reference Standard:    Avoiding negative judgment, hiding incompetence

COGNITIVE PATTERNS:
┌─────────────────────────────────────────┐
│ • Minimal processing strategies         │
│ • Ability attribution for failure       │
│ • Failure-avoidance focus               │
│ • Self-handicapping strategies          │
│ • Defensive pessimism                   │
└─────────────────────────────────────────┘

AFFECTIVE PATTERNS:
┌─────────────────────────────────────────┐
│ • High anxiety                          │
│ • Hopelessness                          │
│ • Shame anticipation                    │
│ • Relief from avoiding failure          │
└─────────────────────────────────────────┘

BEHAVIORAL PATTERNS:
┌─────────────────────────────────────────┐
│ • Avoidance of help-seeking             │
│ • Procrastination                       │
│ • Task avoidance                        │
│ • Withdrawal from challenge             │
└─────────────────────────────────────────┘

Element: Fire/λ (direction away from shame) + pathology: The Choke (σ↑ ∧ μ↑)
```

## Elemental Pattern Analysis

### Fire/λ Dominance (Direction/Purpose)

Achievement Goal Theory is fundamentally a **Fire theory**:

**Fire/λ (Direction/Purpose):**
- **Goal orientation:** The directional vector of motivation
- **Approach vs. avoidance:** Moving toward vs. away from outcomes
- **Competence pursuit:** The energizing force of achievement
- **Effort allocation:** Directing energy based on goal type

**Air/σ (Distinction/Clarity):**
- **Success definition:** How competence is defined and measured
- **Self vs. other reference:** Distinction between standards
- **Mastery vs. performance:** Categorical distinction of goal types

**Water/ρ (Resonance/Competence):**
- **Competence perception:** Feeling capable or not
- **Social comparison:** Resonance with others' performance
- **Feedback reception:** How evaluation is experienced

**Wood/β (Growth/Exploration):**
- **Strategy selection:** Choosing learning approaches
- **Deep processing:** Generative engagement with material
- **Help-seeking:** Branching out for support

