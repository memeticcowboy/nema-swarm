## Core Insight

> Achievement Goal Theory reveals that **how we define success shapes everything that follows** — the strategies we use, the emotions we feel, the risks we take, and ultimately what we achieve. The mastery-performance distinction is not merely academic: it predicts who will persist through difficulty, who will seek help when needed, who will cheat to avoid failure, and who will find genuine satisfaction in learning. The theory's power lies in showing that goals are not fixed traits but **situated orientations** that can be shaped by context, feedback, and culture.

## One-Sentence Insight

> Achievement Goal Theory demonstrates that whether learners define success as developing competence (mastery) or demonstrating superiority (performance) fundamentally shapes their motivation, strategies, affect, and outcomes — with mastery goals generally fostering deeper learning and resilience.

## Three-Bullet Expansion

- **What:** A theory of achievement motivation distinguishing mastery goals (developing competence) from performance goals (demonstrating competence), each creating distinct cognitive, affective, and behavioral patterns in learning contexts
- **How it works:** Goal orientation activates → definition of success shapes standards → competence perception drives affect → strategy selection determines engagement quality → outcomes reinforce or shift goal patterns
- **Where it aims:** Toward optimal motivation through mastery-approach goal adoption, supported by classroom structures that emphasize learning, effort, and self-improvement over normative comparison and ability evaluation

