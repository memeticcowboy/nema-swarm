## The Key Finding: Method Enables Medium

**Not:** IVR → better learning (direct media effect)
**But:** Generative method + IVR affordances → better learning (interaction effect)

| Condition | Medium | Method | Outcome |
|-----------|--------|--------|---------|
| Video + Passive | Low immersion | Reception | Baseline |
| Video + Generative | Low immersion | Enactment | Limited gain |
| IVR + Passive | High immersion | Reception | Limited gain |
| **IVR + Generative** | **High immersion** | **Enactment** | **Significant gain** |

## The Embodiment Principle

**Principle:** People learn more deeply when agents display human-like gesturing, movement, eye contact, facial expressions.

**Why IVR > Video:** Higher **presence** (σ) makes embodiment (μ) more believable, enabling generative methods (λ) to work.

**Elemental chain:** σ (presence) → μ (embodiment) → λ (generative method) → learning outcome

