  epistemics:
    dsrp:
      D: The central distinction is between cultural layers by recency (recent surface vs deep substrate) and between "natural"
        feel and "acquired" status — what feels like bedrock is often the most recently installed habit.
      S: The system is the intercultural encounter as a layered stack collision; each party's identity is a stack with surface
        protocols defending older deep structures, and meaningful exchange requires both stacks to peel from the top.
      R: Relationships flow between Boundary and Signal (constraint), Frame and Protocol (distinction), Memory and Outcome
        (recursion); the most recent layer maps to the first vulnerability, and mutual ignorance feeds defensive response.
      P: Perspectives are insider (everything I do feels universal) vs outsider (everything they do reads as choice); the
        meta-perspective is the systemic observer who watches both stacks and notices which layers are being peeled vs defended.
