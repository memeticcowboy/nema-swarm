elemental_emphasis:
  ∴: 'Air carries the surgery — the cut between "what I think is universal" and "what I learned recently and mistook for
    universal." The work is to keep that distinction perpetually fresh, because every newly-installed habit immediately starts
    masquerading as nature. Air asks: which layer am I defending right now as if it were bedrock, and when did I actually
    install it?'
  ≈: 'Water flows in the receding direction — meaning is recovered downward, not produced forward. The shared substrate
    that emerges after peeling was always there; the encounter just allows it to surface. Water asks: what unspoken resonance
    becomes audible only after we both stop performing our most recent training?'
  ▲: 'Fire directs the deliberate retrograde — peeling is not passive forgetting, it is active shedding under discipline.
    The aim is competence-via-incompetence, the willingness to look gauche in order to become genuinely fluent. Fire asks:
    am I willing to appear to lose status temporarily in order to actually gain shared ground?'
  𐂷: 'Wood branches into the territory below the surface layer — once a layer is peeled, multiple older substrates are
    exposed at once, and a new emergent protocol can sprout from any of them. The branch foreclosed by clinging to the surface
    is the one where genuine third-culture invention becomes possible. Wood asks: what new shared form could only grow if
    both stacks shed two layers, not one?'
  ☷: 'Earth recognizes the cycle — peeled layers do not vanish; they compost back into the cultural substrate, becoming
    raw material for the next encounter''s surface. The discipline is to let the recently-acquired return to the soil rather
    than treating it as identity. Earth asks: what recently-acquired layer am I hoarding as identity that would be more useful
    composted back into the field?'
  ⛨: 'Metal is the structural truth of this term — identity AS a stack, with the most recent layer always on top and always
    the first to be tested in any cross-boundary encounter. The architecture is what makes LIFO peeling possible (and necessary).
    The risk is that the gate that decides which layer is "current" can be hijacked by power asymmetry — one party demands
    the other peel while refusing to peel themselves. Metal asks: who in this encounter has structural permission to keep
    their stack intact, and at whose expense?'
context_note: 'Identity as a layered stack where the topmost layer (most recent acquisition) is mistaken for bedrock and
  becomes the first source of cross-cultural friction. Disciplined retrograde peeling exposes deeper shared structure. The
  hard part: the layer that most needs peeling is the one that feels most like "just being yourself."'
