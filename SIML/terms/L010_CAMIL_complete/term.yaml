## The Six Factors in Depth

### 1. Situational Interest (Fire/λ)
- **Definition:** Psychological relationship between individual and specific content
- **IVR Mechanism:** Presence fosters conditions for sparking interest
- **Development:** Can evolve from situational → individual interest
- **Evidence:** Higher presence/interest in IVR vs. less immersive media (Buttussi & Chittaro, Makransky & Lilleholt, Parong & Mayer)

### 2. Intrinsic Motivation (Fire/λ)
- **Theoretical Base:** Self-Determination Theory (Deci & Ryan, 2015)
- **Three Needs:** Autonomy, competence, relatedness
- **IVR Enhancement:** Presence + social interaction satisfy SDT needs
- **Evidence:** Higher enjoyment/motivation in IVR (Makransky & Lilleholt 2018, Meyer et al. 2019, Olmos-Raya et al. 2018)
- **Supporting Theories:** Social Agency Theory (Mayer 2014a), CVTAE (Pekrun 2006)

### 3. Self-Efficacy (Metal/μ)
- **Definition:** Perceived capabilities for learning/performing actions (Bandura 1977)
- **IVR Mechanism:** High presence/agency → activities as performance accomplishments
- **Four Sources:** Performance accomplishments, vicarious experience, verbal persuasion, physiological states
- **Evidence:** IVR increases self-efficacy (Sitzmann 2011, Buttussi & Chittaro 2018, Makransky et al. 2019a, 2020a)
- **Meta-analysis:** Higher interaction/control → higher self-efficacy (Gegenfurtner et al. 2014)

### 4. Embodiment (Earth/δγ)
- **Definition:** Sensations from "being inside, having, controlling a body"
- **IVR Components:** Body ownership, agency, sensorial events
- **Link to Self-Presence:** Virtual self experienced as actual self
- **Evidence:** Kilteni et al. (2012), Longo et al. (2008), Biocca & Frank (1997), Gonzalez-Franco & Peck (2018)
- **Learning Mechanism:** Motor-visual connection activates more neural pathways

### 5. Cognitive Load (Air/σ)
- **Theoretical Base:** CLT (Sweller et al. 2011), CTML (Mayer 2014)
- **Types:** Intrinsic vs. extraneous load
- **IVR Challenge:** High presence/agency can increase extraneous load
- **Evidence:** Makransky et al. (2019, 2020), Meyer et al. (2019), Parong & Mayer (2018, 2020)
- **Management:** Instructional design principles reduce extraneous processing

### 6. Self-Regulation (Metal/μ)
- **Definition:** Managing behavior, withstanding impulses, maintaining focus (Boyd et al. 2005)
- **IVR Facilitation:** High social presence enables meaningful interactions
- **IVR Hindrance:** Lack of natural reflection opportunities
- **The Hedonic Trap:** Engaging nature → hedonic activities → superficial learning
- **Critical Need:** Reflection activities prompt metacognition (Makransky et al. 2020a)

## The Hedonic Trap

**Risk:** IVR's highly engaging nature leads to:
- Lack of active monitoring/adaptation
- Hedonic activities (focus on fun over learning)
- Superficial learning strategies
- Lower learning and transfer

**Mitigation:** Scaffolded reflection activities
- Explain content to avatar peer
- Summarize after IVR segments
- Metacognitive prompts

## Instructional Design Principles

### Multimedia Learning Principles (Mayer)
| Principle | Function | Element |
|-----------|----------|---------|
| **Coherence** | Reduce extraneous material | Air/σ |
| **Signaling** | Highlight essential material | Fire/λ |
| **Pre-training** | Provide prior knowledge | Metal/μ |
| **Segmentation** | Break into chunks | Earth/δγ |
| **Modality** | Match presentation to content | Water/ρ |
| **Embodiment** | Human-like gesturing | Earth/δγ |
| **Feedback** | Increase self-efficacy | Metal/μ |

### Self-Regulation Activities
- Reflection prompts
- Peer explanation
- Summarization
- Metacognitive monitoring

## Knowledge Taxonomy (Anderson et al. 2001)

| Type | Definition | IVR Effectiveness |
|------|-----------|-------------------|
| **Factual** | Discrete bits of information | Mixed findings (Parong & Mayer 2018) |
| **Conceptual** | Classifications, principles, theories | Equally effective |
| **Procedural** | How to do something | Highly effective (fire safety, surgery, flying) |
| **Transfer** | Apply to new contexts | Enhanced through simulation |

## External Factors

| Factor | Impact | Consideration |
|--------|--------|---------------|
| **Usability** (ISO 2018) | Breaks presence, impairs agency | System design critical |
| **Social Influence** (TAM) | Technology acceptance | Peer/mentor effects |
| **Age** | Moderates IVR impact | Younger users more accepting |
| **Cyber Sickness** | Diminishes learning | More frequent in women |
| **Spatial Ability** | Individual differences | Contributes to variability |
| **Personality** (neuroticism, openness) | Adoption intentions | Trait-dependent |
| **Prior Experience** | Novelty effects | Familiarity matters |
| **Absorption Tendency** | Spatial presence | Individual disposition |

## Core Insight

> The complete CAMIL synthesis reveals that immersive learning is a **double-edged sword**: presence and agency create powerful engagement (interest, motivation, efficacy, embodiment) but also risk cognitive overload and hedonic distraction. The key is **scaffolded reflection** — designing IVR not just for immersion but for metacognitive integration.

## One-Sentence Insight

> The full CAMIL framework shows that immersive virtual reality learning succeeds when six affective-cognitive factors (interest, motivation, self-efficacy, embodiment, cognitive load, self-regulation) are optimized through presence and agency, while avoiding the hedonic trap through scaffolded reflection activities.

## Three-Bullet Expansion

- **What:** The complete CAMIL synthesis — six factors, four knowledge types, instructional principles, external variables, and the hedonic trap
- **How it works:** Presence/agency spark interest and motivation, build efficacy and embodiment, but require load management and self-regulation scaffolding
- **Where it aims:** Toward evidence-based IVR design that balances engagement with reflection, immersion with metacognition

