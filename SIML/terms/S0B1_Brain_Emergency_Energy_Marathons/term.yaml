description: The brain breaks down its own myelin as an emergency energy source during strenuous endurance exercise like marathons — a process termed metabolic myelin plasticity; when glucose levels drop during prolonged physical exertion, the brain cannibalizes the fatty myelin sheath surrounding nerve fibers to maintain function; this results in temporary cognitive decline (slower reaction times, decreased memory performance) within 24-48 hours post-marathon; recovery begins within two weeks and stabilizes by two months; the finding challenges the assumption that the brain relies exclusively on glucose, revealing myelin as a metabolic safety net; evolutionary implications suggest myelin may have allowed early humans to perform demanding physical tasks while maintaining cognitive alertness; the temporary and reversible nature of myelin loss highlights brain resilience under extreme stress; opens research avenues for neuroprotection, recovery strategies, and potential therapeutic applications for conditions involving myelin loss such as multiple sclerosis.
