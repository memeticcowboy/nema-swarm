## The Principles of Connectivism

Siemens articulated eight core principles:

| Principle | Description | Nemetic Mapping |
|-----------|-------------|-----------------|
| **1. Learning is a process of connecting** | Knowledge exists in the world, not just in heads | ρ (network/connection) |
| **2. Learning may reside in non-human appliances** | Technology stores and processes information | μ (metal/structure) |
| **3. Capacity to know more is critical** | Knowing *where* beats knowing *what* | λ (fire/direction) |
| **4. Nurturing connections enables learning** | Relationships are the learning infrastructure | ρ (water/flow) |
| **5. Connection-making is key competency** | The skill is building and maintaining networks | β (wood/growth) |
| **6. Currency is key** | Accurate, up-to-date knowledge matters | δγ (earth/cycling) |
| **7. Decision-making is itself learning** | Choosing what to learn is learning | σ (air/distinction) |
| **8. Learning is network formation** | The physical metaphor is the reality | ρ+β (network+growth) |

