## Core Definition

**Connectivism**, proposed by **George Siemens** (2005) and developed with **Stephen Downes** (2007), is a learning theory for the **digital age**. It posits that knowledge is distributed across a network of connections, and learning is the ability to construct, navigate, and traverse these networks. In an era of information abundance, knowing *where* to find knowledge becomes as important as knowing *what* — learning is literally the formation of connections.

