## Criticisms and Responses

| Criticism | Response |
|-----------|----------|
| "It's a pedagogical view, not a learning theory" | It describes *how* learning happens in networks, not just how to teach |
| "Too focused on technology" | Technology enables but doesn't define; the principles apply to human networks too |
| "Neglects individual cognition" | Complements rather than replaces; individual sense-making still matters |
| "Information isn't knowledge" | Agreed — connectivism addresses finding and connecting, not just accessing |

