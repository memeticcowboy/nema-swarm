context_note: 'Shu represents Air as cosmogonic separator—not breath within body but
  breath that creates world. Key act: lifting Nut (Sky) from Geb (Earth), creating
  habitable space. The ostrich feather symbolizes lightness/emptiness. Unlike Greek
  Pneuma (internal) or Chinese Qi (omnipresent), Shu is agent—personified deity with
  will. Air as creation''s first act, not medium of life.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic
