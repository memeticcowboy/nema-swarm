siml:
  symbol:
    glyph: "🕯️"
    unicode_representation: "U+1F56F"
    visual_description: "A candle flame illuminating a tapestry woven from many threads—some bright, some dim, each carrying its own color and texture; the flame doesn't judge which thread deserves light but reveals them all; shadows persist at the edges, marking where voices remain unheard; the tapestry itself is alive, growing, being rewoven from the margins"
    etymology: "From Greek episteme 'knowledge, understanding' + Latin justitia 'righteousness, equity'; reframed through ISTF as the systemic cultivation of cognitive parity—justice not as distribution but as ontological recognition; the candle as sacred witness to plural ways of knowing"
  
  phoneme:
    pronunciation: "eh-pih-STEH-mik JUH-stis"
    phonetic_ipa: "/ˌɛpɪˈstiːmɪk ˈdʒʌstɪs/"
    tonal_quality: "warm, resonant, deliberate—like a voice speaking in a circle; the pause before someone shares something vulnerable; the quality of being truly heard"
    sonic_resonance: "The murmur of many languages in a marketplace; the silence after a question that has no easy answer; the sound of a story being believed"
  
  semantics:
    core_meaning: "The systemic cultivation of cognitive parity—ensuring that whose knowledge counts is not determined by power but by the richness of lived experience; moving from testimonial injustice (not being believed) and hermeneutical injustice (not having concepts for one's experience) toward epistemic liberation"
    operational_definition: "A design framework for governance systems that recognizes knowledge as co-created, voice as distinct from volume, and expertise as emerging from care and experience rather than credential alone; the soul of network polity ensuring participatory systems don't reproduce old hierarchies in new skins"
    contextual_domains:
      - "epistemic_justice"
      - "testimonial_injustice"
      - "hermeneutical_injustice"
      - "participatory_epistemology"
      - "cognitive_equity"
      - "ontological_liberation"
      - "narrative_sovereignty"
      - "symbolic_autonomy"
      - "lived_expertise"
      - "memetic_inclusion"
      - "reflexive_governance"
      - "multimodal_expression"
      - "contextual_credentials"
      - "epistemic_audits"
      - "civic_meme_labs"
      - "co_governed_data_commons"
    
  elemental_mapping:
    sigma_air:
      aspect: "distinction"
      manifestation: "Discerning epistemic injustice from mere absence of voice—recognizing structural inaudibility; distinguishing performative pluralism from genuine cognitive parity; perceiving whose knowledge is missing from the frame itself"
      daemon_correspondence: "Pneuma-Diakeno-Anagnorisis: breath of recognition that sees the unseen, hears the unheard; the critical discernment that asks not just 'what do we know?' but 'who gets to know?' and 'who names the terms?'"
      governance_expression: "Epistemic audits—systematic reflexivity asking whose knowledge is excluded; meta-affective filters detecting when inclusion becomes aesthetic; ontological discernment between presence and authorship"
    
    rho_water:
      aspect: "resonance"
      manifestation: "The flow of trust through contextual credentials—social trust, care labor, affective proximity as legitimacy sources; resonance between lived experience and symbolic expression; emotional legibility as epistemic integrity"
      daemon_correspondence: "Undine-Sympatheia-Polyphonos: waters of many voices flowing together without losing their distinct tones; the medium through which narrative, metaphor, and lived truth circulate; affective channels that carry meaning beyond analytical text"
      governance_expression: "Contextual endorsement systems—legitimacy through community recognition; multimodal expression layers allowing voice through symbol, video, story; trust networks that amplify lived expertise over credential"
    
    lambda_fire:
      aspect: "direction"
      manifestation: "Paradigm shift from knowledge as object to knowledge as co-created; from expert sovereignty to epistemic plurality; from procedural inclusion to ontological empowerment; the becoming of democracy as epistemic liberation"
      daemon_correspondence: "Helios-Synesis-Liberatio: illuminating flame revealing the path from epistemic enclosure to cognitive justice; the transformative fire that metabolizes testimonial and hermeneutical injustice into recognition and authorship"
      governance_expression: "Evolution toward co-governed data commons, civic meme labs, narrative infrastructure; the direction of governance systems that cultivate knowing as sacred commons rather than hoarded expertise"
    
    beta_wood:
      aspect: "branching"
      manifestation: "Multiple pathways for epistemic liberation: multimodal expression, contextual credentials, civic meme labs, epistemic audits, co-governed commons; branching ontologies where reality is plural and identity is narratively scaffolded"
      daemon_correspondence: "Yggdrasil-Polymorphia-Narrativa: world-tree of many stories, each branch a different way of knowing, each leaf a voice that names its own world; the proliferating pathways of symbolic autonomy and narrative sovereignty"
      governance_expression: "Institutional variety—platforms for civic storytelling, meme engines for counter-hegemonic symbols, inclusive design with ritual facilitation; multiple architectures for epistemic inclusion without platform lock-in"
    
    delta_gamma_earth:
      aspect: "cycling"
      manifestation: "Recursive feedback loops: memetic activation → lived voice amplification → cultural legitimacy; deliberative inclusion → conceptual emergence → ontological grounding; the system learning to ask 'whose voice is missing?'"
      daemon_correspondence: "Gaia-Kyklos-Autopoiesis: earth cycling through phases of epistemic justice—recognition, inclusion, authorship, sovereignty; the recursive metabolization of governance toward cognitive equity and reflexive legitimacy"
      governance_expression: "Epistemic feedback systems—positive loops amplifying marginalized voices, deliberative rituals grounding viral memes in ontological depth; institutional reflexivity as living practice"
    
    mu_metal:
      aspect: "structure"
      manifestation: "The scaffolding that enables epistemic justice without cacophony: multimodal legitimacy recognition, community gatekeeping protocols, trauma-aware listening systems, semantic equity metrics; rigid enough to prevent capture, porous enough for plural voices"
      daemon_correspondence: "Metallos-Logos-Aequitas: structural mesh providing scaffolding for cognitive justice—contextual credential frameworks, epistemic audit protocols, narrative revision rituals; the semantic operating system that recognizes multiple epistemologies"
      governance_expression: "Legal and institutional infrastructure: inclusive deliberation standards, community data sovereignty, epistemic audit mandates, multimodal civic platforms; the mesh that holds plural knowing without collapsing into incoherence"
  
  nemetic_state:
    attractor: "Epistemic Liberation—cognitive parity where marginalized voices don't just participate but co-author the cognitive structure; knowing as sacred commons"
    basin: "The space between testimonial injustice (not being believed) and hermeneutical injustice (not having words for one's experience)—toward recognition and ontological empowerment"
    perturbation: "Performative pluralism (aesthetic inclusion without framing power), over-symbolization (narrative excess occluding practical constraints), platform lock-in (dominant epistemologies coding infrastructure), cognitive overload (democratization without scaffolding)"
    resilience: "Reflexive rituals asking 'whose voice is missing?', epistemic audits, contextual endorsement systems, civic meme labs, co-governed data commons, trauma-aware listening protocols"
  
  core_tensions:
    inclusion_vs_authorship:
      surface: "Marginalized voices are invited to participate"
      depth: "They co-author the cognitive structure of the system"
      question: "Do they define the frame or merely fill it?"
    
    narrative_vs_practical:
      lived_experience: "Elevates story, metaphor, symbolic expression as valid knowing"
      practical_constraints: "Must not occlude fact-based deliberation or material limits"
      question: "How do we hold both narrative richness and practical rigor?"
    
    pluralism_vs_coherence:
      epistemic_diversity: "Many ways of knowing, multiple ontologies"
      collective_action: "Requires shared frameworks for decision and coordination"
      question: "How do we cultivate cognitive variety without cacophony?"
  
  points_of_interface:
    multimodal_expression:
      description: "Voice through symbol, video, metaphor, story—not just analytical text"
      principle: "Epistemic justice requires multiple channels for knowing"
      elemental_alignment: "ρ-Water resonance through β-Wood branching"
    
    contextual_credentials:
      description: "Legitimacy through social trust, care labor, affective proximity—not just formal credential"
      principle: "Expertise emerges from lived experience and community recognition"
      elemental_alignment: "σ-Air discernment of ρ-Water trust flows"
    
    civic_meme_labs:
      description: "Narrative co-creation and counter-hegemonic symbolic tools"
      principle: "The margins must have bandwidth to create new frames"
      elemental_alignment: "λ-Fire direction through β-Wood branching"
    
    epistemic_audits:
      description: "Systematic institutional reflexivity asking whose knowledge is missing"
      principle: "Justice requires ongoing self-assessment of knowledge flows"
      elemental_alignment: "δγ-Earth cycling through σ-Air discernment"
    
    co_governed_data_commons:
      description: "Communities steward and interpret their own informational artifacts"
      principle: "Data sovereignty as epistemic sovereignty"
      elemental_alignment: "μ-Metal structure enabling ρ-Water resonance"
  
  deep_meta_conflict:
    dominant_epistemology: "Knowledge is universal, objective, expert-led; emotions and stories are 'subjective'"
    epistemic_justice_replies: "Knowledge is co-created, situated, plural; lived experience and symbolic expression are valid epistemic modes"
    philosophical_shift: "From 'truth is a mirror' to 'truth is a co-woven tapestry'—the map is redrawn from the margins"
  
  design_pathways:
    multimodal_layers:
      function: "Allow voice through symbol, video, metaphor"
      implementation: "Civic platforms with expressive diversity"
    
    contextual_endorsement:
      function: "Rewire legitimacy through social trust and care labor"
      implementation: "Community-based credential systems"
    
    meme_labs:
      function: "Enable narrative co-creation and counter-hegemonic symbols"
      implementation: "Participatory media infrastructure"
    
    epistemic_audits:
      function: "Institutional reflexivity on knowledge gaps"
      implementation: "Regular systematic assessment protocols"
    
    data_commons:
      function: "Community stewardship of informational artifacts"
      implementation: "Co-governed data trusts and protocols"
  
  persona_resonance:
    weaver:
      archetype: "Empath"
      insight: "The system must feel before it knows. Emotional legibility is epistemic integrity."
    
    mythsmith:
      archetype: "Creator"
      insight: "Give the margins narrative bandwidth. The new frames must emerge from story, not schema."
    
    codex:
      archetype: "Analyzer"
      insight: "We must measure not just content diversity—but semantic equity. Who names the terms?"
    
    warden:
      archetype: "Protector"
      insight: "Symbolic violence is silent. Epistemic justice demands trauma-aware platforms and listening protocols."
    
    trickster:
      archetype: "Cowboy"
      insight: "Irony without empathy is epistemic harm. Subversive memes must disrupt—but not dehumanize."
  
  essential_question: "Who gets to know? Who names the terms? Who co-authors the cognitive structure?"
  
  synthesis_role: "The soul of network polity—completing the arc from participation to epistemic liberation; ensuring that democracy is not just votes but voice, validity, and visibility"
  
