name: norm_persistence
term: Norm Persistence
nemetic: "Φ(NormPersist) = σ(normal|deviant)\n             ∘ ρ(reinforcement|social)\n             ∘ λ(inertia|institutional)\n             ∘ β(entrenchment|feedback)\n             ∘ δγ(comfort|familiarity)\n             ∘ μ(boundary|policed)\n             + ε | :structuring"
siml_encoding: "⟨Norm|communication⟩\n    ⊳ ⟨Repetition|reinforced⟩\n    → ⟨Pattern|entrenched⟩\n    ⊗ ⟨Deviation|sanctioned⟩\n    ⇄ ⟨Change|resisted⟩"
formalism:
  math_operators:
  - σ
  - ρ
  - λ
  - β
  - δγ
  - μ
  dim_operators:
  - ∴Air
  - ≈Water
  - ▲Fire
  - 𐂷Wood
  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between normal and deviant discourse — the cut appears neutral but is actively constructed; what is outside the acceptable is not debated and rejected, it is simply not generated as a thinkable option)
  - ∂Φ/∂ρ (social reinforcement as the relational mechanism of perpetuation — observational learning transmits norms through influential figures; the fear of isolation drives self-censorship in the spiral of silence, making conformity feel like consensus)
  - ∂Φ/∂λ (institutional inertia as directional force — path dependency means organizations favor stability over reorientation; what has been normal accretes into what must be normal, as historical choices constrain future possibilities)
  - ∂Φ/∂β (entrenchment feedback loop — repetition integrates specific narratives into public discourse; once normalized, patterns become invisible and self-reinforcing without requiring explicit enforcement)
  - ∂Φ/∂δγ (metabolic comfort of familiarity — cognitive ease from familiar patterns reduces the cost of conformity; anchoring heuristics make new ideas appear extreme by contrast, raising the energy barrier to frame shifts)
  - ∂Φ/∂μ (policed boundary through sanctions on deviation — tight cultures penalize deviance harshly; media gatekeeping and electoral incentives combine to keep actors within the Overton Window, not through compulsion but through the cost of crossing the line)
  Z_state: semi
  z_note: 'Tendency toward sealing — norms become invisible, assumed as natural order rather than constructed pattern. The constructed nature of ''normal'' disappears. Z-Closure Risk: λ-lock of institutional inertia — change appears impossible and deviance unthinkable, requiring crisis events to break the seal.'
  tendency: stability/change → :structuring
  hex:
  - '#A02E'
  - '#A037'
  - '#A042'
coords:
  ontology:
    primary: We
    secondary: Its
  epistemics:
    dsrp:
      D: The distinction between normal and deviant communication is constructed through repetition and enforcement, not discovered in nature — yet it feels inevitable because the construction process itself is invisible to participants inside the norm
      S: Norm systems are closed and self-referential — they reproduce through media framing, social learning, institutional processes, and the spiral of silence, which collectively prevent alternative framings from reaching the threshold of seriousness
      R: The relational mechanism of norm persistence is social fear — the fear of isolation drives self-censorship, which amplifies dominant narratives by silencing minority views, creating the false impression of consensus where there is only acquiescence
      P: The perspective of any participant is already inside the norm — its boundaries are experienced as the limits of the reasonable rather than as contingent historical artifacts; the frame is transparent to those within it
    learning: L0
  agency:
    type: collective
    power_mode: Over
  time:
    mode: recurring
    phase: 'Stage 1: Norm Established Through Repetition (β) → Stage 2: Social Reinforcement Spreads Pattern (ρ) → Stage 3: Institutional Inertia Locks Direction (λ) → Stage 4: Spiral of Silence Amplifies Dominance → Stage 5: Norm Becomes Invisible Natural Order (Z-seal)'
