## Core Insight

> The informativeness-divergence tradeoff reveals that optimal teaching is not about maximizing information transfer, but about *calibrated tension* — selecting features that stretch the learner's model without breaking their trust.

## One-Sentence Insight

> The algorithm faces a fundamental tension: it can optimize for immediate performance (fixed mindset) or invest in the human's learning (growth mindset), but the patience parameter δ determines which horizon dominates.

## Three-Bullet Expansion

- **What:** A formal tradeoff in AI-assisted decision making where the algorithm must balance selecting informative features against maintaining alignment with the human's current beliefs
- **How it feels:** For the human — initially confusing (divergence), then clarifying (informativeness); for the algorithm — constantly negotiating the horizon of optimization
- **Where it aims:** Toward π-convergence — the human's beliefs becoming closer to true values through structured, patient interaction

