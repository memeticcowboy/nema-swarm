## The Two Tradeoffs

### Tradeoff 1: Informativeness vs. Divergence
- **λ (Fire):** Select most informative features
- **ρ (Water):** Minimize divergence from human's current model
- **Tension:** Informative features may contradict human beliefs
- **Resolution Parameter:** δ (patience) — higher δ favors informativeness

### Tradeoff 2: Fixed vs. Growth Mindset
- **Fixed (Metal/μ):** Optimize for current human performance
- **Growth (Wood/β):** Guide human to improve beliefs over time
- **Tension:** Short-term loss vs. long-term gain
- **Resolution Parameter:** π (learning efficiency) — higher π favors growth

