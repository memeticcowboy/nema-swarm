historical_progression:
- 'Writing: stable traces + risk of substituting marks for living recollection'
- 'Print: democratized access + standardization/bureaucracy/propaganda'
- 'Digital: extended storage + automated selection/circulation/forgetting under corporate
  control'
nemetic_ambivalence:
- 'As cure: deepens nematic space—long, complex, cross-temporal patternings'
- 'As poison: shortcuts pattern-formation, saturates with pre-processed sequences,
