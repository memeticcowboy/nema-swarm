description: AI-powered bots as support interfaces for individuals with autism — emotional dysregulation as barrier to social interaction and community participation; AI bots offering consistency, predictability, and non-judgmental interaction that autistic individuals often require; reduced social pressure enabling engagement without human interaction stress; customization through text-to-speech, symbols, and structured prompts; social skills training tools like Proloquo2Go and Cognoa; AI as bridge to community inclusion for those with physical or mental limitations; ethical considerations including over-reliance on technology, lack of genuine empathy, individual variability within autism spectrum; need for human-centered design that complements rather than replaces human support.
