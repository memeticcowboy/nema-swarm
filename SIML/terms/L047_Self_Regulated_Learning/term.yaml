## Core Definition

**Self-Regulated Learning (SRL)** refers to the degree to which students are **metacognitively, motivationally, and behaviorally active** participants in their own learning process. Developed by Barry Zimmerman (1986) and expanded by Dale Schunk and others, SRL posits that effective learners strategically manage their own learning through cyclical phases of forethought, performance, and self-reflection.

