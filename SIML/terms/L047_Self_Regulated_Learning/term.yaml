## Key Components of SRL

### 1. Metacognitive Strategies

| Strategy | Function | Element |
|----------|----------|---------|
| **Planning** | Setting goals, selecting strategies | σ (Air) + μ (Metal) |
| **Monitoring** | Tracking comprehension and progress | ρ (Water) |
| **Evaluating** | Assessing outcomes against goals | δγ (Earth) |
| **Regulating** | Adjusting strategies as needed | β (Wood) |

### 2. Motivational Processes

```
MOTIVATION IN SRL
│
├─ Self-efficacy beliefs → "Can I do this?" (ρ-Water resonance)
├─ Outcome expectations → "Will this lead to success?" (λ-Fire direction)
├─ Task value → "Is this worth my effort?" (λ-Fire purpose)
├─ Goal orientation → "Am I learning or performing?" (σ-Air distinction)
└─ Intrinsic interest → "Do I enjoy this?" (✶-Child play)
```

### 3. Behavioral Strategies

- **Time management:** Scheduling, prioritizing (Metal/μ)
- **Environmental structuring:** Creating conducive learning spaces (Earth/δγ)
- **Help-seeking:** Knowing when and whom to ask (Water/ρ)
- **Effort regulation:** Persistence through difficulty (Wood/β)

