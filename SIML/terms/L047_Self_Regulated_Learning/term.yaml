## Social Cognitive Foundations

SRL draws heavily from Bandura's Social Cognitive Theory:

```
TRIADIC RECIPROCALITY IN SRL
│
     ┌─────────────────┐
     │  PERSONAL       │
     │  ├─ Cognition   │
     │  ├─ Affect      │
     │  └─ Motivation  │
     └────────┬────────┘
              │
    ┌─────────┴─────────┐
    │                   │
    ▼                   ▼
┌──────────┐      ┌──────────┐
│BEHAVIOR  │◄────►│ENVIRONMENT│
│          │      │          │
└──────────┘      └──────────┘
```

**Key insight:** Self-regulation is not purely internal—it's shaped by and shapes the social environment.

