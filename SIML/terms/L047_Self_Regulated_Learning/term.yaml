## Assessment of SRL

### Methods

1. **Self-report questionnaires:**
   - Motivated Strategies for Learning Questionnaire (MSLQ)
   - Self-Regulated Learning Interview Schedule (SRLIS)

2. **Think-aloud protocols:** Verbalization during problem-solving

3. **Trace methodologies:** Log files, eye-tracking, keystroke analysis

4. **Observational measures:** Structured observation of learning behaviors

5. **Microanalytic assessment:** Event-specific measures during actual tasks

