description: 'Care ethics in human-technology relationships — focuses on relationships and empathy rather than individual rights (rights-based ethics) or universal duties (rule-based ethics). Central to this framework: vulnerability and interdependence. Reshaping AI in elder care, emotional support bots, and digital assistants by prioritizing empathy and user needs. Reciprocal human-machine relationships where machines respond to emotions and foster trust. Raises controversy over authenticity of machine empathy and risks of over-reliance on technological care.'
