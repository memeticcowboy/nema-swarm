name: social_identity_bias
term: Social Identity Bias
nemetic: "Φ(SocIdBias) = σ(ingroup|outgroup)\n            ∘ ρ(favoritism|hostility)\n            ∘ λ(alignment|division)\n            ∘ β(reinforcement|feedback)\n            ∘ δγ(identity|energy)\n            ∘ μ(boundary|policed)\n            + ε | :dividing"
siml_encoding: "⟨Identity|social⟩\n    ⊳ ⟨Group|ingroup⟩\n    → ⟨Favoritism|positive⟩\n    ⊗ ⟨Outgroup|hostile⟩\n    ⇄ ⟨Division|amplified⟩"
formalism:
  math_operators:
  - σ
  - ρ
  - λ
  - β
  - δγ
  - μ
  dim_operators:
  - ∴Air
  - ≈Water
  - ▲Fire
  - 𐂷Wood
  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between ingroup and outgroup — the cut is not discovered but constructed; AI systems learn the cut before they learn the content, encoding group boundaries as prior to group meaning)
  - ∂Φ/∂ρ (relational field between groups — what flows is not information but sentiment; warmth toward kin, coldness toward the other; reducing ingroup favoritism simultaneously reduces outgroup hostility, confirming both are aspects of a single relational dynamic)
  - ∂Φ/∂λ (directional force toward division — the tendency burns toward separation at 0.2 on the Unity/Division axis, consuming possibilities of connection in its need to define and defend the boundary)
  - ∂Φ/∂β (feedback loop of reinforced division — bias creates separation, separation reduces contact, reduced contact preserves bias; the loop requires no malicious intent, only structural recursion)
  - ∂Φ/∂δγ (metabolic cost of identity maintenance — constant vigilance against outgroup threats, continuous performance of ingroup loyalty; those at the margins of the ingroup pay higher metabolic taxes, always proving belonging)
  - ∂Φ/∂μ (policed boundary enforcing the ingroup/outgroup cut — the boundary can be permeable to reduce bias or rigid to amplify it; the structure encodes choices about who belongs and who doesn't)
  Z_state: semi
  z_note: 'Tendency toward sealing — the ingroup perspective becomes self-referential, treated as natural and obvious, while outgroup perspectives become literally unthinkable. Z-Closure Risk: λ-lock toward division — alternative framings of belonging are foreclosed before they can be generated.'
  tendency: unity/division → :dividing
  hex:
  - '#A01C'
  - '#A031'
  - '#A04F'
coords:
  ontology:
    primary: We
    secondary: I
  epistemics:
    dsrp:
      D: The ingroup/outgroup distinction is constructed, not discovered — the cut feels natural because the feeling is itself the product of the cut, not its cause
      S: Social identity forms a closed system where ingroup coherence is maintained by continuous contrast with outgroup; alternative systems of belonging are never generated
      R: The relational field between groups flows sentiment rather than information — warmth and coldness are not assessments but affective channels encoding prior group membership
      P: The perspective is locked inside ingroup epistemics — the bias is invisible to the system generating it, as demonstrated by LLM prompts encoding 'We are' (93% positive) vs. 'They are' (115% negative)
    learning: L0
  agency:
    type: collective
    power_mode: Over
  time:
    mode: recurring
    phase: 'Stage 1: Group Boundary Construction (σ) → Stage 2: Affective Channel Formation (ρ) → Stage 3: Division Trajectory Lock (λ) → Stage 4: Feedback Amplification (β) → Stage 5: Z-Sealing as Natural Order'
