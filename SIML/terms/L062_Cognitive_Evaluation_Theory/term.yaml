## Research Evidence

### Classic Studies

1. **Deci's (1971) Puzzle Experiment**
   - Participants paid vs. unpaid for puzzle-solving
   - Paid participants spent less time on puzzles during free period
   - **Finding:** Expected tangible rewards undermine intrinsic interest

2. **Lepper et al.'s (1973) Magic Marker Study**
   - Children who expected reward for drawing showed less interest later
   - **Finding:** "Overjustification effect" — extrinsic rewards can reduce intrinsic motivation

3. **Ryan's (1982) Video Game Study**
   - Controlling feedback vs. informational feedback
   - **Finding:** Informational feedback enhanced intrinsic motivation; controlling feedback undermined it

### Meta-Analytic Findings

| Factor | Effect on Intrinsic Motivation | Key Moderator |
|--------|-------------------------------|---------------|
| **Expected tangible rewards** | Undermining | Task interest, reward contingency |
| **Positive feedback** | Enhancing | Informational vs. controlling style |
| **Deadlines** | Undermining | Self-imposed vs. externally imposed |
| **Surveillance** | Undermining | Presence of evaluator |
| **Choice** | Enhancing | Meaningful options provided |

## Practical Applications

### In Education

```
AUTONOMY-SUPPORTIVE TEACHING PRACTICES

❌ CONTROLLING                    ✅ SUPPORTIVE
─────────────────────────────────────────────────────────────
"You must..."                    "You might consider..."
"Do it this way"                 "Here are some options..."
"To get an A..."                 "To deepen your understanding..."
Deadlines imposed                Deadlines negotiated
Grades as pressure               Grades as information
Surveillance                     Availability for help
```

### In Workplace

| Controlling Approach | Autonomy-Supportive Alternative |
|---------------------|--------------------------------|
| Performance-contingent bonuses | Unexpected recognition |
| Micromanagement | Clear goals + discretion on methods |
| Surveillance systems | Regular supportive check-ins |
| Competitive rankings | Collaborative improvement focus |

### In Parenting

```
SUPPORTING CHILDREN'S INTRINSIC MOTIVATION

✓ Provide choice within boundaries
✓ Use informational language ("You figured it out!")
✓ Acknowledge feelings ("This is challenging")
✓ Minimize controlling language ("should", "must")
✓ Offer meaningful rationales for necessary tasks

✗ Avoid excessive rewards for inherently interesting activities
✗ Avoid surveillance during creative play
✗ Avoid conditional approval ("I love you when you...")
```

## Connection to Related Theories

### CET and Self-Determination Theory

Cognitive Evaluation Theory is **one of six mini-theories** within SDT:

```
SELF-DETERMINATION THEORY
│
├── Cognitive Evaluation Theory (CET) — intrinsic motivation
├── Organismic Integration Theory (OIT) — internalization
├── Causality Orientations Theory (COT) — individual differences
├── Basic Psychological Needs Theory (BPNT) — needs satisfaction
├── Goal Contents Theory (GCT) — aspirations and goals
└── Relationships Motivation Theory (RMT) — relatedness

CET asks: How do external events affect intrinsic motivation?
SDT asks: What are the fundamental needs and processes of self-determination?
```

### CET and Attribution Theory

| Aspect | Attribution Theory | Cognitive Evaluation Theory |
|--------|-------------------|----------------------------|
| **Focus** | Causes of outcomes | Effects of external events |
| **Key concept** | Locus, stability, controllability | Locus of causality |
| **Element** | Air/σ (distinction) | Fire/λ (direction) |
| **Complement** | Explains how we explain | Explains how we're affected |

