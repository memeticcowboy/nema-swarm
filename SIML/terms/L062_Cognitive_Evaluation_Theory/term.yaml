## Core Definition

**Cognitive Evaluation Theory (CET)** is a sub-theory of Self-Determination Theory developed by Edward Deci and Richard Ryan in 1985. It examines how external events (rewards, feedback, deadlines, surveillance) affect intrinsic motivation—the inherent satisfaction derived from an activity itself. CET posits that all external events have two functional aspects: a **controlling aspect** and an **informational aspect**, which influence motivation through their impact on perceived autonomy and competence.

### The Dual Aspect of External Events

```
EXTERNAL EVENT (reward, feedback, deadline, surveillance)
           │
           ├──► CONTROLLING ASPECT ──► Threatens AUTONOMY ──► ↓ Intrinsic Motivation
           │                           (external locus)
           │
           └──► INFORMATIONAL ASPECT ──► Enhances COMPETENCE ──► ↑ Intrinsic Motivation
                                       (internal locus)

Net Effect = Balance between control and information
```

