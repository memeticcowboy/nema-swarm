## Key Propositions

### Proposition 1: The Undermining Effect

> **External rewards can undermine intrinsic motivation when they are perceived as controlling rather than informational.**

```
TANGIBLE REWARDS
      │
      ├──► Expected (contingent) ──► Strong undermining effect
      │      • "If you do X, you get Y"
      │      • Perceived as control
      │
      ├──► Unexpected ──► Minimal undermining effect
      │      • Surprise bonus
      │      • Not perceived as control
      │
      └──► Task-noncontingent ──► No undermining effect
             • "Here's payment for participating"
             • Not tied to performance
```

### Proposition 2: The Informational Function

> **Positive feedback enhances intrinsic motivation when it affirms competence without threatening autonomy.**

| Feedback Type | Example | Effect on Intrinsic Motivation |
|--------------|---------|-------------------------------|
| **Informational** | "Your solution was elegant" | ↑ Increases (competence affirmed) |
| **Controlling** | "You did well, as you should" | ↓ Decreases (autonomy threatened) |
| **Negative** | "That was inadequate" | ↓ Decreases (competence threatened) |

### Proposition 3: The Interpersonal Context

> **Interpersonal contexts that support autonomy enhance intrinsic motivation; controlling contexts undermine it.**

```
