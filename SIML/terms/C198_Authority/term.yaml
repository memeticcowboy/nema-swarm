metataxonomy:
  energetic: Authority operates as a held tension between presence and exertion—legitimate
    authority channels force through consent and transparency, while authoritarianism is
    the unmediated discharge of that force; the 'depth = noise' principle captures the
    energetic instability of unproven capability vibrating before it finds coherent form.
  material: The autodidact’s silo functions as a contained forge, and public resources constitute
    the tangible commons upon which authority must act; the blacksmith’s blade—material
    brought from darkness into daylight—serves as the governing metaphor for matter tested
    only by its capacity to cut true.
  informational: This is the governing domain: authority lives or dies by its informational
    practices—showing work, radiating trials, indexing maps, and maintaining functional
    transparency; depth is indistinguishable from noise until standards are applied and
    information is made legible, verifiable, and publicly auditable.
  structural: Authority requires architectures of consent, checks and balances, and developmental
    models of leadership (Polite, Open, Authoritative); it collapses into parroted status
    quo when structural feedback loops decay into rigid, unexamined hierarchy that ceases
    to generate new trials.
  temporal: Authority is forged in developmental time—first in the solitary silo of autodidactic
    practice, then tested in public; the transition from new authority to parroted status
    quo is a temporal drift from living, iterative trial to dead, repetitive performance.
  social: Entirely mediated through the dark field of the Other and the necessity of consent;
    leadership is a social contract between the authoritative actor, the led follower,
    and the public auditor, with the true Other forever approached through mediation but
    never directly accessed.
  cognitive: A dialectical operation—sense, understand, reason—that holds the tension between
    authority and authoritarianism through precise definition and categorization; the
    autodidact’s internal cognitive map must be translated into shareable, indexable,
    and verifiable cognitive artifacts for authority to be recognized.
facet_resonances:
  dominant_facet: Informational
  recessive_facet: Material
taxonomy_anchor: Authority is an information-structured social contract that maintains its
  legitimacy through continuous cognitive verification, transparent public trial, and
  the mediating dark field of the Other.
