### Domains with Strong Evidence

| Domain | Application | Key Finding |
|--------|-------------|-------------|
| **Aggression** | Media violence effects | Observed violence increases aggressive behavior |
| **Prosocial behavior** | Altruism modeling | Helping models increase helping behavior |
| **Phobia acquisition** | Fear learning | Fears can be learned through observation |
| **Skill acquisition** | Sports, crafts | Complex skills learned faster through modeling |
| **Therapy** | Behavioral interventions | Modeling effective for anxiety, social skills |

### Criticisms and Limitations

1. **Cognitive emphasis:** Early versions neglected biological constraints
2. **Causal complexity:** Difficult to isolate modeling effects from other factors
3. **Individual differences:** Not everyone learns equally from observation
4. **Cultural variation:** Modeling effectiveness varies across cultures
5. **Media effects debate:** Controversy over extent of media violence influence

## Connection to CAMIL and IVR

Social Learning Theory is highly relevant to immersive learning:
- **Avatar models:** Virtual characters can serve as effective models
- **Perspective-taking:** IVR enables seeing from model's viewpoint
- **Safe observation:** Learners can observe dangerous procedures risk-free
- **Self-modeling:** Recording and observing own performance in VR
- **Social presence:** Virtual others create social learning contexts

**Evidence:** Virtual models have been shown effective for medical training, social skills development, and phobia treatment.

