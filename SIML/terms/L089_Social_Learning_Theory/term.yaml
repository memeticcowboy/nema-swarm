## The Architecture of Social Learning

### Attentional Processes

What determines whether we notice and attend to a model?

```
ATTENTION DETERMINANTS
═══════════════════════════════════════════════════════════════

    Observer Characteristics:
    ┌─────────────────────────────────────┐
    │  • Perceptual/cognitive capacities  │
    │  • Arousal level                    │
    │  • Past reinforcement               │
    │  • Sensory capabilities             │
    └─────────────────────────────────────┘
    
    Model Characteristics:
    ┌─────────────────────────────────────┐
    │  • Competence (expertise)           │
    │  • Prestige/power                   │
    │  • Similarity to observer           │
    │  • Likability/attractiveness        │
    └─────────────────────────────────────┘
    
    Event Characteristics:
    ┌─────────────────────────────────────┐
    │  • Functional value                 │
    │  • Novelty/surprise                 │
    │  • Affective valence                │
    │  • Accessibility                    │
    └─────────────────────────────────────┘
```

### Retention Processes

How do we store observed behaviors for later use?

| Encoding System | Description | Example |
|-----------------|-------------|---------|
| **Imaginal** | Visual/spatial representations | Mental image of dance move |
| **Verbal** | Linguistic descriptions | "Step left, then pivot" |
| **Conceptual** | Abstract rules and principles | Understanding the physics of motion |

**Retention strategies:**
- **Rehearsal:** Mental or physical practice
- **Organization:** Structuring information meaningfully
- **Coding:** Transforming observations into symbolic form

### Reproduction Processes

Converting stored representations into action:

```
REPRODUCTION PROCESS
═══════════════════════════════════════════════════════════════

    ┌─────────────────────────────────────┐
    │  1. Physical capabilities check     │
    │     • Can I physically do this?     │
    │                                     │
    │  2. Component skills assessment     │
    │     • Do I have the sub-skills?     │
    │                                     │
    │  3. Coordination integration        │
    │     • Can I combine components?     │
    │                                     │
    │  4. Self-observation and correction │
    │     • How does my attempt compare?  │
    │     • What needs adjustment?        │
    │                                     │
    │  5. Refinement through feedback     │
    │     • Iterative improvement         │
    └─────────────────────────────────────┘
```

