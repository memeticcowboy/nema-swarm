## The Bobo Doll Experiment

Bandura's landmark study demonstrating observational learning:

```
BOBO DOLL EXPERIMENT (1961)
═══════════════════════════════════════════════════════════════

    PHASE 1: MODELING
    ┌─────────────────────────────────────┐
    │  Children watched adult model       │
    │  interact with inflatable Bobo doll │
    │                                     │
    │  Aggressive condition:              │
    │  • Model punched, kicked, hit doll  │
    │  • Model used verbal aggression     │
    │  • Model was rewarded with treats   │
    │                                     │
    │  Non-aggressive condition:          │
    │  • Model played quietly with toys   │
    │                                     │
    │  Control condition:                 │
    │  • No model exposure                │
    └─────────────────────────────────────┘
    
    PHASE 2: FRUSTRATION
    ┌─────────────────────────────────────┐
    │  All children were frustrated       │
    │  (taken to room with attractive     │
    │  toys, then told they couldn't play)│
    └─────────────────────────────────────┘
    
    PHASE 3: TESTING
    ┌─────────────────────────────────────┐
    │  Children left alone with Bobo doll │
    │                                     │
    │  RESULTS:                           │
    │  • Aggressive model group:          │
    │    High levels of imitation         │
    │  • Non-aggressive model group:      │
    │    Low aggression                   │
    │  • Control group:                   │
    │    Moderate baseline aggression     │
    │                                     │
    │  KEY FINDING:                       │
    │  Children learned aggression simply │
    │  by watching — no direct            │
    │  reinforcement required             │
    └─────────────────────────────────────┘
```

## Reciprocal Determinism

Bandura's later elaboration — the dynamic interplay of factors:

```
RECIPROCAL DETERMINISM
═══════════════════════════════════════════════════════════════

              ┌─────────────────┐
              │   PERSONAL      │
              │    FACTORS      │
              │                 │
              │ • Cognition     │
              │ • Self-beliefs  │
              │ • Personality   │
              │                 │
              └────────┬────────┘
                       │
         ┌─────────────┼─────────────┐
         │             │             │
         ▼             │             ▼
    ┌─────────┐        │        ┌─────────┐
    │         │◄───────┴───────►│         │
    │BEHAVIOR │    influences   │ENVIRONMENT│
    │         │◄───────────────►│         │
    └─────────┘                 └─────────┘
    
    No single factor determines outcomes;
    all three continuously influence each other.
    
    Example: A student with low self-efficacy 
    (personal) avoids challenging tasks (behavior),
    which limits learning opportunities (environment),
    which reinforces low self-efficacy...
```

## Self-Efficacy: The Core of Social Cognitive Theory

Bandura's extension of Social Learning Theory into **Social Cognitive Theory** emphasizes **self-efficacy** — beliefs about one's capability to execute behaviors:

```
SELF-EFFICACY SYSTEM
═══════════════════════════════════════════════════════════════

    SOURCES OF SELF-EFFICACY:
    ┌─────────────────────────────────────────────────────────┐
    │                                                          │
    │  1. MASTERY EXPERIENCES          [Earth/δγ]             │
    │     ┌─────────────────────────────────────────┐         │
    │     │ "I succeeded before → I can succeed    │         │
    │     │  again"                                 │         │
    │     │                                          │         │
    │     │ Most powerful source                     │         │
    │     └─────────────────────────────────────────┘         │
    │                                                          │
    │  2. VICARIOUS EXPERIENCES          [Water/ρ]            │
    │     ┌─────────────────────────────────────────┐         │
    │     │ "They succeeded and they're similar    │         │
    │     │  to me → I can too"                    │         │
    │     │                                          │         │
    │     │ Modeling by similar others               │         │
    │     └─────────────────────────────────────────┘         │
    │                                                          │
    │  3. VERBAL PERSUASION          [Air/σ]                  │
    │     ┌─────────────────────────────────────────┐         │
    │     │ "You can do this" — credible            │         │
    │     │ encouragement                            │         │
    │     │                                          │         │
    │     │ Weaker but widely used                   │         │
    │     └─────────────────────────────────────────┘         │
    │                                                          │
    │  4. PHYSIOLOGICAL STATES          [Water/ρ]             │
    │     ┌─────────────────────────────────────────┐         │
    │     │ Stress signals interpreted as          │         │
    │     │ inability vs. readiness                │         │
    │     │                                          │         │
    │     │ Interpretation matters more than       │         │
    │     │ physiological state itself             │         │
    │     └─────────────────────────────────────────┘         │
    │                                                          │
    └─────────────────────────────────────────────────────────┘
```

## Elemental Pattern Analysis

### Water/ρ Dominance (Primary)

Social Learning Theory is fundamentally **relational**:
- **Resonance:** Observer-model attunement determines learning
- **Flow:** Behaviors spread through social networks like waves
- **Coupling:** The observer is affectively connected to the model
- **Vicariousness:** Learning through others' experiences (water-like fluidity)

### Air/σ as Secondary (Attention/Retention)

The cognitive dimensions of observation:
- **Distinction:** Selecting which models and behaviors to attend to
- **Clarity:** Symbolic coding creates clear mental representations
- **Categorization:** Organizing observed behaviors meaningfully

### Wood/β as Tertiary (Reproduction)

Behavioral manifestation:
- **Branching:** Multiple possible behavioral outputs from observation
- **Growth:** Skills develop through iterative reproduction attempts
- **Generativity:** New behaviors emerge from recombination of observed elements

### Fire/λ as Quaternary (Motivation)

The directional force:
- **Purpose:** Goals guide which behaviors are performed
- **Expectation:** Anticipated outcomes drive action
- **Value:** Reinforcement values determine behavioral priorities

### Earth/δγ as Supporting (Retention/Performance)

The cyclical nature of learning:
- **Accumulation:** Behavioral repertoire grows over time
- **Cycling:** Practice-rehearsal-performance loops
- **Grounding:** Physical capabilities constrain what's reproducible

## Connection to Related Theories

### Social Learning vs. Behaviorism

| Aspect | Traditional Behaviorism | Social Learning Theory |
|--------|------------------------|------------------------|
| **Learning mechanism** | Direct reinforcement | Observation and modeling |
| **Role of cognition** | Ignored or denied | Central to the theory |
| **Reinforcement** | Necessary for learning | Affects performance, not just learning |
| **Learning speed** | Gradual, trial-and-error | Rapid, insight-like |
| **Complex behaviors** | Shaped through successive approximation | Acquired whole through observation |
| **Element** | Earth/δγ (conditioning) | Water/ρ (social flow) |

### Social Learning vs. Communities of Practice

| Aspect | Social Learning Theory | Communities of Practice |
|--------|------------------------|------------------------|
| **Focus** | Individual learning from models | Collective learning through participation |
| **Unit of analysis** | Observer-model dyad | Community as social structure |
| **Key mechanism** | Imitation and reinforcement | Legitimate peripheral participation |
| **Identity** | Less emphasized | Central to learning |
| **Time frame** | Specific learning episodes | Sustained engagement over time |
| **Element** | Water/ρ (observation) | Water/ρ + Metal/μ (relationship + structure) |

