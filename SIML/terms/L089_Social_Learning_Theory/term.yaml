## Core Definition

**Social Learning Theory**, developed by Albert Bandura (1977), revolutionized behaviorism by demonstrating that learning can occur through **observation and imitation** of others, without direct personal experience or reinforcement. Unlike classical and operant conditioning, which require the learner to perform behaviors and experience consequences directly, social learning enables the acquisition of complex behaviors, attitudes, and emotional responses simply by watching models.

The theory emphasizes the **interdependence of personal factors, behavior, and environment** — a concept Bandura later formalized as **reciprocal determinism** in his Social Cognitive Theory. Learning is not a passive absorption of stimuli but an active process of attention, retention, reproduction, and motivation.

