## Core Insight

> Social Learning Theory reveals that **we are not isolated learners but nodes in networks of observation and imitation**. The behaviors, attitudes, and emotional responses of those around us constantly shape who we are becoming. We learn not just from our own experience but from the experiences of others — their successes, failures, joys, and fears all become part of our potential repertoire. The model is the message; the observer is always learning, whether we intend it or not.

## One-Sentence Insight

> Bandura's Social Learning Theory demonstrates that humans acquire behaviors, attitudes, and emotional responses through observation and imitation of models, with learning requiring attention, retention, reproduction capacity, and motivation — enabling rapid acquisition of complex behaviors without direct personal experience.

## Three-Bullet Expansion

- **What:** A theory showing that learning occurs through observing others (models), with four key processes — attention to models, retention of observed behaviors, physical reproduction capacity, and motivation to perform — enabling the acquisition of complex behaviors without direct reinforcement
- **How it works:** Observer attends to model → encodes behavior symbolically → retains in memory → reproduces when capable and motivated → performance influenced by direct, vicarious, and self-reinforcement → self-efficacy beliefs develop from mastery experiences and modeling
- **Where it aims:** Toward understanding how social observation shapes human behavior across domains from aggression to altruism, with applications in education, therapy, media effects, and organizational training

