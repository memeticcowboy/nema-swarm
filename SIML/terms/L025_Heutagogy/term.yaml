## Connection to Related Theories

### Heutagogy and Self-Determination Theory

| Aspect | Self-Determination Theory | Heutagogy |
|--------|---------------------------|-----------|
| **Core need** | Autonomy, Competence, Relatedness | Autonomy (total), Capability |
| **Motivation** | Intrinsic motivation | Self-determined learning |
| **Element** | Fire (λ-direction) | Child/Aether (✶-autonomy) |
| **Relationship** | SDT explains why autonomy matters | Heutagogy extends autonomy to total self-determination |

Heutagogy represents the **fullest expression** of SDT's autonomy principle — not just choice within options, but determination of the options themselves.

