## Core Definition

**Heutagogy** (from Greek *heuriskein* meaning "to discover") is a theory of self-determined learning developed by Stewart Hase and Chris Kenyon (2000) as an extension of andragogy. While andragogy emphasizes self-directed learning within structured contexts, heutagogy posits that learners can and should determine their own learning paths, content, methods, and assessments. The goal is not just learning specific content but developing the *capability* to learn effectively in any context.

### The Double-Loop of Heutagogy

```
SINGLE-LOOP LEARNING (Andragogy)     DOUBLE-LOOP LEARNING (Heutagogy)
┌─────────────────────────┐         ┌─────────────────────────────┐
│ Learn within            │         │ Question the learning       │
│ established framework   │         │ framework itself            │
│                         │         │                             │
│ • What to learn         │         │ • Why this approach?        │
│ • How to learn it       │         │ • What other paths exist?   │
│ • When to learn         │         │ • Who decides what matters? │
│                         │         │                             │
│ Element: λ (Fire)       │         │ Element: ✶ (Aether)         │
│ — direction within      │         │ — questioning the frame     │
│   structure             │         │   itself                    │
└─────────────────────────┘         └─────────────────────────────┘
```

### Five Heutagogical Principles

| Principle | Description | Nemetic Mapping |
|-----------|-------------|-----------------|
| **1. Learner autonomy** | Complete control over learning decisions | ✶ (harmonic/aether) |
| **2. Self-reflection** | Metacognitive awareness of learning process | σ (distinction/air) |
| **3. Capability development** | Learning how to learn, not just what | β (generative/wood) |
| **4. Non-linear learning** | Exploration without predetermined path | β (branching/wood) |
| **5. Authentic assessment** | Learner determines how to demonstrate learning | λ (direction/fire) |

