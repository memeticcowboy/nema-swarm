The heutagogical learner **navigates connectivist networks** according to their own purposes.

### Heutagogy and Flow Theory

| Aspect | Flow Theory | Heutagogy |
|--------|-------------|-----------|
| **Optimal state** | Challenge-skill balance | Total self-determination |
| **Key condition** | Clear goals + feedback | Learner-defined goals |
