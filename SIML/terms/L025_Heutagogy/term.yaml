## Core Insight

> Heutagogy reveals that the ultimate goal of education is not the transmission of knowledge or even the development of competence, but the cultivation of **capability** — the capacity to learn effectively in any context, to navigate uncertainty with confidence, and to architect one's own learning journey. The heutagogical learner is not a recipient of education but the sovereign of their own becoming.

## One-Sentence Insight

> Heutagogy extends self-directed learning into total self-determination — where learners architect their own learning paths, develop the capability to learn in any context, and transcend predetermined frameworks to discover their own unique way of knowing and becoming.

## Three-Bullet Expansion

- **What:** A theory of self-determined learning where learners control what, how, when, and why they learn — going beyond andragogy to develop not just competence (ability to do) but capability (ability to learn in new contexts)
- **How it works:** Learners exercise total autonomy in designing their learning journey, engaging in non-linear exploration, developing metacognitive awareness, and integrating competence with the capability to adapt to new challenges
- **Where it aims:** Toward human flourishing through lifelong learning capability — creating learners who are not just knowledgeable but are sovereign architects of their own continuous development

