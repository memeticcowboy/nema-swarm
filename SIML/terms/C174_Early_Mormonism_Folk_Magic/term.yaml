context_note: >-
  Early Mormonism reveals how religious movements emerge from folk traditions.
  Joseph Smith's journey from treasure-digging folk magician to founder of a
  major world religion illustrates the fluid boundaries between magic and
  religion in 19th-century America, with seer stones, Kabbalistic influences,
  and Freemasonic elements transformed into distinctively Mormon theology.
