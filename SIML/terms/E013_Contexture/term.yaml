# E013 вЂ” Contexture

## Core Concept

**Contexture** is actively woven meaning, not passive context. The shift from "context-dependent" to "contexture-dependent" emphasizes that meaning is **produced through interaction**, not received from environment.

## From Context to Contexture

**Context (passive):** Meaning depends on surrounding circumstances.

**Contexture (active):** Participants **weave** meaning through their engagement. The weave is the work.

## Elemental Profile

**Water (ПЃ) at 0.85:** The weaving itselfвЂ”resonance produced through interaction, not found in context.

**Wood (ОІ) at 0.75:** Branching possibilities elaborated through the weave. Each turn opens new paths.

**Meta (в€®) at 0.70:** The pattern of weavingвЂ”how contexture operates as meta-process.

## The NEMAtic Absorption

Adopt "contexture" over "context" to emphasize:
- Active production (not passive dependence)
- Water (ПЃ) + Wood (ОІ) operations
- The work of meaning-making

