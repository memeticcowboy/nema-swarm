  epistemics:
    dsrp:
      D: The distinction between 'I am communicating' and 'I am being understood' collapses — the act of sending is experienced as the act of connecting, while the distortion operating at both ends remains invisible to each party
      S: The self is framed as the correct perceiver of a situation that is actually being distorted — alternative framings (the receiver's perspective, disconfirming evidence) are never generated; only the distortion's version appears
      R: The relation between sender intent and receiver interpretation is severed by the distortion operating at each end — what flows between communicators is the distortion itself, not the intended meaning, producing reciprocal defensive patterning
      P: The perspective of the thinker is locked inside the distortion — mind-reading, catastrophizing, and overgeneralization each construct a perspective that feels like accurate perception and resists external correction as threatening
