  partials:
  - ∂Φ/∂σ (distinction between valid reasoning and cognitive distortion — the cut that the thinker cannot make; the distortion is invisible from inside it, so the gap between 'I think this' and 'this is true' never appears as a gap)
  - ∂Φ/∂ρ (relational misalignment between sender intent and receiver interpretation — what flows between communicators is not meaning but mutual projection; each processes the exchange through their own distortion, producing shared hallucination of understanding)
  - ∂Φ/∂λ (direction of communication energy toward self-protection rather than mutual understanding — mind-reading, catastrophizing, and labeling all redirect the communicative arrow inward, serving the self-narrative over shared clarity)
  - ∂Φ/∂β (assumption-confirmation feedback loop — one error compounds into others; defensive communication triggers defensive response, which confirms the original distortion and intensifies it)
  - ∂Φ/∂δγ (metabolic efficiency of cognitive shortcuts versus the long-term cost of accumulated miscommunication — heuristics conserve energy now and build relationship debt that compounds until reckoning)
  - ∂Φ/∂μ (blurred boundary between internal thought and external expression — the thinking error requires permeability between assumption and assertion; the boundary that would pause and check is precisely what the distortion pattern dissolves)
  Z_state: semi
  z_note: 'Tendency toward sealing — thinking error patterns become invisible habits, assumed as natural perception rather than cognitive distortion. Z-Closure Risk: β-lock — confirmation loops seal the distorted frame; the error becomes the lens through which all evidence is processed, making correction feel like attack.'
  tendency: clarity/distortion → 0.3 :distorting
