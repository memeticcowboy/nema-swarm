term: Thinking Errors in Communication
nemetic: "Φ(ThinkErr) = σ(valid|distorted)\n            ∘ ρ(sender|receiver)\n            ∘ λ(intention|impact)\n            ∘ β(assumption|confirmation)\n            ∘ δγ(efficiency|defense)\n            ∘ μ(boundary|blurred)\n            + ε | :distorting"
siml_encoding: "⟨Thought|cognitive⟩\n    ⊳ ⟨Expression|communicated⟩\n    → ⟨Interpretation|received⟩\n    ⊗ ⟨Error|distortion⟩\n    ⇄ ⟨Feedback|reinforced⟩"
formalism:
  math_operators:
  - σ
  - ρ
