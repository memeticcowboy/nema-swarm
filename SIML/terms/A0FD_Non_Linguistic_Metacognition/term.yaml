description: 'Non-linguistic metacognition in Piaget, Vygotsky, and Bruner. Piaget: sensorimotor stage builds schemas through sensation/movement — cognition precedes language. Vygotsky: preverbal thought exists, cultural tools beyond language include artifacts, symbols, non-verbal practices. Bruner: enactive and iconic representations operate independently of language. All three have strands reaching beyond language into thinking-about-thinking through action, perception, embodied sense.'
