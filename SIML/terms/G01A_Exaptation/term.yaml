description: "An evolutionary process where a trait evolved for one purpose is co-opted for a new, different function. Coined by Gould and Vrba in 1982, exaptation explains how complex novelty arises from repurposing existing structures -- feathers evolved for insulation becoming instruments of flight, wine press mechanics becoming printing press technology."
