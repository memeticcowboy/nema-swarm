description: Lacan's mirror stage — the infant's recognition of its reflection as a complete unified self, producing a foundational misidentification that creates the basis for psychological struggles. Desire and Lack — unconscious desires shaped by society, always seeking external fulfillment, creating persistent incompleteness. The subject is constituted through desire for what it lacks, ensuring that satisfaction remains structurally impossible.
