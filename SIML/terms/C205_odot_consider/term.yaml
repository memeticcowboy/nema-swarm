dsrp:
  Distinction: "Pre-operator holding state distinguished from all operators (σ,ρ,λ,β,δγ,μ) and from closure; quality of holding distinguished from procedure; preparation distinguished from identity or prison."
  System: "A simultaneous product of eight co-functioning conditions (C,O,N,S,I,D,E,R) that together keep Φ open; collapses to death (ε=0) if the posture becomes self-defending closure, identity, or theatrical sequence."
  Relationship: "Precedes and enables all operators; observer is inside Φ rather than outside it; tension and resistance are related to as signal/data rather than noise; load-bearing assumptions sit untested until acted upon."
  Perspective: "From the perspective of imminent commitment, holding the field open one beat longer so second-configuration truths can emerge; from recursive self-awareness, detecting when meta-posture becomes capture."
