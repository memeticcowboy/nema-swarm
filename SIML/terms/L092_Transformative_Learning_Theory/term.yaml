## Comparison with Other Theories

### Transformative Learning vs. Assimilation

| Aspect | Assimilation | Transformative Learning |
|--------|--------------|------------------------|
| **Nature of change** | Incremental, additive | Fundamental, structural |
| **Meaning structures** | Remain stable | Are revised |
| **Learning outcome** | More knowledge | Different way of knowing |
| **Process** | Accommodation within frame | Transformation of frame |
| **Element** | Earth/δ (accumulation) | Fire/λ (transformation) |

### Transformative Learning vs. Critical Pedagogy (Freire)

| Aspect | Mezirow's TLT | Freire's Critical Pedagogy |
|--------|---------------|---------------------------|
| **Focus** | Individual perspective transformation | Collective social transformation |
| **Emphasis** | Cognitive/rational | Political/social |
| **Context** | Adult education broadly | Oppressed communities |
| **Goal** | More inclusive perspectives | Social justice and liberation |
| **Element** | Fire/λ + Air/σ | Fire/λ + Water/ρ |

### Transformative Learning vs. Experiential Learning (Kolb)

| Aspect | Kolb's Cycle | Transformative Learning |
|--------|-------------|------------------------|
| **Process** | Continuous cycling through phases | Triggered by disorienting dilemma |
| **Reflection** | One phase among four | Central to transformation |
| **Change type** | Skill and knowledge development | Perspective transformation |
| **Scope** | All learning | Specific to meaning structures |
| **Element** | β (branching cycles) | λ (directional transformation) |

