## Criticisms and Extensions

### Criticisms of Mezirow's Theory

1. **Overly rational:** Critics argue it neglects emotional, embodied, and spiritual dimensions
2. **Individual focus:** Insufficient attention to social and cultural contexts
3. **Western bias:** Emphasis on autonomy and critical reflection may reflect Western values
4. **Linear model:** The process may be more iterative and messy than depicted

### Extensions and Revisions

- **Embodied transformation:** Including somatic and emotional experience (Dirkx)
- **Social transformation:** Emphasizing collective and cultural change (Freire, hooks)
- **Spiritual dimension:** Including transformative experiences beyond rationality
- **Cultural sensitivity:** Recognizing different pathways to transformation

