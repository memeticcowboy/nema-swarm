## Core Insight

> Transformative Learning Theory reveals that **the most profound learning involves not acquiring more information but fundamentally changing how we make meaning**. Adults carry frames of reference developed through years of experience—habitual ways of seeing that filter reality. When these frames are challenged by experiences that don't fit, and when we engage in critical reflection and dialogue, we can transform not just what we know but how we know. This perspective transformation is the hallmark of adult development.

## One-Sentence Insight

> Jack Mezirow's Transformative Learning Theory demonstrates that profound adult learning occurs when disorienting experiences trigger critical reflection on the assumptions underlying our meaning structures, leading to perspective transformation—a fundamental shift toward more inclusive, discriminating, and integrative frames of reference.

## Three-Bullet Expansion

- **What:** A theory of adult learning focused on how adults revise their meaning structures (frames of reference) through critical reflection, triggered by disorienting dilemmas that cannot be accommodated within existing perspectives
- **How it works:** Experience → Disorienting dilemma → Critical self-reflection (content/process/premise) → Rational discourse with others → Revision of meaning schemes or transformation of meaning perspectives → Action based on new understanding
- **Where it aims:** Toward perspective transformation—becoming more critically aware of how and why our assumptions constrain perception, leading to more inclusive, discriminating, permeable, and integrative frames of reference that enable fuller participation in a democratic, pluralistic society

