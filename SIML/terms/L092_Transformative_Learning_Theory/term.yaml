### Meaning Structures: Schemes and Perspectives

```
LEVELS OF MEANING STRUCTURE
═══════════════════════════════════════════════════════════════

    MEANING SCHEMES (Specific Beliefs)
    ┌─────────────────────────────────────────────────────────┐
    │  Specific knowledge, beliefs, judgments, feelings       │
    │  about particular situations                            │
    │                                                         │
    │  Example: "My boss doesn't respect me because           │
    │  she criticized my report"                              │
    │                                                         │
    │  [Air/σ — Distinctions about specific contexts]         │
    └─────────────────────────┬───────────────────────────────┘
                              │
                              ▼
    MEANING PERSPECTIVES (Frames of Reference)
    ┌─────────────────────────────────────────────────────────┐
    │  Broad sets of assumptions that filter experience       │
    │  — the lens through which we interpret reality          │
    │                                                         │
    │  Two types:                                             │
    │  • Psychological: How we see ourselves                  │
    │  • Socio-linguistic: How we see our social world        │
    │                                                         │
    │  Example: "Authority figures are inherently             │
    │  critical and untrustworthy"                            │
    │                                                         │
    │  [Fire/λ — Directional frame shaping perception]        │
    └─────────────────────────────────────────────────────────┘

    ═══════════════════════════════════════════════════════
    
    TRANSFORMATION CAN OCCUR AT EITHER LEVEL:
    
    • Revision of meaning schemes (easier, more common)
    • Transformation of meaning perspectives (deeper, rarer)
```

## Elemental Pattern Analysis

### Fire/λ Dominance (Primary)

Transformative Learning is fundamentally about **directional transformation of purpose and meaning**:
- **Direction:** Shifts in how we orient ourselves to the world
- **Purpose:** Revision of what we value and why
- **Transformation:** Fundamental change, not incremental addition
- **Aspiration:** Toward more inclusive, discriminating, integrative perspectives

### Air/σ as Secondary (Distinction/Clarity)

Critical to the theory's mechanism:
- **Distinction:** Examining assumptions vs. taking them for granted
- **Clarity:** Seeing through distortions in meaning-making
- **Negotiation:** Comparing interpretations with others
- **Premise reflection:** Questioning the foundations of belief

### Water/ρ as Tertiary (Resonance/Connection)

The social dimension of transformation:
- **Rational discourse:** Dialogue with others about interpretations
- **Resonance:** Finding validation or challenge in community
- **Flow:** Movement between individual and collective meaning-making
- **Vicariousness:** Learning from others' transformations

### Earth/δγ as Supporting (Cycling/Growth)

The developmental foundation:
- **Accumulation:** Experience builds until it challenges meaning structures
- **Cycling:** Disorienting dilemmas may recur, deepening transformation
- **Grounding:** Experience provides the raw material for reflection
- **Rhythm:** Transformation occurs in phases, not instantaneously

### Metal/μ as Supporting (Structure/Mastery)

The cognitive architecture:
- **Structure:** Meaning schemes provide organized interpretation
- **Containment:** Frames of reference bound acceptable interpretations
- **Valuation:** Assumptions carry weight in decision-making
- **Exchange:** Perspectives can be compared and evaluated

