## Core Definition

**Transformative Learning Theory**, developed by Jack Mezirow, is a theory of adult learning that explains how adults revise their **meaning structures**—the frames of reference through which they interpret experience. Unlike incremental learning that adds to existing knowledge, transformative learning involves a **fundamental shift** in the premises that shape how we understand ourselves and our world.

The theory centers on **perspective transformation**: the process of becoming critically aware of how and why our assumptions have come to constrain the way we perceive, understand, and feel about our world. This awareness leads to a restructuring of our meaning schemes and perspectives.

