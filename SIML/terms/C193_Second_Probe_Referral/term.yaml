objects:
  - name: Actor
    role: Initial communicator attempting cross-cultural contact
  - name: Observer
    role: Cultural recipient interpreting the probe
  - name: Frame
    role: Dominant cultural norm assumed as default
  - name: Value
    role: Mutual understanding sought across divide
  - name: Resource
    role: Shared language, translation, or symbolic tool
  - name: Environment
    role: Cross-cultural milieu where dominant and co-cultures meet
  - name: Boundary
    role: Cultural divide between communicators
  - name: Protocol
    role: Referral protocol for second probe mediation
  - name: Signal
    role: Verbal and nonverbal cues exchanged
  - name: Narrative
    role: Stereotypical assumptions about the other culture
  - name: Memory
    role: Past cross-cultural encounters and their outcomes
  - name: Outcome
    role: Successful mediation or persistent misunderstanding
  - name: Artifact
    role: Translated document or mediated message produced

relations:
