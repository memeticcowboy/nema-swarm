taxonomy:
  ontology_position: "Situated at the collision point between assumed universal pragmatics and the hierarchical escalation of interpretive frameworks."
  epistemic_stance: "Critical—exposes the parochialism of universalist communicative assumptions and the authority structures embedded in mediation."
  temporal_orientation: "Sequential and recursive: initial failure triggers referral, yet the act loops back to reinforce the epistemic hierarchy it attempts to bridge."
  qualia_signature: "The vertigo of watching your own frame dissolve, replaced by a mediator whose neutrality itself is a power move."
  agency_gradient: "Asymmetric: dominant-culture speaker initiates, co-cultural respondent is subjected to referral, and the mediating framework absorbs the agency of both."
  coherence_topology: "A paradox attractor: the surface structure is cooperative repair, the deep structure is epistemic capture—the more it 'helps,' the more it homogenizes."
  ce_potential: "High: extends to AI intent-alignment, diplomatic protocol, translation ethics, and any system where 'neutral' mediation masks embedded cultural authority."

