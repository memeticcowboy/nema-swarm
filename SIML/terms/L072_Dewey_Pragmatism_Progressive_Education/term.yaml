### The Pattern of Inquiry

Dewey described inquiry as the natural response to **problematic situations** — states of doubt or disruption that call forth reflection and experimentation:

```
DEWEY'S PATTERN OF INQUIRY

┌─────────────────────────────────────────────────────────┐
│                                                         │
│   1. SITUATION (Experience)                             │
│   ═════════════════════════                             │
│   • Ongoing, continuous experience                      │
│   • Some quality feels problematic                      │
│   • Indeterminate, unsettled state                      │
│                                                         │
│   Element: ρ (Water) — fluid experience                 │
│                                                         │
│   ↓                                                     │
│                                                         │
│   2. PROBLEM (Recognition)                              │
│   ════════════════════════                              │
│   • The situation becomes consciously problematic       │
│   • Felt difficulty is named and located                │
│   • Problem is intellectualized                         │
│                                                         │
│   Element: σ (Air) — distinction-making                 │
│                                                         │
│   ↓                                                     │
│                                                         │
│   3. HYPOTHESIS (Suggestion)                            │
│   ══════════════════════════                            │
│   • Possible solutions emerge from experience           │
│   • Ideas are entertained, not yet accepted             │
│   • Imagination generates possibilities                 │
│                                                         │
│   Element: β (Wood) — generative branching              │
│                                                         │
│   ↓                                                     │
│                                                         │
│   4. REASONING (Development)                            │
│   ════════════════════════                              │
│   • Ideas are elaborated and connected                  │
│   • Consequences are anticipated                        │
│   • Logical relations are developed                     │
│                                                         │
│   Element: λ (Fire) — directed reasoning                │
│                                                         │
│   ↓                                                     │
│                                                         │
│   5. ACTION (Experimentation)                           │
│   ═══════════════════════════                           │
│   • Ideas are tested in action                          │
│   • Hypotheses are embodied in practice                 │
│   • Doing, not just thinking                            │
│                                                         │
│   Element: δγ (Earth) — embodied testing                │
│                                                         │
│   ↓                                                     │
│                                                         │
│   6. CONSEQUENCE (Resolution)                           │
│   ═══════════════════════════                           │
│   • Situation is transformed                            │
│   • New meaning is established                          │
│   • Experience is reconstructed                         │
│                                                         │
│   Element: ✶ (Aether) — integrative resolution          │
│                                                         │
│   ↓                                                     │
│                                                         │
│   [Cycle continues — growth is continuous]              │
│                                                         │
└─────────────────────────────────────────────────────────┘
