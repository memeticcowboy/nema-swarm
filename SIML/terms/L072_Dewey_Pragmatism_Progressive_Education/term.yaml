## Elemental Pattern Analysis

### Water/ρ Dominance

Dewey's Pragmatism is fundamentally a **Water theory**:
- **Experience as transactional:** Knowing flows between self and world
- **Fluid adaptation:** Intelligence as problem-solving in changing conditions
- **Continuity:** Experience as a stream, not discrete events
- **Context-sensitivity:** Meaning emerges from situation, not abstract rules
- **Resonance:** Education must connect to lived experience

### Wood/β Inquiry

The **generative, branching** nature of inquiry:
- Problems generate multiple hypotheses
- Inquiry opens new possibilities
- Growth is organic, not mechanical
- Learning branches into new questions

### Fire/λ Democracy

The **directional, purposeful** aspect:
- Education aims toward democratic participation
- Intelligence is directed toward common good
- Reflection guides action
- Growth has direction (more meaning, richer experience)

### Earth/δγ Continuity

The **cyclical, embodied** dimension:
- Experience is continuous, not fragmented
- Action tests ideas in reality
- Habits form through repeated transaction
- Growth builds on itself

### Child/✶ Integration

The **harmonic, experiential** quality:
- Integration of thinking and doing
- Play and work unified
- Interest and effort harmonized
- The "consummatory" moment of meaningful experience

### Supporting Elements

| Element | Role in Dewey's Pragmatism |
|---------|---------------------------|
| **Air/σ** | Reflection, intellectualization of problems |
| **Metal/μ** | Social organization of the classroom, structure |

