## Core Definition

**Pragmatism**, as applied to education by **John Dewey** (1859-1952), represents a fundamental shift from traditional, authoritarian schooling to **progressive, experiential learning**. Dewey's philosophy, articulated in *Democracy and Education* (1916) and *Experience and Education* (1938), posits that education is not preparation for life but **life itself** — a continuous process of growth through meaningful experience. Learning emerges from the **transaction** between the learner and their environment, guided by inquiry, reflection, and intelligent action.

