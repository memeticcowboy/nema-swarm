  epistemics:
    dsrp:
      D: The river mouth is distinguished as the boundary where a river's flow terminates into a larger, distinct body of
        water, marking a sharp transition in energy, salinity, and sediment dynamics.
      S: It is a system comprising the flowing river, transported sediments, the receiving water body, emergent landforms
        like deltas, and human settlements, all interacting within a frame of climate change.
      R: Key relationships include the flow of water and sediment from river to sea, the transformation of sediment into landforms,
        and the constraining conflict between natural deposition and human interventions like damming.
      P: Perspectives range from the geomorphological (landform formation), ecological (habitat support), and human (settlement
        risk and resource management), each viewing the mouth's stability and function differently.
