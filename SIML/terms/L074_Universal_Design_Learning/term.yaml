## Elemental Pattern Analysis

### Metal/Ој Dominance (Structural Flexibility)

UDL is fundamentally a **Metal theory** at its foundation:
- **Architectural Design:** Proactive design of learning environments
- **Structural Framework:** The three principles create a systematic approach
- **Universal Access:** Removing barriers at the design level
- **Scaffolding:** Built-in supports that can be adjusted
- **Organization:** Clear guidelines and checkpoints

However, unlike rigid Metal structures, UDL's Metal is **flexible and permeable** вҖ” designed to accommodate variability rather than enforce uniformity.

