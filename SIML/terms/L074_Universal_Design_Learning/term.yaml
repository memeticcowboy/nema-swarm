## Connection to Related Theories

### UDL and Differentiated Instruction

| Aspect | Differentiated Instruction | Universal Design for Learning |
|--------|---------------------------|------------------------------|
| **Timing** | Reactive — responds to assessed needs | Proactive — designs for variability upfront |
| **Focus** | Adjusting content/process/product | Multiple means of representation/action/expression |
| **Scope** | Often individual or small group | Universal — benefits all learners |
| **Element** | Water (ρ-adaptive) | Metal (μ-structured) + all elements |
| **Relationship** | Complementary — DI addresses immediate needs, UDL prevents barriers |

