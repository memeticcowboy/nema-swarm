## Core Definition

**Universal Design for Learning (UDL)** is a neuroscience-based educational framework developed by CAST (Center for Applied Special Technology) that guides the design of learning experiences to proactively address learner variability. Rather than retrofitting accommodations for individual students, UDL calls for flexible curriculum design that provides **multiple means of representation** (the "what" of learning), **multiple means of engagement** (the "why" of learning), and **multiple means of action and expression** (the "how" of learning). Grounded in research on the three primary brain networks вҖ” recognition, strategic, and affective вҖ” UDL transforms the concept of disability from a fixed individual trait to a contextual mismatch between learner and environment.

