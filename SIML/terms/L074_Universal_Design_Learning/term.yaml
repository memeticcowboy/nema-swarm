## Elemental Pattern Analysis

### Metal/μ Dominance (Structural Flexibility)

UDL is fundamentally a **Metal theory** at its foundation:
- **Architectural Design:** Proactive design of learning environments
- **Structural Framework:** The three principles create a systematic approach
- **Universal Access:** Removing barriers at the design level
- **Scaffolding:** Built-in supports that can be adjusted
- **Organization:** Clear guidelines and checkpoints

However, unlike rigid Metal structures, UDL's Metal is **flexible and permeable** — designed to accommodate variability rather than enforce uniformity.

### Supporting Elements

| Element | Role in UDL |
|---------|-------------|
| **Air/σ** | Multiple representations, perception options, clarity of information |
| **Fire/λ** | Strategic networks, executive function, goal-directed action |
| **Water/ρ** | Affective networks, engagement, interest, emotional connection |
| **Wood/β** | Growth of expert learner attributes, branching pathways |
| **Earth/δγ** | Iterative design cycles, feedback loops, sustained effort |
| **Child/✶** | Integration of all elements toward expert learner development |

