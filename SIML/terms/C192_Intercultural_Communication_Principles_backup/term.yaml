taxonomy:
  ontology_position: "liminal interface between incommensurable worldviews where meaning must be negotiated rather than assumed; operates in the gap between frameworks"
  epistemic_stance: "perspectival constructivism: no single cultural lens is privileged; truth emerges through dialogic tension and reciprocal bracketing of assumptions"
  temporal_orientation: "recursive and slow; understanding accretes through repeated encounters where prior interpretations are continually revised and deepened"
  qualia_signature: "cognitive friction giving way to sudden fluency; the vertigo of displaced assumptions followed by warmth of genuine mutual recognition"
  agency_gradient: "distributed and constrained: cultural frameworks possess partial agency through their speakers, yet each participant can reflexively interrupt default patterns"
  coherence_topology: "mesh-like with fragile bridges: local clusters of shared meaning connected by tenuous links across cultural voids; robust at edges, volatile at joints"
  ce_potential: "expands meta-cognitive capacity to hold multiple frameworks simultaneously; dissolves monocultural blinders toward integrative pluralism"

