  - name: Narrative
    role: Pre-existing cultural assumptions
  - name: Memory
    role: Cultural knowledge and past encounters
  - name: Outcome
    role: Meaningful exchange or misunderstanding
  - name: Artifact
    role: Symbolic expressions and negotiated meanings

