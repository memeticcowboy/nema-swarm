    └─────────────────────────────────────┘
```

### 2. Redundancy Effect

| Condition | Effect on Learning | When to Use |
|-----------|-------------------|-------------|
| **Redundant information** (same info in multiple formats) | Impairs learning | Never for novices |
| **Complementary information** (different info in different formats) | Enhances learning | Always |
| **Eliminating redundancy** | Reduces extraneous load | When information is self-contained |

### 3. Modality Effect

```
MODALITY PRINCIPLE
═══════════════════════════════════════════════════════════════

    Visual-only presentation:
    ┌─────────────────────────────────────┐
    │  [Diagram] + [On-screen text]       │
    │                                     │
    │  Both compete for visual attention  │
    │  → Overloaded visual channel        │
    └─────────────────────────────────────┘
    
    Dual-modality presentation:
    ┌─────────────────────────────────────┐
    │  [Diagram] + [Narration]            │
    │                                     │
    │  Visual + Auditory channels         │
    │  → Expanded working memory capacity │
    │  → Better learning outcomes         │
    └─────────────────────────────────────┘
```

### 4. Worked Example Effect

**Novices learn better from studying worked examples than solving problems.**

```
WORKED EXAMPLE EFFECT
═══════════════════════════════════════════════════════════════

    Problem-solving for novices:
    ┌─────────────────────────────────────┐
    │  High extraneous load               │
    │  • Search for solution method       │
    │  • Trial and error                  │
    │  • Limited resources for learning   │
    └─────────────────────────────────────┘
    
    Studying worked examples:
    ┌─────────────────────────────────────┐
    │  Low extraneous load                │
    │  • Focus on understanding steps     │
    │  • Build schemas directly           │
    │  • Resources directed to germane    │
    └─────────────────────────────────────┘
    
    EXPERTISE REVERSAL: As expertise increases,
    worked examples become redundant and problem-
    solving becomes more effective.
```

