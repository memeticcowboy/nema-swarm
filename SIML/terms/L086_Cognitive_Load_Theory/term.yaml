## Core Insight

> Cognitive Load Theory reveals that **learning is fundamentally a resource management problem**. Working memory is a scarce resource that must be protected from extraneous demands and directed toward germane processing. The art of instruction is not adding more information but removing obstacles to schema construction. Expertise is the freedom that comes when knowledge becomes automatic, liberating working memory for higher-order thinking.

## One-Sentence Insight

> Sweller's Cognitive Load Theory demonstrates that effective instruction requires minimizing extraneous cognitive load, managing intrinsic load through careful sequencing, and maximizing germane load so that limited working memory resources are directed toward the construction of automated schemas in long-term memory.

## Three-Bullet Expansion

- **What:** A theory explaining how the limitations of working memory affect learning, categorizing cognitive load into intrinsic (essential), extraneous (needless), and germane (productive) types, with instructional principles for optimizing each
- **How it works:** Working memory has limited capacity → information must be processed into schemas in long-term memory → instructional design should minimize extraneous load, manage intrinsic load, and maximize germane processing → expertise develops as schemas become automated
- **Where it aims:** Toward evidence-based instructional design that respects human cognitive architecture — optimizing learning by working within the constraints of working memory rather than against them

