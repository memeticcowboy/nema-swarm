    │         │  B  │                     │
    │         └─────┘                     │
    │                                     │
    │  A = Input source                   │
    │  B = Processing unit                │
    │                                     │
    │  [Learner must search back and      │
    │   forth between diagram and text]   │
    └─────────────────────────────────────┘
    
    INTEGRATED DESIGN (Reduced Load):
    ┌─────────────────────────────────────┐
    │                                     │
    │         ┌─────────┐                 │
