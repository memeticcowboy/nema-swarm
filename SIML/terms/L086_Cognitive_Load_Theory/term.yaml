## Core Definition

**Cognitive Load Theory (CLT)**, developed by John Sweller in 1988, explains how human cognitive architecture — specifically the limitations of **working memory** — affects learning. The theory posits that working memory can only hold a limited amount of information (approximately 7±2 chunks for novices), while long-term memory has essentially unlimited capacity. Learning occurs when information is processed in working memory and encoded into long-term memory as **schemas** (organized knowledge structures).

