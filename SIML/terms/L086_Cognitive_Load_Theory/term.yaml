## Element Interactivity

The core determinant of intrinsic cognitive load:

```
ELEMENT INTERACTIVITY
═══════════════════════════════════════════════════════════════

    LOW INTERACTIVITY (Low intrinsic load):
    ┌─────────────────────────────────────┐
    │  Learning vocabulary words          │
    │                                     │
    │  Cat = felis                        │
    │  Dog = canis                        │
    │  Bird = avis                        │
    │                                     │
    │  Each element can be learned        │
    │  independently                      │
    │                                     │
    │  Elements: 3    Interactions: 0     │
    └─────────────────────────────────────┘
    
    HIGH INTERACTIVITY (High intrinsic load):
    ┌─────────────────────────────────────┐
    │  Learning to solve equations        │
    │                                     │
    │  2x + 3 = 7                         │
    │                                     │
    │  Must understand:                   │
    │  • Variables (x)                    │
    │  • Coefficients (2)                 │
    │  • Constants (3, 7)                 │
    │  • Equality concept (=)             │
    │  • AND how they interact!           │
    │                                     │
    │  Elements: 5    Interactions: 10    │
    └─────────────────────────────────────┘
```

## Instructional Design Principles

### The CLT Design Framework

| Principle | Application | Load Type Addressed |
|-----------|-------------|---------------------|
| **Segmenting** | Break complex material into parts | Intrinsic |
| **Pre-training** | Teach component concepts first | Intrinsic |
| **Weeding** | Eliminate interesting but irrelevant material | Extraneous |
| **Signaling** | Highlight essential material | Extraneous |
| **Aligning** | Place text near corresponding graphics | Extraneous |
| **Eliminating redundancy** | Don't narrate identical on-screen text | Extraneous |
| **Synchronizing** | Present narration and graphics together | Extraneous |
| **Individualizing** | Adapt to learner expertise | All types |

## Elemental Pattern Analysis

### Air/σ Dominance (Primary)

Cognitive Load Theory is fundamentally about **distinction-making**:
- **Signal/Noise Separation:** Distinguishing germane from extraneous processing
- **Element Isolation:** Identifying what must be processed vs. what can be automated
- **Clarity:** Making instructional design transparent to working memory
- **Categorization:** Classifying load types for optimization

