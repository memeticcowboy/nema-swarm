### CLT and Multimedia Learning

Mayer's Cognitive Theory of Multimedia Learning extends CLT:
- Both assume limited working memory
- Both emphasize dual-channel processing
- Mayer adds: Active processing principle (learners must engage)

## Applications and Evidence

### Domains Where CLT Has Strong Evidence

| Domain | Key Finding | Application |
|--------|-------------|-------------|
| **Mathematics** | Worked examples superior for novices | Example-problem pairs |
| **Science** | Integrated labels reduce split-attention | Labeled diagrams |
| **Technical training** | Modality effect robust | Narrated animations |
| **Medical education** | Expertise reversal well-documented | Adaptive instruction |
| **Language learning** | Redundancy effect applies | Avoid redundant captions |

### Criticisms and Limitations

1. **Measurement challenges:** How to objectively measure cognitive load?
2. **Individual differences:** Working memory capacity varies significantly
3. **Motivation ignored:** Purely cognitive; doesn't account for affective factors
4. **Expertise definition:** What counts as "expert" is often unclear
5. **Domain specificity:** Effects vary across different knowledge domains

## Connection to CAMIL and IVR

Cognitive Load Theory is critical for immersive learning design:
- **Sensory overload:** IVR can easily exceed working memory capacity
- **Embodied cognition:** Physical movement adds to cognitive load
- **Presence vs. learning:** High presence doesn't guarantee low extraneous load
- **Design principle:** Every immersive element must earn its place

**Evidence:** Research shows poorly designed VR can impair learning despite high engagement

