## The Architecture of Human Cognition

### Working Memory vs. Long-Term Memory

```
COGNITIVE ARCHITECTURE
═══════════════════════════════════════════════════════════════

    ┌─────────────────────┐         ┌─────────────────────┐
    │   WORKING MEMORY    │         │   LONG-TERM MEMORY  │
    │                     │         │                     │
    │  Capacity: Limited  │◄───────►│  Capacity: Unlimited│
    │  (7±2 chunks)       │  Encode │  (schemas)          │
    │                     │         │                     │
    │  Duration: Brief    │  Retrieve│  Duration: Permanent│
    │  (seconds)          │◄────────│  (with retrieval)   │
    │                     │         │                     │
    │  Conscious          │         │  Automated          │
    │  processing         │         │  processing         │
    │                     │         │                     │
    │     [Air/σ]         │         │     [Earth/δγ]      │
    └─────────────────────┘         └─────────────────────┘
             │                                 │
             │         ┌───────────────┐       │
             └────────►│  SCHEMAS      │◄──────┘
                       │               │
                       │ • Organized   │
                       │   knowledge   │
                       │ • Automated   │
                       │   procedures  │
                       │ • Reduce WM   │
                       │   load        │
                       └───────────────┘

    LEARNING = Moving information from WM to LTM as schemas
```

### Schema Theory: The Foundation of CLT

Schemas are cognitive structures that organize knowledge:
- **Novices:** Rely on working memory; process element-by-element
- **Experts:** Rely on schemas; process large chunks automatically

| Feature | Novice | Expert |
|---------|--------|--------|
| Working Memory Load | High | Low |
| Processing | Conscious, effortful | Automatic, fluent |
| Knowledge Organization | Fragmented | Integrated schemas |
| Problem Solving | Means-ends analysis | Pattern recognition |
| Element Interactivity | High burden | Managed through schemas |

## Key Instructional Effects and Principles

### 1. Split-Attention Effect

```
SPLIT-ATTENTION PROBLEM
═══════════════════════════════════════════════════════════════

    POOR DESIGN (High Extraneous Load):
    ┌─────────────────────────────────────┐
    │  [Diagram with labels at bottom]    │
    │                                     │
    │         ┌─────┐                     │
    │         │  A  │                     │
    │         └──┬──┘                     │
    │            │                        │
