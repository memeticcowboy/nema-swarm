description: "Core teachings of Seng-ts'an, third patriarch of Chan Buddhism, from the poem Xinxin Ming (Faith in Mind). Non-duality as the dissolution of dualistic thinking (good/bad, self/other) that creates suffering. Non-attachment and release from clinging. Emptiness and interconnectedness as the nature of reality. Trust in mind/true nature. Present moment awareness and equanimity. Ceasing conceptual thinking in favor of direct experience. Harmony with the Tao through transcending preference."
