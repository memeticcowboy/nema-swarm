## Core Definition

**Flow** is a state of complete absorption in an activity, characterized by intense focus, loss of self-consciousness, and intrinsic enjoyment. First described by Mihaly Csikszentmihalyi in 1975 and elaborated in his 1990 book *Flow: The Psychology of Optimal Experience*, the theory describes how deep engagement emerges when challenge and skill are in perfect balance.

