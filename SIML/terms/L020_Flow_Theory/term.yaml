## The Autotelic Personality

Csikszentmihalyi identified traits of people who frequently experience flow:

```
AUTOTELIC PERSONALITY TRAITS
├── Curiosity and interest in life
├── Persistence despite difficulty
├── Low self-centeredness
├── Capacity to be absorbed
├── Intrinsic motivation
└── Ability to transform constraints into opportunities
```

These individuals can enter flow states more easily because they:
- Seek out challenges that stretch their skills
- Focus attention on the present moment
- Find enjoyment in the process, not just outcomes
- Transform routine activities into opportunities for flow

