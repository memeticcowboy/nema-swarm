## Key Principles of Cognitive Flexibility Theory

### 1. Avoid Oversimplification

```
THE OVERSIMPLIFICATION TRAP

Well-Intentioned Error:
"We'll teach the basics first, then add complexity"

Problem:
┌─────────────────────────────────────────────────────┐
│                                                     │
│  Simplified Version          Real-World Complexity  │
│  ┌─────────────┐             ┌─────────────────┐    │
│  │ Linear      │             │ Web of          │    │
│  │ A → B → C   │    vs.      │ interconnected  │    │
│  │             │             │ factors         │    │
│  └─────────────┘             └─────────────────┘    │
│                                                     │
│  Learners develop rigid schemas that must be        │
│  UNLEARNED before advanced understanding            │
│                                                     │
└─────────────────────────────────────────────────────┘

CFT Alternative:
Teach complexity from the beginning using
structured approaches that honor domain complexity
```

### 2. Embrace Multiple Representations

```
MULTIPLE REPRESENTATIONS OF THE SAME CONCEPT

Concept: "Democracy"

Representation 1: Mechanical
└── Democracy as machine (checks and balances, institutional design)

Representation 2: Organic
└── Democracy as living system (adaptation, evolution, health)

Representation 3: Conversational
└── Democracy as dialogue (deliberation, public reason, disagreement)

Representation 4: Conflictual
└── Democracy as struggle (power, contestation, inclusion/exclusion)

Representation 5: Performative
└── Democracy as practice (habits, rituals, everyday enactment)

Each representation captures different truths.
No single representation is sufficient.
Together they enable flexible understanding.
```

### 3. The Criss-Crossing Landscape

```
CRISS-CROSSING THE CONCEPTUAL LANDSCAPE

Traditional Linear Approach:
┌─────┐    ┌─────┐    ┌─────┐    ┌─────┐
│ Ch1 │───►│ Ch2 │───►│ Ch3 │───►│ Ch4 │
└─────┘    └─────┘    └─────┘    └─────┘

CFT Criss-Crossing Approach:
         ┌─────┐
         │CaseA│◄────────┐
         └──┬──┘         │
            │            │
    ┌───────┼───────┐    │
    ▼       ▼       ▼    │
┌─────┐  ┌─────┐  ┌─────┐│
│Con1 │  │Con2 │  │Con3 ││
└──┬──┘  └──┬──┘  └──┬──┘│
   │        │        │   │
   └────────┼────────┘   │
            ▼            │
         ┌─────┐         │
         │CaseB│─────────┘
         └──┬──┘
            │
    ┌───────┼───────┐
    ▼       ▼       ▼
┌─────┐  ┌─────┐  ┌─────┐
│Con1 │  │Con2 │  │Con3 │  (revisited)
└─────┘  └─────┘  └─────┘

Concepts revisited from different angles
Cases examined through multiple conceptual lenses
Non-linear traversal of knowledge domain
```

## The Role of Cases in CFT

### Case Diversity Dimensions

```
CASE DIVERSITY SPECTRUM

┌─────────────────────────────────────────────────────────┐
│  DIMENSION 1: Surface Similarity                        │
│  ═══════════════════════════════                        │
│  Cases that look different but share deep structure     │
│  vs. cases that look similar but have different         │
│  underlying patterns                                    │
│                                                         │
│  Example: Two medical cases with similar symptoms       │
│  but different etiologies                               │
└─────────────────────────────────────────────────────────┘

┌─────────────────────────────────────────────────────────┐
│  DIMENSION 2: Complexity Gradient                       │
│  ═══════════════════════════════                        │
│  Cases ranging from simpler to more complex             │
│  instances of the same concept                          │
│                                                         │
│  Example: Ethical dilemmas from clear-cut to            │
│  genuinely ambiguous                                    │
└─────────────────────────────────────────────────────────┘

┌─────────────────────────────────────────────────────────┐
│  DIMENSION 3: Contextual Variation                      │
│  ═══════════════════════════════                        │
│  Cases drawn from different contexts, cultures,         │
│  historical periods, or situational constraints         │
│                                                         │
│  Example: Democratic transitions in different           │
│  countries and eras                                     │
└─────────────────────────────────────────────────────────┘

┌─────────────────────────────────────────────────────────┐
│  DIMENSION 4: Perspective Diversity                     │
│  ═══════════════════════════════                        │
│  Cases examined from multiple stakeholder               │
│  perspectives or theoretical frameworks                 │
│                                                         │
│  Example: A policy issue viewed through economic,       │
│  social, environmental, and political lenses            │
└─────────────────────────────────────────────────────────┘
```

## Elemental Pattern Analysis

### Wood/β Dominance

Cognitive Flexibility Theory is fundamentally a **Wood theory**:
- **Generative Exploration:** Multiple representations create branching pathways
- **Schema Assembly:** Knowledge components recombine in novel configurations
- **Case Diversity:** Wide exploration of the conceptual landscape
- **Criss-Crossing:** Non-linear traversal enables flexible connections
- **Possibility Space:** Embracing complexity rather than simplifying

