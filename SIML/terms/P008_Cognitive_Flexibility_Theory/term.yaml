## Core Definition

**Cognitive Flexibility Theory (CFT)** addresses the challenge of learning complex, ill-structured knowledge domains — areas where simple rules and single perspectives are insufficient. Developed by **Rand Spiro, Paul Feltovich, and Richard Coulson** (1988), the theory argues that advanced knowledge acquisition requires exposure to multiple representations, diverse cases, and the ability to reassemble knowledge components in context-sensitive ways.

### The Problem: Cognitive Rigidity

```
COGNITIVE RIGIDITY IN COMPLEX DOMAINS

Simple Domain                    Complex Domain
┌─────────────────┐              ┌─────────────────────────┐
│ • Well-defined  │              │ • Ill-defined           │
│ • Single answer │              │ • Multiple valid        │
│ • Clear rules   │              │   perspectives          │
│ • Linear path   │              │ • Context-dependent     │
│ • Novice →      │              │ • Interconnected        │
│   Expert        │              │ • Novice → Advanced     │
│                 │              │   Beginner → Expert     │
└─────────────────┘              └─────────────────────────┘

Traditional instruction works    Traditional instruction fails
for simple domains               for complex domains

Examples of ill-structured domains:
• Medicine (diagnosis and treatment)
• History (interpretation and causation)
• Literature (textual analysis)
• Ethics (moral reasoning)
• Architecture (design problems)
• Business strategy
```

