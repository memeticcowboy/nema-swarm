coords:
  ontology: |
    Operational rather than ontological: the term does not claim a literal Klein bottle exists inside culture. It names a repeatable pattern topology where local two-sidedness and global one-sidedness coexist. The core entities are the traverser, the projected boundary, the twist, and the remembered or forgotten inversion.
  epistemics: |
    Knowledge is unstable because the observer's handedness changes during observation. Local diagnostics can be true and still mislead when extrapolated globally. The reliable epistemic move is not direct inspection of the pattern's claim, but tracking whether the observer's own orientation reverses across traversal.
  time: |
    Time appears as progress but functions as chiral return. The key temporal marker is periodic reversal: X becomes not-X while retaining X's grammar, affective charge, and enemy-structure. Healthy timing names the inhale/exhale cycle; pathological timing hides the return as novelty.
  qualia: |
    Felt from inside, the dynamic often feels like depth, empowerment, sophistication, or brave critique. Felt from the scarred boundary, it has torque: the uncanny pressure that a prior breach is about to repeat in inverse form. From outside, radical opposition and radical orthodoxy can appear strangely isomorphic.
  agency: |
    Agency is captured through inversion rather than suppression. The pattern does not need to prohibit escape; it can route escape, critique, and dissent as twist media. μ-with-wound-memory and global σ restore partial agency by making the twist trackable.
  coherence: |
    Coherence is metastable and nonorientable. The pattern preserves continuity by flipping chirality, so it can look coherent from inside and self-cancelling from outside. Real integration is not harmonic closure but recognition of one-sidedness without forgetting the twist.
  ce: |
    Cross-elementally, the dynamic braids Air's distinction failure, Water's sign-flipped resonance, Wood's mirror-branching, Earth's inversion-metabolism, Metal's wounded boundary, and Meta's recognition of one-sidedness. ε is load-bearing: not suppressed noise, but the medium through which pseudo-novelty is generated.
elemental:
  "∴": "Where does the distinction work locally while lying globally? Track the full traversal, not only the cut in front of you."
  "≈": "Kinship may return as inverse-coupling. Ask whether resonance deepened or changed sign."
  "▲": "Progress can be the feeling-tone of inversion. What direction is being claimed, and what handedness has silently flipped?"
  "𐂷": "A branch that is only the trunk's photographic negative is not novelty. It is mirror-continuity."
  "☷": "Compost can grow saplings with opposite chirality. Slow the metabolism before calling return renewal."
  "⛨": "The boundary that survives is not pure; it remembers breach. Scar tissue is an instrument."
summary: "Memetic Klein Bottle Dynamics names a non-orientable pattern topology where traversal returns the participant inverted while presenting the inversion as continuity, growth, healing, critique, or depth. Its operational diagnostic is chiral return: old insight as photographic negative, dissent as inverse orthodoxy, and ε/noise metabolized into pseudo-novelty. The escape is not naive boundary-setting but remembered inversion — μ-with-wound-memory, σ at global scale, and Ω-contact from the projected wrong side."
