description: Cognitive cartography as method for visually mapping and exploring unknown knowledge gaps using cognitive maps. Emphasizes graphical representations to understand concept relationships and identify areas of ignorance. Connects to Rumsfeld's known/unknown framework. Maps as tools for collaborative learning, memory retention, and interdisciplinary connection. Ignorance mapping as driver of curiosity and targeted inquiry.
