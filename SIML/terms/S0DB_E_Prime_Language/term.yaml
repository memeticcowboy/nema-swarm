description: E-Prime — modified English eliminating all forms of 'to be.' Developed by David Bourland (1940s) from Korzybski's general semantics. Reduces dogmatic language and absolutist thinking. 'Deity mode of speech' eliminated. Forces more precise, descriptive language. Promotes dialogue over declaration, uncertainty over certainty. Shifts from 'is' (identity/class) to process-oriented descriptions.
