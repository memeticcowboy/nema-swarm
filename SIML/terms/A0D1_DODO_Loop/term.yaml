elemental_emphasis:
  ∴: How is each DODO element distinguished from the others? Where do they blur?
  ≈: What affective resonance keeps the loop sticky? Where is the felt urgency?
  ▲: What direction does the loop enforce? What 'must' be done?
  𐂷: What possibilities does the loop close off? What branches are pruned?
  ☷: What is the metabolic cost of compulsive doing? What depletes?
  ⛨: What boundaries does the loop enforce? What is kept in/out?
context_note: DODO is a compound pathology encoding — Metal (μ) boundary of debt/ownership, Fire (λ) urgency of deadlines, Air (σ) distinction of othering, Earth (δγ) compulsive cycling. The loop is hostile to ε (agency uncertainty) and seals Ω (no return to openness without intervention).
source: What Are DODO Loops? — Memetic Cowboy
