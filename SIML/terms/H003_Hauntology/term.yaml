author: Bert, the Memetic Cowboy

etymology: >
  Coined by Jacques Derrida in Specters of Marx (1993), from French "hantise" 
  (obsession, haunting) combined with "ontology" (the study of being). The term 
  refers to the spectral presence of non-being within being—the way the past 
  persists as virtual presence, neither fully present nor fully absent. 
  Cultural theorist Mark Fisher expanded the concept to diagnose capitalist 
  realism's "cancellation of the future"—retro-culture as mourning for 
  unlived potentials.

definition: >
  The condition of failed metabolic cycling (δγ) where the release phase (δ) 
  stalls without regeneration (γ). The "ghost" is pattern that hasn't been 
  excreted—ε-noise that wasn't released or reintegrated, now clogging the 
  field as virtual presence. Hauntology is the pathology of temporal 
  stagnation: the past that couldn't become fertility, so it haunts as 
  undead residue. Where traditional nostalgia mourns what was lost, 
  hauntology mourns what was never allowed to be—the futures preemptively 
  closed, the β-branching (generative exploration) that was foreclosed 
  before it could unfold.

