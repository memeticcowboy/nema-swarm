## Core Insight

> Self-Determination Theory reveals that **motivation is not a quantity but a quality**. The same behavior can be driven by external pressure or internal volition, with profoundly different consequences for persistence, creativity, and well-being. Humans are not passive recipients of external forces but active organisms oriented toward growth, requiring three psychological nutrients—autonomy, competence, and relatedness—to flourish.

## One-Sentence Insight

> Deci and Ryan's Self-Determination Theory demonstrates that human flourishing depends on satisfying three universal psychological needs—autonomy (volition), competence (mastery), and relatedness (connection)—and that the quality of motivation (autonomous vs. controlled) matters more than its quantity for optimal learning, performance, and well-being.

## Three-Bullet Expansion

- **What:** A comprehensive theory of human motivation distinguishing autonomous (self-endorsed) from controlled (pressured) motivation, positing three universal psychological needs (autonomy, competence, relatedness) that must be satisfied for optimal functioning
- **How it works:** Social contexts can support or thwart basic needs → need satisfaction promotes intrinsic motivation and integration → autonomous motivation leads to persistence, creativity, deep learning, and well-being → controlled motivation leads to compliance, defensiveness, and fragmentation
- **Where it aims:** Toward understanding how to design environments (educational, organizational, familial, clinical) that nurture human potential by supporting basic psychological needs, enabling people to act from authentic volition rather than external or internal pressure

