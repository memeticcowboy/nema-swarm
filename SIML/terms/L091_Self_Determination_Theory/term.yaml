## Core Definition

**Self-Determination Theory (SDT)**, developed by Edward Deci and Richard Ryan, is a comprehensive framework for understanding human motivation and personality. Unlike theories that treat motivation as a unitary quantity (more/less), SDT distinguishes between **autonomous motivation** (acting with a sense of volition and self-endorsement) and **controlled motivation** (acting under pressure or coercion).

The theory posits three **universal psychological needs** that must be satisfied for optimal functioning:
1. **Autonomy** — The need to experience behavior as self-endorsed and volitional
2. **Competence** — The need to feel effective and capable in one's activities
3. **Relatedness** — The need to feel connected to and cared for by others

When these needs are satisfied, people experience vitality, self-concordance, and well-being. When thwarted, they experience fragmentation, defensiveness, and ill-being.

