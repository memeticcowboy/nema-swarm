## Elemental Pattern Analysis

### Fire/λ Dominance (Primary)

Self-Determination Theory is fundamentally about **directional purpose and volition**:
- **Direction:** Motivation has a trajectory from external to internal
- **Purpose:** Autonomous goals align with authentic values
- **Transformation:** Controlled motivation can become autonomous through internalization
- **Aspiration:** Humans naturally move toward growth and self-actualization

### Water/ρ as Secondary (Resonance/Connection)

Relatedness provides the social foundation:
- **Resonance:** Feeling understood and cared for enables authentic expression
- **Flow:** Social connection supports intrinsic motivation
- **Coupling:** Secure relationships allow autonomy to flourish
- **Vicariousness:** Internalization occurs through connection to significant others

### Metal/μ as Tertiary (Structure/Mastery)

Competence provides the structural scaffold:
- **Structure:** Clear goals and feedback support competence development
- **Containment:** Optimal challenges stretch without overwhelming
- **Valuation:** Progress is measurable and meaningful
- **Exchange:** Skills can be developed and demonstrated

### Earth/δγ as Supporting (Cycling/Growth)

The developmental dimension:
- **Accumulation:** Competence builds over time through practice
- **Cycling:** Motivation fluctuates but trends toward integration
- **Grounding:** Need satisfaction provides stable foundation for growth
- **Rhythm:** Internalization occurs in stages, not all at once

### Air/σ as Supporting (Distinction/Clarity)

The cognitive dimension:
- **Distinction:** Distinguishing autonomous from controlled motivation
- **Clarity:** Understanding one's own values and interests
- **Negotiation:** Balancing personal needs with social demands

