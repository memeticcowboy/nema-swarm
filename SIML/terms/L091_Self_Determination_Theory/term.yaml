## Connection to Other Theories

### SDT vs. Behaviorism

| Aspect | Behaviorism | Self-Determination Theory |
|--------|-------------|---------------------------|
| **View of motivation** | Unitary (more/less) | Multidimensional (type matters) |
| **Role of rewards** | Increase motivation | Can undermine intrinsic motivation |
| **Human nature** | Blank slate | Growth-oriented, needs-based |
| **Focus** | External control | Internal volition |
| **Element** | Metal/μ (external structure) | Fire/λ (autonomous direction) |

### SDT vs. Humanistic Psychology

| Aspect | Humanistic (Maslow, Rogers) | Self-Determination Theory |
|--------|------------------------------|---------------------------|
| **Needs** | Hierarchy (deficiency → growth) | Three basic needs (always active) |
| **Empirical basis** | Philosophical/clinical | Extensive research program |
| **Measurement** | Qualitative | Quantitative scales and experiments |
| **Focus** | Self-actualization | Need satisfaction and motivation |
| **Element** | Fire/λ (growth) | Fire/λ + Water/ρ + Metal/μ |

### SDT and Flow Theory

Both theories address optimal experience:
- **SDT:** Need satisfaction → intrinsic motivation → well-being
- **Flow:** Challenge-skill balance → absorption → optimal performance
- **Connection:** Autonomy and competence support flow; flow experiences satisfy needs

## Research Findings

### Key Empirical Results

1. **Intrinsic motivation undermining:** Expected tangible rewards decrease intrinsic interest
2. **Autonomy support predicts:** Better learning, persistence, creativity, well-being
3. **Cross-cultural validity:** Basic needs appear universal (though expression varies)
4. **Goal contents:** Intrinsic goals (growth, connection) > extrinsic goals (wealth, image)
5. **Mindfulness:** Present-moment awareness supports autonomy and need satisfaction

