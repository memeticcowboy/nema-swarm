## Criticisms and Limitations

1. **Western bias concerns:** Some argue autonomy is culturally specific
   - *Response:* SDT distinguishes autonomy (volition) from independence (not needing others)
   
2. **Need for more needs?** Some propose additional needs (e.g., meaning, security)
   - *Response:* Three needs are necessary but not sufficient for all outcomes
   
3. **Measurement challenges:** Self-report of motivation types can be difficult
   
4. **Intervention complexity:** Supporting all three needs simultaneously is demanding

## Connection to CAMIL and IVR

Self-Determination Theory has strong implications for immersive learning:
- **Autonomy in IVR:** Choice of paths, exploration freedom, agency in virtual worlds
- **Competence in IVR:** Progressive challenge, skill feedback, mastery experiences
- **Relatedness in IVR:** Social presence, collaborative VR, AI companions
- **Intrinsic motivation:** IVR's novelty and immersion can spark inherent interest

