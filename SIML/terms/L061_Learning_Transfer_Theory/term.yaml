## Perkins & Salomon's Dual Mechanisms

### Low-Road Transfer

```
LOW-ROAD TRANSFER MECHANISM

Context A                    Context B
Learning                     Application
    │                            │
    ▼                            ▼
┌─────────┐                ┌─────────┐
│ Practice│ ──automatic──→ │ Spontaneous│
│ Practice│    transfer    │ application│
│ Practice│                │            │
│ Practice│                │            │
└─────────┘                └─────────┘
     │                            │
   Element: Earth/δγ          Element: Earth/δγ
   (habit formation)          (habit activation)

Mechanism: Extensive practice creates automatized skills
that trigger when similar contextual cues appear.
```

### High-Road Transfer

```
HIGH-ROAD TRANSFER MECHANISM

Context A                    Context B
Learning                     Application
    │                            │
    ▼                            ▼
┌─────────┐                ┌─────────┐
│ Abstract│ ──mindful────→ │ Intentional│
│ General │    search      │ application│
│ Principle│               │            │
│ Extraction│              │            │
└─────────┘                └─────────┘
     │                            │
   Element: Air/σ             Element: Fire/λ
   (abstraction)               (intentional direction)

Mechanism: Mindful abstraction of general principles
enables deliberate search for application opportunities.
```

## Elemental Pattern Analysis

### Water/ρ Dominance (Resonance/Connection)

Learning Transfer is fundamentally a **Water theory**:

**Water/ρ (Resonance/Connection):**
- **Analogical mapping:** Finding similarities between contexts
- **Relational correspondence:** "This is like that"
- **Bridge formation:** Connecting source and target
- **Context resonance:** Feeling when knowledge applies

**Wood/β (Growth/Exploration):**
- **Knowledge extension:** Stretching understanding to new domains
- **Generative application:** Creating novel solutions
- **Exploration:** Testing boundaries of what applies where

**Air/σ (Distinction/Clarity):**
- **Abstraction:** Extracting general principles from specifics
- **Discrimination:** Knowing when transfer applies vs. when it doesn't
- **Surface vs. deep structure:** Distinguishing irrelevant from relevant similarities

**Metal/μ (Structure/Boundary):**
- **Schema extraction:** Structured knowledge organization
- **Domain boundaries:** Understanding where knowledge applies
- **Systematic abstraction:** Formal principle identification

### The Transfer Elements Matrix

| Transfer Type | Primary Element | Secondary | Mechanism |
|---------------|-----------------|-----------|-----------|
| **Near Transfer** | μ (Metal) | δγ (Earth) | Structural similarity, automaticity |
| **Far Transfer** | ✶ (Child) | β (Wood) | Creative synthesis, exploration |
| **Low-Road** | δγ (Earth) | μ (Metal) | Habit, practice, cycling |
| **High-Road** | σ (Air) | λ (Fire) | Abstraction, intentional search |
| **Positive** | β (Wood) | ρ (Water) | Growth, connection |
| **Negative** | σ (Air) | μ (Metal) | Interference, rigid structure |

