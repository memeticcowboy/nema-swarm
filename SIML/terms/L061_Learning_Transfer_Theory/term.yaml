### Positive vs. Negative Transfer

| Type | Definition | Example | Element |
|------|------------|---------|---------|
| **Positive** | Prior learning aids new learning | Piano skills help organ playing | β (Wood) |
| **Negative** | Prior learning interferes with new learning | Driving on left interferes with right-side driving | σ (Air) |
| **Zero** | No measurable effect | Latin study on math ability | — |

