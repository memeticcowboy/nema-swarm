## Core Definition

**Learning Transfer** refers to the application of knowledge, skills, or attitudes learned in one context to a different context. First studied systematically by Edward Thorndike in 1901, transfer theory examines when, why, and how learning travels across situations — from school to work, from one problem to another, from theory to practice.

