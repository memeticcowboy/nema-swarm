## The Cognitive Flexibility Hypertext

CFT pioneered hypertext learning environments:

```
CRISS-CROSSING THE CONCEPTUAL LANDSCAPE

                    Concept A
                   /    |    \
                  /     |     \
            Case 1    Case 2   Case 3
            /    \    /    \   /    \
           /      \  /      \ /      \
      Concept B ───── Concept C ───── Concept D
           \      /  \      / \      /
            \    /    \    /   \    /
            Case 4    Case 5   Case 6
                  \    |    /
                   \   |   /
                   Concept E

LEARNER PATHS (non-linear):
• Path 1: Case 1 → Concept A → Case 2 → Concept C → Case 5
• Path 2: Concept B → Case 1 → Concept A → Case 3 → Concept D
• Path 3: Case 4 → Concept B → Concept C → Case 5 → Concept E

Each path constructs different understanding.
No single path is sufficient.
All paths together build flexible knowledge.
```

## Key Instructional Principles

| Principle | Mechanism | Element | Implementation |
|-----------|-----------|---------|----------------|
| **Multiple Representations** | Same concept, different forms | Air/σ | Text, diagram, case, simulation |
| **Case Variation** | Diverse examples, not prototypes | Wood/β | Wide range of cases, edge cases included |
| **Criss-Crossing** | Non-linear traversal | Wood/β | Learner-chosen paths through hypertext |
| **Schema Revision** | Restructuring understanding | Water/ρ | Confronting conceptual contradictions |
| **Knowledge Web** | Interconnected concepts | Water/ρ | Concept maps, semantic networks |
| **Adaptive Application** | Context-sensitive use | Fire/λ | Applying knowledge to novel situations |

## The Re-representation Process

```
SCHEMA REVISION THROUGH RE-REPRESENTATION

Initial Understanding (Simplified)
┌─────────────────────────────────────────┐
│  Concept X = Definition Y               │
│  (single, stable meaning)               │
└─────────────────┬───────────────────────┘
                  │
                  ▼ Encounter Case 1
┌─────────────────────────────────────────┐
│  Concept X in Context A                 │
│  → Slight modification needed           │
└─────────────────┬───────────────────────┘
                  │
                  ▼ Encounter Case 2
┌─────────────────────────────────────────┐
│  Concept X in Context B                 │
│  → Different emphasis required          │
│  → Conflict with Context A understanding│
└─────────────────┬───────────────────────┘
                  │
                  ▼ Schema Revision
┌─────────────────────────────────────────┐
│  Concept X = {Context A: Xa,            │
│              Context B: Xb,             │
│              ...}                       │
│  (flexible, context-sensitive meaning)  │
└─────────────────────────────────────────┘

Element: Water/ρ (flow, adaptation)
Element: Air/σ (distinction between contexts)
```

## Elemental Pattern Analysis

### Wood/β Dominance (Exploration/Branching)

CFT is fundamentally a **Wood theory**:

**Wood/β (Exploration/Branching):**
- **Case variation:** Multiple branches of examples
- **Criss-crossing:** Non-linear exploration paths
- **Hypertext structure:** Tree-like knowledge organization
- **Generative growth:** Each case generates new connections

**Air/σ (Distinction/Clarity):**
- **Multiple representations:** Distinguishing different forms
- **Context discrimination:** Recognizing situational differences
- **Conceptual boundaries:** Flexible but present

**Water/ρ (Resonance/Flow):**
- **Knowledge webs:** Interconnected conceptual networks
- **Schema revision:** Fluid restructuring of understanding
- **Transfer:** Flow of knowledge across contexts

**Fire/λ (Direction/Purpose):**
- **Adaptive application:** Purposeful use in new situations
- **Expertise development:** Direction toward mastery

**Child/✶ (Integration/Harmony):**
- **Flexible expertise:** Integration of multiple perspectives
- **Adaptive competence:** Holistic application

