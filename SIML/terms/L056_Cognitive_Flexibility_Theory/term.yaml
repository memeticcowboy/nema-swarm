## Connection to Related Theories

### Cognitive Flexibility vs. Cognitive Load Theory

| Aspect | Cognitive Load Theory | Cognitive Flexibility Theory |
|--------|----------------------|------------------------------|
| **Domain type** | Well-structured | Ill-structured |
| **Learner level** | Novice | Advanced |
| **Structure** | Reduce complexity | Embrace complexity |
| **Path** | Linear, guided | Non-linear, exploratory |
| **Element** | Air/σ (clarity) | Wood/β (complexity) |
| **Relationship** | CLT for beginners, CFT for experts |

### Cognitive Flexibility vs. Constructivism

| Aspect | Constructivism | Cognitive Flexibility |
|--------|---------------|----------------------|
| **Focus** | Knowledge construction | Representation flexibility |
| **Mechanism** | Active engagement | Multiple perspectives |
| **Element** | Wood/β (generative) | Wood/β + Air/σ (branching + distinction) |
| **Relationship** | CFT is a specific constructivist approach |

