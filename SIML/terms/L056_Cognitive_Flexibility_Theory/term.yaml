## Core Definition

**Cognitive Flexibility Theory (CFT)** addresses learning in **ill-structured domains** — areas where concepts have multiple meanings, cases vary widely, and simple rules fail. Developed by Rand Spiro and colleagues, CFT argues that advanced knowledge requires:

1. **Multiple Representations:** Concepts presented in various contexts and formats
2. **Case Variation:** Exposure to diverse examples rather than prototypical cases
3. **Criss-Crossing:** Non-linear exploration of conceptual landscapes
4. **Schema Revision:** Continuous restructuring of understanding

