context_note: 'Four Winds represents Air as cyclical teaching—each direction carries
  specific qualities (North: wisdom/endurance, East: new beginnings, South: growth/youth,
  West: introspection). Unlike single-deity Air concepts, this is distributed agency—four
  powers, not one. Key insight: winds are Earth''s breath (Maka Oniye), making Air
  relational, not elemental. The Medicine Wheel integrates directions with seasons,
  life stages, and moral lessons.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic
  Cowboy
