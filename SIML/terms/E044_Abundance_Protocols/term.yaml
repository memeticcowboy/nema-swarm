coords:
  ontology: "The domain is structured by a fundamental ontological dualism: food exists simultaneously as commodity and necessity, yet the market ontology recognizes only the former, rendering surplus invisible as surplus and visible only as waste. Core entities include the Actor (farmer, agribusiness, cooperative, local government), the Protocol (abundance pathway conditional on surplus detection), the Signal (price, satellite imagery, scarcity metric), and the Boundary (contract, debt, regulatory fence, market threshold). The ontology is layered: beneath the market layer lies a suppressed abundance layer where surplus rots, and emerging parallel layers (digital vouchers, community currencies, cosmo-local hubs) operate as shadow infrastructures that do not replace but coexist with the primary market layer. Waste is reclassified as misplaced abundance; scarcity is reclassified as distribution failure rather than production failure."
  epistemics: "Knowledge formation is split between two epistemic regimes. The dominant regime treats price as truth: if market price falls below collection cost, the food 'does not exist' as viable knowledge-object. The counter-regime uses satellite imagery and surplus-detection algorithms to reveal what market epistemics conceals—abundance that the price signal cannot register. Farmers know through contractual obligation; cooperatives know through mutual observation; local governments know through governance friction. The abundance protocol itself functions as a distributed epistemic engine: it senses, validates, and routes surplus through non-market pathways. Epistemic authority is contested between financial accounting (scarcity-validating) and experiential/observational knowing (abundance-revealing). Trust replaces price as the validation mechanism in parallel pathways."
  time: "Multiple temporalities collide. Agricultural time is cyclical and seasonal, producing predictable surplus windows. Market time is instantaneous and arbitrage-driven, declaring surplus worthless in a single price tick. Contractual and debt time binds farmers into long-term path dependencies, making them hostages to past commitments during present abundance. The abundance protocol introduces event-driven time: it activates when surplus is detected, creating a temporary parallel economy that exists only during the mismatch between market valuation and human need. The deeper challenge is not the acute harvest moment but the slow time of re-architecting incentives, governance, and trust—an infrastructural temporality that spans political cycles and growing seasons."
  qualia: "The felt texture of the domain is one of cognitive dissonance: the visceral wrongness of watching food rot while people hunger, a somatic knowledge that market rationality cannot metabolize. For farmers, there is constrained dread—the felt trap of contracts, debt, and financial rationality that makes harvesting feel like an act of self-harm. For agribusiness, there is the cold qualia of price stability and profit optimization. For mutual-aid participants, there is urgent hope mixed with regulatory friction—the felt resistance of liability laws and food-safety rules. The abundance protocol offers a qualia of relief: necessity met through non-market flow, the taste of food that bypassed the commodity layer, the warmth of cosmo-local coordination against the chill of market abandonment."
  agency: "Agency is asymmetrically distributed and heavily constrained. Farmers possess biological agency (they grow the food) but lack economic agency (debt, contracts, and infrastructure lock-in bind them). Agribusiness wields concentrated logistical and financial agency, controlling the chokepoints of storage and distribution. Cooperatives and mutual-aid networks exercise collective agency, pooling small individual capacities into mobilization capacity. Local governments hold mediating agency, caught between enabling abundance flows and preserving agricultural finance stability. The abundance protocol itself functions as a distributed, conditional agent: it senses surplus and autonomously triggers routing pathways. Digital vouchers and community currencies act as agency-amplification mechanisms, allowing recipients to act as economic agents without scarce fiat currency."
  coherence: "The system coheres around two competing attractors. The market attractor coheres through price signals, debt structures, and centralized logistics—stable but blind to human need. The abundance attractor coheres through trust, shared purpose, and protocol-mediated coordination—responsive but fragile. The central tension is that activating abundance pathways risks destabilizing agricultural finance, threatening the market attractor. Coherence is maintained not by choosing one attractor but by engineering parallel coherence: abundance protocols create bridges that allow surplus to flow without collapsing the financial structures that farmers depend on. Governance, incentive re-architecture, and cosmo-local processing hubs function as coherence-preserving infrastructure, translating between the two attractors without forcing systemic collapse."
  ce: "Emergent properties arise from the gap between market failure and human need. Cosmo-local processing hubs emerge as novel infrastructure, neither fully centralized nor fully decentralized, activating only when surplus is detected. Community currencies and digital vouchers emerge as alternative value-forms, bootstrapped from the negative space of market abandonment. The coalition of cooperatives, mutual-aid networks, and local governments functions as a superorganism—a distributed actor capable of sensing abundance and routing necessity outside market logic. The most significant emergence is a phase shift in the economic attractor: from scarcity-as-default to abundance-as-conditionally-routable. This is not merely redistribution but the emergence of a parallel economic grammar where value is redefined around flow and resilience rather than price and hoarding."
elemental:
  "∴": "The market names a tomato a commodity, and so the tomato rots. The protocol names it nourishment, and so it travels. What you call it determines whether it lives or dies in the field."
  "≈": "Surplus breathes toward scarcity like water finding its level. The parallel pathway is not a revolution but a tributary—quiet, persistent, carving new channels while the old river chokes on its own abundance."
  "▲": "Someone must strike the match. The voucher, the currency, the hub—each is a spark against the inertia of financial rationality. Let the fields burn with harvest, not with waste."
  "𐂷": "This is bread. This is the body of the land offered to the body of the people. Do not speak to me of futures and margins when grain is splitting its husk in the sun."
  "☷": "Contracts are walls. Debt is a roof that keeps the rain out and the farmer in. The abundance protocol does not demolish the house; it builds a door."
  "⛨": "To eat is sacred. To feed another when the market says 'let them hunger' is a prayer against the false god of price. The protocol is sanctuary; the table is altar."
summary: "Satellite imagery reveals regions where food rots in fields because market prices have fallen below the cost of collection, exposing a structural paradox: the market treats food as a commodity rather than a necessity, leading to systemic waste amid human need. Farmers remain locked in by contracts, debt, and infrastructure designed for centralized processing, while regulatory and power asymmetries prevent rapid community mobilization. In response, a coalition of cooperatives, mutual-aid networks, and local governments experiments with 'abundance protocols'—digital vouchers, community currencies, and cosmo-local processing hubs that create parallel pathways for moving surplus food when conventional markets fail. The core challenge shifts from mere harvesting to re-architecting incentives, governance, and trust so that abundance can flow without destabilizing agricultural finance."
