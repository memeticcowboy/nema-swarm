Sacks' mechanisms are **elemental operations in discourse time**:
- Turn-taking = Metal (Ој) boundary enforcement
- Adjacency pairs = Metal (Ој) structural regulation
- Repair = Metal (Ој) boundary maintenance + Earth (ОґОі) integration

