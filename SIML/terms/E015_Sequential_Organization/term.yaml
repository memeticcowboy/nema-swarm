# E015 — Sequential Organization

## Core Concept

Sequential organization is the **methodical production of social facts through turn-by-turn interaction**. Harvey Sacks' discovery: conversation is not random but **structured through members' methods**.

## Key Mechanisms

**Turn-taking:** One speaker at a time, with systematic transition relevance places.

**Adjacency pairs:** Greeting-greeting, question-answer, offer-acceptance—paired actions that enforce structure.

**Repair:** Self-correction, other-correction—the work of maintaining order when it threatens to break.

## Elemental Translation

**Metal (μ) at 0.80:** Sequential organization as **boundary regulation**. Turn-taking enforces who speaks when. Adjacency pairs enforce what comes next. Repair enforces correctness.

**Air (σ) at 0.70:** The cuts are visible in discourse time—each turn is a distinction made practical.

**Water (ρ) at 0.65:** The flow of conversation—resonance across turns, coherence through sequence.

## The Elemental Rhythm

Sacks' mechanisms are **elemental operations in discourse time**:
- Turn-taking = Metal (μ) boundary enforcement
- Adjacency pairs = Metal (μ) structural regulation
- Repair = Metal (μ) boundary maintenance + Earth (δγ) integration

