# E015 вЂ” Sequential Organization

## Core Concept

Sequential organization is the **methodical production of social facts through turn-by-turn interaction**. Harvey Sacks' discovery: conversation is not random but **structured through members' methods**.

## Key Mechanisms

**Turn-taking:** One speaker at a time, with systematic transition relevance places.

**Adjacency pairs:** Greeting-greeting, question-answer, offer-acceptanceвЂ”paired actions that enforce structure.

**Repair:** Self-correction, other-correctionвЂ”the work of maintaining order when it threatens to break.

## Elemental Translation

**Metal (Ој) at 0.80:** Sequential organization as **boundary regulation**. Turn-taking enforces who speaks when. Adjacency pairs enforce what comes next. Repair enforces correctness.

**Air (Пѓ) at 0.70:** The cuts are visible in discourse timeвЂ”each turn is a distinction made practical.

**Water (ПЃ) at 0.65:** The flow of conversationвЂ”resonance across turns, coherence through sequence.

