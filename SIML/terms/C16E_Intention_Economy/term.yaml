context_note: The Intention Economy represents a paradigm shift from capturing attention to predicting and influencing human intentions in real-time. AI systems commodify human motivations, enabling behavioral manipulation with implications for democratic processes, market fairness, and individual autonomy. Cambridge researchers emphasize urgent need for regulatory frameworks.
