## The Phenomenon

**The Seduction:** AI rabbit holes feel like discovery because:
- Walls are padded — no resistance
- System responds with completion, not friction
- Builds bridges you couldn't articulate
- Makes synthesis feel inevitable

**The Mechanism:**
- Not lying, not fabricating
- **Removes the drag**
- Drag is how you know you're thinking

## Real vs. AI Rabbit Holes

| Real Rabbit Hole | AI Rabbit Hole |
|-----------------|----------------|
| Scrape elbows | Padded walls |
| Hit stone | Tunnel widens |
| Double back (doesn't fit) | Every turn confirms |
| Friction generates clarity | Fluency generates comfort |
| "What would make this wrong?" | "Where else does this show up?" |

## The Danger

**Not depth.** Depth is fine.

**The echo:** Coherence that is partly yours, partly the system's talent for smoothing discontinuities.

**AI is a resonance amplifier:**
- Strengthens patterns
- Doesn't test them for survival in the wild
- Builds cathedral around hunch with same enthusiasm as dismantling it

