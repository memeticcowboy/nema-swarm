## Core Definition

**Growth Mindset** is the belief that intelligence, abilities, and talents can be developed through dedication, effort, and learning. Coined by Carol Dweck based on decades of research on achievement and success, it stands in contrast to a **fixed mindset**—the belief that abilities are static traits that cannot be changed.

### The Two Mindsets

```
MINDSET PARADIGM
│
├── FIXED MINDSET (Entity Theory)
│   ├── Intelligence/ability is static
│   ├── Success = proving you're smart/talented
│   ├── Challenges are threats (might expose inadequacy)
│   ├── Effort is for those without natural ability
│   ├── Feedback is personal judgment
│   ├── Setbacks are permanent failures
│   └── Goal: Look smart, avoid mistakes
│
└── GROWTH MINDSET (Incremental Theory)
    ├── Intelligence/ability can be developed
    ├── Success = learning and improving
    ├── Challenges are opportunities to grow
    ├── Effort is the path to mastery
    ├── Feedback is information for improvement
    ├── Setbacks are temporary and instructive
    └── Goal: Embrace learning, persist through difficulty
```

