## Mindset in Educational Practice

### Process Praise vs. Person Praise

| Type | Example | Effect |
|------|---------|--------|
| **Person Praise** | "You're so smart!" | Fixed mindset; fear of challenging tasks |
| **Process Praise** | "You worked hard and used good strategies!" | Growth mindset; embrace challenges |

### The Power of "Yet"

```
THE POWER OF "YET"

Fixed statement          →    Growth reframing
─────────────────────────────────────────────────
"I'm not good at math"   →    "I'm not good at math YET"
"I can't do this"        →    "I can't do this YET"
"This doesn't work"      →    "This doesn't work YET"

The word "yet" opens the temporal dimension—
implies possibility, trajectory, becoming.
```

### Classroom Interventions

**Effective growth mindset interventions:**
1. **Brainology:** Interactive program teaching neuroplasticity
2. **Reading + writing:** Articles about brain growth + reflection
3. **Workshop format:** Structured sessions on learning strategies
4. **Embedded practices:** Process praise, "yet" language, challenge framing

