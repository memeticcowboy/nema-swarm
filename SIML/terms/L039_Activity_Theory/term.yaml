### Activity Theory and Situated Learning (L014)

Both emphasize context, but:
- **Situated Learning:** Learning as legitimate peripheral participation in communities of practice
- **Activity Theory:** Learning as transformation through object-oriented activity
- **Integration:** Communities of practice can be analyzed as activity systems

