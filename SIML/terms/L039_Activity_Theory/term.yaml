### Three Levels of Activity (Leontiev)

```
┌─────────────────────────────────────────────────────────────────┐
│                                                                 │
│  LEVEL 1: ACTIVITY (Деятельность)                               │
│  ═══════════════════════════════════                            │
│  • Driven by MOTIVE (motive → object)                           │
│  • Collective, social, historically formed                      │
│  • Element: Fire/λ (direction toward meaningful object)         │
│  • Example: "Getting a university education"                    │
│                                                                 │
│       ↓ Decomposes into                                         │
│                                                                 │
│  LEVEL 2: ACTIONS (Действия)                                    │
│  ═══════════════════════════                                    │
│  • Driven by GOALS (conscious, specific)                        │
│  • Can be individual or collective                              │
│  • Element: Metal/μ (structured, goal-directed)                 │
│  • Example: "Attending lecture," "Writing essay," "Studying"    │
│                                                                 │
│       ↓ Decomposes into                                         │
│                                                                 │
│  LEVEL 3: OPERATIONS (Операции)                                 │
│  ═══════════════════════════════                                │
│  • Driven by CONDITIONS (automatic, unconscious)                │
│  • Context-dependent execution                                  │
│  • Element: Earth/δγ (conditioned, habitual)                    │
│  • Example: "Holding pen," "Turning page," "Typing"             │
│                                                                 │
├─────────────────────────────────────────────────────────────────┤
│                                                                 │
│  THE HIERARCHY IS FLUID:                                        │
│                                                                 │
│  What is an OPERATION in one context...                         │
│       ↓                                                         │
│  ...can become an ACTION when conditions change                 │
│       ↓                                                         │
│  ...can become ACTIVITY when given new social meaning           │
│                                                                 │
│  Example: Typing                                                │
│  • Operation: For skilled typist (automatic)                    │
│  • Action: For learner (conscious attention to keys)            │
│  • Activity: For typing instructor (motive: teaching others)    │
│                                                                 │
└─────────────────────────────────────────────────────────────────┘
```

### Mediation: The Core Mechanism

```
MEDIATION TRIANGLE (Vygotsky's Original Insight)

          Subject ◄─────────────────────► Object
              \                           /
               \                         /
                \                       /
                 \    MEDIATING        /
                  \   ARTIFACTS       /
                   \   (Tools)        /
                    \                 /
                     ▼               ▼
                ┌─────────────────────┐
                │  • Physical tools   │
                │  • Signs/symbols    │
                │  • Language         │
                │  • Cultural schemas │
                └─────────────────────┘

Without mediation: Direct stimulus → Response (animal behavior)
With mediation:   Stimulus → Tool/Sign → Response (human behavior)

The tool transforms both the object AND the subject
```

## Key Concepts

### 1. Object-Orientedness (Fire/λ)

Every activity is oriented toward an **object** that holds motive power:
- The object is not just a thing but a **problem space**
- It carries cultural and historical meaning
- It transforms through activity (raw → processed)
- The object motivates and directs activity

```
OBJECT TRANSFORMATION

Raw Object          Activity Process          Transformed Object
──────────          ────────────────          ──────────────────

Illiterate          Education system          Literate citizen
person                                        (new capabilities)

Raw materials       Manufacturing             Finished product
                                          
Social problem      Collective action         Changed social
                                            conditions

The object is both the target and the catalyst of transformation
```

