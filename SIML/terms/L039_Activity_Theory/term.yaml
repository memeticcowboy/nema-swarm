## Core Definition

**Activity Theory**, developed by Alexei Leontiev (1974) as an extension of Vygotsky's cultural-historical psychology, posits that human cognition and learning cannot be understood in isolation but must be analyzed through **purposeful, tool-mediated social activity**. The basic unit of analysis is not the individual or the stimulus-response pair, but the **activity system** — a collective, object-oriented, historically situated formation.

