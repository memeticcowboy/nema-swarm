### Activity-Centered Design

Principles for designing learning environments:

1. **Identify the object:** What is the meaningful problem learners engage with?
2. **Analyze mediation:** What tools (physical, conceptual, social) are available?
3. **Map the activity system:** Who is the community? What are the rules? How is labor divided?
4. **Find contradictions:** Where are the tensions that can drive development?
5. **Design for expansive learning:** How can learners transcend current practices?

## Critiques and Developments

### Valid Criticisms

1. **Functionalist bias:** Early versions emphasized adaptation over transformation
2. **Underestimation of power:** Insufficient attention to domination and resistance
3. **Complexity:** Difficult to operationalize for empirical research
4. **Cultural specificity:** Rooted in Soviet context; universal applicability questioned
5. **Subjectivity:** Insufficient attention to individual experience within activity

### Post-Vygotskian Developments

- **Cultural-Historical Activity Theory (CHAT):** Emphasizing diversity of voices
- **Actor-Network Theory (ANT) integration:** More symmetrical treatment of human/non-human
- **Critical psychology:** Attention to power, marginalization, resistance

