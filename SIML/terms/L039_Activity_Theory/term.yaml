## Core Insight

> Activity Theory reveals that human cognition is not a property of individual brains but of **activity systems** — collective, tool-mediated, object-oriented formations that stretch across time and space. To understand learning, we must look not at what happens "in the head" but at the transformations occurring through engagement with meaningful objects, mediated by cultural tools, within social communities. The elemental wisdom is clear: we are not isolated thinkers but nodes in networks of activity, and our development occurs through the contradictions and resolutions of collective praxis.

## One-Sentence Insight

> Activity Theory demonstrates that human learning and development must be understood not as individual cognitive acquisition but as transformation occurring through collective, tool-mediated, object-oriented activity systems that carry historical meaning and develop through the resolution of internal contradictions.

## Three-Bullet Expansion

- **What:** A theoretical framework developed by Leontiev extending Vygotsky's work, analyzing human cognition and learning through the lens of collective, tool-mediated, object-oriented activity systems rather than isolated individual behavior
- **How it works:** Subject (individual or group) engages with object (problem/motive) through tools (artifacts, signs, language), within a community, governed by rules and division of labor → activity transforms both object and subject → internalization absorbs social practices into individual cognition → externalization creates new artifacts and practices → contradictions drive system development
- **Where it aims:** Toward expansive learning and human development — understanding how individuals and collectives can transcend existing practices, transform their activity systems, and develop new capabilities through meaningful engagement with their world

