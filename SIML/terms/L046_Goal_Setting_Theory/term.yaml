## Core Insight

> Goal-Setting Theory reveals that the mere act of setting specific, challenging goals is a powerful motivational intervention. Goals work by directing attention, energizing effort, prolonging persistence, and promoting strategy development. The theory demonstrates that **what we aim for determines what we achieve** — and that the characteristics of our goals (specificity, difficulty, commitment) are as important as the goals themselves.

## One-Sentence Insight

> Goal-Setting Theory demonstrates that specific, challenging goals consistently outperform vague or easy goals by directing attention, energizing effort, prolonging persistence, and stimulating strategy development—provided there is goal commitment and feedback.

## Three-Bullet Expansion

- **What:** A comprehensive theory of motivation proposing that specific, challenging goals lead to higher performance than easy goals, vague goals, or no goals, through four mechanisms: directing attention, energizing effort, prolonging persistence, and promoting strategy development
- **How it works:** Goal characteristics (specificity, difficulty) combine with moderating conditions (commitment, feedback, task complexity, self-efficacy) to activate goal mechanisms; these mechanisms transform goal intentions into directed action; performance outcomes feed back to modify self-efficacy and inform future goal-setting
- **Where it aims:** Toward optimal performance through the systematic application of specific, challenging goals with adequate feedback, appropriate task strategies, and strong goal commitment

