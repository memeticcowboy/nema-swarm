|--------|-------------------|---------------------|
| **Focus** | Explaining past outcomes | Directing future behavior |
| **Feedback role** | Shapes attributions | Enables goal progress monitoring |
| **Element** | Air (σ) — explanation | Fire (λ) — direction |
| **Relationship** | Attributions affect goal commitment | Goal progress affects future attributions |

## Practical Applications

### SMART Goals Framework

```
SMART GOALS CRITERIA

S - Specific (σ - Air)
    "What exactly will be accomplished?"
    
M - Measurable (σ - Air)
    "How will we know when it's done?"
    
A - Achievable/Attainable (λ - Fire + ρ - Water)
    "Is this challenging but possible?"
    
R - Relevant (ρ - Water)
    "Does this matter? Is it important?"
    
T - Time-bound (δγ - Earth)
    "When will this be completed?"
```

### Goal-Setting in Education

```
EDUCATIONAL APPLICATIONS

1. LEARNING OBJECTIVES (σ - Air)
   • Specific, observable outcomes
   • "Students will be able to..."
   • Clear success criteria

2. SCAFFOLDED CHALLENGES (λ - Fire + β - Wood)
   • Progressive difficulty
   • Zone of proximal development
   • Build confidence through success

3. FEEDBACK SYSTEMS (σ - Air)
   • Frequent, specific feedback
   • Progress monitoring tools
   • Self-assessment opportunities

4. GOAL COMMITMENT (ρ - Water)
   • Student participation in goal-setting
   • Public goal declaration
   • Connection to personal values

5. STRATEGY INSTRUCTION (μ - Metal)
   • Teach metacognitive strategies
   • Model planning and monitoring
   • Reflect on goal progress
```

