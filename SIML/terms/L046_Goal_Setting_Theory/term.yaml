### Goal-Setting and Self-Determination Theory (L015)

| Aspect | Self-Determination Theory | Goal-Setting Theory |
|--------|--------------------------|---------------------|
| **Core concept** | Basic psychological needs | Goal characteristics |
| **Autonomy** | Need for self-direction | Autonomous goals more effective |
| **Element** | Fire (λ) — intrinsic direction | Fire (λ) — goal direction |
| **Complement** | SDT explains why goals matter | Goal-setting explains how to structure goals |

**Integration:**
- Autonomy-supportive goal setting increases commitment
- Competence need ↔ Challenging but achievable goals
- Relatedness need ↔ Shared/group goals

