### Approach vs. Avoidance Goals

| Type | Focus | Example | Element |
|------|-------|---------|---------|
| **Approach** | Moving toward positive outcome | "Get an A" | λ (Fire) — positive direction |
| **Avoidance** | Moving away from negative outcome | "Don't fail" | σ (Air) — threat distinction |

Approach goals generally produce better outcomes than avoidance goals.

## Elemental Pattern Analysis

### Fire/λ Dominance

Goal-Setting Theory is fundamentally a **Fire theory**:
- **Directional purpose:** Goals provide clear direction for action
- **Energy activation:** Goals energize effort proportional to difficulty
- **Achievement striving:** The theory explains the fire of goal pursuit
- **Commitment as fuel:** Goal commitment sustains the flame of effort

### Supporting Elements

| Element | Role in Goal-Setting Theory |
|---------|-----------------------------|
| **Metal/μ** | Task strategy development, structured planning, goal hierarchy |
| **Air/σ** | Specificity of goals, feedback clarity, progress monitoring |
| **Water/ρ** | Goal commitment, self-efficacy beliefs, emotional investment |
| **Wood/β** | Persistence over time, strategy adaptation, growth orientation |
| **Earth/δγ** | Temporal pacing, resource management, sustainable effort |
| **Child/✶** | Intrinsic satisfaction from goal achievement |

