## Core Definition

**Goal-Setting Theory**, developed by Edwin Locke and Gary Latham (1990), proposes that **specific and challenging goals** lead to higher performance than easy goals, vague goals, or no goals at all. The theory identifies the mechanisms by which goals affect performance and the moderating conditions that influence goal effectiveness. It is one of the most robust and practical theories of motivation in organizational and educational psychology.

