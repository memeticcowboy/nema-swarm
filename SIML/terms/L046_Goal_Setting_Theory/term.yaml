## The Four Core Mechanisms

| Mechanism | Function | Element | Description |
|-----------|----------|---------|-------------|
| **Directs Attention** | Focuses attention on goal-relevant activities | λ (Fire) | Goals tell us what to pay attention to and what to ignore |
| **Energizes Effort** | Increases intensity of effort | λ (Fire) | Harder goals produce greater effort than easy goals |
| **Prolongs Persistence** | Extends duration of effort | β (Wood) | Goals sustain effort over time despite obstacles |
| **Promotes Strategy** | Encourages development of strategies | μ (Metal) | Goals activate knowledge and planning |

