## Core Definition

**Communities of Practice (CoP)**, developed by Etienne Wenger (1998) building on work with Jean Lave, describes groups of people who share a concern, a set of problems, or a passion about a topic, and who deepen their knowledge and expertise in this area by interacting on an ongoing basis.

Unlike formal organizations or teams, CoPs are defined by **practice** — the sustained pursuit of a shared enterprise. They exist wherever people engage in a process of collective learning in a shared domain of human endeavor.

### The Three Structural Elements

| Element | Definition | Function | Operator |
|---------|------------|----------|----------|
| **Mutual Engagement** | People are engaged in actions whose meanings they negotiate with one another | Creates the social fabric of learning | ρ (resonance) |
| **Joint Enterprise** | Collective process of negotiation that results in an understanding of what the community is about | Creates relations of accountability | λ (direction) + μ (structure) |
| **Shared Repertoire** | Shared resources for negotiating meaning — routines, words, tools, stories, symbols | Accumulates communal knowledge | δγ (cycling) + κ (knowledge) |

