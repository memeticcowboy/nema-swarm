Communities of Practice are fundamentally **relational**:
- **Resonance:** Mutual attunement through sustained engagement
- **Flow:** Knowledge circulates through relationships, not documents
- **Coupling:** Members are affectively and socially bound
- **Contextuality:** Understanding emerges from participation, not instruction

