## Core Insight

> Communities of Practice reveal that **learning is not an individual act of cognition but a social act of becoming**. We do not acquire knowledge and then join communities; we join communities and become knowledgeable. Identity and competence co-emerge through sustained participation in shared practice. The community is the curriculum; membership is the pedagogy.

## One-Sentence Insight

> Wenger's Communities of Practice demonstrates that learning is fundamentally a social process of identity formation through sustained mutual engagement in shared practice, where knowledge lives not in individual heads but in the relationships and repertoires of the community.

## Three-Bullet Expansion

- **What:** A theory describing how groups of people who share a passion or concern deepen their expertise through ongoing interaction, creating social structures where learning occurs through participation rather than instruction
- **How it works:** Members engage in mutual relationships → negotiate a joint enterprise → develop a shared repertoire of resources → transform their identities through community membership → evolve the practice across generations
- **Where it aims:** Toward understanding learning as a fundamentally social phenomenon — the transformation of identity through sustained participation in communities that matter

