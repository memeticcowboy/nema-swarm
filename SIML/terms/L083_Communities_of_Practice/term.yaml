## Connection to Related Theories

### Communities of Practice vs. Situated Learning

| Aspect | Situated Learning (Lave & Wenger 1991) | Communities of Practice (Wenger 1998) |
|--------|----------------------------------------|---------------------------------------|
| **Focus** | Learning as situated process | Learning as social structure |
| **Unit of analysis** | Legitimate peripheral participation | Community as sustained configuration |
| **Scope** | Apprenticeship contexts | All domains of human endeavor |
| **Key contribution** | Learning = participation | Learning = identity transformation |
| **Element** | Water-Earth | Water-Metal |

### Connection to Social Learning Theory

While Bandura's Social Learning Theory (L013) emphasizes **observation and modeling** (Air/Fire), Communities of Practice emphasize **participation and identity** (Water/Metal):
- Social Learning: "I learn by watching others"
- Communities of Practice: "I learn by becoming who I participate with"

