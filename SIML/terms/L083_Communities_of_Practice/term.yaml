## Communities of Practice vs. Other Social Forms

| Feature | Formal Team | Network | Community of Practice |
|---------|-------------|---------|----------------------|
| **Purpose** | Deliverable, project | Information exchange | Learning, developing competence |
| **Membership** | Selected, assigned | Self-selecting, loose | Self-selecting, sustained |
| **Duration** | Project timeline | Variable, often transient | Ongoing, evolving |
| **What holds it together** | Goals, tasks | Information needs | Shared practice, identity |
| **Leadership** | Appointed | Emergent, often none | Emergent, distributed |
| **Element** | Metal/μ (structure) | Air/σ (information) | Water/ρ (relationship) |

