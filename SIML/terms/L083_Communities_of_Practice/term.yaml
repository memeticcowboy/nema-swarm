### Key Boundary Concepts

| Concept | Definition | Function |
|---------|------------|----------|
| **Boundary Objects** | Artifacts that inhabit multiple intersecting worlds (Star & Griesemer) | Enable coordination without consensus |
| **Brokering** | Connections provided by people who participate in multiple communities | Enable transfer and translation |
| **Peripheral Participation** | Access to multiple practices without full membership | Enables learning across boundaries |
| **Marginality** | Position at the edge of multiple communities | Source of innovation and perspective |

