## One-Sentence Insight

> Liquid democracy replaces fixed representation with fluid trust — but the same waters that prevent calcification can also erode the banks of accountability.

## Three-Bullet Expansion

- **What:** A governance mechanism where citizens can vote directly or delegate their vote on a per-issue basis, with revocability at any time, creating dynamic trust networks rather than static representation — characterized by granular delegation, trust chains, and emergent superdelegates
- **How it feels:** Empowering yet demanding, fluid yet potentially unstable, intimate yet scalable — the relief of agency-without-burnout mixed with the cognitive load of perpetual trust management
- **Where it aims:** Toward a modular trust ecology where influence flows to those who earn it through reputation and transparency — but with risks of platform capture, delegation cascades, and the gravitational pull of memetic celebrity re-centralizing power

