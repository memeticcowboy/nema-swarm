## Connection to Related Theories

### Inquiry and Discovery Learning (L034)

| Aspect | Discovery Learning | Inquiry-Based Learning |
|--------|-------------------|----------------------|
| **Originator** | Bruner (1961) | Dewey, Socrates, modern science educators |
| **Focus** | Individual hypothesis testing | Collaborative investigation |
| **Structure** | More open-ended | Scaffolded progression (5E) |
| **Element** | Wood (β) | Wood-Air (β-σ) |
| **Complement** | IBL adds structure to discovery | DL adds openness to inquiry |

**Integration:** IBL provides the pedagogical scaffolding that makes discovery learning systematic and replicable across contexts.

### Inquiry and Problem-Based Learning (L026)

| Aspect | Problem-Based Learning | Inquiry-Based Learning |
|--------|----------------------|----------------------|
| **Starting point** | Authentic, complex problem | Student-generated question |
| **Context** | Often real-world scenarios | Can be abstract or concrete |
| **Collaboration** | Essential — team-based | Common but variable |
| **Element** | Water-Wood (ρ-β) | Wood-Air (β-σ) |
| **Complement** | PBL anchors inquiry in authenticity | IBL emphasizes question-generation |

### Inquiry and Constructionism (L017)

**Synergy:** Inquiry provides the questioning framework; constructionism provides the making dimension:
- **Inquiry asks:** "What do we want to know?"
- **Constructionism asks:** "What can we build to find out?"
- **Together:** Learning through making things that answer questions

