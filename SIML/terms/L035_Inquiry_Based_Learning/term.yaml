### Types of Inquiry (Inquiry Continuum)

| Level | Teacher Role | Student Role | Description |
|-------|--------------|--------------|-------------|
| **Confirmation** | Provides question, procedure, solution | Follows directions, verifies known result | Structured — entry point |
| **Structured** | Provides question, procedure | Generates solution from evidence | Guided — developing skills |
| **Guided** | Provides question only | Designs procedure, generates solution | Open — building independence |
| **Open** | Provides context only | Generates question, procedure, solution | Authentic — full inquiry |

## Key Principles

1. **Questions Drive Learning:** Authentic, meaningful questions originate from student curiosity
2. **Evidence-Based Reasoning:** Claims require support from investigation and data
3. **Student Agency:** Learners make meaningful decisions about their learning path
4. **Collaborative Investigation:** Knowledge construction is social and dialogic
5. **Reflection Integrates Learning:** Metacognitive awareness transforms experience into understanding
6. **Scaffolding Enables Growth:** Support structures adapt to learner readiness

## Elemental Pattern Analysis

### Wood/β + Air/σ Coalition (Primary)

Inquiry-Based Learning is fundamentally a **Wood-Air** theory:

**Wood/β (Branching/Generation):**
- **Question generation:** Curiosity branches into multiple inquiry paths
- **Hypothesis formation:** Possibilities proliferate from initial wonder
- **Investigation design:** Learners generate approaches to answering questions
- **Knowledge construction:** Understanding grows organically from inquiry

**Air/σ (Distinction/Structure):**
- **Evidence evaluation:** Distinguishing strong from weak support
- **Hypothesis testing:** Clear criteria for confirming or revising ideas
- **Conceptual clarity:** Distinctions emerge through investigation
- **Logical reasoning:** Structure imposed on inquiry process

### Supporting Elements

| Element | Role in Inquiry-Based Learning |
|---------|-------------------------------|
| **Water/ρ** | Collaborative flow — dialogue, discussion, shared investigation |
| **Earth/δγ** | Iterative cycling — the spiral of question-investigate-reflect |
| **Fire/λ** | Purposeful direction — sustained motivation through authentic questions |
| **Metal/μ** | Scaffolding structure — the framework that enables inquiry |

## The Inquiry Mindset

```
TRADITIONAL MINDSET              INQUIRY MINDSET
─────────────────────────────────────────────────────────────
"The teacher has answers"    →   "Questions lead to discovery"
"Learning is receiving"      →   "Learning is investigating"
"Mistakes are failures"      →   "Mistakes are data"
"Knowledge is fixed"         →   "Knowledge is constructed"
"Coverage matters most"      →   "Understanding matters most"
"Silence means compliance"   →   "Silence means thinking"
```

