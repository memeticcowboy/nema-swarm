## Core Definition

**Inquiry-Based Learning (IBL)** is a pedagogical approach that centers learning around student-driven questions, investigations, and discoveries rather than teacher-delivered content. Rooted in the philosophical tradition of inquiry (Socrates, Dewey, Bruner) and formalized in science education through the 5E Instructional Model (Bybee, 1997), IBL positions learners as active investigators who construct understanding through authentic questioning and evidence-based reasoning.

### The Inquiry Cycle

```
