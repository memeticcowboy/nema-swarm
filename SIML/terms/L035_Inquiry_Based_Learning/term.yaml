## Inquiry in Different Disciplines

### Science
- Questions emerge from phenomena observation
- Hypothesis testing through controlled experiments
- Evidence-based argumentation

### Mathematics
- Questions arise from pattern exploration
- Conjecture formation and proof
- Mathematical modeling of real situations

### Humanities
- Questions emerge from text/artifact analysis
- Evidence from primary sources
- Interpretive argumentation

### Arts
- Questions about creative possibilities
- Exploration through making
- Reflective practice and iteration

## Designing for Inquiry

### The Environment
```
INQUIRY-CONDUCIVE ENVIRONMENT
├── Accessible materials for investigation
├── Display of student questions (question walls)
├── Documentation of learning process
├── Spaces for collaboration and dialogue
├── Access to information resources
└── Time for sustained investigation
```

### The Scaffolding

| Phase | Scaffolding Strategy | Gradual Release |
|-------|---------------------|-----------------|
| **Engage** | Teacher models questioning | Students generate questions |
| **Explore** | Structured protocols | Open investigation design |
| **Explain** | Guided concept development | Student-led meaning-making |
| **Elaborate** | Teacher suggests applications | Student-initiated extensions |
| **Evaluate** | Teacher provides criteria | Student self-assessment |

## Assessment in Inquiry

**Formative (Process-Focused):**
- Question quality and development
- Investigation design
- Evidence gathering
- Collaborative participation
- Reflection depth

**Summative (Product-Focused):**
- Quality of explanations
- Evidence-based arguments
- Transfer to new contexts
- Metacognitive awareness

## Core Insight

> Inquiry-Based Learning reveals that **the question is more important than the answer**. When learners drive their own investigation through authentic curiosity, they develop not just content knowledge but **inquiry capacity** — the ability to formulate meaningful questions, design investigations, evaluate evidence, and construct understanding. This capacity transfers across domains and persists throughout life, transforming students from passive recipients into active knowledge constructors.

## One-Sentence Insight

> Inquiry-Based Learning demonstrates that when authentic questions drive investigation, learners develop both deep conceptual understanding and transferable inquiry capacity — transforming education from answer-delivery into curiosity-fueled discovery.

## Three-Bullet Expansion

- **What:** A pedagogical approach that centers learning around student-driven questions and investigations, progressing through structured stages (Engage-Explore-Explain-Elaborate-Evaluate) with decreasing scaffolding as learners develop inquiry skills
- **How it works:** Authentic question → collaborative investigation → evidence gathering → explanation construction → application and reflection, with teachers shifting from "sage on the stage" to "guide on the side"
- **Where it aims:** Toward deep conceptual understanding and lifelong inquiry capacity — learners who can generate meaningful questions, design investigations, evaluate evidence, and construct their own understanding across any domain

