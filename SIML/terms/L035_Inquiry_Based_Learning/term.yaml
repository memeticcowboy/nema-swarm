│   │(curiosity,  │    │(investigate,│    │(concept      │ │
│   │ question)   │    │ gather data)│    │ development)│ │
│   └─────────────┘    └─────────────┘    └──────┬──────┘ │
│        ▲                                         │       │
│        │                                         ▼       │
