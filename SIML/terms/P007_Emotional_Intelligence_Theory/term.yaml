## Core Definition

**Emotional Intelligence (EI)** refers to the ability to perceive, understand, manage, and use emotions to facilitate thought and action. First conceptualized by **Salovey and Mayer (1990)** and popularized by **Daniel Goleman (1995)**, EI represents a distinct form of intelligence that complements cognitive ability and significantly impacts learning, relationships, and life success.

