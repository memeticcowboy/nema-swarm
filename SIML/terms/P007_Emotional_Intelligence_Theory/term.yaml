### The Emotional-Cognitive Interface

```
HOW EMOTIONS SHAPE THINKING

POSITIVE EMOTIONS:
• Broaden attention and cognition (Broaden-and-Build Theory)
• Enhance creative problem-solving
• Facilitate social connection
• Build psychological resources
• Enable flexible thinking

NEGATIVE EMOTIONS:
• Narrow attention (fight/flight focus)
• Enhance analytical processing
• Signal threat or problem
• Motivate protective action
• Can be adaptive when appropriate

OPTIMAL STATE:
• Emotional-cognitive integration
• Neither suppressed nor overwhelmed
• Emotions inform but don't dominate
• "Wise mind" (Linehan) — reason + emotion
```

