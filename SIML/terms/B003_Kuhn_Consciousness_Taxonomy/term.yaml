context_note: This term captures Robert Lawrence Kuhn's taxonomy of consciousness theories, developed through decades of interviews with over 200 experts. Kuhn categorizes theories from materialism through non-reductive physicalism, quantum theories, panpsychism, monism, dualism, to idealism. Rather than adjudicating between theories, Kuhn seeks to map the landscape of possibilities, emphasizing phenomenal consciousness (subjective experience) and exploring implications for AI consciousness, virtual immortality, and free will. His personal preference for a Dualism-Idealism mashup reflects the dynamic nature of his understanding. The taxonomy serves as a framework for exploring ultimate questions about meaning, purpose, and value in the context of consciousness studies.
