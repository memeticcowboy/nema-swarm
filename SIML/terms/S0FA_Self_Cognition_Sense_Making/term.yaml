description: "Examines whether the self (identity as construct) is an ideal vector for cognition in sense-making. Self may limit fluidity needed for participatory sense-making through its static nature, overemphasis on individuality, illusion of autonomy, and cognitive bias. Counter-arguments position self as necessary anchor for coherence, rational actor model, empirical support for individual cognition, and evolutionary survival value. Synthesis proposes self as lens or filter rather than engine of cognition — functional but not primary in the sense-making process."
