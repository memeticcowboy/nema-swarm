context_note: 'Agni represents Fire as divine mediator—not just element but deity
  who carries prayers. Key insight: Agni is unique among Vedic gods for being physically
  present (the flame), making him accessible. The cycling (δγ) is cosmic: Agni governs
  creation AND destruction, birth AND death. This is ρ (resonance) as communication
  technology—fire bridges human and divine. The Agni Pariksha (fire test) shows fire
  as truth-revealer, not just transformer.'
source: Fire's Symbolic Meaning in Ancient Philosophical and Indigenous Traditions
