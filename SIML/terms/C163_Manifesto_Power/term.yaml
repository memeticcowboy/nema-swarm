elemental_emphasis:
  ∴: What is the core question that destabilizes the prevailing assumption?
  ≈: How do new principles flow to replace entrenched paradigms?
  ▲: Where does the manifesto's energy direct — toward mobilization or mere provocation?
  𐂷: What movements grow from manifesto seeds that the authors never imagined?
  ☷: What grounds the charged symbolic power — embodied imagery or detached theory?
  ⛨: What edges does the manifesto sharpen between old and new worldviews?
context_note: 'Manifestos function as memetic engines through four mechanisms: a disruptive core question, an alternate principle, actionable possibilities, and charged symbolic power. Analyzed through the Communist, Futurist, Cyborg, and SCUM Manifestos.'
