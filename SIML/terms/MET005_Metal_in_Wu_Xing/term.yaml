elemental_emphasis:
  ∴: How is Metal distinguished from Wood's expansion?
  ≈: What resonance does autumn's gathering carry?
  ▲: What direction does Metal's contraction aim?
  𐂷: What possibilities emerge from concentrated essence?
  ☷: How does Metal transform into Water?
  ⛨: What boundaries does Metal's structure enforce?
context_note: 'Chinese Metal is distinct from Western metallic symbolism—it''s one of five dynamic phases, not a material category. Key insight: Metal represents concentration (σ) and contraction (β), the gathering inward of autumn. Earth creates Metal (ores from earth); Metal creates Water (condensation); Fire controls Metal (melting). This is Metal as seasonal process, not substance.'
source: Symbolic Meaning of Metal in Ancient Philosophical and Indigenous Traditions — Memetic Cowboy
