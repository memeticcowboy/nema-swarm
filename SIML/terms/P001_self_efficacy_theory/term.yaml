## Connection to CAMIL

Self-efficacy is one of CAMIL's six affective-cognitive factors:
- **IVR Mechanism:** High presence/agency → performance accomplishments → increased self-efficacy
- **Evidence:** IVR increases self-efficacy through immediate high-fidelity feedback
- **Meta-analysis:** Higher interaction/control → higher self-efficacy estimates

