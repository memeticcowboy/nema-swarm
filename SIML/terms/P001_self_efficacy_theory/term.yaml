## Core Insight

> Self-efficacy theory reveals that capability beliefs are not merely correlates of performance but **causal agents** — the belief shapes the behavior that creates the outcome that confirms the belief. The four sources provide actionable levers for intervention.

## One-Sentence Insight

> Bandura's self-efficacy theory shows that belief in capability determines motivation, effort, and persistence through four sources — mastery experiences, vicarious modeling, verbal persuasion, and physiological management — creating self-fulfilling prophecies of success or avoidance.

## Three-Bullet Expansion

- **What:** Core psychological theory (Bandura) that capability beliefs determine motivation, effort, and persistence
- **How it works:** Four sources (mastery, modeling, persuasion, physiology) → cognitive/motivational/selection impacts → effort/persistence/resilience
- **Where it aims:** Toward intentional efficacy-building in education, therapy, training, and personal development

