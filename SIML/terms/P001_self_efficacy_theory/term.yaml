## Core Definition

**Self-efficacy:** Beliefs about personal capability to organize and execute actions to achieve specific tasks. Acts as self-fulfilling prophecy.

## The Four Sources (Elemental Mapping)

| Source | Element | Operator | Mechanism |
|--------|---------|----------|-----------|
| **Mastery Experiences** | Metal/⛨ | μ (structure) | Prior success builds confidence |
| **Vicarious Modeling** | Water/≈ | ρ (resonance) | Observing similar others succeed |
| **Verbal Persuasion** | Fire/▲ | λ (direction) | Encouragement focuses effort |
| **Physiological States** | Air/∴ | σ (distinction) | Managing arousal as readiness |

## Three Impact Dimensions

| Dimension | Function | Element |
|-----------|----------|---------|
| **Cognitive** | Goal setting, problem-solving, decision-making | Air/σ |
| **Motivational** | Effort, persistence, challenge engagement | Fire/λ |
| **Selection** | Task choice, environment selection | Wood/β |

## The Self-Fulfilling Prophecy

```
High Self-Efficacy → Greater Effort → Success → Reinforced Efficacy
       ↑___________________________________________↓

Low Self-Efficacy → Avoidance → No Mastery → Confirmed Low Efficacy
       ↑___________________________________________↓
```

