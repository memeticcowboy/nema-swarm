## Elemental Emphasis Questions

- **∴ (Distinction):** How do testimonial and hermeneutical injustice operate differently, and what distinct interventions does each require?
- **≈ (Resonance):** What is the felt-quality of "being heard" versus "being known" — how does emotional legibility differ from cognitive recognition?
- **▲ (Direction):** Where is epistemic justice heading — toward deeper ontological sovereignty or performative pluralism?
- **𐂷 (Possibility):** What new democratic forms emerge when expertise is decoupled from credential and reconnected to care?
- **☷ (Cycling):** How do epistemic audits cycle — can reflexivity become ritual, or does it risk becoming bureaucratic checkbox?
- **⛨ (Boundary):** What boundaries exist between legitimate epistemic diversity and harmful relativism — who decides?

## One-Sentence Insight

> Epistemic justice reclaims the right to define legibility itself — transforming governance from "who gets to speak" to "who co-authors the cognitive structure of the system."

## Three-Bullet Expansion

- **What:** A framework for recognizing and remedying testimonial injustice (being heard) and hermeneutical injustice (having concepts to express experience) — centering lived experience, narrative, and symbolic expression as valid epistemic modes
- **How it feels:** Validating yet vulnerable, empowering yet exhausting — the relief of being understood mixed with the labor of educating others about one's reality
- **Where it aims:** Toward epistemic liberation where marginalized voices don't just participate but co-author the frames of knowing — but with risks of performative pluralism, over-symbolization, and platform lock-in

