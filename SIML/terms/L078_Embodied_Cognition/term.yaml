### Three Dimensions of Embodiment

| Dimension | Focus | Key Insight |
|-----------|-------|-------------|
| **Embodied** | Body as constitutive | Cognitive processes are shaped by bodily structure |
| **Embedded** | Environment as context | Cognition depends on environmental scaffolding |
| **Enactive** | Action as constitutive | Cognition is brought forth through action |

## Elemental Pattern Analysis

### Air/σ (Distinction) — Embodied

In embodied cognition, distinction-making is **grounded in sensorimotor experience**:
- Categories emerge from bodily interaction patterns
- Boundaries are experienced through movement and manipulation
- "Grasping" a concept is not metaphorical — it recruits actual motor schemas

### Water/ρ (Relationship) — Coupling

The body is **dynamically coupled** with the environment:
- Perception-action loops create organism-environment systems
- Cognition extends beyond the skull into the world
- Understanding is participatory, not representational

### Wood/β (Generation) — Action

Knowledge is **generated through action**:
- Learning happens through doing, not just receiving
- Concepts are formed through manipulation and exploration
- The "maker" learns differently than the "receiver"

### Child/✶ (Harmony) — Emergence

Cognition **emerges from body-world harmony**:
- Understanding is not stored but enacted
- Meaning arises from the dance of perception and action
- The "aha" moment is a shift in sensorimotor attunement

