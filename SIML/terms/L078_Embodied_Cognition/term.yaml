## Core Definition

**Embodied Cognition** is the theory that cognitive processes are deeply rooted in the body's interaction with the physical world. Rather than viewing the mind as a disembodied computer processing abstract symbols, embodied cognition holds that thinking, understanding, and reasoning are fundamentally shaped by the body's sensorimotor experiences, its physical structure, and its dynamic coupling with the environment.

