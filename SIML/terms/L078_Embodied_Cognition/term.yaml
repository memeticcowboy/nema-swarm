## Sensorimotor Contingencies (O'Regan & Noë)

Perception is not passive reception but **active exploration**:

```
PERCEPTION AS SENSORIMOTOR KNOWLEDGE

Visual Perception:
┌─────────────────────────────────────────────────────────┐
│  "Seeing is not receiving images but mastering the      │
│   sensorimotor contingencies of vision"                 │
│                                                         │
│   • Moving eyes → predictable changes in stimulation    │
│   • Moving head → parallax and occlusion patterns       │
│   • Reaching → hand-eye coordination contingencies      │
│                                                         │
│   Perception = Knowledge of how sensory input changes   │
│                as a function of bodily action           │
└─────────────────────────────────────────────────────────┘

The "feel" of redness is not a quale in the head but the
knowledge of how red surfaces behave under exploration:
• Moving gaze across red surface → uniform stimulation
• Approaching red object → expansion in visual field
• Touching red surface → expected texture/temperature
```

