## Conceptual Metaphor Theory

Lakoff and Johnson's groundbreaking work reveals how abstract concepts are built from physical experience:

### Primary Metaphors (Universal, Embodied)

| Source Domain (Physical) | Target Domain (Abstract) | Example |
|--------------------------|--------------------------|---------|
| **UP/DOWN** | More/Less | "Prices rose" / "Stocks fell" |
| **WARM/COLD** | Affection/Distance | "Warm welcome" / "Cold shoulder" |
| **NEAR/FAR** | Time/Emotional Closeness | "The near future" / "Distant relative" |
| **CONTAINER** | Categories/States | "In trouble" / "Out of danger" |
| **PATH/JOURNEY** | Purpose/Progress | "Life's journey" / "Career path" |
| **FORCE** | Causation/Influence | "Pushed me to decide" |
| **BALANCE** | Fairness/Equity | "Balanced argument" |

