## Elemental Diagnostics for Learning Design

### The Learning Environment Assessment

Use these six questions to diagnose any learning environment:

| Question | Element | Theory | Diagnostic |
|----------|---------|--------|------------|
| **Is it clear?** | σ-Air | Cognitive Load | Can learners distinguish essential from incidental? |
| **Is it connected?** | ρ-Water | Situated Learning | Is learning embedded in authentic social practice? |
| **Is it purposeful?** | λ-Fire | Self-Determination | Do learners have autonomy and intrinsic motivation? |
| **Is it generative?** | β-Wood | Constructionism | Are learners actively building and creating? |
| **Is it cyclical?** | δγ-Earth | Spaced Repetition | Is practice distributed over time with retrieval? |
| **Is it harmonious?** | ✶-Child | Flow Theory | Does challenge match skill, creating absorption? |

### Elemental Imbalance Patterns

```
COMMON LEARNING FAILURES (Elemental Imbalances)

1. OVERLOAD (σ-Air deficient)
   Symptoms: Confusion, anxiety, shallow processing
   Cause: Too much information, unclear structure
   Remedy: Reduce extraneous load, use advance organizers

2. ISOLATION (ρ-Water deficient)
   Symptoms: Inauthentic practice, transfer failure
   Cause: Learning decontextualized from practice
   Remedy: Embed in communities of practice, authentic tasks

3. APATHY (λ-Fire deficient)
   Symptoms: Disengagement, compliance without investment
   Cause: Extrinsic motivation, lack of autonomy
   Remedy: Support autonomy, connect to values, build competence

4. PASSIVITY (β-Wood deficient)
   Symptoms: Surface learning, inability to apply
   Cause: Passive consumption without construction
   Remedy: Active learning, project-based tasks, debugging

5. FORGETTING (δγ-Earth deficient)
   Symptoms: Rapid decay, cramming patterns
   Cause: Massed practice, no retrieval opportunities
   Remedy: Spaced repetition, interleaving, retrieval practice

6. BOREDOM/ANXIETY (✶-Child deficient)
   Symptoms: Disengagement or overwhelm
   Cause: Challenge-skill mismatch
   Remedy: Adaptive difficulty, clear goals, immediate feedback
```

