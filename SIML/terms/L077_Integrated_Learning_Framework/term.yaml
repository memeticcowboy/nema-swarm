## Core Definition

The **Integrated Learning Framework** synthesizes insights from 76+ learning theories encoded in the SIML repository, revealing that effective learning emerges from the **dynamic interplay of six elemental forces**. No single theory captures the full complexity of human learning; rather, each theory illuminates one facet of a multi-dimensional process. This framework integrates Cognitive Load Theory (σ-Air), Social Learning Theory (ρ-Water), Self-Determination Theory (λ-Fire), Constructionism (β-Wood), Spaced Repetition (δγ-Earth), and Flow Theory (✶-Child/Aether) into a coherent meta-model.

