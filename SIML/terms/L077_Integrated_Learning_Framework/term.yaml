## Cross-Theory Integration Patterns

### Pattern 1: The Clarity-Connection Bridge

```
COGNITIVE LOAD ↔ SITUATED LEARNING

σ-Air (Cognitive Load Theory) provides the mechanism for clarity:
    • Manage intrinsic, extraneous, and germane load
    • Free working memory for deep processing

ρ-Water (Situated Learning) provides the context for meaning:
    • Learning happens in authentic practice
    • Knowledge is context-dependent

INTEGRATION: Clear structure (σ) enables effective participation 
            in authentic contexts (ρ) — you can't engage deeply
            if you're cognitively overwhelmed.
```

### Pattern 2: The Purpose-Construction Cycle

```
SELF-DETERMINATION ↔ CONSTRUCTIONISM

λ-Fire (Self-Determination Theory) provides the motivational engine:
    • Autonomy: learner chooses what to build
    • Competence: construction demonstrates capability
    • Relatedness: sharing creations with others

β-Wood (Constructionism) provides the generative mechanism:
    • Learning by making
    • Debugging as understanding
    • Externalization of thought

INTEGRATION: Intrinsic motivation (λ) drives generative engagement 
            (β) — we build what matters to us, and building 
            deepens our investment.
```

### Pattern 3: The Cycling-Harmony Spiral

```
SPACED REPETITION ↔ FLOW THEORY

δγ-Earth (Spaced Repetition) provides the temporal structure:
    • Learning is metabolic, not instantaneous
    • Desirable difficulties strengthen memory
    • Forgetting enables deeper relearning

✶-Child (Flow Theory) provides the optimal state:
    • Challenge-skill balance creates absorption
    • Time transforms in the learning state
    • Growth happens without conscious striving

INTEGRATION: Cyclical practice (δγ) builds the skills that enable 
            flow (✶), and flow accelerates the learning that 
            makes cycling worthwhile.
```

