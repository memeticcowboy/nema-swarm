### The Six Elemental Functions in Learning

| Element | Theory | Function | When Missing |
|---------|--------|----------|--------------|
| **σ Air** | Cognitive Load Theory | **Distinction-making** — separating signal from noise | Overwhelm, confusion, cognitive overload |
| **ρ Water** | Social Learning Theory | **Relationship** — learning as participation in communities | Isolation, lack of context, inauthentic practice |
| **λ Fire** | Self-Determination Theory | **Direction** — autonomous purpose and intrinsic motivation | Apathy, extrinsic compliance, burnout |
| **β Wood** | Constructionism | **Generation** — building knowledge through making | Passive consumption, shallow processing |
| **δγ Earth** | Spaced Repetition | **Cycling** — metabolic reinforcement over time | Rapid forgetting, cramming, brittle knowledge |
| **✶ Child** | Flow Theory | **Harmony** — integration of all elements in optimal experience | Anxiety (too hard), boredom (too easy), disengagement |

