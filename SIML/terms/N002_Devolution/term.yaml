# N002 — Devolution

## The Mythwork

**Devolution: A Firsthand Account of the Rainier Sasquatch Massacre** (2020) by Max Brooks is an epistolary horror novel that serves as a **mythwork**—a narrative testing ground where human complexity meets environmental reality.

Greenloop represents the MemeGrid's promise: sustainable, tech-enabled, ecologically harmonious living. The eruption (Earth/δγ) strips away the infrastructure. The Sasquatch (wilderness/Ω) finish what the volcano started.

## The Elemental Reading

### Water (ρ) — Kate's Transformation

Kate begins as a passive observer, emotionally dependent, floating in the privilege bubble. The crisis forces **resonance attunement**—she must feel or die. Her arc culminates not in return to civilization, but in ruthless survival clarity.

> "The transformation... from self-doubting basket case into formidable warrior transcends the notion of 'evolution.' It's terrifying."

### Fire (λ) — Survival Ignition

When structure fails, direction crystallizes. The novel's core question: what do you become when civilization's constraints dissolve? For Kate: a predator. For others: prey.

### Earth (δγ) — The Composting

Mount Rainier's eruption is not disaster—it's **metabolic cycling**. The ash covers everything, returning Greenloop's pretensions to soil. The "green" community becomes compost for something older.

### Metal (μ) — Structural Collapse

The community's boundaries—physical, social, psychological—were always provisional. The novel asks: what remains when μ fails? What structure holds when the grid goes down?

### Meta (✶) — The Species Question

The title's sting: "Devolution" implies we're not advancing but **cycling**. Civilization as temporary pattern. The Sasquatch aren't monsters—they're what humans become when the MemeGrid fails.

## The Memetic Ecology Reading

| Concept | Manifestation |
|---------|---------------|
| **I-Tube** | Greenloop as insulated identity container |
| **MemeGrid** | Eco-ideology, Amazon dependency, planned community |
| **Ω** | The eruption, the Sasquatch, the wild |
| **Sanity Sphere** | The community's shared hallucination of safety |
| **Thread → Knot** | Kate's diary entries compressing into survival wisdom |

## Core Insight

> Devolution is what happens when the MemeGrid's infrastructure fails and humans must metabolize their own pretensions. The novel is a field test: how thin is civilization's veneer? Thin enough that a volcano and some hungry hominids strip it clean.

## The Cowboy's Take

Greenloop thought they were living the future. Turns out they were just **hoarding resources near an active volcano**.

The novel ain't about Bigfoot. It's about **what you become when nobody's watching**—when the cameras fail, the drones stop delivering, and the only law is thermodynamics.

Kate doesn't evolve. She **returns**. To something older than Greenloop's eco-ideology. Something that doesn't need solar panels to survive.

That's the real devolution: recognizing that civilization was always a temporary Sanity Sphere, and the wilderness was waiting.

