- **LOGO/Turtle Geometry** — Programming as math learning
- **Scratch** — Visual programming for creative expression
- **Maker spaces** — Physical construction with digital tools
- **Microworlds** — Constrained environments for exploration
- **Robotics kits** — Building and programming physical systems

### Pedagogical Approaches
- **Project-based learning** — Extended inquiry through making
- **Design thinking** — Human-centered problem solving
- **Computational thinking** — Problem-solving with computational concepts
- **Studio-based learning** — Critique and revision cycles
- **FabLearn** — Digital fabrication in education

### Key Practices
- **Low floor, high ceiling** — Easy entry, unlimited depth
- **Wide walls** — Multiple pathways and expressions
- **Learning by doing** — Active engagement over passive reception
- **Tangible artifacts** — Externalizing thinking through making
- **Iterative design** — Cycles of construction and revision

## Critiques and Limitations

1. **Resource intensity** — Making requires materials, tools, time
2. **Assessment challenges** — Standardized testing doesn't capture constructionist learning
3. **Teacher preparation** — Requires shift from "sage on stage" to "guide on side"
4. **Not all learning requires making** — Some knowledge is efficiently transmitted
5. **Equity concerns** — Access to tools and materials varies
6. **Cultural assumptions** — Individual project ownership may not fit all cultures

