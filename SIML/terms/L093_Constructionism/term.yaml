### Key Principles

1. **Learning by Making** — Knowledge construction is most effective when learners create tangible products
2. **Objects-to-Think-With** — Artifacts mediate thinking; the material shapes the mental model
3. **Debugging as Learning** — Errors reveal understanding gaps and drive revision
4. **Personal Ownership** — Learners take charge of their learning through project choice
5. **Social Construction** — Making is enhanced by sharing, collaboration, and discussion
6. **Powerful Ideas** — Access to conceptually rich domains (math, science, programming) from early ages
7. **Microworlds** — Constrained environments that make complex ideas concrete and manipulable

### Constructionism vs. Constructivism

```
CONSTRUCTIVISM (Piaget)          CONSTRUCTIONISM (Papert)
══════════════════════════       ══════════════════════════
Knowledge is actively            Learning is most effective
constructed by learners          when constructing something
                                 external and shareable

Focus: Cognitive structures      Focus: Learning through making

Internal mental operations       External artifact creation

Universal developmental          Contextual, material-mediated
stages                           learning

Learning as adaptation           Learning as design

The learner constructs           The learner constructs publicly,
knowledge internally             making thinking visible
```

### The Role of Debugging

Papert saw **debugging** as the quintessential learning activity:

- **Bugs make thinking visible** — When a program doesn't work, the learner must examine their assumptions
- **Debugging is non-judgmental** — Errors are expected, natural parts of the process
- **Iterative refinement** — Each debug cycle deepens understanding
- **Agency and ownership** — The learner controls the revision process
- **Transferable skill** — Debugging mindset applies across domains

```
THE DEBUGGING MINDSET
═══════════════════════════════════════════════════════════════

Traditional Learning          Constructionist Learning
────────────────────          ────────────────────────

"I got it wrong"              "The program has a bug"
                              (separation of self from error)

Fear of mistakes              Expectation of iteration

Right/wrong binary            Degrees of working

Teacher corrects              Learner debugs

Shame                         Curiosity

Fixed mindset                 Growth mindset
```

