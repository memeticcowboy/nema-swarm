## Core Definition

**Constructionism**, developed by Seymour Papert at MIT, extends constructivist theory into a theory of learning-by-making. While constructivism (Piaget) holds that knowledge is actively constructed by the learner rather than passively received, constructionism adds the crucial insight: **learning happens most effectively when learners are consciously engaged in constructing a public entity**—whether a sandcastle on the beach, a theory, or a computer program.

The theory emerged from Papert's work with the LOGO programming language and the "microworld" concept—computational environments where learners could explore powerful ideas through concrete manipulation. Constructionism emphasizes that the **process of creating sharable artifacts** drives deep learning, as externalization makes thinking visible, debuggable, and discussable.

