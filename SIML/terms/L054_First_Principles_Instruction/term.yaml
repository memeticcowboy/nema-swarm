## Core Insight

> First Principles of Instruction reveals that effective learning is not about accumulating isolated knowledge components but about **engaging with authentic whole tasks** from the start. The five principles form an integrated system: tasks provide the center, activation anchors to prior knowledge, demonstration shows the way, application builds skill, and integration ensures transfer. This is not merely a set of guidelines but a fundamental restructuring of how we design learning — around performance rather than content, authenticity rather than abstraction, and integration rather than fragmentation.

## One-Sentence Insight

> Merrill's First Principles of Instruction demonstrates that learning is most effective when centered on authentic whole tasks that progress from simple to complex, activating prior knowledge, providing consistent demonstrations, enabling coached application, and culminating in integration into the learner's world.

## Three-Bullet Expansion

- **What:** A synthesis of instructional design research into five fundamental principles — task-centered, activation, demonstration, application, and integration — that are always true regardless of delivery medium or instructional strategy
- **How it works:** Instruction is organized around authentic whole tasks rather than fragmented components; learners progress through a sequence of problems (simple to complex), activate relevant prior knowledge, observe consistent demonstrations, apply skills with fading coaching, and integrate new capabilities into their lives
- **Where it aims:** Toward transferable, mastered performance that learners can apply in their real world — not just knowledge acquisition but capability development through authentic engagement

