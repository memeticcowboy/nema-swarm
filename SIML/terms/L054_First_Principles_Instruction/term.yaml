## Connection to Related Theories

### First Principles vs. Elaboration Theory

| Aspect | Elaboration Theory | First Principles |
|--------|-------------------|------------------|
| **Focus** | Sequencing content | Centering on authentic tasks |
| **Structure** | Epitome → elaboration | Whole task → components → whole |
| **Element** | Metal-Wood | Metal-Child (with all elements) |
| **Relationship** | Elaboration Theory provides sequencing within First Principles |

**Synergy:** First Principles provides the "what" (authentic whole tasks); Elaboration Theory provides the "how" (sequencing the content).

### First Principles vs. Cognitive Load Theory

| Aspect | Cognitive Load Theory | First Principles |
|--------|----------------------|------------------|
| **Focus** | Managing cognitive resources | Designing effective instruction |
| **Strategy** | Reduce load, optimize working memory | Whole-task authenticity |
| **Element** | Air (σ-clarity) | Multi-element synthesis |
| **Relationship** | CLT informs how to manage load during First Principles application |

### First Principles vs. Situated Learning

| Aspect | Situated Learning | First Principles |
|--------|------------------|------------------|
| **Focus** | Learning in authentic contexts | Authentic tasks as center |
| **Mechanism** | Legitimate peripheral participation | Progressive problem sequence |
| **Element** | Water (ρ-context) | Metal-Child |
| **Relationship** | Situated Learning provides the authenticity principle; First Principles operationalizes it |

### First Principles vs. Constructivism

| Aspect | Constructivism | First Principles |
|--------|---------------|------------------|
| **Focus** | Learner constructs knowledge | Instructional design principles |
| **Mechanism** | Active construction | Task-centered engagement |
| **Element** | Wood (β-generation) | Multi-element |
| **Relationship** | Constructivism is a learning theory; First Principles is an instructional theory that accommodates construction |

## Connection to CAMIL and IVR

First Principles transforms immersive learning design:
- **Task-centered in IVR:** Authentic whole tasks in virtual environments
- **Activation in IVR:** Virtual pre-experiences that activate prior knowledge
- **Demonstration in IVR:** First-person observation of expert performance
- **Application in IVR:** Safe practice with fading guidance systems
- **Integration in IVR:** Virtual public demonstrations before real-world transfer

**Design Implications:**
- Design IVR experiences around complete authentic performances
- Begin with simple virtual scenarios, progress to complex
- Use IVR for demonstrations impossible in other media
- Provide intelligent coaching that fades with competence
- Include reflection and creation spaces in virtual environments

