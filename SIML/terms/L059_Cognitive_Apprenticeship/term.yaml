## Cognitive Apprenticeship in Practice

### Example: Teaching Reading Comprehension

```
COGNITIVE APPRENTICESHIP IN READING

┌─────────────────────────────────────────────────────────────┐
│ MODELING (Expert thinks aloud while reading):               │
│ "I'm confused here — let me reread... Ah, this connects     │
│  to what the author said earlier. I'm making an inference   │
│  based on..."                                               │
├─────────────────────────────────────────────────────────────┤
│ COACHING (While student reads):                             │
│ "What do you do when you don't understand?"                 │
│ "Good — you reread. What else could you try?"               │
├─────────────────────────────────────────────────────────────┤
│ SCAFFOLDING (Structured support):                           │
│ • Graphic organizers for main ideas                         │
│ • Question prompts for self-monitoring                      │
│ • Strategy reminders                                        │
├─────────────────────────────────────────────────────────────┤
│ ARTICULATION (Student explains thinking):                   │
│ "I was confused so I went back and looked for..."           │
├─────────────────────────────────────────────────────────────┤
│ REFLECTION (Compare strategies):                            │
│ "How did your approach differ from the expert's?"           │
├─────────────────────────────────────────────────────────────┤
│ EXPLORATION (Independent practice):                         │
│ Student selects texts and applies strategies independently  │
└─────────────────────────────────────────────────────────────┘
```

## Core Insight

> Cognitive Apprenticeship reveals that **cognitive skills can be taught like craft skills** — through modeling, coaching, and guided practice in authentic contexts. The framework solves the "expert blind spot" problem by making thinking visible, externalizing tacit knowledge, and providing structured support that fades as competence develops. It bridges the gap between knowing and doing, between abstract knowledge and situated expertise.

## One-Sentence Insight

> Cognitive Apprenticeship makes expert thinking visible and learnable through modeling, coaching, scaffolding, and fading — teaching cognitive skills through guided participation in authentic practice.

## Three-Bullet Expansion

- **What:** A pedagogical framework that extends traditional apprenticeship to cognitive skills, using six methods (modeling, coaching, scaffolding, articulation, reflection, exploration) to make thinking visible and teachable
- **How it works:** Expert demonstrates thinking → coaches student practice → provides scaffolding → fades support → student articulates and reflects → achieves independent exploration
- **Where it aims:** Toward expertise development through legitimate peripheral participation in authentic practice communities, with tacit knowledge becoming explicit and transferable

