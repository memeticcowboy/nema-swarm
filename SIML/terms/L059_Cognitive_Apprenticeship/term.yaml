## The Six Teaching Methods

### 1. Modeling (μ - Metal/Structure)

```
MODELING: Making Thinking Visible

Expert demonstrates while verbalizing internal processes:

┌─────────────────────────────────────────────────────────────┐
│ EXPERT THINKING ALOUD (Mathematics Problem)                 │
│                                                             │
│ "Okay, I need to solve for x. First, I look at what's      │
│  given... Hmm, I have two equations with two variables.    │
│  My strategy is substitution. Let me check if that will    │
│  work... Actually, elimination might be cleaner here.      │
│  I'm noticing the coefficients..."                         │
│                                                             │
│ Element: Metal/μ — Structure of expert cognition            │
└─────────────────────────────────────────────────────────────┘

Purpose: Externalize tacit expert knowledge
Key: Show the false starts, the strategy selection, the monitoring
```

### 2. Coaching (δγ - Earth/Cycling)

```
COACHING: Observation and Feedback

Expert watches student practice and provides guidance:

┌─────────────────────────────────────────────────────────────┐
│ COACHING INTERACTION                                        │
│                                                             │
│ Student: [Works on problem]                                 │
│                                                             │
│ Coach: "I see you're trying to factor. What made you        │
│        choose that approach?"                               │
│                                                             │
│ Student: "The form looks factorable."                       │
│                                                             │
│ Coach: "Good pattern recognition. What would you check      │
│        before committing to that path?"                     │
│                                                             │
│ Element: Earth/δγ — Iterative feedback cycles               │
└─────────────────────────────────────────────────────────────┘

Purpose: Guide performance in the moment
Key: Questions over answers, process over product
```

### 3. Scaffolding (β - Wood/Growth)

```
SCAFFOLDING: Support for Stretch Performance

┌─────────────────────────────────────────────────────────────┐
│ SCAFFOLDING EXAMPLES                                        │
│                                                             │
│ High Support:                                               │
│ • Provide problem-solving framework                         │
│ • Break task into sub-tasks                                 │
│ • Offer hints and prompts                                   │
│ • Reduce degrees of freedom                                 │
│                                                             │
│ Medium Support:                                             │
│ • Remind of relevant strategies                             │
│ • Ask monitoring questions                                  │
│ • Provide partial solutions                                 │
│                                                             │
│ Low Support:                                                │
│ • Check understanding                                       │
│ • Confirm approach                                          │
│ • Available if needed                                       │
│                                                             │
│ Element: Wood/β — Generative growth support                 │
└─────────────────────────────────────────────────────────────┘

Purpose: Enable performance beyond current independent ability
Key: Temporary support that fades as competence develops
```

### 4. Articulation (σ - Air/Distinction)

```
ARTICULATION: Verbalizing Thought Processes

Methods for making student thinking explicit:

┌─────────────────────────────────────────────────────────────┐
│ ARTICULATION TECHNIQUES                                     │
│                                                             │
│ • Think-aloud protocols: Student verbalizes while solving   │
│ • Self-explanation: Student explains why steps were taken   │
│ • Peer teaching: Student explains concepts to others        │
│ • Process journals: Written reflection on problem-solving   │
│                                                             │
│ Example: "Explain why you chose that strategy"              │
│          "What made you think of that approach?"            │
│          "How did you know to stop there?"                  │
│                                                             │
│ Element: Air/σ — Distinction through verbalization          │
└─────────────────────────────────────────────────────────────┘

Purpose: Make implicit strategies explicit and examinable
Key: Both correct and incorrect reasoning is valuable to articulate
```

### 5. Reflection (✶ - Child/Integration)

```
REFLECTION: Comparing Performance

┌─────────────────────────────────────────────────────────────┐
│ REFLECTION ACTIVITIES                                       │
│                                                             │
│ Expert-Novice Comparison:                                   │
│ • "Notice how the expert approached this differently"       │
│ • "What did you miss that they saw?"                        │
│                                                             │
│ Self-Comparison Over Time:                                  │
│ • "Compare your solution to last week's"                    │
│ • "What strategies have you added?"                         │
│                                                             │
│ Multiple Solution Comparison:                               │
│ • "Here are three approaches — what differs?"               │
│ • "When would each be most effective?"                      │
│                                                             │
│ Element: Child/✶ — Integration through comparison           │
└─────────────────────────────────────────────────────────────┘

Purpose: Develop self-monitoring and abstract understanding
Key: Comparison reveals patterns not visible in single instances
```

### 6. Exploration (λ - Fire/Direction)

```
EXPLORATION: Independent Problem-Solving

┌─────────────────────────────────────────────────────────────┐
│ EXPLORATION PHASE                                           │
│                                                             │
