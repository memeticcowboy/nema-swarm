Purpose: Develop independent expertise
Key: Student takes increasing responsibility for learning
```

## The Fading Process

```
FADING: Gradual Transfer of Responsibility

┌─────────────────────────────────────────────────────────────┐
│                                                             │
│  EXPERT    MODELING → COACHING → SCAFFOLDING → EXPLORATION  │
│  CONTROL        │         │          │            │         │
│    High         │         │          │            │         │
│                 ▼         ▼          ▼            ▼         │
│  NOVICE    OBSERVING → PRACTICING → GUIDED → INDEPENDENT   │
│  AUTONOMY       │         │          │            │         │
│    Low          └─────────┴──────────┴────────────┘         │
│                        FADING PATH                          │
│                                                             │
│  Support decreases as competence increases                  │
│  ─────────────────────────────────────────►                 │
│  Time/Experience                                            │
│                                                             │
└─────────────────────────────────────────────────────────────┘

Fading is not abandonment — it's calibrated release
```

## Elemental Pattern Analysis

### Water/ρ Dominance (Situated/Resonant)

Cognitive Apprenticeship is fundamentally a **Water theory** — learning is **embedded in authentic contexts**:

**Water/ρ (Situated/Resonant):**
- **Authentic contexts:** Learning occurs in real practice situations
- **Legitimate peripheral participation:** Novices join communities of practice
- **Context-dependent knowledge:** Skills transfer because they were learned in context
- **Social learning:** Exploiting the social nature of cognition

**Metal/μ (Structure/Form):**
- **Systematic sequencing:** Global before local, increasing complexity
- **Method framework:** Six structured teaching methods
- **Progression markers:** Clear developmental trajectory

**Wood/β (Growth/Exploration):**
- **Scaffolding:** Support that enables growth beyond current ability
- **Branching paths:** Multiple strategies and approaches
- **Generative learning:** Student generates solutions with support

**Earth/δγ (Cycling/Metabolic):**
- **Iterative practice:** Repeated cycles of attempt-feedback-revision
- **Coaching loops:** Ongoing observation and guidance
- **Skill consolidation:** Through repeated cycles

**Child/✶ (Integration/Harmony):**
- **Reflection:** Integration through comparison
- **Fading:** Seamless transition from supported to independent
- **Whole practice:** Global skills before component skills

**Fire/λ (Direction/Purpose):**
- **Exploration:** Self-directed learning goals
- **Intrinsic motivation:** Learning for authentic purposes
- **Autonomy development:** Increasing self-direction

**Air/σ (Distinction/Clarity):**
- **Articulation:** Making thinking explicit and distinct
- **Strategy comparison:** Distinguishing between approaches
- **Process visibility:** Externalizing internal cognition

