## Connection to Related Theories

### Cognitive Apprenticeship vs. Situated Learning

| Aspect | Situated Learning | Cognitive Apprenticeship |
|--------|-------------------|--------------------------|
| **Focus** | Social context of learning | Teaching methods for cognitive skills |
| **Mechanism** | Legitimate peripheral participation | Modeling, coaching, scaffolding, fading |
| **Element** | Water/ρ (situatedness) | Water/ρ + Metal/μ + Wood/β |
| **Relationship** | CA provides pedagogical methods for situated learning |

### Cognitive Apprenticeship vs. Scaffolding

| Aspect | Scaffolding (Vygotsky/Wood) | Cognitive Apprenticeship |
|--------|----------------------------|--------------------------|
| **Scope** | Temporary support structure | Complete pedagogical framework |
| **Methods** | Support and fading | Six integrated methods |
| **Element** | Wood/β (growth) | Multiple elements |
| **Relationship** | Scaffolding is one method within CA |

### Cognitive Apprenticeship vs. Cognitive Apprenticeship vs. PCK

| Aspect | PCK | Cognitive Apprenticeship |
|--------|-----|--------------------------|
| **Focus** | Teacher knowledge | Teaching methods |
| **Question** | "What does the teacher know?" | "How does the teacher teach?" |
| **Element** | Child/✶ (integration) | Water/ρ (situated) |
| **Relationship** | PCK enables effective CA; CA is a method PCK employs |

