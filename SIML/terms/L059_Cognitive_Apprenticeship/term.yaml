## Core Definition

**Cognitive Apprenticeship**, developed by Allan Collins, John Seely Brown, and Ann Newman in 1989, extends traditional apprenticeship models to **cognitive and metacognitive skills**. While traditional apprenticeship focuses on physical tasks (crafts, trades), cognitive apprenticeship makes thinking visible and learnable in domains like reading, writing, mathematics, and problem-solving.

The framework addresses a critical problem in education: **expert knowledge is often tacit** — experts have automated their thinking to the point where they can no longer articulate how they do what they do. Cognitive apprenticeship provides methods to externalize, model, and teach these invisible cognitive processes.

