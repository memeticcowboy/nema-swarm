      manifestation: "Viral coherence ≠ epistemic truth; Cathartic vs Addictive vs Fragmented resonance taxonomy; meme classification by affective quality rather than viral spread"
      daemon_correspondence: "Zephyros-Krisis: wind of judgment separating healing symbols from addictive loops, fragmenting noise from coherent signal"
      governance_expression: "Meta-affective filters as instruments of epistemic care; ritual friction as discernment technology; truth cultivated through recursive deceleration"
    
