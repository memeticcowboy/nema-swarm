    core_meaning: "Governance through recursive symbolic care—not governance BY memes but governance THROUGH memetic stewardship; memes as affect-laden semiotic vehicles requiring ethical tending"
    operational_definition: "A framework where memes function as truth-cultivation mechanisms rather than epistemic declarations, filtered through embodied rituals of friction and meta-affective taxonomy"
