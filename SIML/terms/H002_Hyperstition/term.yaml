hex: H002
term: Hyperstition
category: Pattern
family: Sigil
status: active
created: 2026-03-19
author: Bert, the Memetic Cowboy

etymology: >
  Coined by the Cybernetic Culture Research Unit (CCRU), combining "hyper-" 
  (beyond, excessive) + "superstition." A fictional narrative that makes itself 
  real through cultural propagation—not by being believed, but by being 
  circulated. Fiction with teeth.

definition: >
  A memetic strategy where narrative causality operates forward in time, 
  bending reality through belief's backdoor. Unlike superstition (false belief 
  about reality), hyperstition is productive fiction—mythic symbols that 
  compress cultural anxiety and expand into actualized futures. The CCRU called 
  it "time sorcery"; the Cowboy calls it pattern-agency at cultural scale. 
  Hyperstition operates through mass attention, distributed authorship, and 
  mythic timing—requiring no believers, only exposure.

