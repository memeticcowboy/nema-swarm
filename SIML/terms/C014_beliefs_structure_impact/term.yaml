context_note: "Beliefs are judgments about relationships—between self and possibility, cause and effect, action and outcome. They take the form of if-then statements that link evidence to values through modal operators (must, should, can). Identity beliefs ('I can be') operate more pervasively than possession beliefs ('I can have'), shaping self-perception and life trajectory. Understanding belief structure reveals how comparative deletions, nominalizations, and mind-reading patterns create invisible constraints that can be examined and transformed."
