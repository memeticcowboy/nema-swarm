context_note: >-
  Henri Bergson's philosophy posits that true understanding emerges through
  experiencing the subjective flow of time (duration). Consciousness is
  inherently temporal, continuous, and qualitative, resisting the spatialized
  measurable time of clocks. This offers insights into free will as creative
  evolution and consciousness as temporal process rather than static computation.
