## Shaping and Chaining

### Successive Approximation (Shaping)

```
SHAPING PROCESS

Target: Rat presses lever

Step 1: Reinforce turning toward lever
    └── Behavior: Orient to lever area
        
Step 2: Reinforce moving closer to lever
    └── Behavior: Approach lever
        
Step 3: Reinforce touching lever
    └── Behavior: Contact with lever
        
Step 4: Reinforce pressing lever
    └── Behavior: Full target response

Each step reinforces successive approximations
toward the final desired behavior
```

### Behavior Chaining

```
BEHAVIOR CHAINS

A sequence of behaviors where each response
produces the discriminative stimulus for the next response

Example: Brushing Teeth
┌─────────┐    ┌─────────┐    ┌─────────┐    ┌─────────┐
│  Pick up│───►│  Apply │───►│  Brush │───►│  Rinse │
│  brush  │Sᴰ  │  paste │Sᴰ  │  teeth │Sᴰ  │  mouth │
└─────────┘    └─────────┘    └─────────┘    └─────────┘
     R              R              R              R

Each behavior: (1) produces consequence for previous response,
                (2) serves as Sᴰ for next response
```

