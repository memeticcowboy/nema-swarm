## Core Definition

**Operant Conditioning**, developed by B.F. Skinner (1938, 1953), is a learning process through which the strength of a behavior is modified by reinforcement or punishment. Unlike classical conditioning (which involves involuntary responses to stimuli), operant conditioning concerns voluntary behaviors that operate on the environment, producing consequences that shape future behavior.

