## Reinforcement Schedules

### Continuous vs. Intermittent Reinforcement

```
REINFORCEMENT SCHEDULES

CONTINUOUS REINFORCEMENT (CRF)
Every response is reinforced
├── Fast initial learning
├── Rapid extinction when reinforcement stops
└── Best for establishing new behaviors

INTERMITTENT/PARTIAL REINFORCEMENT
Only some responses are reinforced
├── Slower initial learning
├── Greater resistance to extinction
├── Creates persistence and habit strength
└── Best for maintaining established behaviors
```

### Four Basic Intermittent Schedules

| Schedule | Pattern | Example | Behavior Pattern |
|----------|---------|---------|------------------|
| **Fixed Ratio (FR)** | Reinforcement after fixed number of responses | Factory piecework | High steady rate, post-reinforcement pause |
| **Variable Ratio (VR)** | Reinforcement after unpredictable number of responses | Slot machines | Highest, most consistent rate |
| **Fixed Interval (FI)** | Reinforcement for first response after fixed time | Weekly paycheck | Scalloped pattern, acceleration toward interval end |
| **Variable Interval (VI)** | Reinforcement for first response after unpredictable time | Checking email | Moderate, steady rate |

