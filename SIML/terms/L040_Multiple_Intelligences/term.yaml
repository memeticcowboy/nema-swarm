### Intelligence Criteria

Gardner established eight criteria for identifying an intelligence:

| Criterion | Description |
|-----------|-------------|
| **1. Potential isolation by brain damage** | Different intelligences can be independently impaired |
| **2. Existence of savants, prodigies, exceptional cases** | Uneven profiles demonstrate modularity |
| **3. Identifiable core operation or set of operations** | Each intelligence has distinct computational processes |
| **4. Distinct developmental history + expert performance** | Different developmental trajectories |
| **5. Evolutionary plausibility** | Roots in human evolutionary history |
| **6. Support from experimental psychology** | Evidence from cognitive research |
| **7. Support from psychometric findings** | Factor analysis supports distinct capacities |
| **8. Susceptibility to encoding in symbol systems** | Cultural transmission through symbols |

## Elemental Pattern Analysis

### Child/✶ (Pluralism) — Primary

Multiple Intelligences is fundamentally a **Child/Aether theory**:
- **Multiplicity over unity:** Intelligence is not one thing but many
- **Democracy of gifts:** No intelligence is inherently superior
- **Playful diversity:** Like children exploring different games
- **Holistic integration:** The intelligences work in concert
- **Becoming:** Each intelligence has its own developmental path

### Air/σ (Distinction) — Secondary

The analytical dimension:
- **Modularity:** Clear boundaries between intelligences
- **Criteria-based identification:** Rigorous demarcation
- **Cognitive science grounding:** Information-processing approach
- **Discrimination:** What counts (and doesn't count) as intelligence

### Water/ρ (Resonance) — Secondary

The relational dimension:
- **Interpersonal intelligence:** Direct resonance between people
- **Musical intelligence:** Harmonic and rhythmic sensitivity
- **Spatial intelligence:** Resonance with environmental patterns
- **Cultural embeddedness:** Intelligences expressed through culture

### Wood/β (Generation) — Supporting

The creative dimension:
- **Bodily-kinesthetic:** Growth through physical action
- **Multiple pathways:** Different routes to mastery
- **Branching development:** Each intelligence branches independently
- **Creative expression:** Diverse forms of human creativity

### Metal/μ (Structure) — Supporting

The organizing dimension:
- **Domain specificity:** Each intelligence has structured content
- **Developmental stages:** Ordered progression within each domain
- **Assessment profiles:** Structured mapping of strengths
- **Educational frameworks:** Organizing curriculum around intelligences

### Fire/λ (Direction) — Supporting

The purposeful dimension:
- **Intrapersonal intelligence:** Self-direction and purpose
- **Existential intelligence:** Ultimate questions and meaning
- **Goal pursuit:** Each intelligence oriented toward its own ends

### Earth/δγ (Cycling) — Supporting

The developmental dimension:
- **Naturalist intelligence:** Cycles of nature, classification
- **Developmental trajectories:** Each intelligence on its own timeline
- **Growth patterns:** Emergence and refinement over time

