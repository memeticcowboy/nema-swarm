## Core Definition

**Multiple Intelligences Theory (MI)**, proposed by Howard Gardner in his 1983 book *Frames of Mind: The Theory of Multiple Intelligences*, challenges the traditional view of intelligence as a single, general capacity measurable by IQ tests. Instead, Gardner posits that human cognitive capability comprises **multiple, relatively autonomous intelligences** вҖ” distinct information-processing modules that operate independently yet can work in concert.

