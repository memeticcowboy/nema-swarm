context_note: >-
  The Illusion of Self converges Dennett's Multiple Drafts Theory with Vedanta
  philosophy. Both challenge the singular unified self—one through neurocognitive
  mechanisms revealing competing perceptual drafts, the other through
  metaphysical inquiry revealing maya (illusion) and atman (true self identical
  with Brahman). The synthesis reveals how and why the illusion persists.
