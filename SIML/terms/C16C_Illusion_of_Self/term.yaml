  ≈: "What flows between the constructed self and essential consciousness?"
  ▲: "What transforms misidentification into recognition of true nature?"
  𐂷: "How does the narrative loop of identity reinforce itself?"
  ☷: "What grounds the cost of maintaining maya against the liberation of atman?"
