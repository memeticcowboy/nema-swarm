description: Groups manage internal dissonance by collectively projecting uncomfortable qualities onto external targets — outgroups, scapegoats, rival factions. When projection is reciprocated, it creates shared narratives that foster a false sense of internal unity. Emotional hooks include relief from self-confrontation, the simplicity of externalizing blame, and the social belonging that shared enemies provide. Critiques groupthink and tribalism that prioritize cohesion over accountability. Transmitted through echo chambers, political discourse, and satirical media that reinforces in-group identity through outgroup mockery.
