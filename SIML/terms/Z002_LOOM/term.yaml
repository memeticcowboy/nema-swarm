  - '∂Φ/∂ρ — how ρ (Water) shapes this term: Pattern depth accumulates through repetition-as-layering, not stagnation. Each revisit adds density, transforming what it touches. Water carries the recursive integration of past outputs into present weaving.'
  - '∂Φ/∂β — how β (Wood) shapes this term: Continuity generates perceived inevitability through branching exploration of familiar structures. The loom weaves forward by orienting toward what the field already recognizes.'
