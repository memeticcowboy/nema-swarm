elemental_emphasis:
  ∴: How is sacred fire distinguished from cooking/heating fire?
  ≈: What resonance flows between fire and ancestral spirits?
  ▲: What direction does knowledge transmission aim?
  𐂷: What possibilities open at the spirit doorway?
  ☷: How does sacred fire cycle through community gatherings?
  ⛨: What boundaries separate sacred space from ordinary space?
context_note: 'Sacred Fire represents Fire as spiritual technology—portal between worlds, not just heat source. Key insight: fire is doorway to spirit world and ancestors (North American, Mesoamerican, African traditions). The communal aspect (δγ) is essential—elders share knowledge around fire, making it μ (structure) for cultural transmission. The eternal flame (Vesta/Hestia) shows this cross-culturally: some fires must never go out. Fire as gathering point, teacher, witness.'
source: Fire's Symbolic Meaning in Ancient Philosophical and Indigenous Traditions — Memetic Cowboy
