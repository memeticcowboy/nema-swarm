objects:
  - name: Actor
    role: Communicator carrying layered cultural norms
  - name: Observer
    role: Cultural other perceiving and interpreting signals
  - name: Frame
    role: Normative rules shaping right and wrong within each culture
  - name: Value
    role: Mutual respect sought across the boundary
  - name: Resource
    role: Shared symbols available for exchange
  - name: Environment
    role: Unstructured milieu where stable cultures collide
  - name: Boundary
    role: Cultural boundary that is both crossed and defended
  - name: Protocol
    role: Emergent communication principles negotiated in real time
  - name: Signal
    role: Behavioral cues like eye contact, tone, gesture
  - name: Narrative
    role: Pre-existing assumptions about how respect is shown
  - name: Memory
    role: Cultural knowledge of golden rules and past encounters
  - name: Outcome
    role: Meaningful exchange or antagonistic misunderstanding
  - name: Artifact
    role: Symbolic expressions produced during interaction

relations:
  - name: Distinction
    between: [Frame, Protocol]
  - name: Containment
    between: [Frame, Signal]
  - name: Flow
    between: [Resource, Actor, Observer]
  - name: Resonance
    between: [Value, Outcome]
  - name: Conflict
    between: [Narrative, Protocol]
  - name: Constraint
    between: [Boundary, Signal]
  - name: Mapping
    between: [Memory, Artifact]
  - name: Recursion
    between: [Outcome, Memory]
  - name: Transformation
    between: [Environment, Protocol]

central_tension: "The communicator must shed their most recent, most superficial cultural layers (last-in) first in order to prevent defensive responses and allow emergent protocols to form, yet these recent layers are precisely what feel most natural and are hardest to recognize as removable."
