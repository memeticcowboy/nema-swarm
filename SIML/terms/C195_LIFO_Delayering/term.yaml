taxonomy:
  ontology_position: "Straddles process and substance ontology, treating cultural identity as a layered stack where emergent protocols form only through deliberate retrograde peeling of recent assumptions."
  epistemic_stance: "Knowledge is interaction-indexed and perspectival; valid understanding emerges from mutual deconstruction of assumed frames rather than pre-existing normative truths."
  temporal_orientation: "Retrograde—progress demands moving backward through accumulated layers, dissolving the most recent adaptations first to expose deeper shared structure."
  qualia_signature: "Vulnerability-as-peeling: the disorienting sensation of shedding comfortable assumptions to reveal raw communicative potential beneath the boundary."
  agency_gradient: "Distributed and iterative—neither party controls the frame; agency arises through recursive negotiation of protocol within constrained misalignment."
  coherence_topology: "Layered-stack with toroidal closure—surface assumptions wrap and defend a core; coherence emerges when parties recognize depth beneath crossed boundaries."
  ce_potential: "High—the metaprotocol transforms defensive boundary encounters into generative synthesis, crystallizing new symbolic resources from disciplined layer-shedding."

dsrp:
  distinctions:
    - recent_cultural_layer vs deep_cultural_structure
    - assumed_protocol vs emergent_protocol
    - threatening_boundary vs inviting_boundary
  systems:
