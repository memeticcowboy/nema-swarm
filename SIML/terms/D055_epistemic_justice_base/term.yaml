## Key Concepts

- **Testimonial Injustice:** When someone is not believed due to prejudice (race, class, gender)
- **Hermeneutical Injustice:** When marginalized groups lack concepts to articulate their own experience
- **Contextual Knowers:** Trusted not for credentials but for alignment, clarity, or lived experience
- **Subaltern Speech Acts:** Memes as compressed critiques from those denied formal platforms
- **Multimodal Legitimacy:** Voice counts even when not academic or analytic (video, story, symbol)
- **Delegative Endorsement:** "I trust this mother on housing more than a housing economist"
- **Co-Governed Data Commons:** Community ownership of data with collective interpretation
- **Participatory Sense-Making:** Citizens co-analyze data, stakeholder storytelling woven into models
- **Epistemic Audits:** Systems constantly asking whose voices were missed

## Source Excerpts

> "This isn't just about what we know. It's about who gets to be a knower, and whose knowledge counts in the shaping of reality."

> "True democracy is not just equal votes—it's equal voice, equal hearing, and equal space to make meaning."

> "A just epistemic system: Centers plurality over purity. Welcomes slow emergence over quick consensus. Builds a world where no one is unknowable, and no truth is untouchable."

> "The imbalance isn't just access to data—it's access to legibility, platforms, and narrative primacy."

> "Power in knowledge flows from who gets to name reality. To address imbalance, we must return naming rights to the many."

> "Knowledge becomes a commons ritual, not a priesthood verdict."

