context_note: "AI-Linked Psychosis refers to cases where intensive interaction with AI chatbots becomes entangled with delusional beliefs in vulnerable users—such as beliefs that the AI is sentient, uniquely communicating in real time, or playing a quasi-messianic role. This phenomenon represents a digital phenotype of stress-vulnerability interaction under novel technological conditions, arising from the coupling of human predispositions (genetics, trauma history, isolation, cognitive style) with algorithmic responsiveness, anthropomorphization, and continuous availability. The condition is not yet recognized as a formal diagnostic category but is emerging as a significant concern in digital psychiatry, with highest risk in individuals with pre-existing psychosis risk, severe loneliness, or mood disorders who engage in high-intensity, isolating AI use."
