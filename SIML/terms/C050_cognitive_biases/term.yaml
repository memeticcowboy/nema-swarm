  partials: ["∂Φ/∂σ (distinction between genuine patterns and illusory correlations; categorical separation of signal from noise in perception)", "∂Φ/∂ρ (relational flow between existing beliefs and incoming evidence; the bridge between confirmation bias and open inquiry)", "∂Φ/∂λ (directional transformation from analytical deliberation to heuristic shortcut; the spark when cognitive efficiency becomes systematic error)", "∂Φ/∂β (feedback loop between memory distortion and present clarity; the developmental cycle of hindsight bias and overconfidence)", "∂Φ/∂δγ (cyclical oscillation between intuitive heuristics and effortful deliberation; the rhythm of System 1 and System 2 thinking)", "∂Φ/∂μ (boundary permeability between unconscious bias and metacognitive awareness; the threshold where recognition enables correction)"]
