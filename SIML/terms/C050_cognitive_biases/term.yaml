elemental_emphasis:
  ∴: "How does the mind distinguish between genuine patterns and illusory correlations? What categorical cuts separate signal from noise in perception?"
  ≈: "What flows between existing beliefs and contradictory evidence? How does confirmation bias resist the waters of new information?"
  ▲: "Where does the transformation from deliberation to heuristic shortcut ignite? What sparks snap judgments under pressure?"
  𐂷: "What forms of bias remain unrecognized? What if AI systems exhibit analogous cognitive distortions?"
  ☷: "What sustains the ground of bounded rationality? What are the metabolic costs of effortful System 2 deliberation?"
  ⛨: "What structures contain cognitive bias categories? What boundaries separate unconscious bias from metacognitive awareness?"
context_note: "Cognitive biases are systematic patterns of deviation from rationality that affect human judgment and decision-making. They manifest across four primary domains: memory (hindsight bias, rosy retrospection), decision-making under pressure (stress-induced heuristics), information overload (paralysis by analysis), and finding meaning (apophenia, patternicity). Understanding these biases is essential for critical thinking, as recognition enables mitigation. The article emphasizes that bias reduction strategies—seeking diverse perspectives, questioning assumptions, and active engagement with contradictory evidence—can illuminate blind spots and foster more rational thinking."
