term: "Cognitive Biases"
hex_tag: "#C050"
nemetic: "Φ(CognitiveBiases) = σ(pattern|noise) ∘ ρ(belief|evidence) ∘ λ(shortcut|analysis) ∘ β(distortion|clarity) ∘ δγ(heuristic|deliberation) ∘ μ(bias|awareness) + ε | :recognizing"
siml_encoding: "⟨Bias|systematic⟩ ⊳ ⟨Distortion|perceptual⟩ → ⟨Error|predictable⟩ ⊗ ⟨Category|fourfold⟩ ⇄ ⟨Decision|flawed⟩"
