## Core Definition

**Pedagogical Content Knowledge (PCK)**, introduced by Lee Shulman in 1986, is a special form of knowledge that represents "the blending of content and pedagogy into an understanding of how particular topics, problems, or issues are organized, represented, and adapted to the diverse interests and abilities of learners, and presented for instruction."

### The Knowledge Base for Teaching

Shulman identified seven categories of teacher knowledge:

| Category | Description | Element | Operator |
|----------|-------------|---------|----------|
| **Content Knowledge (CK)** | Subject matter knowledge | Air/∴ | σ (distinction) |
| **General Pedagogical Knowledge** | Teaching strategies, classroom management | Metal/⛨ | μ (structure) |
| **Curriculum Knowledge** | Materials, programs, scope/sequence | Metal/⛨ | μ (organization) |
| **PCK** | Content knowledge for teaching | ✶ | Integration of all |
| **Knowledge of Learners** | Understanding students' backgrounds | Water/≈ | ρ (resonance) |
| **Knowledge of Educational Contexts** | School, district, community settings | Earth/☷ | δγ (context) |
| **Knowledge of Educational Ends** | Purposes, values, philosophical aims | Fire/▲ | λ (purpose) |

