## Components of PCK

### 1. Knowledge of Subject Matter Representations

| Representation Type | Function | Example (Teaching Photosynthesis) |
|---------------------|----------|-----------------------------------|
| **Analogies** | Connect to known concepts | "Factory making sugar from sunlight" |
| **Metaphors** | Create vivid understanding | "Solar panels in leaves" |
| **Models** | Simplify complex systems | Diagrams showing inputs/outputs |
| **Examples** | Ground in specifics | Specific plants, experiments |
| **Demonstrations** | Show processes in action | Elodea bubbling experiment |
| **Illustrations** | Visual representation | Cross-section of leaf |

### 2. Knowledge of Learner Conceptions

```
LEARNER CONCEPTIONS ABOUT PHOTOSYNTHESIS
═══════════════════════════════════════════════════════════════

Preconceptions (Common Misconceptions):
├── Plants get food from soil (not air/sun)
├── Plants breathe in CO2 and out O2 only
├── Photosynthesis and respiration are opposites
├── Green plants don't respire
└── Light is only for warmth

Knowledge of these misconceptions = PCK component
Knowing how to address them = PCK in action
```

### 3. Knowledge of Teaching Strategies

| Strategy | When to Use | PCK Element |
|----------|-------------|-------------|
| **Inquiry-based** | When exploring phenomena | Content structure guides inquiry design |
| **Direct instruction** | When efficiency matters | Content determines what needs telling |
| **Conceptual change** | When misconceptions exist | Content barriers guide approach |
| **Scaffolding** | When building understanding | Content complexity determines support |
| **Collaborative learning** | When multiple perspectives help | Content richness enables discussion |

## Elemental Pattern Analysis

### Aether/✶ Dominance (Integration, Harmony, Transformation)

PCK is fundamentally an **Aether/Child theory**:
- **Integration:** The fusion of content and pedagogy into something new
- **Harmony:** The balance between disciplinary integrity and learner accessibility
- **Transformation:** Content is reshaped, not merely transmitted
- **Emergence:** PCK emerges from practice, not just from knowing content or pedagogy separately

