## Core Definition

**Reflective Practice** is a theory of professional learning developed by Donald Schön (1983) that emphasizes the role of reflection in developing professional knowledge and competence. Schön challenged the dominant "technical rationality" model—which assumes professionals apply scientific knowledge to instrumental problems—and proposed instead that professional knowing emerges through reflection on the "messy," indeterminate situations of practice.

Schön distinguished between two modes of reflection:

1. **Reflection-in-Action:** Thinking about what we're doing while we're doing it, responding to surprise and adjusting our approach in the moment

2. **Reflection-on-Action:** Retrospective examination of practice, analyzing what happened after the fact to develop new understandings

