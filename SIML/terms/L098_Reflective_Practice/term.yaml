## Elemental Analysis

### Earth (δγ): Cyclical Return and Metabolic Processing

- **Cycling:** Reflection is inherently cyclical—experience → reflection → new understanding → new experience
- **Metabolic:** The "digestion" of experience into knowledge, transforming raw events into nourishment for growth
- **Grounding:** Reflection keeps practice grounded in actual experience rather than abstract theory
- **Patience:** The slow, iterative nature of deep professional learning

### Water (ρ): Resonance and Tacit Flow

- **Resonance:** The felt-sense of "rightness" or "wrongness" in practice
- **Flow:** Tacit knowing flows beneath explicit awareness, guiding skilled action
- **Adaptation:** Water-like responsiveness to the unique contours of each situation
- **Depth:** The depths of professional knowing that lie beneath the surface of articulation

### Air (σ): Distinction and Clarity

- **Distinction:** Separating what worked from what didn't; distinguishing espoused theory from theory-in-use
- **Clarity:** The "aha" moment when reframing brings new understanding
- **Surprise:** The disturbance that breaks routine and triggers reflection
- **Articulation:** Making the tacit explicit through description and analysis

### Fire (λ): Direction and Transformation

- **Direction:** The inquiry that moves toward deeper understanding
- **Transformation:** The heat of reflection that transforms experience into knowledge
- **Purpose:** The commitment to professional growth and improved practice
- **Courage:** The willingness to confront uncomfortable truths about one's practice

### Wood (β): Generation and Growth

- **Generation:** New understanding branching from reflection on experience
- **Growth:** Professional development as organic, not mechanical
- **Reframing:** The creative leap to new ways of seeing situations
- **Experiment:** Trying new approaches based on reflective insight

