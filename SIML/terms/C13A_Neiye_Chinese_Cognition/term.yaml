elemental_emphasis:
  ∴: How does the Neiye distinguish cognition centered in heart-mind from brain-centered thinking?
  ≈: What flows between balanced and imbalanced internal states during cultivation?
  ▲: Where does cultivation practice lead — toward clarity or mere quietude?
