  - ∂Φ/∂σ (distinguishing creation — the free generative act of making something beautiful, functional, or innovative — from entrapment — the condition of being bound by the very system one has created or inherited; the boundary between maker and made dissolves as the creation generates constraints that ensnare the creator, revealing that the act of building can simultaneously be the act of binding)
  - ∂Φ/∂ρ (the relational dynamics between creator and creation as binding force — the system, structure, or beautiful work does not remain separate from its maker but exerts relational power back upon them; the architect becomes enslaved by their architecture, the designer trapped within their design; this is not external oppression but an emergent property of the creative act itself)
  - ∂Φ/∂λ (the transformation from beauty and ingenuity — the creative brilliance that produces something admirable — into systemic ironic reversal — where that very brilliance becomes the mechanism of constraint; like Icarus whose wings enabled both flight and destruction, the transformative power of creation contains within it the seeds of the creator's entrapment)
  - ∂Φ/∂β (the developmental trajectory from the free creative act — unencumbered invention and design — to the emergence of deterministic constraints — where the created system develops its own logic, momentum, and binding force; the growth of a system is simultaneously the growth of the creator's confinement within it)
