  partials:
  - '∂Φ/∂σ — Air distinguishes between closure-seeking authority and open witnessing. The child refuses the demand to name, creating space where meaning can emerge without being seized. Distinction here is apophatic: what is not said carries the signal.'
  - ∂Φ/∂ρ — Water relates the child to the world through non-possessive presence. The relational field is one of tender refusal, where care operates without compliance and connection persists without instruction.
  - ∂Φ/∂λ — Fire transforms the compulsion to understand into the practice of walking through. The initiatory journey replaces resolution with passage, converting the demand for answers into lived movement through wreckage.
  - ∂Φ/∂β — Wood grows meaning through the child's unfolding journey rather than through imposed explanation. Growth is non-linear, emerging from sacred delay and the refusal to rush understanding into premature form.
  - ∂Φ/∂δγ — Earth cycles wreckage into breathability. The child does not repair the world but walks through it, composting grief and loss into something livable through continued passage rather than restoration.
