### The Civic Metabolism Loop

```
Attention → Symbol → Affect → Delegation → Deliberation → Legitimacy → Attention
```

This is not linear but **recursive**: legitimacy feeds back into attention, creating self-sustaining (or self-undermining) civic coherence. Emergence occurs when symbolic coherence aligns with collective trust thresholds.

