## Core Concept

The Civic Symbolic Stack represents the **architectural integration** of three previously analyzed governance models (D003 Memetic Governance, D002 Liquid Democracy, D004 Deliberation in the Attention Economy) into a unified, layered system. Where the individual papers examined each model in isolation, this integration reveals how they braid together into a coherent civic metabolism.

This is the **stack term**: governance reconceived as layered infrastructure, where symbolic membranes filter meaning, delegation fabrics route trust, and deliberative cores metabolize complexity into temporary consensus.

### The Four-Layer Stack

| Layer | Function | Governance Mode | Elemental Correspondence |
|-------|----------|-----------------|-------------------------|
| **Symbolic Membrane** | Sense-making filters | Memetic Governance | σ-Air (distinction, symbolic boundaries) |
| **Delegation Fabric** | Fluid governance topology | Liquid Democracy | ρ-Water (resonance, trust flow) |
| **Deliberative Core** | Deep cognition layer | Networked Deliberation | δγ-Earth (cycling, slow processing) |
