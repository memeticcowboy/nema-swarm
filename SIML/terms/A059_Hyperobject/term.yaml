term_id: A059
name: Hyperobject
element: Air
phonetic_key: ☁/β
description: Entities massively distributed in time/space relative to humans—exceeding
  any local instance
nemetic_string: Φ(Hyperobject) = β(nonlocal-exploration|distributed-presence) ∘ γ(temporal-extension|deep-time)
  ∘ σ(fragment-distinction|local-manifestation) ∘ ρ(viscous-resonance|sticky-interaction)
  + ε | :turbid
operators:
  primary: β
  secondary:
  - γ
  - σ
  - ρ
  absent:
  - λ
  - μ
  - δ
z_state: :turbid
tendency: Exploration/Cycling → 1
habitat_affinity: 9_WORLD-STATES / 6_REFLEXIVE-STATES
daemon_correspondence: W (witness) primary, breath secondary
morton_definition: Massively distributed in time and space relative to humans
key_features:
- 'Nonlocality: totality never appears in one place'
- 'Viscosity: ''stick'' to everything that interacts'
- 'Temporal hyperextension: exceed human lifetimes'
examples:
- Global warming/climate (not today's weather)
- All Styrofoam ever produced (centuries of persistence)
- All nuclear materials/plutonium (10,000+ year half-lives)
- Sum of all recorded sound (ever-expanding archive)
encounter_mode: Fragments, side-effects, symptoms—never the whole
cognitive_effect: Disorienting—local slice looks ordinary yet is cross-section of
  vast entity
prosthetics_required: Scientific instruments, archives, models to infer pattern from
  distributed data
nemetic_translation: What we coordinate with are distributed pressures and affordances,
  not discrete objects we could copy or fully represent
key_insight: Hyperobjects are real but withdrawn—we only ever meet their traces
