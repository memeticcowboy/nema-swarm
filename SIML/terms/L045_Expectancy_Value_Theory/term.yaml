## Developmental Trajectories

### Expectancy Beliefs Across Development

```
EXPECTANCY BELIEFS OVER TIME

Childhood (Ages 5-8):
    High, optimistic beliefs
    "I can do anything!"
    Little differentiation between domains
    
Early Adolescence (Ages 9-12):
    Increasing differentiation
    Beginning of ability attributions
    Social comparison emerges
    
Adolescence (Ages 13-18):
    Decline in some domains (especially math for girls)
    Stabilization of self-concept
    Strong domain-specificity
    
Adulthood:
    Relatively stable
    Based on accumulated evidence
    Can be modified through mastery experiences
```

### Value Development

```
VALUE TRAJECTORIES

Intrinsic Value:
    Often declines from elementary to high school
    Subject-specific patterns
    Influenced by teaching quality, autonomy support

Attainment Value:
    Increases with identity development
    Strong gender and cultural patterns
    Linked to significant others' expectations

Utility Value:
    Increases with future orientation
    Critical during educational transitions
    Can be enhanced through connections to goals
```

## Elemental Pattern Analysis

### Fire/λ Dominance

Expectancy-Value Theory is fundamentally a **Fire theory**:
- **Directional purpose:** Motivation is goal-directed and purposeful
- **Value as compass:** What we value determines where we direct our energy
- **Expectancy as fuel:** Belief in success provides the confidence to act
- **Achievement striving:** The theory explains the fire of achievement motivation

### Supporting Elements

| Element | Role in Expectancy-Value Theory |
|---------|--------------------------------|
| **Air/σ** | Expectancy beliefs — the cognitive distinction between "can" and "cannot" |
| **Water/ρ** | Attainment value — emotional resonance with identity and importance |
| **Metal/μ** | Utility value — structured instrumentality, goal-pathways |
| **Earth/δγ** | Cost value — trade-offs, effort expenditure, temporal dynamics |
| **Child/✶** | Intrinsic value — pure enjoyment, harmonic engagement |
| **Knowledge/κ** | Self-concept of ability — accumulated competence beliefs |

## Connection to Related Theories

### Expectancy-Value and Attribution Theory (L044)

| Aspect | Attribution Theory | Expectancy-Value Theory |
|--------|-------------------|------------------------|
| **Focus** | How we explain past outcomes | How we anticipate future outcomes |
| **Time orientation** | Retrospective | Prospective |
| **Element** | Air (σ) — explanation | Fire (λ) + Air (σ) — direction + belief |
| **Relationship** | Attributions shape expectancy beliefs | Expectancies influence value appraisals |

**Recursive relationship:**
```
Past Success → Internal, stable attribution
           → High self-concept of ability
           → High expectancy for future success
           → Increased task value
           → Motivated engagement
           → Future success (cycle continues)
```

### Expectancy-Value and Self-Determination Theory (L015)

| Aspect | Self-Determination Theory | Expectancy-Value Theory |
|--------|--------------------------|------------------------|
| **Core concept** | Basic psychological needs | Expectancy-value calculus |
| **Intrinsic motivation** | Autonomy + competence + relatedness | Intrinsic value + high expectancy |
| **Element** | Fire (λ) — intrinsic direction | Fire (λ) + multiple elements |
| **Complement** | SDT explains why intrinsic motivation matters | EVT explains how value components combine |

**Integration:**
- SDT's competence need ↔ EVT's expectancy beliefs
- SDT's autonomy need ↔ EVT's intrinsic value
- SDT's relatedness need ↔ EVT's attainment value (identity)

### Expectancy-Value and Self-Efficacy (P001)

| Aspect | Self-Efficacy | Expectancy-Value Theory |
|--------|---------------|------------------------|
| **Core belief** | "Can I do this specific task?" | "Will I succeed?" + "Do I want to?" |
| **Scope** | Domain-specific confidence | Motivational system |
| **Element** | Water (ρ) — confidence/resonance | Fire (λ) + Air (σ) — direction + distinction |
| **Relationship** | Self-efficacy is a component of expectancy | Expectancy incorporates efficacy beliefs |

## Practical Applications

### Enhancing Expectancy Beliefs

```
STRATEGIES FOR BUILDING EXPECTANCY

1. MASTERY EXPERIENCES (Most powerful)
   • Scaffolded success experiences
   • Progressive challenge
   • Attribution to effort and strategy
   Element: β (Wood) — growth through success

2. VICARIOUS EXPERIENCES
   • Models similar to learner
   • See others succeed through effort
   • "If they can, I can"
   Element: ρ (Water) — social resonance

3. VERBAL PERSUASION
   • Specific, credible feedback
   • Focus on process, not just ability
   • Avoid empty praise
   Element: σ (Air) — clear communication

4. PHYSIOLOGICAL STATES
   • Reduce anxiety
   • Stress management
   • Positive emotional framing
   Element: ρ (Water) — emotional regulation
```

### Enhancing Task Value

```
STRATEGIES FOR BUILDING VALUE

ATTAINMENT VALUE (Identity Connection):
   • Connect to personal values
   • Highlight identity-relevance
   • "Scientists like you..."
   Element: ρ (Water) — personal resonance

INTRINSIC VALUE (Enjoyment):
   • Autonomy support
   • Choice and variety
   • Make learning enjoyable
   Element: ✶ (Child) — playful engagement

UTILITY VALUE (Usefulness):
   • Connect to future goals
   • Real-world applications
   • Career relevance
   Element: μ (Metal) — instrumental structure

COST REDUCTION:
   • Efficient instruction
   • Flexible pathways
   • Support for effort
   Element: δγ (Earth) — manageable demands
```

## The Motivational Equation in Practice

```
CLASSROOM SCENARIO: Mathematics

Student A:
    Expectancy: 0.8 ("I'm good at math")
    Value: 0.9 ("Math matters for my future")
    Motivation: 0.8 × 0.9 = 0.72 (HIGH)
    → Chooses advanced math
    → Persists through difficulty
    → Achieves well

Student B:
    Expectancy: 0.8 ("I'm good at math")
    Value: 0.2 ("When will I use this?")
    Motivation: 0.8 × 0.2 = 0.16 (LOW)
    → Takes minimum requirements
    → Does enough to get by
    → Underachieves relative to ability

Student C:
    Expectancy: 0.3 ("I'm not a math person")
    Value: 0.9 ("I need math for medical school")
    Motivation: 0.3 × 0.9 = 0.27 (ANXIOUS)
    → High anxiety
    → Avoids challenging courses
    → Self-handicapping behaviors

Student D:
    Expectancy: 0.2 ("I'll never get this")
    Value: 0.1 ("Who cares?")
    Motivation: 0.2 × 0.1 = 0.02 (APATHETIC)
    → Disengagement
    → Behavioral problems
    → Learned helplessness
```

## Gender and Cultural Patterns

### Gender Differences in Value

```
TRADITIONAL PATTERNS (changing but persistent)

Mathematics:
    Boys: Higher expectancy, similar intrinsic value
    Girls: Lower expectancy (despite equal achievement),
           lower attainment value ("math isn't for me")

Language Arts:
    Girls: Higher expectancy and value across all components
    Boys: Lower value, especially intrinsic and attainment

Science:
    Gender gaps largest in physics and engineering
    Related to stereotypes and socialization
    Attainment value particularly affected
```

### Cultural Influences

| Cultural Factor | Impact on Expectancy | Impact on Value |
|-----------------|---------------------|-----------------|
| **Collectivism** | Group ability beliefs | Family attainment value high |
| **Individualism** | Personal efficacy emphasized | Personal interest valued |
| **Gender roles** | Stereotype threat effects | Domain-specific value gaps |
| **Socioeconomic status** | Resource access affects expectancy | Utility value varies by opportunity |

