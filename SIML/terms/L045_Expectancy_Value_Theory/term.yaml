## Core Insight

> Expectancy-Value Theory reveals that motivation is not a unitary force but a dynamic interplay between what we believe we can do and what we believe is worth doing. The multiplicative relationship is crucial — high expectancy without value produces complacent competence; high value without expectancy produces anxious avoidance. True motivation requires both the confidence to act and the purpose that makes action meaningful. Educators must attend to both belief-building and value-cultivation to unlock learner potential.

## One-Sentence Insight

> Expectancy-Value Theory demonstrates that achievement motivation emerges from the multiplicative combination of expectancy beliefs (confidence in success) and subjective task values (attainment, intrinsic, utility, and cost), explaining why individuals choose, persist in, and achieve at different learning tasks.

## Three-Bullet Expansion

- **What:** A comprehensive theory of achievement motivation proposing that behavior is determined by expectancy for success (beliefs about competence and task difficulty) and subjective task value (attainment/importance, intrinsic/enjoyment, utility/usefulness, and cost), with motivation being the product of these factors
- **How it works:** Socialization experiences and cultural context shape individual differences in aptitudes and self-perceptions; these influence the formation of expectancy beliefs and value appraisals; the interaction of expectancy and value determines motivational intensity, which drives task choice, persistence, and performance; outcomes feed back to modify future expectancies and values
- **Where it aims:** Toward optimal motivational profiles where high expectancy combines with high value across multiple components, producing engaged, persistent, and successful learners who choose challenging tasks and maintain effort through difficulty

