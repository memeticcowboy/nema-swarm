## The Four Components of Subjective Value

| Value Type | Definition | Element | Core Question |
|------------|------------|---------|---------------|
| **Attainment Value** | Importance of doing well; personal/social identity | ρ (Water) | "Does success matter to who I am?" |
| **Intrinsic Value** | Enjoyment, interest in the task itself | ✶ (Child/Aether) | "Do I enjoy this?" |
| **Utility Value** | Usefulness for future goals | μ (Metal) | "Does this help me achieve my goals?" |
| **Cost** | Negative aspects: effort, lost opportunities, emotional toll | δγ (Earth) | "What must I sacrifice?" |

