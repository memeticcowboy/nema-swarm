## Core Definition

**Expectancy-Value Theory**, developed by Jacquelynne Eccles and Allan Wigfield (2002), proposes that achievement motivation and behavior are determined by two primary factors: **expectancy** (beliefs about one's ability to succeed at a task) and **value** (the perceived importance, usefulness, and cost of engaging with the task). The theory provides a comprehensive framework for understanding why individuals choose, persist in, and achieve at different academic and life tasks.

