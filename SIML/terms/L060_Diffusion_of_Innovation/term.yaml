## Critical Mass and Tipping Points

The theory identifies **critical mass** — the point at which enough individuals have adopted an innovation that its further adoption becomes self-sustaining. This is the ✶ (Child/Aether) harmonic point where:

- Network effects take over
- Adoption becomes normative
- The innovation becomes "the way things are done"

