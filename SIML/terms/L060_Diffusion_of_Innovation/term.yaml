## Core Definition

**Diffusion of Innovation** explains how new ideas, practices, and technologies spread through social systems over time. Everett Rogers' theory, first published in 1962 and now in its 5th edition, identifies the patterns by which innovations are communicated through channels among members of a social system.

### The Five Stages of the Adoption Process

| Stage | Description | Element |
|-------|-------------|---------|
| **Knowledge** | Person learns about innovation | σ (Air) |
| **Persuasion** | Person forms favorable/unfavorable attitude | ρ (Water) |
| **Decision** | Person engages in activities leading to adoption/rejection | λ (Fire) |
| **Implementation** | Person puts innovation to use | β (Wood) |
| **Confirmation** | Person seeks reinforcement for decision | δγ (Earth) |

### The Five Adopter Categories

| Adopter Category | % of Population | Characteristics | Element |
|------------------|-----------------|-----------------|---------|
| **Innovators** | 2.5% | Risk-takers, venturesome, desire novelty | β (Wood) |
| **Early Adopters** | 13.5% | Opinion leaders, respectable, judicious | ✶ (Child) |
| **Early Majority** | 34% | Deliberate, adopt before average | δγ (Earth) |
| **Late Majority** | 34% | Skeptical, adopt after average | μ (Metal) |
| **Laggards** | 16% | Tradition-bound, isolated, suspicious | μ (Metal) |

### The Five Perceived Attributes of Innovation

| Attribute | Definition | Adoption Impact | Element |
|-----------|------------|-----------------|---------|
| **Relative Advantage** | Degree to which innovation is better than idea it supersedes | Higher = faster adoption | λ (Fire) |
| **Compatibility** | Consistency with existing values, past experiences, needs | Higher = faster adoption | ρ (Water) |
| **Complexity** | Degree of difficulty understanding and using | Lower = faster adoption | σ (Air) |
| **Trialability** | Extent to which may be experimented with on limited basis | Higher = faster adoption | β (Wood) |
| **Observability** | Extent to which results are visible to others | Higher = faster adoption | σ (Air) |

