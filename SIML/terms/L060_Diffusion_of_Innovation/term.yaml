## Core Insight

> Diffusion of Innovation reveals that **the spread of new ideas is not random but follows predictable patterns** shaped by social networks, time, and the perceived attributes of innovations. The theory shows that adoption is a social process — individuals are influenced by their connections, by opinion leaders, and by the accumulating weight of others' decisions. Understanding these patterns enables intentional design of change: identifying key influencers, reducing complexity, enabling trialability, and building toward critical mass.

## One-Sentence Insight

> Diffusion of Innovation demonstrates that new ideas spread through social systems in predictable patterns shaped by network structure, adopter characteristics, and innovation attributes — with adoption accelerating toward critical mass when relative advantage, compatibility, and observability resonate across the social fabric.

## Three-Bullet Expansion

- **What:** A theory explaining how innovations spread through social systems via communication channels over time, identifying five adopter categories (innovators to laggards) and five perceived attributes that determine adoption rate
- **How it works:** Knowledge → Persuasion → Decision → Implementation → Confirmation; spread follows an S-curve with adoption accelerating as opinion leaders influence early majority, reaching critical mass when network effects become self-sustaining
- **Where it aims:** Toward system transformation through strategic diffusion — identifying change agents, reducing complexity, enabling trialability, and building toward the tipping point where innovation becomes normative

