## The Three Cognitive Processes of Meaningful Learning

### 1. Selecting (Extraneous Processing Control)

```
SELECTION PROCESS
│
├── Visual Channel
│   ├── Attend to relevant images/graphics
│   ├── Filter out irrelevant visual details
│   └── Transfer to working memory
│
└── Verbal Channel
    ├── Attend to relevant spoken/written words
    ├── Filter out irrelevant verbal content
    └── Transfer to working memory
```

**Key Principle:** Working memory is limited. Only essential information should be selected for processing.

### 2. Organizing (Essential Processing)

```
ORGANIZATION PROCESS
│
├── Visual Channel
│   ├── Build coherent visual representation
│   ├── Establish spatial relationships
│   └── Create pictorial model
│
└── Verbal Channel
    ├── Build coherent verbal representation
    ├── Establish logical/causal relationships
    └── Create verbal model
```

**Key Principle:** Raw information must be structured into coherent mental representations within each channel.

### 3. Integrating (Generative Processing)

```
INTEGRATION PROCESS
│
┌─────────────────────────────────────────────────────────────┐
│                                                             │
│   Pictorial Model          Verbal Model                     │
│        │                        │                           │
│        └──────────┬─────────────┘                           │
│                   ▼                                         │
│         ┌─────────────────┐                                 │
│         │  INTEGRATION    │                                 │
│         │  • Connect      │                                 │
│         │    visual-verbal│                                 │
│         │  • Map to prior │                                 │
│         │    knowledge    │                                 │
│         │  • Build unified│                                 │
│         │    mental model │                                 │
│         └─────────────────┘                                 │
│                   │                                         │
│                   ▼                                         │
│         Long-Term Memory Storage                            │
│                                                             │
└─────────────────────────────────────────────────────────────┘
```

**Key Principle:** Deep learning occurs when verbal and visual representations are integrated with each other and with prior knowledge.

## The 12 Principles of Multimedia Learning

### Principles for Reducing Extraneous Processing

| Principle | Description | Element |
|-----------|-------------|---------|
| **Coherence** | Exclude irrelevant words, pictures, sounds | Metal/μ |
| **Signaling** | Highlight essential material | Wood/β |
| **Redundancy** | Don't add on-screen text to narrated graphics | Air/σ |
| **Spatial Contiguity** | Place corresponding words and pictures near each other | Water/ρ |
| **Temporal Contiguity** | Present corresponding words and pictures simultaneously | Water/ρ |

### Principles for Managing Essential Processing

| Principle | Description | Element |
|-----------|-------------|---------|
| **Segmenting** | Break lessons into learner-paced segments | Earth/δγ |
| **Pre-training** | Teach names and characteristics of key components | Metal/μ |
| **Modality** | Present words as spoken narration rather than on-screen text | Air/σ |

### Principles for Fostering Generative Processing

| Principle | Description | Element |
|-----------|-------------|---------|
| **Multimedia** | Use words and pictures rather than words alone | Child/✶ |
| **Personalization** | Use conversational style rather than formal style | Water/ρ |
| **Voice** | Use human, friendly voice rather than machine voice | Water/ρ |
| **Image** | Show author's video or image (not required for learning) | Fire/λ |
| **Embodiment** | Show instructor's gesturing hands | Wood/β |

