## The Three Types of Cognitive Load

```
COGNITIVE LOAD TYPES
│
┌─────────────────────────────────────────────────────────────────┐
│                                                                 │
│  EXTRANEOUS LOAD (Bad — Eliminate)                              │
│  ├── Caused by poor instructional design                        │
│  ├── Does not support learning objectives                       │
│  ├── Examples: irrelevant details, confusing layout             │
│  └── Counter: Coherence, Signaling, Redundancy principles       │
│                                                                 │
│  ESSENTIAL LOAD (Necessary — Manage)                            │
│  ├── Caused by complexity of essential material                 │
│  ├── Required for learning objectives                           │
│  ├── Examples: understanding relationships, building schemas    │
│  └── Counter: Segmenting, Pre-training, Modality principles     │
│                                                                 │
│  GENERATIVE LOAD (Good — Foster)                                │
│  ├── Caused by deep cognitive processing                        │
│  ├── Leads to meaningful learning                               │
│  ├── Examples: integrating, organizing, connecting              │
│  └── Counter: Multimedia, Personalization, Voice principles     │
│                                                                 │
└─────────────────────────────────────────────────────────────────┘
```

