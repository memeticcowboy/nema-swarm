## Core Definition

**Multimedia Learning Theory**, developed by Richard Mayer beginning in the 1990s and formalized in his 2001 book *Multimedia Learning*, provides evidence-based principles for designing instruction that combines words (spoken or printed) with pictures (static graphics, photos, illustrations, charts, animation, or video). The theory is grounded in cognitive science research on how humans process information and has been validated through hundreds of experimental studies.

### The Core Principle

> People learn better from words and pictures than from words alone — but only when the multimedia is designed according to cognitive principles that support human information processing.

