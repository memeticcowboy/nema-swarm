## The Extended Mind Hypothesis (Clark & Chalmers)

```
Parity Principle:
    If an external process would count as cognitive 
    if it occurred inside the head,
    then it counts as cognitive when it occurs outside.

Examples:
    - Notebook as memory (Otto and Inga case)
    - Calculator as arithmetic
    - Smartphone as extended knowledge access
    - Pen and paper as extended working memory
```

**Controversy:** Where does cognition end and environment begin? The "mark of the cognitive" debate.

