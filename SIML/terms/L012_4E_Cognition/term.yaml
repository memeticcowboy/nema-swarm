## Core Definition

**4E Cognition** represents a family of approaches challenging the computational-representational view of mind. Cognition emerges from dynamic coupling between brain, body, and environment:

1. **Embodied:** Cognitive processes are shaped by bodily structures and capacities
2. **Extended:** Cognitive systems include external tools and resources
3. **Embedded:** Cognition is context-dependent, situated in specific environments
4. **Enactive:** Cognition is action-oriented, bringing forth meaning through interaction

