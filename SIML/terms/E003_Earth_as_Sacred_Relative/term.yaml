context_note: 'The Indigenous Earth is radically different from Greek or Ayurvedic
  conceptions—not element, not body, but relative. The key shift: from ''belonging
  to the Earth'' (ownership model) to ''the Earth belongs to itself, we belong with
  it'' (kinship model). This is ρ (resonance) as ethical foundation, not just affect.
  Land loss = spiritual trauma, not resource deprivation.'
source: The Elemental and the Ethereal — Memetic Cowboy
