    │   • System dynamics                     │
    └─────────────────────────────────────────┘

    Learners navigate non-linearly,
    criss-crossing the landscape
```

## Core Insight

> Cognitive Flexibility Theory reveals that advanced knowledge cannot be built through simplification and repetition alone. In complex domains, concepts are **irreducibly context-dependent** — the same principle behaves differently in different situations. True expertise requires **cognitive flexibility**: the ability to assemble and reassemble knowledge structures to fit novel circumstances. This flexibility emerges only from **criss-crossing the conceptual landscape** — revisiting the same territory multiple times from multiple directions.

## One-Sentence Insight

> Spiro's Cognitive Flexibility Theory demonstrates that advanced knowledge acquisition in ill-structured domains requires criss-crossing multiple cases and representations — building adaptable understanding that can flex to fit novel contexts rather than applying rigid rules.

## Three-Bullet Expansion

- **What:** A theory of advanced knowledge acquisition arguing that complex, ill-structured domains require instruction through multiple cases and representations (criss-crossing), rather than simplified rules, to build flexible, transferable understanding
- **How it works:** Present the same concept across diverse cases → highlight different themes in each context → enable non-linear exploration → build flexible schema assembly capacity rather than rigid knowledge structures
- **Where it aims:** Toward adaptive expertise — the ability to apply knowledge flexibly across novel situations, avoiding "inert knowledge" that cannot transfer beyond the learning context

