## The Self-Determination Continuum

```
Amotivation → External Regulation → Introjected Regulation → Identified Regulation → Integrated Regulation → Intrinsic Motivation
     │              │                      │                       │                      │                    │
     └──────────────┴──────────────────────┴───────────────────────┴──────────────────────┴────────────────────┘
                              EXTERNAL ←──────────────────────────────────────────────→ INTERNAL
                              CONTROLLED ←────────────────────────────────────────────→ AUTONOMOUS
                              
     Non-self-determined ←────────────────────────────────────────────────────────────────→ Self-determined
```

| Regulation Type | Locus of Causality | Experience | Example |
|-----------------|-------------------|------------|---------|
| **Amotivation** | Impersonal | No intention | "I don't see the point" |
| **External** | External | Compliance, external reward/punishment | "I have to do this for the grade" |
| **Introjected** | Somewhat external | Internal pressure, guilt, anxiety | "I should do this or I'll feel bad" |
| **Identified** | Somewhat internal | Personal importance, conscious valuing | "This matters to my goals" |
| **Integrated** | Internal | Congruence with self | "This aligns with who I am" |
| **Intrinsic** | Internal | Interest, enjoyment, inherent satisfaction | "I do this because I love it" |

