## Core Definition

**Self-Determination Theory** (Deci & Ryan, 1985, 2000) is a macro-theory of human motivation and personality that argues for three innate, universal psychological needs:

1. **Autonomy:** The need to experience volition and self-endorsement in action
2. **Competence:** The need to feel effective and capable in one's activities
3. **Relatedness:** The need to feel connected to and cared for by others

When these needs are satisfied, people experience intrinsic motivation, vitality, and well-being. When thwarted, motivation becomes controlled, and wellness suffers.

