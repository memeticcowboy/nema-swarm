## SDT in Educational Contexts

### The Motivation Paradox

```
Traditional Approach (Control):
    Rewards → Compliance → External regulation
    Surveillance → Anxiety → Introjected regulation
    Deadlines → Pressure → Controlled motivation
    
SDT Approach (Support):
    Choice → Autonomy satisfaction → Intrinsic motivation
    Optimal challenge → Competence satisfaction → Engagement
    Connection → Relatedness satisfaction → Internalization
```

### Instructional Strategies by Need

| Need | Supportive Practice | Thwarting Practice |
|------|--------------------|--------------------|
| **Autonomy** | Provide choice, rationale, acknowledge feelings | Control, surveillance, conditional regard |
| **Competence** | Optimal challenge, informational feedback, structure | Excessive difficulty, controlling feedback, chaos |
| **Relatedness** | Warmth, caring, inclusion, belonging | Rejection, coldness, exclusion |

## Connection to CAMIL and IVR

Self-Determination Theory transforms immersive learning design:
- **Agency in IVR:** Virtual environments can provide unprecedented autonomy (free exploration, choice)
- **Competence Feedback:** Real-time, embodied feedback on performance
- **Social VR:** Relatedness through avatar interaction, virtual presence

**Evidence:** Makransky & Petersen (2021) — presence and agency in IVR drive learning through SDT mechanisms

**Design Implications:**
- Avoid excessive external control in immersive environments
- Provide meaningful choices within virtual worlds
- Support competence through scaffolded challenges
- Enable social connection in multi-user VR

