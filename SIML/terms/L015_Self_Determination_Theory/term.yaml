## Core Insight

> Self-Determination Theory reveals that motivation is not something done *to* people but something that emerges *from* people when their basic psychological needs are satisfied. The most powerful motivation is not external reward but **internal volition** — the experience of freely choosing to engage because the activity is inherently meaningful and satisfying.

## One-Sentence Insight

> Deci & Ryan's Self-Determination Theory demonstrates that human flourishing emerges when three basic needs are satisfied: autonomy (volition), competence (mastery), and relatedness (connection) — shifting motivation from external control to internal purpose.

## Three-Bullet Expansion

- **What:** A macro-theory of motivation arguing that humans have three innate psychological needs (autonomy, competence, relatedness) that must be satisfied for intrinsic motivation, well-being, and optimal development to occur
- **How it works:** Need satisfaction → intrinsic motivation and internalization → self-regulated engagement → integrated self and wellness; need thwarting → controlled motivation → alienation and ill-being
- **Where it aims:** Toward understanding motivation as growth-oriented and self-determined — learning and development as natural tendencies that require nurturing (not controlling) social contexts

