  - '∂Φ/∂σ — how σ (Air) shapes this term: Air distinguishes the emergent cut between healthy bur oak tissue and Tubakia iowensis infection. The signal is the wedge-shaped necrotic lesion; the noise is abiotic leaf scorch and other oak pathogens. The distinction itself is unstable — early infection mimics drought stress, making the cut hard to perceive until the lesion consolidates.'
  - '∂Φ/∂ρ — how ρ (Water) shapes this term: Water resonates the coupling between wet spring weather and spore dispersal. The fungus requires moisture for infection; climate patterns that extend wet seasons into summer amplify this resonance. The felt-but-not-named pressure is the Midwestern forester''s dread of a cool wet May.'
  - '∂Φ/∂δγ — how δγ (Earth) shapes this term: Earth metabolizes the tree''s vascular integrity, cycling carbohydrates downward until the root system starves. Premature defoliation in consecutive years depletes stored reserves. What composts is the tree''s capacity to reflush — each infection season consumes metabolic substrate that cannot be recovered.'
