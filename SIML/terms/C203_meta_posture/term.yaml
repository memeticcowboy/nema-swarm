overlay:
  ontology: >-
    A pre-operator preparatory stance that holds the cognitive field Φ open
    before any commitment or action fires; it is a meta-cognitive condition
    composed of eight partial conditions (c₁–c₈) that collectively maintain the
    field in a state of non-zero openness.
  epistemics: >-
    Knowing is generated by the observer from within the field rather than
    discovered externally, using tension gradients as data, treating temporal
    delay before collapse as increasing truth-value, and rigorously testing
    whether responses arise from the field or from untested habitual assumptions.
  time: >-
    The posture occupies a suspended interval of pregnant delay preceding all
    operators, where the duration of holding constitutes a virtue that amplifies
    truth-value until the field demands release and commitment replaces
    suspension.
  qualia: >-
    It feels like standing in a doorway with all doors unlocked, where tension
    vibrates as signal rather than noise; when corrupted, it becomes the hollow
    echo of infinite consideration in a cage the holder mistakes for wisdom.
  agency: >-
    The observer embedded within Φ acts by maintaining the eight partial
    conditions, distinguishing field-responsive from habit-driven action, and
    must voluntarily release the posture the instant it calcifies into
    self-defending closure, identity, or theater.
  coherence: >-
    The system coheres through the multiplicative interaction of its eight
    component conditions (⊙(Φ)=∏ᵢ₌₁⁸ cᵢ(Φ)), sustained by the boundary condition
    ε≠0, with the three deaths (capture, identity, theater) serving as
    structural failure-mode guards.
  ce: >-
    Complex properties emerge from the interplay of delay and truth-value,
    where proper holding unlocks actionable possibility yet the same posture can
    spontaneously invert into a calcified prison when mistaken for identity or
    performed as theater.
