elemental_emphasis:
  ∴: How is cool burning distinguished from destructive wildfire?
  ≈: What resonance flows between fire-keeper and land?
  ▲: What direction does regenerative fire aim?
  𐂷: What ecological possibilities emerge from controlled burning?
  ☷: How does fire knowledge cycle through generations?
  ⛨: What boundaries separate proper fire from dangerous fire?
context_note: 'Cool Burning represents Fire as relational technology—not destruction but renewal when practiced with knowledge. Key insight: Aboriginal fire management prevents catastrophic wildfires by regular low-intensity burns that clear undergrowth, promote biodiversity, and maintain ecological balance. This is δγ (cycling) as land-care, not just natural process. The knowledge (μ) is inherited and sacred—fire as cultural practice, not just tool. The ash provides medicine, showing fire as healing, not just harming.'
source: Fire's Symbolic Meaning in Ancient Philosophical and Indigenous Traditions — Memetic Cowboy
