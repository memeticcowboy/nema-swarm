# Mythworks

**Fictional constructs (OstrichTech, Pinktopia) used as testing grounds** where the framework encounters human complexity without literal constraints. The membrane where β branches into narrative possibility.

## Function

Mythworks allow the ecology to test itself against **"memory wearing costume."** They are not mere illustrations—they are **experimental apparatus**:

- **OstrichTech**: Corporate hellscape where the MemeGrid ▩ stabilizes war itself
- **Pinktopia**: Dream world flickering like a destination before roads were built

## The Testing Ground

| Mythwork | Tests Against | Reveals |
|----------|---------------|---------|
| OstrichTech | Institutional capture | How systems normalize absurdity |
| Pinktopia | Imagination under constraint | Futures that die before being born |

