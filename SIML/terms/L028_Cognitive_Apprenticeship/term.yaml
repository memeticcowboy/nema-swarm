## Core Definition

**Cognitive Apprenticeship** is an instructional model that makes the processes of expert thinking and problem-solving visible to learners, enabling them to observe, practice, and ultimately master complex cognitive skills within authentic contexts. Developed by Allan Collins, John Seely Brown, and Ann Newman in 1989, it extends traditional apprenticeship models to cognitive domains (reading, writing, mathematics, problem-solving) that lack visible physical processes.

