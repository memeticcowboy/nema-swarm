| **Metal/μ** | Structured methods, scaffolding, clear procedures |
| **Wood/β** | Sequencing, increasing complexity, exploration |
| **Air/σ** | Articulation, reflection, making thinking visible |
| **Fire/λ** | Motivation, direction, goal-setting |
| **Earth/δγ** | Iterative cycles of practice and feedback |
| **Child/✶** | Integration of skills into expert identity |
| **Knowledge/κ** | Domain expertise, content knowledge |

