## Elemental Pattern Analysis

### Water/ρ Dominance

Cognitive Apprenticeship is fundamentally a **Water theory**:
- **Relationship:** Expert-learner bond is central to learning
- **Community:** Learning embedded in authentic practice communities
- **Resonance:** Emotional and social connection enables learning transfer
- **Flow:** Knowledge flows from expert to novice through participation

