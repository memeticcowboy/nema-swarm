## Critiques and Nuances

### Valid Concerns

1. **Expertise requirement:** Requires skilled experts who can articulate their tacit knowledge
2. **Time intensity:** One-to-one or small group coaching is resource-intensive
3. **Domain limitations:** Most effective for well-defined domains with clear expert models
4. **Assessment challenge:** Difficult to measure tacit knowledge transfer
5. **Cultural assumptions:** Assumes apprenticeship models are culturally appropriate

### The Tacit Knowledge Problem

> Much expert knowledge is **tacit** — difficult to articulate even for experts. Cognitive Apprenticeship must find ways to make the invisible visible through think-alouds, process tracing, and reflective prompts.

**Element:** Air/σ (distinction, articulation) + Water/ρ (intuitive knowing)

## Core Insight

> Cognitive Apprenticeship reveals that expertise is not merely knowing *what* but knowing *how* — and that this procedural knowledge can be taught by making expert thinking visible, providing structured opportunities for practice, and gradually releasing responsibility as learners develop their own expertise.

## One-Sentence Insight

> Cognitive Apprenticeship demonstrates how complex cognitive skills can be taught through making expert thinking visible, providing structured coaching and scaffolding, and gradually releasing responsibility as learners develop expertise through authentic practice.

## Three-Bullet Expansion

- **What:** An instructional model that makes expert thinking and problem-solving processes visible to learners through modeling, coaching, scaffolding, articulation, reflection, and exploration within authentic contexts
- **How it works:** Expert demonstrates while verbalizing thinking → learner practices with coaching → support fades → learner articulates reasoning → reflection on expert-novice differences → independent exploration → enculturated expertise
- **Where it aims:** Toward enculturated expertise — not just knowing domain content but thinking like a practitioner, with skills and identity integrated into authentic community practice

