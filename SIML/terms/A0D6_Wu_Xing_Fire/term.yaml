elemental_emphasis:
  ∴: How is Fire distinguished from Water's descent?
  ≈: What resonance does passion-at-peak carry?
  ▲: What direction does Fire's upward rising aim?
  𐂷: What possibilities emerge from prosperous transformation?
  ☷: How does Fire cycle into Earth (ash)?
  ⛨: What boundaries contain Fire when balanced vs. burning out of control?
context_note: 'Chinese Fire represents the prosperity phase—not substance but energetic peak. Key insight: Fire is ''prosper of the matter'' (the flourishing stage), not just combustion. As Great Yang (σ), Fire opposes Water''s Great Yin. The imbalance pattern is crucial: Fire out of control = restlessness, hatred, impulsivity. This is λ (direction) as upward expression, not just heat. The heart association shows Fire as emotional, not just physical.'
source: Fire's Symbolic Meaning in Ancient Philosophical and Indigenous Traditions — Memetic Cowboy
