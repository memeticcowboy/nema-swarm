  partials:
  - ∂Φ/∂σ (distinguishing dopamine's conventional characterization as a reward signal — a neurotransmitter that simply signals the presence or anticipation of reward through prediction error — from its newly revealed function as a memory modifier — actively encoding and reshaping memories associated with rewards, including reducing their perceived value; this boundary redefines dopamine from a unidirectional reward reinforcer to a bidirectional memory sculptor)
  - ∂Φ/∂ρ (the relational dynamics between dopamine-producing cells and reward memory valuation — dopamine cells are not merely broadcasting reward signals but are integral to how the brain values and revalues stored reward memories; reactivating these cells during memory recall intensifies memory devaluation, while blocking dopamine activity prevents it, demonstrating a direct relational coupling between dopaminergic activity and memory modification)
  - ∂Φ/∂λ (the transformation from the conventional understanding of dopamine as reward reinforcement — strengthening associations between cues, behaviors, and rewards — to the discovery of dopamine-mediated memory devaluation — where dopamine actively reduces the perceived value of reward-related memories based on new information; this represents a paradigm shift from dopamine as simple amplifier to dopamine as active reshaper of memorial value)
  - ∂Φ/∂β (the developmental trajectory from simple reward models of dopamine function — prediction error signaling, reinforcement learning — to complex understanding of dopamine's role in memory encoding and modification — a multifaceted system that not only records reward associations but actively reshapes them in response to changing circumstances, supporting more nuanced models of learning and behavior)
  - ∂Φ/∂δγ (the cycling through encoding, recall, and modification — reward memories are initially encoded with dopaminergic tagging, subsequently recalled and subjected to modification based on new experiences, and revalued through dopamine-mediated processes; this iterative cycle enables the brain to update its reward landscape rather than remaining locked into initial valuations)
  - ∂Φ/∂μ (the structural framework of dopamine circuitry integrated with computational modeling — the neural architecture of dopamine-producing cells, their connections to memory and reward systems, and their role in encoding and modifying memories; computational models simulate and validate dopamine's integral role in memory processing, providing a formal structure for understanding the mechanisms of reward memory reshaping)
