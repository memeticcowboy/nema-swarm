description: The Hauntological Reflective Cycle of Metaphoric Learning (HRCML) — integrating Kolb's Experiential Learning Cycle with hauntological theory through the lens of metaphor; each phase of Kolb's cycle is haunted by metaphor which acts as both cognitive vehicle and spectral force that frames, distorts, or opens new meanings; Concrete Experience involves living within inherited metaphors unconsciously (experience haunted by interpretive frames before becoming conscious); Reflective Observation is where ghosts begin to stir as metaphors become visible and lost metaphors are detected through hauntological memory-work; Abstract Conceptualization involves naming the ghost and reframing the script through active metaphor selection (metaphoric alchemy entangled with spectral affect); Active Experimentation is embodied reanimation of new metaphors against the resistance of old ones; metaphors are not neutral — they encode power, memory, and suppressed futures; the recursive dynamic means each cycle reframes the symbolic architecture of the world; metaphors serve as hauntological carriers that move through time, identity, and culture; strategic implications for shadow work (recognizing dominant metaphors as shadow carriers), cyborg praxis (prototyping new self-states), and education/leadership (shifting collective metaphors to change organizational hauntings).
