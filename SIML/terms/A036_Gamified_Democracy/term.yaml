elemental_emphasis:
  ∴: How is genuine democratic participation distinguished from performative engagement? What cut separates truth-seeking from tribal signaling?
  ≈: What flows between participants in gamified systems? Is this collective resonance or echo chamber reinforcement?
  ▲: Where does the gamified system want to go? Does it serve collective intelligence or engagement metrics?
  𐂷: What forms of democratic participation haven't been gamified? What if the frame of 'points and badges' itself corrupts civic virtue?
  ☷: What's the metabolic cost of sustained deliberation in gamified systems? What sustains the tension between ease and depth?
  ⛨: What structures enable genuine democratic gamification? What boundaries prevent manipulation while preserving participation?
context_note: Gamified Democracy emerges from the intersection of civic technology, game design, and deliberative democracy. It asks whether applying game mechanics to governance can increase participation quality — or merely create more sophisticated systems for manufacturing consent. Key tensions include participation vs quality, engagement vs truth, tribal identity vs epistemic humility, and static vs dynamic governance. Systems that measure engagement will optimize for engagement — often outrage, tribal signaling, and simplified narratives — rather than epistemic progress.
