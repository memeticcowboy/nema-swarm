elemental_emphasis:
  ∴: How is genuine metacognitive awareness distinguished from performative vigilance?
  ≈: What flows between the vigilant defender and the manipulative actor?
  ▲: Where does vigilance want to go — liberation or perpetual anxiety?
  𐂷: What if the vulnerability frame itself creates the exploit?
  ☷: What is the metabolic cost of constant vigilance against cognitive manipulation?
  ⛨: What structures distinguish healthy skepticism from paralyzing paranoia?
context_note: 'Cognitive Vulnerabilities describes systematic flaws in human thinking — biases, blind spots, and heuristics — that make minds exploitable. The self-sealing meta-frame is critical: dismissal of the concept proves its point.'
