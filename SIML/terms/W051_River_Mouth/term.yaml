      D: The river mouth is distinguished from the upstream river and the receiving water body, creating a zone of mixing
        and transition. This distinction is sharpened by the Air operator (σ) to enable boundary dynamics.
      S: The system comprises the river flow, sediment transport, deposition, delta formation, and the interactions with coastal
        city, dams, and climate change. It is a coupled human-natural system.
