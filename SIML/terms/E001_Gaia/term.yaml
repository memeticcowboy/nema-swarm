context_note: 'Gaia represents Earth as active creator, not passive ground. She generates
  without union (autochthonous births), then with Uranus (Titans), then against Uranus
  (retaliation). The pattern: creation → conflict → new creation. This is δγ (metabolic
  cycling) at cosmogonic scale, with β (exploratory generation) producing diverse
  offspring.'
source: The Elemental and the Ethereal — Memetic Cowboy
