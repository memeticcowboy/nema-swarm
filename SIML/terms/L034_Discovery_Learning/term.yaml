│ Surface encoding │
└─────────────────────────────────────────┘
↓
Limited Transfer
(Cannot apply flexibly)

Discovery Learning Model:
    ┌─────────────────────────────────────────┐
│ Problem/Question presented │
│ "What will happen if...?" │
└─────────────────┬───────────────────────┘
│
┌─────────────────────────────────────────┐
│ Learner generates hypotheses │
│ Prior knowledge activated │
└─────────────────┬───────────────────────┘
│
┌─────────────────────────────────────────┐
│ Active exploration/manipulation │
│ Testing predictions │
└─────────────────┬───────────────────────┘
│
┌─────────────────────────────────────────┐
│ Error/confirmation feedback │
│ Cognitive restructuring │
└─────────────────┬───────────────────────┘
│
┌─────────────────────────────────────────┐
│ Insight and generalization │
│ Knowledge construction │
└─────────────────────────────────────────┘
↓
Deep Understanding
(Transferable, flexible)
```

## Three Modes of Representation

Bruner identified developmental stages in how learners encode knowledge:

| Mode | Description | Example | Element |
|------|-------------|---------|---------|
| **Enactive** | Action-based representation | Learning through physical manipulation | Earth/δγ |
| **Iconic** | Image-based representation | Visual models, diagrams, mental images | Water/ρ |
| **Symbolic** | Language-based representation | Abstract symbols, words, formulas | Air/σ |

**Key Insight:** Effective instruction moves learners through these modes toward symbolic fluency while maintaining connections to concrete experience.

## The Spiral Curriculum

```
Spiral Curriculum Pattern:

    Basic Concepts
    (Introductory level)
         │
         ↓
    ┌─────────────────────────────────────────┐
    │ Enactive exploration │
    │ Concrete manipulation │
    └─────────────────┬───────────────────────┘
         │
         ↓ (Revisit at deeper level)
    ┌─────────────────────────────────────────┐
    │ Iconic representation │
    │ Visual models and diagrams │
    └─────────────────┬───────────────────────┘
         │
         ↓ (Revisit at expert level)
    ┌─────────────────────────────────────────┐
    │ Symbolic abstraction │
    │ Formal systems and language │
    └─────────────────────────────────────────┘
         │
         ↓ (Continue spiraling)
    Return to concrete with 
    deeper conceptual framework
```

## Elemental Pattern Analysis

### Wood/β Dominance

Discovery Learning is fundamentally a **Wood theory**:
- **β (branching):** Multiple pathways to understanding through exploration
- **Generation:** Learners generate their own hypotheses and solutions
- **Inquiry:** Questions branch into sub-questions, creating knowledge networks
- **Construction:** Building understanding rather than receiving it

### Supporting Elements

| Element | Role in Discovery Learning |
|---------|---------------------------|
| **Air/σ** | Pattern recognition — distinguishing relevant from irrelevant features |
| **Fire/λ** | Intrinsic motivation — the drive to discover, autonomous purpose |
| **Earth/δγ** | Iterative cycling — hypothesis-test-revise cycles |
| **Water/ρ** | Conceptual flow — connecting new insights to existing knowledge |
| **Metal/μ** | Structure of knowledge — the categories and frameworks being built |

## Discovery vs. Reception Learning

| Dimension | Reception Learning | Discovery Learning |
|-----------|-------------------|-------------------|
| **Knowledge view** | Transmitted from teacher | Constructed by learner |
| **Learner role** | Passive recipient | Active inquirer |
| **Motivation source** | External (grades, rewards) | Internal (curiosity, mastery) |
| **Memory type** | Rote, surface | Meaningful, deep |
| **Transfer** | Limited | Enhanced |
| **Element** | Metal (structure) | Wood (generation) |

## Connection to Related Theories

### Discovery Learning and Constructivism (Piaget)

| Aspect | Piagetian Constructivism | Bruner's Discovery Learning |
|--------|-------------------------|----------------------------|
| **Core mechanism** | Accommodation/assimilation | Hypothesis testing |
| **Focus** | Developmental stages | Instructional design |
| **Role of error** | Disequilibrium driver | Feedback for revision |
| **Emphasis** | Natural development | Structured discovery |

**Integration:** Bruner operationalized constructivist principles into pedagogical practice.

### Discovery Learning and Problem-Based Learning (L026)

| Aspect | Discovery Learning | Problem-Based Learning |
|--------|-------------------|----------------------|
| **Starting point** | Question or puzzle | Authentic problem |
| **Structure** | Flexible, learner-directed | More structured, collaborative |
| **Context** | Can be abstract | Always authentic/real-world |
| **Social dimension** | Often individual | Always collaborative |

**Integration:** PBL is a specific application of discovery principles to authentic, collaborative contexts.

### Discovery Learning and Cognitive Load Theory (L011)

**Tension and Resolution:**
- **CLT concern:** Unguided discovery imposes excessive cognitive load
- **Bruner response:** Scaffolding and structuring the discovery environment
- **Resolution:** "Guided discovery" — structured exploration with appropriate support

