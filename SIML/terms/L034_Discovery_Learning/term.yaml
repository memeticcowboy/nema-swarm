## Connection to CAMIL and IVR

Discovery Learning has particular relevance for immersive learning:

- **Embodied Exploration:** IVR enables physical manipulation of virtual objects
- **Safe Failure:** Virtual environments allow error without real consequences
- **Scale Manipulation:** Learners can explore systems at impossible scales (molecular, cosmic)
- **Time Manipulation:** Processes can be slowed down or sped up for observation
- **Multiple Representations:** Seamless switching between enactive, iconic, and symbolic modes

**Design Implications:**
- Create explorable virtual environments with embedded challenges
- Provide responsive feedback systems
- Enable hypothesis testing through manipulation
- Support the spiral curriculum through layered complexity

