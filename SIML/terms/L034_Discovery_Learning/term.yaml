## Core Definition

**Discovery Learning Theory**, developed by Jerome Bruner (1961), posits that learning is most effective when learners **actively construct** their own understanding through exploration, hypothesis formation, and problem-solving rather than passively receiving information. The theory emphasizes that knowledge is not transmitted but discovered — that the process of discovery itself builds cognitive structures that enable transfer and deep understanding.

### Key Principles

1. **Active Construction:** Learners build knowledge through their own cognitive efforts
2. **Hypothesis Testing:** Learning proceeds through forming and testing predictions
3. **Intrinsic Motivation:** Self-directed discovery fuels deeper engagement than external rewards
4. **Spiral Curriculum:** Concepts revisited at increasing levels of complexity
5. **Categorization:** Understanding emerges from organizing experience into conceptual structures
6. **Readiness:** Instruction must match the learner's developmental stage and prior knowledge

## The Discovery Learning Architecture

```
Passive Reception Model:
    ┌─────────────────────────────────────────┐
│ Teacher presents information │
│ "Here is the concept and its definition" │
└─────────────────┬───────────────────────┘
│
┌─────────────────┴───────────────────────┐
