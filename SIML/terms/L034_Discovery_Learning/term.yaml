## Core Insight

> Discovery Learning reveals that **the process of discovery itself is the curriculum**. When learners actively construct knowledge through hypothesis testing, they build not just specific understanding but **cognitive infrastructure** — the capacity to learn, to inquire, to solve novel problems. The spiral curriculum ensures that this capacity develops recursively, with each cycle of discovery building on and deepening the last.

## One-Sentence Insight

> Bruner's Discovery Learning Theory demonstrates that knowledge constructed through active hypothesis-testing and exploration creates deeper understanding, greater transfer, and intrinsic motivation than passive reception — with the spiral curriculum ensuring that concepts are revisited at increasing depth throughout the learning journey.

## Three-Bullet Expansion

- **What:** A theory arguing that learning is most effective when learners actively discover principles through exploration and problem-solving rather than passive reception, with instruction organized as a spiral curriculum that revisits concepts at increasing complexity
- **How it works:** Present problem/question → learner generates hypotheses → active exploration/manipulation → error feedback → cognitive restructuring → insight and generalization, cycling through enactive, iconic, and symbolic modes of representation
- **Where it aims:** Toward independent problem-solving capacity and intrinsic motivation — learners who can construct their own understanding and continue learning throughout life

