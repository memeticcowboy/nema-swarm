## Kolb's Six Propositions About Learning

1. **Learning is best conceived as a process, not in terms of outcomes.**
   - The journey through the cycle matters more than the destination

2. **Learning is a continuous process grounded in experience.**
   - All learning begins with and returns to experience

3. **Learning requires the resolution of conflicts between dialectically opposed modes of adaptation.**
   - Concrete vs. abstract; active vs. reflective

4. **Learning is a holistic process of adaptation to the world.**
   - Involves thinking, feeling, perceiving, and behaving

5. **Learning involves transactions between the person and the environment.**
   - Neither purely internal nor purely external

6. **Learning is the process of creating knowledge through the transformation of experience.**
   - The core thesis: experience must be transformed to become knowledge

