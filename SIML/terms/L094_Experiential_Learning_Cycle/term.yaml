## Core Definition

**Experiential Learning Theory**, developed by David Kolb (1984), defines learning as **"the process whereby knowledge is created through the transformation of experience."** Unlike theories that treat learning as information acquisition, Kolb's model emphasizes that learning is a **cyclical process** requiring four distinct stages. Experience alone does not create learning—it must be transformed through reflection, conceptualization, and active testing.

The theory emerged from the synthesis of multiple intellectual traditions:
- **Dewey's** pragmatic philosophy of learning through experience
- **Lewin's** action research and laboratory training
- **Piaget's** developmental structuralism and cognitive growth

