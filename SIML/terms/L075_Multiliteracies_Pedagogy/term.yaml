## Core Definition

**Multiliteracies Pedagogy**, developed by the **New London Group** (1996), reconceptualizes literacy for the 21st century. It argues that traditional "language-only" literacy is insufficient in a world characterized by:
- **Increasing linguistic and cultural diversity** (plurality of Englishes, multilingualism)
- **Multimodal communication** (visual, audio, spatial, gestural, linguistic modes)
- **Digital mediation** (screens, networks, interactive media)

The framework proposes **four components of pedagogy** organized around the concept of **Design** — the idea that all meaning-making is an active process of designing within available resources.

