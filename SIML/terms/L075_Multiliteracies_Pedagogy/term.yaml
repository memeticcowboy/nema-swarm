## Core Insight

> Multiliteracies Pedagogy reveals that literacy in the 21st century is not about mastering a single standardized form of language but about becoming a **flexible designer of meaning** across multiple modes, cultural contexts, and digital platforms. The learner is not a consumer of texts but an active transformer of available designs into new meanings — a capability essential for participation in an increasingly complex, plural, and mediated world.

## One-Sentence Insight

> Multiliteracies Pedagogy reconceptualizes literacy as active design across six semiotic modes (linguistic, visual, audio, gestural, spatial, multimodal) in culturally diverse contexts, positioning learners as meaning-makers who transform available designs rather than simply consume standardized language forms.

## Three-Bullet Expansion

- **What:** A pedagogical framework recognizing that literacy now requires meaning-making across multiple modes (visual, audio, spatial, gestural, linguistic) in culturally and linguistically diverse contexts — moving beyond "language-only" literacy
- **How it works:** Four-component pedagogy — Situated Practice (immersion) + Overt Instruction (metalanguage) + Critical Framing (analysis) + Transformed Practice (application) — organized around the concept of Design as transformation of available resources
- **Where it aims:** Toward learners as flexible designers of meaning who can navigate plural cultural contexts, critique how texts position people, and create new meanings across multimodal, digitally-mediated environments

