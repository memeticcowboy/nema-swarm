### The Four Pedagogical Components

| Component | Function | Element | Description |
|-----------|----------|---------|-------------|
| **Situated Practice** | Immersion in meaningful practices | Water/ρ | Learning through participation in authentic cultural contexts |
| **Overt Instruction** | Explicit teaching of metalanguage | Metal/μ | Systematic description of how meanings are made |
| **Critical Framing** | Analysis of social contexts | Air/σ | Understanding how designs position and shape identities |
| **Transformed Practice** | Transfer to new contexts | Wood/β | Applying designs in new situations, creating new meanings |

