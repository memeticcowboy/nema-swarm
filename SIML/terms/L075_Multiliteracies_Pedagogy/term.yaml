## Elemental Pattern Analysis

### Wood/β Dominance (Transformation/Design)

Multiliteracies is fundamentally a **Wood theory** at its core:
- **Design as Transformation:** All meaning-making transforms available resources
- **Generative Process:** Learners are designers, not consumers
- **Branching Pathways:** Multiple modes enable multiple expression pathways
- **Growth Through Remix:** New meanings emerge from redesigning existing designs

