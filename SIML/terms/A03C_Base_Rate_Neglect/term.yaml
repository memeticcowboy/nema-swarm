context_note: 'Base-Rate Neglect is the tendency to ignore general statistical information in favor of specific, vivid case details. Even when given clear statistical base rates (e.g., 70% of population are lawyers, 30% engineers), people rely on personality descriptions that match stereotypes. Classic Kahneman/Tversky finding: the ''Linda problem'' demonstrates this bias. In AI contexts: models may generate compelling narratives that feel representative while ignoring base-rate probabilities, leading to overconfident predictions and miscalibrated risk assessments.'
