## Optimal Spacing Intervals

Research suggests expanding intervals work best:

```
First learning: Day 0
Review 1: Day 1 (24 hours)
Review 2: Day 3 (3 days later)
Review 3: Day 7 (1 week later)
Review 4: Day 14 (2 weeks later)
Review 5: Day 30 (1 month later)
Review 6: Day 60 (2 months later)
...
Interval increases as memory strengthens
```

## The Testing Effect

Retrieval practice is the active ingredient in spaced repetition:

```
STUDY METHOD          RETENTION AFTER 1 WEEK
─────────────────────────────────────────────
Study once            ~20%
Study twice           ~30%
Test once             ~50%
Test with feedback    ~70%
Spaced testing        ~80%+
```

