## Core Insight

> Spaced Repetition reveals that forgetting is not the enemy of learning but its essential partner. The struggle to retrieve information — the "desirable difficulty" of spaced practice — is what transforms fragile short-term memories into durable long-term knowledge. Learning is not a single event but a metabolic process requiring cycles of encoding, forgetting, retrieval, and consolidation.

## One-Sentence Insight

> Spaced Repetition demonstrates that durable learning emerges from the rhythmic cycle of learning, forgetting, and retrieval — leveraging the brain's natural metabolic processes to transform fragile memories into lasting knowledge through strategically spaced engagement.

## Three-Bullet Expansion

- **What:** A learning technique based on the forgetting curve that uses strategically spaced review intervals to strengthen long-term memory retention
- **How it works:** Initial encoding → allow partial forgetting → effortful retrieval → memory consolidation → repeat at expanding intervals, with each cycle strengthening the memory trace
- **Where it aims:** Toward durable, long-term knowledge retention — moving beyond short-term familiarity to lasting competence through metabolic cycling of memory

