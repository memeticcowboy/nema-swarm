### Q-Gradient Connection

The Namboodiri & Burke (2025) discovery reveals that **Q-gradients** (directional tension in the field) are the underlying mechanism:

> **Q-gradients are the dopaminergic tension waiting for resolution.**

During the interval between learning events:
1. **χ (Distinction):** Initial encoding creates separation
2. **Q (Resonance):** Tension builds as forgetting begins—the brain anticipates
3. **Dopamine spike:** At interval completion, dopamine releases in anticipation
4. **Ψ (Compression):** Retrieval consolidates the memory

This explains why **sparse rewards (10%) create steeper Q-gradients**—the longer interval builds more tension, driving faster learning with fewer repetitions.

```
Q-GRADIENT IN SPACED REPETITION

χ ──────── Q builds ──────── ⚡ ──────── Ψ
(encoding)   (tension/      (dopamine   (compression/
              anticipation)   spike)      consolidation)

Interval length = Q-gradient steepness
Steeper gradient = faster learning
```

