## Core Definition

**Spaced Repetition** is a learning technique that incorporates increasing intervals of time between subsequent review of previously learned material. Based on the **Forgetting Curve** discovered by Hermann Ebbinghaus (1885), elaborated by Robert Bjork's theory of **Desirable Difficulties** (1994), and now explained neuroscientifically by **Namboodiri & Burke's dopamine interval mechanism** (2025), the approach leverages the brain's natural forgetting processes to strengthen memory.

### The Dopamine Interval Discovery (2025)

Groundbreaking research from UCSF reveals the mechanism behind spaced repetition's efficacy:

> **"The time between cue-reward pairings helps the brain determine how much to learn from that experience."** — Vijay Mohan K. Namboodiri

**Key Findings:**

| Variable | Traditional Assumption | New Discovery |
|----------|------------------------|---------------|
| **Learning driver** | Number of repetitions | Duration between rewards |
| **Optimal reward rate** | Frequent reinforcement | Sparse rewards (10%) |
| **Dopamine timing** | Responds to reward | Anticipates based on interval |
| **Cramming effect** | More exposure = better | Downregulated learning |

**The Mechanism:**
When rewards (or learning events) are spaced further apart, the brain requires significantly fewer repetitions before releasing dopamine in anticipation. The inter-reward interval creates a **Q-gradient**—directional tension that drives learning.

```
DOPAMINE RELEASE PATTERN

Frequent rewards (cramming):
Reward ──Reward──Reward──Reward──
     ↓       ↓       ↓       ↓
   Dopamine response (diminishing)

Spaced rewards (spaced repetition):
Reward ──────────────Reward──────────────
     ↑                  ↑
   Dopamine ANTICIPATION (enhanced)
   Builds during interval
```

**The 10% Rule:**
Mice receiving rewards only 10% of the time (sparse learning) learned at the same rate—or faster—than those receiving 20x more trials. The brain extracts maximum information from infrequent experiences.

### The Forgetting Curve

Ebbinghaus discovered that memory retention drops exponentially over time when there is no attempt to retain it:

```
Retention %
    100% ┤●────┐
     80% ┤     └─●───┐
     60% ┤           └──●──┐
     40% ┤                 └──●─┐
     20% ┤                      └──●──┐
      0% ┼────────────────────────────┴─────●─────→ Time
         │    1h    9h   1d   2d   6d   31d
         │
         └─ Without review: exponential decay
```

### Spaced Repetition Interventions

Each review resets the curve at a higher baseline:

```
Retention %
    100% ┤●────┐
     80% ┤     └─●───┐       (Review 1)
     60% ┤           └──●────┐
     40% ┤                   └────●───┐   (Review 2)
     20% ┤                            └──●────┐
      0% ┼────────────────────────────────────┴────●──→ Time
         │    1d    3d    7d   14d   30d   60d
         │
         └─ With spaced review: stair-step consolidation
```

## Key Principles

### 1. The Spacing Effect

Information learned over spaced intervals is retained better than information learned through massed practice (cramming).

```
MASSED PRACTICE (Cramming)        SPACED PRACTICE
┌─────────────────────┐          ┌───┐   ┌───┐   ┌───┐
│█████████████████████│          │███│   │███│   │███│
│█████████████████████│          └───┘   └───┘   └───┘
│█████████████████████│            ↑       ↑       ↑
└─────────────────────┘          Day 1   Day 3   Day 7
     Day 1 only

Result: Short-term fluency        Result: Long-term retention
      Illusion of competence      Actual competence
```

### 2. Desirable Difficulties (Bjork)

Some difficulties that slow initial learning actually enhance long-term retention:

| Difficulty | Why It Helps | Mechanism |
|------------|-------------|-----------|
| **Spacing** | Creates retrieval challenges | Forces memory reconstruction |
| **Interleaving** | Mixing different topics | Discrimination learning |
| **Testing** | Active recall vs. review | Retrieval practice effect |
| **Variability** | Changing practice conditions | Flexible knowledge |

### 3. Retrieval Practice

The act of actively recalling information strengthens memory more than passive review:

```
PASSIVE REVIEW                    ACTIVE RETRIEVAL
┌─────────────────┐              ┌─────────────────┐
│ Read notes      │              │ Close notes     │
│ Read again      │              │ Try to recall   │
│ Read once more  │              │ Check accuracy  │
│ "I know this"   │              │ "I struggled    │
│                 │              │  but now I know"│
└─────────────────┘              └─────────────────┘
      ↓                                  ↓
  Short-term                         Long-term
  familiarity                        retention
```

