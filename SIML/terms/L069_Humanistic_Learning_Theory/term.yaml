│                                                         │
│  → Creates trust through vulnerability                  │
└─────────────────────────────────────────────────────────┘

┌─────────────────────────────────────────────────────────┐
│  UNCONDITIONAL POSITIVE REGARD (Prizing)                │
│  ═══════════════════════════════════════                │
│  Accepting the learner as a person of worth             │
│  Separating person from behavior                        │
│  No conditional worth ("if you do X, you're good")      │
│  Caring without possessiveness                          │
│                                                         │
│  → Creates safety for risk-taking                       │
└─────────────────────────────────────────────────────────┘

┌─────────────────────────────────────────────────────────┐
│  EMPATHIC UNDERSTANDING                                 │
│  ═══════════════════════                                │
│  Sensing the learner's private world                    │
│  Understanding without judgment                         │
│  Communicating this understanding                       │
│  "Walking in their shoes"                               │
│                                                         │
│  → Creates felt understanding, reduces isolation        │
└─────────────────────────────────────────────────────────┘
```

