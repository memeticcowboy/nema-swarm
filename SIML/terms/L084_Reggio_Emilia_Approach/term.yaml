## Core Insight

> The Reggio Emilia Approach reveals that **children are not empty vessels to be filled but rich sources of potential to be revealed**. The hundred languages metaphor challenges the narrowness of traditional schooling that privileges only linguistic intelligence. By treating the environment as a teacher, documentation as research, and curriculum as emergent, Reggio creates learning ecologies where children and adults co-construct knowledge through relationship, beauty, and wonder.

## One-Sentence Insight

> The Reggio Emilia Approach demonstrates that children possess a hundred languages for learning and expression, and education should protect this diversity through emergent curriculum, documentation, and environments that function as active partners in the co-construction of knowledge.

## Three-Bullet Expansion

- **What:** An educational philosophy from Italy that views children as rich in potential, possessing "a hundred languages" for expression and learning, with curriculum emerging from children's interests through documentation and collaborative research
- **How it works:** Child's emergent interest → team observation and hypothesis → provocation and exploration → documentation → reflection and interpretation → curriculum response → (cycle continues), with the environment functioning as "third teacher"
- **Where it aims:** Toward a learning ecology where knowledge is co-constructed through relationships, multiple forms of expression are valued, and the process of learning is made visible and shared

