## Core Definition

The **Reggio Emilia Approach**, developed by Loris Malaguzzi and parents in the villages around Reggio Emilia, Italy, following WWII (1963), is an educational philosophy based on the image of the child as rich in potential, strong, powerful, competent, and connected to adults and other children.

### The Hundred Languages of Children

Malaguzzi's famous poem declares that children have "a hundred languages, a hundred hands, a hundred thoughts, a hundred ways of thinking, of playing, of speaking" — and the school and culture "steal ninety-nine" by telling children that only "one" (typically verbal/linguistic) matters.

```
THE HUNDRED LANGUAGES
═══════════════════════════════════════════════════════════════

    ┌─────────────────────────────────────────────────────┐
    │           CHILD'S EXPRESSIVE LANGUAGES              │
    │                                                     │
    │  Visual      Verbal      Kinesthetic    Musical   │
    │    ●──────────●────────────●──────────────●         │
    │    │          │            │              │         │
    │    ▼          ▼            ▼              ▼         │
    │  Drawing    Speaking    Movement       Rhythm       │
    │  Painting   Storytelling  Dance         Song        │
    │  Sculpture  Poetry        Gesture       Sound       │
    │  Collage    Discussion    Building      Tone        │
    │  Clay       Argument      Dramatic      Pattern     │
    │  Wire       Question      Play          Melody      │
    │  Light      Metaphor      Construction  Harmony     │
    │  Shadow     Humor         Exploration   Silence     │
    │                                                     │
    │  ...and ninety more ways of being and expressing   │
    │                                                     │
    └─────────────────────────────────────────────────────┘
    
    The school's role: Protect and nurture all languages
    The danger: "They tell the child: you have no hundred,
                 you have only one."
```

