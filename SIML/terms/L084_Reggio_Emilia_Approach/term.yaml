| **Air/σ** | Documentation — making the invisible visible |
| **Earth/δγ** | Environment as grounded, nurturing space |
| **Fire/λ** | The passion and purpose of progettazione |
| **Metal/μ** | The order and beauty of the prepared environment |
| **Child/✶** | The holistic, playful, integrated nature of learning |

## Connection to Related Theories

### Reggio Emilia vs. Montessori

| Aspect | Montessori | Reggio Emilia |
|--------|------------|---------------|
| **Image of child** | Natural learner, self-directed | Rich in potential, relational |
| **Curriculum** | Structured materials, scope/sequence | Emergent, project-based |
| **Environment** | Prepared, child-sized | Atelier, aesthetic, "third teacher" |
| **Documentation** | Minimal | Central practice |
| **Collaboration** | Individual work emphasized | Group work emphasized |
| **Teacher role** | Observer, preparer | Co-researcher, documenter |
| **Element** | Metal/Earth | Water/Wood |

### Reggio Emilia and 4E Cognition

Reggio embodies 4E principles:
- **Embodied:** Hundred languages include movement, gesture, making
- **Extended:** Environment and materials extend children's thinking
- **Embedded:** Learning is always situated in relationships and contexts
- **Enactive:** Knowledge emerges through doing and interacting

### Reggio Emilia and Social Learning Theory

Both emphasize:
- Learning as social and relational
- The importance of community
- Co-construction of knowledge
- The role of more knowledgeable others

## Connection to CAMIL and IVR

Reggio principles transform immersive learning:
- **Hundred Languages:** IVR enables expression beyond verbal — gesture, movement, creation
- **Documentation:** IVR can capture and replay learning experiences
- **Environment as Teacher:** Virtual spaces as responsive, aesthetic learning environments
- **Progettazione:** Emergent curriculum in open virtual worlds
- **Collaboration:** Multi-user VR for co-construction

**Design Implications:**
- Create virtual ateliers with rich, open-ended materials
- Enable documentation within the virtual environment
- Design for emergent, child-directed exploration
- Support multiple modes of expression and communication
- Build spaces that are beautiful, ordered, and responsive

