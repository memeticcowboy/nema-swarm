## Progettazione: Emergent Curriculum Design

Unlike traditional curriculum planning (linear, predetermined), **progettazione** is:

| Traditional Planning | Progettazione |
|---------------------|---------------|
| Teacher decides topics in advance | Topics emerge from children's interests |
| Fixed scope and sequence | Flexible, responsive trajectory |
| Outcomes predetermined | Hypotheses tested and revised |
| Individual teacher planning | Collaborative team research |
| Assessment at end | Documentation throughout |

```
PROGETTAZIONE CYCLE
═══════════════════════════════════════════════════════════════

    ┌─────────────────────────────────────────────────────┐
    │              EMERGENT INTEREST                      │
    │         (Child's question, play, conversation)      │
    └─────────────────────┬───────────────────────────────┘
                          │
                          ▼
    ┌─────────────────────────────────────────────────────┐
    │              TEAM HYPOTHESIS                        │
    │    (What might this mean? Where might this go?)     │
    └─────────────────────┬───────────────────────────────┘
                          │
                          ▼
    ┌─────────────────────────────────────────────────────┐
    │              PROVOCATION                            │
    │    (Materials, questions, experiences offered)      │
    └─────────────────────┬───────────────────────────────┘
                          │
                          ▼
    ┌─────────────────────────────────────────────────────┐
    │              DOCUMENTATION                          │
    │    (Observe, record, collect traces of learning)    │
    └─────────────────────┬───────────────────────────────┘
                          │
                          ▼
    ┌─────────────────────────────────────────────────────┐
    │              REFLECTION                             │
    │    (What happened? What does it mean? What's next?) │
    └─────────────────────┬───────────────────────────────┘
                          │
                          └──► (cycle continues, evolving)

The curriculum is not a path to follow
but a journey to co-create.
```

