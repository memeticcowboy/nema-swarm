## Elemental Pattern Analysis

### Water/ρ Dominance (Primary)

Reggio Emilia is fundamentally a **Water theory**:
- **Resonance:** Deep attunement to children's thinking and expression
- **Relationality:** Learning emerges from relationships — child-child, child-adult, child-environment
- **Flow:** Curriculum flows with children's interests, not against them
- **Coupling:** The "hundred languages" are channels of connection

### Wood/β Support (Secondary)

- **Branching:** Multiple languages, multiple paths, emergent possibilities
- **Growth:** Curriculum grows organically from children's questions
- **Flexibility:** Progettazione adapts and evolves

### Supporting Elements

| Element | Role in Reggio |
