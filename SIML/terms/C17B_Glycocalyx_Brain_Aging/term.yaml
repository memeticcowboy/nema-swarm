# C17B — Glycocalyx and Brain Aging

## Core Concept

Stanford research led by Sophia Shi and Carolyn Bertozzi reveals that **aging depletes the brain's glycocalyx**—the protective "sugar shield" on blood-brain barrier cells. This degradation increases barrier permeability, allowing harmful substances to enter the brain and fueling neuroinflammation and cognitive decline. Critically, restoring key sugars can improve barrier integrity and enhance cognitive function in aged mice.

## Key Mechanism

**The Sugar Shield Paradox:** The glycocalyx is dense and effective in young brains but becomes sparse with age. Unlike many age-related changes, this degradation appears reversible through targeted sugar restoration.

## Elemental Dynamics

**Earth (δγ) at 0.90:** The core grounding function—blood-brain barrier integrity as the foundation of neural protection.

**Wood (β) at 0.85:** The organic metaphor drives understanding—lush forest of sugars becoming sparse wasteland with age.

**Air (σ) at 0.80:** Critical distinctions between dense/young and sparse/aged glycocalyx structures.

**Water (ρ) at 0.75:** Flow dynamics—what crosses the barrier changes dramatically as glycocalyx degrades.

