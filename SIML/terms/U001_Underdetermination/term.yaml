# U001 ‚Äî Underdetermination

## Core Concept

Underdetermination is **the condition where available data is insufficient to determine a unique or fully specified outcome**. Multiple theories, narratives, or explanations may fit the same facts.

## The NEMAtic View

Underdetermination is **not failure** but structural condition:
- The bow-tie necessarily compresses data
- The bottleneck discards information
- The right funnel faces underdetermination

Confabulation is the **necessary response**‚Äîgenerating coherent narrative from incomplete data.

