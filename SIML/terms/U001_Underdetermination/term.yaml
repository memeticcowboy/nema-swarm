- Usurpenic extraction
- Pathological closure

## In the Bow-Tie

**Left funnel:** Data compression creates underdetermination
**Bottleneck:** Оµ-preservation maintains productive uncertainty
**Right funnel:** Confabulation generates narrative from underdetermined data

## The Generative Gap

Underdetermination is the **space of creative possibility**вЂ”where:
- Multiple narratives compete
- Pattern-agency operates
- Confabulation generates
- New understanding emerges

