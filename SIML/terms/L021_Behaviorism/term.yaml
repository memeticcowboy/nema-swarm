## Core Definition

**Behaviorism** is a learning theory that focuses on observable behaviors rather than internal mental states. It posits that all behaviors are acquired through conditioningвҖ”interaction with the environment. Learning is defined as a change in behavior, and this change occurs through the systematic manipulation of stimuli and consequences.

### The Two Major Branches

```
BEHAVIORISM PARADIGM
в”Ӯ
в”ңв”Җв”Җ CLASSICAL CONDITIONING (Pavlov, Watson)
в”Ӯ   в”ңв”Җв”Җ Neutral Stimulus (NS) вҶ’ No response initially
в”Ӯ   в”ңв”Җв”Җ Unconditioned Stimulus (US) вҶ’ Natural response
в”Ӯ   в”ңв”Җв”Җ Pairing NS + US вҶ’ Association formation
в”Ӯ   в””в”Җв”Җ Conditioned Stimulus (CS) вҶ’ Conditioned Response (CR)
в”Ӯ
в””в”Җв”Җ OPERANT CONDITIONING (Skinner)
    в”ңв”Җв”Җ Antecedent (A) вҶ’ Context/cue
    в”ңв”Җв”Җ Behavior (B) вҶ’ Observable action
    в”ңв”Җв”Җ Consequence (C) вҶ’ Reinforcement or punishment
    в””в”Җв”Җ Result вҶ’ Behavior increase or decrease
```

## Classical Conditioning: Pavlov and Watson

### Pavlov's Discovery (1890s-1900s)

Ivan Pavlov, studying digestion in dogs, accidentally discovered that dogs would salivate at the sound of a bell if the bell had been repeatedly paired with food presentation.

```
CLASSICAL CONDITIONING PROCESS

Before Conditioning:
  Food (US) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә Salivation (UR) [natural]
  Bell (NS) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә No response [neutral]

During Conditioning:
  Bell (NS) + Food (US) в”Җв”Җв”Җв”Җв–ә Salivation (UR) [repeated pairings]
       вҶ“
After Conditioning:
  Bell (CS) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–ә Salivation (CR) [learned response]
```

### Key Concepts in Classical Conditioning

| Concept | Definition | Example |
|---------|------------|---------|
| **Acquisition** | Initial learning of the stimulus-response association | Dog learns bell predicts food |
| **Extinction** | Gradual weakening and disappearance of conditioned response | Bell presented without food repeatedly |
| **Spontaneous Recovery** | Reappearance of extinguished response after a rest period | Salivation returns after delay |
| **Generalization** | Responding to stimuli similar to the conditioned stimulus | Salivating to similar-sounding bells |
| **Discrimination** | Ability to distinguish between conditioned stimulus and similar stimuli | Responding only to specific bell tone |

### Watson's Behaviorism (1913)

John B. Watson established behaviorism as a formal school of psychology, rejecting introspection and focusing solely on observable behavior.

> "Give me a dozen healthy infants, well-formed, and my own specified world to bring them up in and I'll guarantee to take any one at random and train him to become any type of specialist I might selectвҖ”doctor, lawyer, artist, merchant-chief and, yes, even beggar-man and thief." вҖ” John B. Watson

**The Little Albert Experiment (1920):**
- Demonstrated emotional conditioning in humans
- 11-month-old Albert conditioned to fear a white rat by pairing it with a loud noise
- Fear generalized to other furry objects (rabbit, fur coat, Santa mask)
- Showed both the power and ethical dangers of behavioral conditioning

