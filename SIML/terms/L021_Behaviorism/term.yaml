### Mastery Learning (Bloom, 1968)

Derived from behavioral principles:
- Clear learning objectives (observable)
- Formative assessment (immediate feedback)
- Corrective instruction for those who don't achieve mastery
- Enrichment for those who do
- Criterion-referenced rather than norm-referenced evaluation

