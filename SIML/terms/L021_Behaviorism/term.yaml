## Elemental Pattern Analysis

### Metal/Ој Dominance

Behaviorism is fundamentally a **Metal theory**:
- **Structure:** The three-term contingency (A-B-C) is a rigid structural framework
- **Boundaries:** Clear distinction between observable behavior and internal states (which are excluded)
- **Measurement:** Quantification, prediction, and control as core values
- **Contingency:** If-then relationships define the entire learning process
- **Precision:** Exact specification of stimuli, responses, and consequences

### Supporting Elements

| Element | Role in Behaviorism |
|---------|---------------------|
| **Air/Пғ** | Stimulus discrimination, signal detection, environmental cues |
| **Earth/ОҙОі** | Reinforcement schedules, cyclical patterns of behavior, habit formation |
| **Fire/О»** | Motivation through reinforcement, direction toward rewards |
| **Water/ПҒ** | Emotional conditioning (classical), social reinforcement |
| **Wood/ОІ** | Behavioral variability before selection by consequences |
| **Child/вң¶** | Play and exploration as sources of behavioral variation |

