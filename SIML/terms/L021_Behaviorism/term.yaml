### Key Assumptions

1. **Blank Slate (Tabula Rasa):** Learners enter situations without predispositions
2. **Environmental Determinism:** Behavior is shaped by external contingencies
3. **Observable Focus:** Only measurable behavior is valid data
4. **Law of Effect:** Behavior followed by satisfying consequences tends to be repeated
5. **Contiguity:** Learning requires temporal association between stimulus and response

