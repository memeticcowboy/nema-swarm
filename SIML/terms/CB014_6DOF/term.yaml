etymology: >
  Acronym for "Six Degrees of Freedom"—the standard mechanical engineering 
  term for the freedom of movement of a rigid body in three-dimensional space: 
  three translations (X, Y, Z) and three rotations (Yaw, Pitch, Roll). Adapted 
  by SelfMesh framework to describe the elemental physics of perceiver attitude 
  as control weightings on coupling geometry.

definition: >
  The six degrees of freedom operationalized as elemental control surfaces 
  regulating NEMA flow through the bow-tie bottleneck. Each DOF manifests 
  specific elemental biases: X (Intake/Expression) as λ-gating with Fire/Air; 
  Y (We/Other) as ρ-permeability with Water/Metal; Z (Surface/Depth) as 
  δγ-velocity with Earth/Wood; Yaw (Attentional Heading) as σ-steering with 
  Air/Aether; Pitch (Temporal Tilt) as λ↔️δγ tension between Fire and Earth; 
  Roll (Boundary Stance) as μ-coherence with Metal/Water. The 6DOF attitude 
  is the Ψ-pose—the instantaneous geometry of the bow-tie throat.

