    - "∂Φ/∂σ (distinguishing attached temporal thinking — the habitual linking of thoughts across past, present, and future in continuous series that creates self-imposed constraints and mental bondage — from unattached mental freedom — the state of detachment where the mind remains free from all things at all times, achieving genuine emancipation; Tan Ching's central claim is that this distinction is the threshold between constraint and liberation)"
    - "∂Φ/∂ρ (the relational dynamics between thought-to-thought temporal linking — where each thought connects to the next in chains spanning past memory, present concern, and future anticipation, creating a relational web of mental constraint — and mind-to-liberation detachment — where breaking these relational chains produces freedom not through suppression but through non-attachment to temporal and material concerns)"
    - "∂Φ/∂λ (the transformation from chained cognition — a mental state where thoughts are bound to each other across time, producing restlessness, anxiety, and self-imposed limitation — to emancipated awareness — a liberated cognitive state achieved through the practice of unattached thinking, where the mind moves freely without being tethered to temporal connections or material attachments)"
    - "∂Φ/∂β (the developmental trajectory from habitual attachment patterns — the deeply ingrained tendency to link thoughts across temporal domains, connecting past regret to present worry to future anxiety in self-reinforcing chains — to cultivated detachment practice — the deliberate and progressive development of mental habits that release attachment and foster liberation)"
