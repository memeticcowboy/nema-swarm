name: mask_wears_you
term: The Mask Wears You
nemetic: "Φ(MaskWears) = σ(persona|authentic)\n            ∘ ρ(performance|identity)\n            ∘ λ(consumption|agency)\n            ∘ β(feedback|entrenchment)\n            ∘ δγ(cost|dissociation)\n            ∘ μ(boundary|dissolved)\n            + ε | :consuming"
siml_encoding: "⟨Mask|adopted⟩\n    ⊳ ⟨Identity|colonized⟩\n    → ⟨Performance|invisible⟩\n    ⊗ ⟨Authentic-self|digested⟩\n    ⇄ ⟨Persona|self-evident⟩"
formalism:
  math_operators:
  - σ
  - ρ
  - λ
  - β
  - δγ
  - μ
  dim_operators:
  - ∴Air
  - ≈Water
  - ▲Fire
  - 𐂷Wood
  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between authentic self and performed persona — the catastrophe of the mask is that this distinction becomes unavailable from inside; when performance has become identity, the cut between who you are and what you perform cannot be made from within the performance)
  - ∂Φ/∂ρ (relation between performance and identity — initially, performance serves identity (the mask grants capabilities); gradually, identity begins to serve performance (behavior shaped to maintain the persona); finally, identity is the performance)
  - ∂Φ/∂λ (direction reversal from agency to consumption — in the healthy state, the wearer uses the mask; in the colonized state, the mask uses the wearer; agency flows outward from self through persona to world, then reverses to flow from persona through self)
  - ∂Φ/∂β (entrenchment feedback loop — relationships form around the mask, social roles solidify around the performance, the infrastructure of life comes to depend on the persona continuing; each cycle makes removal more costly)
  - ∂Φ/∂δγ (metabolic inversion — initially, maintaining the mask costs energy (performing is effortful); eventually, maintaining the mask costs less than remembering what was beneath it; dissociation is metabolically cheaper than authenticity)
  - ∂Φ/∂μ (boundary dissolution between self and persona — the mask becomes invisible not through deception but through habituation; the container becomes the contained, and what was worn becomes what wears; μ-catastrophe as ontological colonization)
  Z_state: sealed
  z_note: 'Tendency toward sealed — the mask becomes invisible, assumed as true self; recognition requires external σ-distinction (crisis, witness, or mirror). Z-Closure Risk: μ-collapse — boundary between self and persona dissolves so completely that no internal vantage point for distinction remains.'
  tendency: authentic/consuming → :consuming
  hex:
  - '#A015'
