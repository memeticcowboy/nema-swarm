  - '#A046'
coords:
  ontology:
    primary: I
    secondary: We
  epistemics:
    dsrp:
      D: The distinction between authentic self and performed persona — the essential cut — becomes unavailable from inside the colonized state; the mask shapes what 'obviously' is, so there is no felt gap between performance and being
      S: The mask presents as the complete system of self — not a layer over something else but the whole; alternative framings (the self beneath the mask) are not rejected but structurally inaccessible without external disruption
      R: What flows between the wearer and the mask inverts over time — the relation begins as tool-use (I wear this) and ends as instrumental (this wears me); recognition of the inversion requires a perspective outside the relation
      P: The perspective is locked inside the performed frame — the persona has become the viewing apparatus; trying to see the mask while looking through it is the structural impossibility that makes external witness (crisis, relationship, therapy) the primary access point
    learning: L0
  agency:
    type: ego
    power_mode: Against
  time:
    mode: process
    phase: 'Stage 1: Mask Adoption (necessity or opportunity) → Stage 2: Performance (mask grants capabilities) → Stage 3: Habituation (performance becomes effortless, invisible) → Stage 4: Inversion (mask begins directing behavior) → Stage 5: Colonization (persona as self-evident identity, Z-sealed)'
