elemental_emphasis:
  ∴: 'The cut between authentic self and performed persona becomes unavailable from inside the colonized state — the mask shapes what ''obviously'' is, leaving no felt gap between performance and being. Air asks: If you could not use the persona to answer, who is asking this question?'
  ≈: 'What flows between the wearer and the mask inverts over time — from tool-use to instrumental use; the relation that once felt empowering begins to feel hollow, then feels like nothing at all. Water asks: What flows between you and your performance — and when did that flow reverse direction?'
  ▲: 'The direction reversal from agency to consumption is the defining mechanism — the mask that was once worn begins wearing; agency flows outward from persona rather than from self. Fire asks: Does this performance serve your expression or your erasure — and how would you know the difference from inside it?'
  𐂷: 'Recognizing the mask is itself a performance; meta-masking is possible; but what grows when masks drop is genuinely open. Wood asks: What identities have been foreclosed by the infrastructure of relationships and roles built around this persona — what has never been tried because the mask made it unthinkable?'
  ☷: 'The metabolic inversion — where maintaining the mask becomes cheaper than remembering what was beneath it — is the ground of colonization; dissociation is not chosen but arrives as the path of least energy. Earth asks: What would it cost to remember — and is the cost of forgetting worth what the persona provides?'
  ⛨: 'The structures that enable colonization are relational and social — relationships formed around the mask, roles that depend on the performance continuing, environments that reward the persona and punish its dissolution. Metal asks: What would need to be true structurally — in relationships, roles, and environments — before removing the mask became survivable?'
context_note: 'The Mask Wears You names a μ-catastrophe: the boundary failure in which the container becomes the contained, the worn becomes the wearer. Unlike simple deception — wearing a mask you know you wear — this is ontological colonization: the adopted persona digests the authentic self through repeated performance until maintaining the mask costs less energy than remembering what was beneath it. The process is not chosen but arrived at through the metabolic logic of habituation: what was initially effortful (performance) becomes automatic, then becomes identity. Recognition requires an external σ-distinction — a mirror, a crisis, a witness — because the mask has become the viewing apparatus through which all self-perception passes. Liberation is not simply dropping the mask but first experiencing it as mask, which requires conditions (safety, witness, structural support) that the persona-dependent infrastructure actively prevents from forming.'
