description: "Psycholinguist Michael Vitevitch's experimental investigation into how ChatGPT processes nonsense words reveals fundamentally different pattern-recognition strategies between human cognition and large language models. ChatGPT defined extinct words it should not have known, switched languages unprompted during phonological tasks, and generated novel words by recombining morphological fragments. These behaviors expose the statistical-associative substrate of LLM processing in contrast to human embodied linguistic grounding."
