## Core Definition

**ARCS** is a systematic motivational design model developed by John M. Keller (1987) that provides a framework for creating learning environments that capture and sustain learner motivation. The acronym represents four essential components: **Attention**, **Relevance**, **Confidence**, and **Satisfaction**. The model synthesizes research from cognitive psychology, expectancy-value theory, and instructional design into a practical framework for educators and instructional designers.

