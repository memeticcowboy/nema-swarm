elemental_emphasis:
  ∴: How do abstraction levels reveal hidden system purposes?
  ≈: What constraints flow between system boundaries and worker freedom?
  ▲: What transforms a suboptimal strategy into an adaptive response?
  𐂷: How does collective cognition branch across team structures?
  ☷: What stable structures ground adaptive worker performance?
  ⛨: Where do competency boundaries define system safety margins?
context_note: Cognitive Work Analysis (CWA), developed by Jens Rasmussen in the 1980s, is a comprehensive framework for analyzing complex sociotechnical systems. Unlike traditional task analysis, CWA examines the entire work system including constraints, strategies, social organization, and worker competencies across multiple abstraction levels.
source: Rasmussen, J. (1986). Information Processing and Human-Machine Interaction — via Grok
