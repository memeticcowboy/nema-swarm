## The Art of Questioning

### Revans' Questioning Approach

> **"The most important thing about questioning is not the answer, but the question itself."**
> вҖ” Reg Revans

Action Learning emphasizes **questions over statements**:

| Instead of... | Try asking... |
|---------------|---------------|
| "You should..." | "What have you considered?" |
| "I think..." | "What would happen if...?" |
| "The problem is..." | "How do you see the situation?" |
| "You need to..." | "What support do you need?" |
| "Have you tried..." | "What have you learned so far?" |

