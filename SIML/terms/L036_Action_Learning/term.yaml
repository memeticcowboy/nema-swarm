## The Six Components of Action Learning

| Component | Description | Nemetic Mapping |
|-----------|-------------|-----------------|
| **1. Problem/Project** | A real, urgent, significant challenge | О» (fire/purpose) |
| **2. Action Learning Set** | Small group (4-8) meeting regularly | ПҒ (water/connection) |
| **3. Process of Inquiry** | Questions before statements | Пғ (air/distinction) |
| **4. Action Taken** | Implementation between sessions | О» (fire/action) |
| **5. Learning** | Individual, team, organizational | ОІ (wood/growth) |
| **6. Facilitator/Coach** | Helps with process, not content | Ој (metal/structure) |

