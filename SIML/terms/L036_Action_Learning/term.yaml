## Core Insight

> Action Learning reveals that wisdom cannot be transmitted through instruction alone вҖ” it must be forged in the fire of action, tempered by reflection, and shaped by the questioning of peers. The set is both furnace and mirror: it heats the problem until it demands response, and reflects our blind spots until we see clearly. Learning is not preparation for action; learning is action, reflected upon.

## One-Sentence Insight

> Action Learning demonstrates that the most powerful learning emerges from the cycle of taking action on real problems, reflecting with peers who question rather than advise, and allowing insights to reshape both the problem-solver and the problem itself.

## Three-Bullet Expansion

- **What:** A learning methodology where small groups (sets) tackle real, urgent problems through a cycle of action and structured reflection, guided by the principle that learning equals programmed knowledge plus questioning insight (L = P + Q)
- **How it works:** Participants present challenges вҶ’ peers ask clarifying questions вҶ’ individual takes action between sessions вҶ’ group reflects on results and learning вҶ’ insights inform next actions, creating double-loop learning that transforms both the problem and the problem-solver
- **Where it aims:** Toward wisdom capacity вҖ” developing not just solutions to immediate problems, but the capability to learn from experience, question assumptions, and create sustainable individual and organizational change through the disciplined practice of action-reflection cycles in community

