## Elemental Pattern Analysis

### Fire/О» + Earth/ОҙОі Coalition (Primary)

Action Learning is fundamentally a **Fire-Earth** theory:

**Fire/О» (Direction/Action):**
- **Purposeful doing:** Learning happens through committed action
- **Urgency:** Real problems demand real responses
- **Courage:** Stepping into the unknown requires fire
- **Transformation:** Action changes both situation and actor

**Earth/ОҙОі (Cycling/Metabolism):**
- **Reflection cycles:** The rhythm of action and reflection
- **Digestion of experience:** Making meaning from what happened
- **Grounded learning:** Theory tested against reality
- **Iterative growth:** Each cycle builds on the last

### Supporting Elements

| Element | Role in Action Learning |
|---------|------------------------|
| **Water/ПҒ** | Set dynamics вҖ” trust, empathy, relational safety for honest inquiry |
| **Air/Пғ** | Questioning insight вҖ” the discipline of asking before telling |
| **Wood/ОІ** | Insight generation вҖ” new possibilities emerging from reflection |
| **Metal/Ој** | Set structure вҖ” time boundaries, process discipline, facilitation |

