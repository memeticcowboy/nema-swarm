## Core Definition

**Action Learning** is an approach to problem solving and learning that involves taking action and reflecting upon the results. Developed by Reg Revans in the 1980s (building on work dating back to the 1940s), it is based on the simple yet profound formula:

> **L = P + Q**
> 
> Learning = Programmed Knowledge (traditional instruction) + Questioning Insight (fresh inquiry)

Action Learning occurs in small groups called **"sets"** where participants tackle real problems, take action, and learn from the results through structured reflection and peer questioning.

