## Connection to Related Theories

### Action Learning and Experiential Learning (Kolb)

| Aspect | Experiential Learning | Action Learning |
|--------|----------------------|-----------------|
| **Cycle** | Concrete вҶ’ Reflect вҶ’ Abstract вҶ’ Active | Action вҶ’ Reflect вҶ’ Learn вҶ’ Plan вҶ’ Action |
| **Focus** | Individual learning style | Group problem-solving |
| **Element** | Earth (ОҙОі) cycling | Fire (О») + Earth (ОҙОі) |
| **Complement** | EL describes the learning cycle | AL adds the social dimension |

Action Learning extends Kolb's cycle by embedding it in **social inquiry** вҖ” the set provides the mirror for reflection.

### Action Learning and Transformative Learning (Mezirow)

Both theories address **perspective transformation**:
- **Transformative Learning:** Through critical reflection on assumptions
- **Action Learning:** Through action and peer questioning

Action Learning creates conditions for transformative learning by:
- Presenting **disorienting dilemmas** (real problems)
- Providing **critical reflection** partners (the set)
- Enabling **rational discourse** (questioning process)
- Supporting **action** (testing new perspectives)

### Action Learning and Communities of Practice (Lave & Wenger)

| Aspect | Communities of Practice | Action Learning |
|--------|------------------------|-----------------|
| **Structure** | Organic, ongoing | Time-bounded, intentional |
| **Focus** | Domain knowledge | Problem-solving |
| **Membership** | Shared practice | Diverse perspectives |
| **Element** | Water (ПҒ) relational | Fire (О») purposeful |
| **Complement** | CoPs sustain knowledge | AL generates breakthroughs |

