description: Historical analysis of the French Revolutionary Calendar (1793-1805) as a clash between rationalist technocracy and mythic-civic organicism. Rationalists like Fabre d'Eglantine and Robespierre imposed decimal time, new month names, and state festivals to sever continuity with the ancien regime. Organicists — rural Catholics, royalists, regional communities — defended saints' days, liturgical rhythms, and seasonal rituals as living temporal fabric. The calendar's abolition in 1806 demonstrates the resilience of mythic time-structures against rationalist imposition, with ongoing echoes in digital Sabbath and AI timeline debates.
