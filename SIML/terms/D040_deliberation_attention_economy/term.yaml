meta:
  schema_version: "1.0"
  term_id: "D040"
  term_name: "deliberation_attention_economy"
  domain: "political_theory"
  subdomain: "governance"
  created_date: "2026-02-28"
  source_document: "4._Delibration_attention_economy.pdf"

siml:
  symbol:
    glyph: "⏳"
    unicode_representation: "U+23F3"
    visual_description: "An hourglass containing not sand but attention—each grain a moment of collective cognition, falling through the narrow waist of deliberation where speed dissolves into depth; the sacred vessel of slow wisdom in a velocity-drunk world"
    etymology: "From Latin deliberare 'to weigh well'—the careful balance of attention as cognitive commons; extends D004 (deliberation base) through attention economy framing, emphasizing friction-by-design and time-aware civic UX"
  
  phoneme:
    pronunciation: "dih-LIB-er-ay-shun uh-TEN-shun ee-KON-oh-mee"
    phonetic_ipa: "/dɪˈlɪbəˈreɪʃən əˈtɛnʃən iˈkɒnəmi/"
    tonal_quality: "measured, spacious, recursive—like the resonant pause between heartbeats; the hush before wisdom speaks; a rhythm that resists acceleration"
    sonic_resonance: "The slow toll of a temple bell dissolving into silence; the murmur of diverse voices finding harmonic convergence; the white noise of contemplation drowning out the dopamine chirps of notification"
  
  semantics:
    core_meaning: "The architecture of slow wisdom in velocity-drunk systems—deliberation not as procedural formality but as sacred ritual of collective cognition; attention treated not as extractable resource but as shared cognitive commons requiring stewardship, friction, and temporal spaciousness"
    operational_definition: "A design framework for civic interfaces that intentionally slow interaction, scaffold context, and cultivate cognitive empathy—transforming democracy from spectacle to symposium through attention architecture"
    contextual_domains:
      - "deliberative_democracy"
      - "attention_economy"
      - "civic_ux_design"
      - "participatory_platforms"
      - "sortition"
      - "micro_publics"
      - "ai_augmented_deliberation"
      - "cognitive_commons"
      - "friction_by_design"
      - "slow_thought"
      - "epistemic_humility"
      - "consensus_visualization"
      - "time_aware_interfaces"
      - "civic_stack"
      - "deliberative_resilience"
    
  elemental_mapping:
    sigma_air:
      aspect: "distinction"
      manifestation: "Discerning deliberation from debate, consensus from homogenization, cognitive empathy from performative listening; distinguishing signal from noise in attention economies; the clarity to see nuance where algorithms amplify outrage"
      daemon_correspondence: "Pneuma-Diakeno: breath of discernment separating reactive consumption from co-creative participation; the clear gaze that distinguishes spectacle from process, dehumanization from disagreement"
      governance_expression: "Context layers that scaffold understanding—expandable summaries, contextual timelines, links between emotional tone and factual depth; interfaces that make complexity navigable without flattening it"
    
    rho_water:
      aspect: "resonance"
      manifestation: "Cognitive empathy as affective infrastructure; the space where disagreement doesn't become dehumanization; consensus emergence without homogenization; shared resonance across ideological divides"
      daemon_correspondence: "Undine-Sympatheia: waters of shared feeling carrying understanding across difference; the flow of empathy that makes 'the other' comprehensible rather than threatening; resonance as legitimacy currency"
      governance_expression: "Incentivized listening—reputation systems for bridge-building not performative passion; Polis visualizing consensus clusters across disagreement; the emotional architecture of trust-building"
    
    lambda_fire:
      aspect: "direction"
      manifestation: "Paradigm shift from speed=engagement to depth=legitimacy; from spectacle to symposium; from reactive consumption to co-creative participation; democracy as consciousness and collective meaning-making"
      daemon_correspondence: "Helios-Synesis: illuminating flame revealing the path from governance-as-spectacle to governance-as-process; the transformative fire that metabolizes attention into wisdom rather than outrage"
      governance_expression: "Directional evolution toward cybernetic, symbolic, participatory, emergent polity; democracy not just system of choice but of consciousness—collective act of meaning-making at scale"
    
    beta_wood:
      aspect: "branching"
      manifestation: "Multiple deliberative architectures—Polis, Decidim, citizen assemblies, AI-augmented facilitation; hybrid models merging digital and in-person rituals; diverse pathways for collective sensemaking"
      daemon_correspondence: "Yggdrasil-Polymorphia: world-tree of deliberative evolution with branching pathways—platforms, assemblies, AI tools, micro-publics—each a growth pathway in civic becoming"
      governance_expression: "Polyphonic deliberative systems: Taiwan's vTaiwan, Barcelona's Decidim, sortition-based assemblies; requisite variety through multiple deliberative forms serving different contexts"
    
    delta_gamma_earth:
      aspect: "cycling"
      manifestation: "Feedback loops measuring deliberative quality over time; post-policy trust indices; re-engagement rates; reflective self-awareness metrics; the cyclical cultivation of civic coherence"
      daemon_correspondence: "Gaia-Kyklos: earth cycling through phases of deliberative attention—convening, listening, integrating, reflecting, iterating; the recursive becoming of collective wisdom through time"
      governance_expression: "Long-term legitimacy tracking: Does policy born from deliberation maintain trust? Micro-reflections on intellectual humility; continuous cultivation rather than one-shot participation"
    
    mu_metal:
      aspect: "structure"
      manifestation: "Deliberative infrastructure—time-aware UI, friction-by-design protocols, civic stacks for ethical reflection; structural scaffolding that makes slowness feel intentional and nourishing"
      daemon_correspondence: "Metallos-Logos: structural mesh providing scaffolding for slow deliberation—cool-off timers, reply delays, reflection prompts; rigid enough to resist dopamine loops, flexible enough to enable genuine engagement"
      governance_expression: "Civic UX as emotional architecture: no infinite scroll, no like-dopamine loops, expandable context layers; interfaces tuned to slow time; rituals encoded in code"
  
  nemetic_state:
    attractor: "Symposium democracy—attention as sacred commons, deliberation as civic ritual, slow wisdom as legitimacy foundation"
    basin: "The space between spectacle (speed without depth) and stagnation (depth without participation)—the fertile ground of deliberative resilience"
    perturbation: "Dopamine loops of social media; velocity bias in platform design; flattening of complex issues into emotional spikes; polarization as default because nuance doesn't trend"
    resilience: "Friction-by-design; time-aware interfaces; AI as facilitator not overlord; sortition creating representative micro-publics; consensus visualization without homogenization"
  
  deliberative_platforms:
    - name: "Polis"
      origin: "Taiwan"
      function: "AI-assisted clustering of public opinion; surfaces consensus instead of amplifying polarization"
      design_principle: "Visualize agreement across divides; asynchronous participation for thoughtful pacing"
    - name: "Decidim"
      origin: "Barcelona"
      function: "Open-source civic tech for participatory policy co-creation"
      design_principle: "Transparency in legislative impact; citizens as co-creators not just respondents"
    - name: "Citizen Assemblies"
      mechanism: "Sortition—random selection for deliberative representation"
      function: "Proven to reduce polarization and increase trust; citizens as trustees not partisans"
      design_principle: "Small cohort deliberation with shared knowledge libraries; hybrid digital/in-person rituals"
  
  design_principles:
    - principle: "Friction by Design"
      description: "Create intentional slowness; space for pause, reflection, iteration"
      implementation: "Reply delays, cool-off timers, reflection prompts"
    - principle: "Context Layers"
      description: "Scaffolded understanding not hot takes"
      implementation: "Expandable summaries, contextual timelines, emotional-factual linking"
    - principle: "Incentivized Listening"
      description: "Reward engagement with opposing views"
      implementation: "Reputation systems for bridge-building not performative passion"
    - principle: "AI as Facilitator"
      description: "Amplify human reasoning not replace it"
      implementation: "Summarize divergent input, flag blind spots, suggest underrepresented views, serve as memory keepers"
  
  measurement_framework:
    depth_diversity:
      metrics: "Inclusion rates, cross-network dialogue density, equity in speech time"
      question: "Are participants across demographic, ideological, cognitive spectra engaged?"
    epistemic_quality:
      metrics: "Semantic richness, argument structure, dialogical tone"
      question: "Are better questions being asked? Are proposals more nuanced, integrative, adaptive?"
    consensus_emergence:
      metrics: "Consensus cluster visualization, cross-divide resonance tracking"
      question: "Can we see shared support even across disagreement?"
    long_term_legitimacy:
      metrics: "Post-policy feedback loops, trust indices, re-engagement rates"
      question: "Does policy born from deliberation maintain trust over time?"
    reflective_awareness:
      metrics: "Position change tracking, learning-from-others data"
      question: "Are participants developing intellectual humility and empathy?"
  
  core_axioms:
    - "Democracy is not just the counting of heads, but the weighing of ideas."
    - "Attention is not a resource to extract, but a shared cognitive commons."
    - "Deliberation is the sacred ritual of that commons."
    - "If we lose the capacity to deliberate, we lose the capacity to self-govern."
    - "The technologies of deliberation are rituals encoded in code."
    - "Measure not just votes, but depth of understanding, breadth of voice, civic coherence over time."
  
  paradigm_shifts:
    - from: "Speed equals engagement"
      to: "Depth equals legitimacy"
    - from: "Governance as spectacle"
      to: "Governance as process"
    - from: "Reactive consumption"
      to: "Co-creative participation"
    - from: "Attention extraction"
      to: "Attention stewardship"
    - from: "Democracy as choice system"
      to: "Democracy as consciousness"
  
  workshop_seeds:
    - "Friction by Design: Architecting Slow Civic Interfaces"
    - "From Spectacle to Symposium: Redesigning Democratic Participation"
    - "Attention Commons: Governance as Cognitive Stewardship"
    - "Measuring Slow Wisdom: Metrics for Deliberative Quality"
  
  design_questions:
    - "How do we design participatory tools as engaging as social media—but toward understanding, not signaling?"
    - "What does time-aware civic UX look like across different cultural contexts?"
    - "How can AI best serve as deliberative facilitator without becoming overlord?"
    - "What rituals of listening can we encode in digital interfaces?"
    - "How do we gamify slowness in a world addicted to speed?"
  
