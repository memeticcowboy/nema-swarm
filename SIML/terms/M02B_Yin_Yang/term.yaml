  epistemics:
    dsrp:
      D: The defining distinction is between yin and yang, but the radical move is to recognize that the distinction is itself
        the system — there is no yin without yang to mark it.
      S: The system is the perpetual circulation between the two poles, contained within the larger frame of the Dao; each
        pole is a sub-system that contains a seed of the other.
      R: Relationships are reciprocal-generative — yin generates yang generates yin, never resting in either; the S-curve
        is the relationship made visible.
      P: The required perspective is non-dual — standing on one side and claiming truth is to already be turning toward the
        other; the observer who finds objective ground discovers they are spinning on the same wheel.
