elemental_emphasis:
  ∴: 'Air carves the radical distinction — yin AND yang, not yin OR yang. The cut is not between two things but between
    "this pair held in tension" and "this pair collapsed into hierarchy." The discipline is preserving the cut without resolving
    it: the moment one pole is judged superior, the symbol degrades from generative paradox to dualistic moralism. Air asks:
    where am I trying to resolve a tension that should be sustained?'
  ≈: 'Water flows in both directions simultaneously — yin descends, yang rises, yet neither can exist without the other
    to define it. The flow is not toward resolution but toward sustained tension; like water finding its level, the system
    self-corrects but never settles. Water asks: what unspoken reciprocity is doing the work that I''m attributing to one
    pole alone?'
  ▲: 'Fire reveals the directional commitment of the symbol — not toward stillness but toward perpetual motion. The S-curve
    is the path of fire through the structure: where it cuts cleanly, it also reveals that division is illusion created by
    perspective. Fire asks: am I burning toward an end-state that the Dao does not contain, mistaking arrival for the path?'
  𐂷: 'Wood branches through the seasons — spring becomes summer becomes autumn becomes winter, each carrying the memory
    of what came before and the seed of what comes next. There is no end, only turning. The branch missed by linear-time
    thinking is the one where this season already contains next season. Wood asks: what return is already underway in what
    feels like fresh growth?'
  ☷: 'Earth reveals the metabolic basis — the vessel must be empty to be useful; the structure that holds most is the one
    that yields. Composting is built into the symbol: yin composts to yang composts to yin, each pole feeding the next''s
    emergence. Earth asks: what am I trying to keep static that the cycle wants to compost back into the field?'
  ⛨: 'Metal is the structural truth that defines this term — the Dao as the self-containing frame within which yin and
    yang circulate. The lattice is not rigid; it bends, it breathes, it returns. The architecture is paradoxical: the symbol
    that contains everything cannot itself be contained; to understand it is to become it, and to become it is to forget
    the self that sought understanding. Metal asks: what container am I treating as object that is actually the field I am
    inside?'
context_note: 'The yin-yang glyph as the canonical SIML term for sustained creative tension — opposites that generate, contain,
  and transform into each other across all scales. Maximum multiscale signature. The Z-closure risk is moralistic collapse
  of the pair into hierarchy, which freezes the generative cycle.'
