## Core Definition

**Gamified Learning Theory** represents the strategic integration of game design elements into educational contexts to enhance motivation, engagement, and learning outcomes — while carefully avoiding the corruption of intrinsic motivation through poorly designed extrinsic reward systems. Drawing on Self-Determination Theory (Deci & Ryan), Flow Theory (Csikszentmihalyi), and extensive research on the overjustification effect, this framework distinguishes between superficial gamification (points, badges, leaderboards as extrinsic motivators) and meaningful gamification (game mechanics that support autonomy, competence, and relatedness).

