│  Learner does task  │                │  Learner does task  │
│  for inherent       │                │  for rewards;       │
│  satisfaction       │                │  intrinsic joy lost │
│                     │                │                     │
└─────────────────────┘                └─────────────────────┘

Research Evidence:
• Deci (1971): Paid puzzle-solvers spent less free time on puzzles
• Deci, Koestner, Ryan (1999): Meta-analysis of 128 studies confirms
  tangible rewards undermine intrinsic motivation
• Hanus & Fox (2015): 16-week study — gamified course showed LESS
  motivation, satisfaction, and empowerment over time
• Roy & Zaman (2018): Intrinsic motivation decreased over time in
  gamified learning; only extrinsically motivated remained stable
```

