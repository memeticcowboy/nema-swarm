description: 'Evolution from E-Prime (eliminating ''to be'' for linguistic clarity) to IF-Prime (also minimizing ''I/my/me'', adding elemental symbols and recursive structures). E-Prime provides linguistic clarity through verb constraint; IF-Prime extends this into a cognitive and symbolic framework. Contributing sources include Chinese Wu Xing, Western Alchemy, Zen Buddhism, and cybernetics. Key thinkers: Korzybski (general semantics), Peirce (semiotics), Lakoff (cognitive linguistics). IF-Prime adds elemental mapping (Air, Water, Fire, Wood, Metal, Earth, Aether) and spiral grammars for self-reflection and recursive sense-making.'
