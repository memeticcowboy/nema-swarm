## Elemental Pattern Analysis

### Metal/μ + Wood/β Coalition (Primary)

Elaboration Theory is fundamentally a **Metal-Wood** system:

**Metal/μ (Structure/Sequencing):**
- **Hierarchical organization:** The epitome provides the structural anchor
- **Sequencing control:** Planned progression from simple to complex
- **Integrative reconciliation:** Bringing components back together

**Wood/β (Branching/Expansion):**
- **Progressive elaboration:** Each level branches into more detail
- **Generative growth:** Knowledge expands like a tree from trunk to branches to leaves
- **Multiple pathways:** Different elaboration sequences for different learners

**Earth/δγ (Cycling/Returning):**
- **Spiral revisiting:** Prior content is revisited at deeper levels
- **Cumulative building:** Each cycle adds to what came before
- **Grounded expansion:** New elaboration always connected to prior learning

**Air/σ (Distinction/Clarity):**
- **Epitome clarity:** Simplest representation provides clear anchor
- **Summarizers:** Periodic clarification of what has been learned
- **Synthesizers:** Showing how elaborated components relate

