## Core Definition

**Elaboration Theory**, developed by Charles Reigeluth in 1979, is an instructional design framework that proposes teaching content in a **simple-to-complex sequence**, starting with the simplest, most fundamental representation (the "epitome") and progressively adding layers of detail and complexity. The theory addresses the challenge of teaching complex material without overwhelming learners.

### The Elaboration Sequence

```
ELABORATION THEORY SEQUENCE
│
┌─────────────────────────────────────────────────────────────────┐
│                                                                 │
│  STEP 1: PRESENT THE EPITOME                                    │
│  ┌─────────────────────────────────────────────────────────┐   │
│  │  Simplest, most inclusive representation of the domain  │   │
│  │  • Core concepts only                                   │   │
│  │  • Broadest organizational structure                    │   │
│  │  • Provides cognitive anchor for all subsequent learning│   │
│  └─────────────────────────────────────────────────────────┘   │
│                              ↓                                  │
│  STEP 2: FIRST LEVEL ELABORATION                                │
│  ┌─────────────────────────────────────────────────────────┐   │
│  │  Add the next level of detail                           │   │
│  │  • Elaborate on each major component                    │   │
│  │  • Maintain connection to epitome                       │   │
│  │  • Learner sees "big picture" while adding detail       │   │
│  └─────────────────────────────────────────────────────────┘   │
│                              ↓                                  │
│  STEP 3: SECOND LEVEL ELABORATION                               │
│  ┌─────────────────────────────────────────────────────────┐   │
│  │  Add further detail to each elaborated component        │   │
│  │  • Progressive deepening                                │   │
│  │  • Always connected to prior learning                   │   │
│  │  • Complexity increases gradually                       │   │
│  └─────────────────────────────────────────────────────────┘   │
│                              ↓                                  │
│  STEP N: CONTINUE ELABORATING                                   │
│  ┌─────────────────────────────────────────────────────────┐   │
│  │  Until desired level of complexity is reached           │   │
│  │  • Each elaboration builds on prior learning            │   │
│  │  • Learner never loses sight of the whole               │   │
│  │  • Final state: sophisticated, integrated understanding │   │
│  └─────────────────────────────────────────────────────────┘   │
│                                                                 │
└─────────────────────────────────────────────────────────────────┘
```

### Key Principles

| Principle | Description | Nemetic Mapping |
|-----------|-------------|-----------------|
| **Epitome First** | Begin with simplest, most inclusive representation | μ (structural anchor) |
| **Progressive Elaboration** | Add detail in planned sequence | β (branching expansion) |
| **Spiral Organization** | Revisit and expand prior content | δγ (cycling/returning) |
| **Integrative Reconciliation** | Show relationships between components | ✶ (harmonic integration) |
| **Summarizers** | Periodic review of what has been learned | σ (distinction/clarity) |

