## Types of Elaboration

### 1. Conceptual Elaboration
Adding detail to the conceptual structure of the domain:
- More specific concepts
- Finer distinctions
- Additional relationships

### 2. Procedural Elaboration
Adding detail about how to do things:
- More specific steps
- Alternative procedures
- Exception handling

### 3. Theoretical Elaboration
Adding detail about why things work:
- Deeper explanatory mechanisms
- Alternative theories
- Boundary conditions

