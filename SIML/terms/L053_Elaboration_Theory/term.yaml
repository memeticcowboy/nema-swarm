## Core Insight

> Elaboration Theory reveals that complex understanding emerges not from presenting complexity all at once, but from **progressive expansion** — starting with a simple, cognitively manageable epitome that serves as an anchor, then systematically adding layers of detail while maintaining connection to the whole. The learner never loses sight of the forest while examining each tree, branch, and leaf. This simple-to-complex sequencing respects cognitive limitations while building toward sophisticated expertise.

## One-Sentence Insight

> Reigeluth's Elaboration Theory demonstrates that optimal learning of complex domains occurs through progressive elaboration — beginning with a simple epitome that anchors understanding, then systematically adding detail in planned sequences while maintaining connection to the whole.

## Three-Bullet Expansion

- **What:** An instructional design theory proposing that complex content should be taught through progressive elaboration — starting with the simplest, most inclusive representation (the epitome) and systematically adding layers of detail and complexity
- **How it works:** Epitome presentation → first-level elaboration (add detail to each component) → second-level elaboration (further detail) → continue until desired complexity reached — with spiral revisiting, summarizers, and integrative reconciliation maintaining coherence throughout
- **Where it aims:** Toward anchored, expandable knowledge structures that enable learners to understand complex domains without cognitive overload — building from simple foundations to sophisticated expertise while never losing sight of the whole

