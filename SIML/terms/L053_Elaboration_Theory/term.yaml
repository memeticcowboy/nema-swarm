## Connection to Related Theories

### Elaboration Theory vs. Cognitive Load Theory

| Aspect | Cognitive Load Theory | Elaboration Theory |
|--------|----------------------|-------------------|
| **Focus** | Managing working memory limits | Sequencing content for optimal learning |
| **Strategy** | Reduce extraneous load | Progressive complexity increase |
| **Element** | Air (σ-clarity) | Metal-Wood (μ-β structure-expansion) |
| **Complement** | CLT manages cognitive resources | Elaboration Theory sequences content |

**Synergy:** Elaboration Theory provides the macro-structure; CLT ensures each elaboration level is cognitively manageable.

### Elaboration Theory vs. Subsumption Theory

| Aspect | Subsumption Theory (Ausubel) | Elaboration Theory (Reigeluth) |
|--------|------------------------------|--------------------------------|
| **Core idea** | New learning subsumes under prior | Content elaborates from simple epitome |
| **Anchor** | Advance organizers | The epitome |
| **Mechanism** | Subsumption (hierarchical inclusion) | Elaboration (progressive detail) |
| **Relationship** | Elaboration Theory operationalizes subsumption principles |

## Connection to CAMIL and IVR

Elaboration Theory transforms immersive learning design:
- **Epitome in IVR:** Simple, holistic virtual environment showing the "whole" first
- **Progressive Immersion:** Increasingly complex virtual scenarios
- **Spiral Revisiting:** Return to virtual environments with new capabilities
- **Elaborated Presence:** Agency and complexity increase together

**Design Implications:**
- Begin IVR experiences with simplified, representative environments
- Gradually add complexity (more objects, more interactions, more rules)
- Allow learners to return to earlier environments with new skills
- Maintain connection to the "big picture" throughout

