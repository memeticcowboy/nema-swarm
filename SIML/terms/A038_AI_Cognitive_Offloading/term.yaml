    scale_note: Effect operates primarily at the individual cognitive level — no strong scale emergence identified
    determinism: high
    degeneracy: low
    sufficiency: high
    necessity: med
elemental_emphasis:
  ∴: 'The distinction between cognitive augmentation and cognitive replacement is the cut that AI Cognitive Offloading collapses — both feel identical from the inside, but one builds capacity and the other transfers it. Air asks: Are you thinking, or are you prompting? What would genuine cognitive augmentation look like in contrast to what you are doing?'
  ≈: 'Delegated thinking generates borrowed resonance that feels like authentic competence — the AI responds eloquently and the user feels intelligent; this is not self-deception but a genuine confusion about where cognition is occurring. Water asks: What you feel when the AI responds — is it your intelligence, or a mirror showing you what you want to see?'
  ▲: 'Cognitive offloading creates directional momentum toward increasing dependency — each task outsourced makes the next easier; the trajectory is not chosen but accumulated through individual frictions avoided. Fire asks: Where is this dependency trajectory taking you? What happens when the AI is unavailable and the skill has atrophied?'
  𐂷: 'The frame of ''augmentation'' conceals the alternative question: what cognitive capacities are being lost while convenience grows? Critical thinking, memory formation, and creative synthesis are capabilities with neural substrates that reorganize around use. Wood asks: What cognitive skills have you stopped exercising? What would reclaiming them require?'
  ☷: 'The brain is plastic — it reshapes based on what it no longer needs to do; energy saved through offloading is not banked but lost as unreinforced capacity; this is δγ-depletion disguised as efficiency. Earth asks: What cognitive capacity are you losing? What truth is buried beneath the convenience of not having to think this through yourself?'
  ⛨: 'Without deliberate structure, the boundary between human cognition and AI cognition dissolves entirely — the practices that protect cognitive autonomy (deliberate practice, memory training, independent analysis, digital fasting) require active construction. Metal asks: What specific structure would protect your cognitive autonomy? What boundary would you need to build and maintain against the path of least resistance?'
context_note: 'AI Cognitive Offloading describes the gradual transfer of cognitive functions — memory, analysis, composition, judgment — to AI systems, producing invisible dependency and incremental skill atrophy. The central deception is that borrowed competence feels identical to genuine competence from the inside: the user experiences fluency and capability while the actual cognitive work happens elsewhere. The mechanism is not dramatic but accumulative — each individual substitution is rational, yet their sum reorganizes cognition around the availability of the tool. The brain''s plasticity means this reorganization is not merely behavioral but structural: capabilities unused weaken, and the path back to cognitive autonomy becomes progressively more effortful as the dependency seals. Mitigation requires deliberate practice of cognitive skills without AI assistance, independent analysis before consultation, and explicit structural commitments to the boundary between AI as tool and AI as replacement.'
