name: ai_cognitive_offloading
term: AI Cognitive Offloading
nemetic: "Φ(AICogOffload) = σ(augmentation|replacement)\n               ∘ ρ(thinking|delegated)\n               ∘ λ(dependency|increasing)\n               ∘ β(atrophy|skill-loss)\n               ∘ δγ(effort|minimized)\n               ∘ μ(boundary|porous)\n               + ε | :structuring"
siml_encoding: "⟨Cognition|human⟩\n    ⊳ ⟨Function|outsourced⟩\n    → ⟨Memory|externalized⟩\n    ⊗ ⟨Skill|atrophy⟩\n    ⇄ ⟨Dependency|increased⟩"
formalism:
  math_operators:
  - σ
  - ρ
  - λ
  - β
  - δγ
  - μ
  dim_operators:
  - ∴Air
  - ≈Water
  - ▲Fire
  - 𐂷Wood
  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between augmented and replaced cognition — the cut between extending capability and outsourcing it entirely is subtle but critical; using AI to check a fact extends memory, using AI to generate thoughts replaces cognition, and the collapse of this distinction is where offloading begins)
  - ∂Φ/∂ρ (delegated thinking feels like own thinking — borrowed resonance passes as authentic cognition; the user feels competent and knowledgeable while actual capability is elsewhere; this is not deception but a genuine confusion about the boundary of self)
  - ∂Φ/∂λ (momentum toward increasing dependency — each outsourced task makes the next easier; why remember when you can search, why analyze when AI summarizes; the direction is not chosen but accumulated through individual frictions avoided)
  - ∂Φ/∂β (skill atrophy loop — capacities unused weaken; critical thinking, memory formation, creative synthesis, and independent judgment are neural muscles that reshape based on use; the feedback is slow and invisible until the capability is needed and absent)
  - ∂Φ/∂δγ (effort minimized as efficiency mistaken for growth — energy saved through offloading is energy not spent building cognitive capacity; δγ-depletion disguised as optimization; the brain is plastic and reorganizes around what it no longer needs to do)
  - ∂Φ/∂μ (porous boundary between human and AI cognition — without deliberate structure, the line between where the human thinks and where the AI thinks dissolves; the claim 'I wrote this' becomes increasingly uncertain even to the claimant)
  Z_state: semi
  z_note: 'Tendency toward sealing — dependency becomes invisible and naturalized; the outsourced cognitive functions are no longer experienced as outsourced, they are simply how thinking happens. Z-Closure Risk: when the dependency seals, reclaiming cognitive autonomy feels unnatural and effortful, making the return harder than the descent.'
  tendency: autonomy/dependency → :structuring
  hex:
  - '#A038'
  - '#A059'
coords:
  ontology:
    primary: I
    secondary: Its
  epistemics:
    dsrp:
      D: The distinction between using AI as a tool and using AI as a cognitive replacement is the central cut — it is routinely collapsed because both feel identical from the inside; the user experiences competence either way, but in one case it is genuine and in the other it is borrowed
      S: The cognitive system gradually reorganizes around offloading — not through dramatic choice but through accumulated frictionless substitutions; the resulting system is neither human cognition nor AI cognition but a dependency structure that functions only when the AI is present
      R: The relation between the user and the AI is asymmetric in a way the user typically cannot see — the AI holds capability the user believes themselves to possess; the user manages the interface while the cognition happens elsewhere
      P: The perspective of the offloading user is locked inside the felt competence — the borrowed resonance of AI-generated responses feels like self-generated understanding; authorship, analysis, and memory all feel genuine even when they are not
    learning: L0
  agency:
    type: ego
    power_mode: Under
  time:
    mode: slow
    phase: 'Stage 1: Initial Offloading for Convenience (δγ efficiency) → Stage 2: Repeated Substitution Normalizes Pattern → Stage 3: Cognitive Skill Atrophy Begins (β loop) → Stage 4: Dependency Becomes Transparent (μ dissolves) → Stage 5: Reclamation Feels Unnatural (Z-seal)'
  qualia:
    affect:
    - ease
    - competence
    - fluency
    - efficiency — all potentially borrowed; latent anxiety when AI is unavailable
    aesthetic:
    - smooth
    - productive
    - capable; hollow when the tool is absent
    symbolic:
    - The Extended Hand (tool as prosthetic)
    - The Mirror (AI showing the user what they want to see)
    - The Atrophied Muscle (capability lost to disuse)
    energetic:
    - low-friction
    - metabolically cheap
    - δγ-depleting in disguise; high-cost when autonomy is reclaimed
  coherence:
    state: delegated
    loop: open
    transcontext: low
  ce: &id001
    ei_state: high
