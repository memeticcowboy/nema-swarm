### Script Modification Types

| Type | Description | Example |
|------|-------------|---------|
| **Instantiation** | Filling slots with specifics | "Ordered steak" instantiates "orders food" |
| **Generalization** | Creating broader scripts from specific instances | "Restaurant script" from many dining experiences |
| **Discrimination** | Creating distinct scripts for different contexts | Fancy restaurant vs. fast food scripts |
| **Exception Learning** | Adding special cases to scripts | "If no table available, wait or leave" |

## Connection to Related Theories

### Script Theory and Schema Theory (Piaget; Bartlett)

| Aspect | Schema Theory | Script Theory |
|--------|---------------|---------------|
| **Scope** | All knowledge structures | Event sequences specifically |
| **Structure** | Abstract organizational framework | Temporal, sequential, predictive |
| **Element** | Metal/μ (general structure) | Metal/μ + Earth/δγ (structure + time) |
| **Focus** | How knowledge is organized | How events are anticipated |
| **Complement** | ST provides the "what" | Script Theory provides the "when" |

Scripts can be seen as **temporal schemas** — knowledge structures specifically organized around time and sequence.

### Script Theory and Situated Learning (Lave & Wenger)

Both theories emphasize **context-embedded knowledge**:
- **Situated Learning:** Knowledge is inseparable from practice and community
- **Script Theory:** Knowledge is activated by and organized around situations

The difference:
- Situated Learning focuses on **legitimate peripheral participation**
- Script Theory focuses on **cognitive structures for prediction**

### Script Theory and Cognitive Load Theory (Sweller)

Scripts reduce cognitive load by:
- **Automating predictions:** No need to consciously infer what happens next
- **Chunking sequences:** Whole scripts occupy one working memory slot
- **Providing defaults:** Reducing decision points

Expertise = Richer, more refined scripts that handle more situations automatically.

## Educational Applications

### 1. Reading Comprehension

Scripts help readers:
- Fill gaps in narratives
- Make predictions about story development
- Understand implied information
- Organize memory for stories

### 2. Writing Instruction

Teaching script awareness:
- Genre conventions are shared scripts
- Story structures (beginning-middle-end) are scripts
- Academic writing follows disciplinary scripts

### 3. Second Language Learning

Scripts help language learners:
- Predict what will be said in routine exchanges
- Know appropriate responses
- Navigate cultural differences in scripts

### 4. Expert-Novice Differences

Experts have:
- More scripts
- More refined scripts
- More flexible scripts
- Better script selection for context

## Pathological Script Patterns

### Dysfunctional Scripts

| Pattern | Description | Example |
|---------|-------------|---------|
| **Overgeneralized scripts** | One script applied too broadly | "All authority figures will hurt me" |
| **Rigid scripts** | Inability to adapt scripts | Insisting on exact sequence, can't improvise |
| **Underdeveloped scripts** | Missing scripts for common situations | Social awkwardness from missing social scripts |
| **Conflicting scripts** | Multiple incompatible scripts for same situation | Approach-avoidance in relationships |

### Therapeutic Applications

Cognitive therapy often works with scripts:
- Identifying maladaptive life scripts
- Developing new, healthier scripts
- Increasing flexibility in script application

## Core Insight

> Script Theory reveals that much of what we call "understanding" is actually **pattern matching** — the activation of pre-existing structures that tell us what to expect, what to remember, and how to behave. We don't comprehend events fresh each time; we **recognize** them as instances of familiar patterns. This is efficient but creates blind spots: we may "remember" what the script says should have happened rather than what actually occurred. The expert is not someone who thinks faster, but someone who has better scripts — more refined, more flexible, more appropriate to context.

## One-Sentence Insight

> Script Theory demonstrates that human comprehension relies on structured mental representations of familiar event sequences that enable prediction, fill gaps in information, and organize memory—but these same scripts can create rigidity and false memories when reality deviates from expected patterns.

## Three-Bullet Expansion

- **What:** A cognitive theory proposing that knowledge about common situations is organized as "scripts" — structured representations of stereotyped event sequences including roles, props, actions, and default values that enable prediction and rapid comprehension
- **How it works:** Context triggers script activation → slots are filled with specific details → default values provide expectations for unstated information → inferences are generated automatically → atypical events are remembered better than typical ones
- **Where it aims:** Toward expertise as script refinement — developing richer, more flexible, more context-appropriate scripts that reduce cognitive load while maintaining adaptability; and toward understanding how rigid or maladaptive scripts can limit perception and behavior

