## Core Definition

**Script Theory**, developed by Roger Schank and Robert Abelson (1977), proposes that human memory organizes knowledge about common situations into **scripts** — structured representations of stereotyped event sequences. Scripts enable rapid comprehension, prediction, and appropriate behavior in familiar contexts without requiring conscious deliberation.

### The Restaurant Script (Classic Example)

```
THE RESTAURANT SCRIPT

┌─────────────────────────────────────────────────────────────────────────┐
│                                                                         │
│  ENTRY CONDITIONS: Hungry, has money, wants food                       │
│                                                                         │
│  ROLES: Customer, Waiter, Cook, Cashier                                 │
│                                                                         │
│  PROPS: Table, Menu, Food, Bill, Money                                  │
│                                                                         │
│  SCENE 1: ENTERING                                                      │
│     ├── Customer enters restaurant                                      │
│     ├── Customer looks for table                                        │
│     └── Customer decides where to sit (or is shown to table)            │
│                                                                         │
│  SCENE 2: ORDERING                                                      │
│     ├── Waiter brings menu                                              │
│     ├── Customer reads menu                                             │
│     ├── Customer decides on food                                        │
│     └── Customer tells Waiter order                                     │
│                                                                         │
│  SCENE 3: EATING                                                        │
│     ├── Waiter brings food                                              │
│     ├── Customer eats food                                              │
│     └── (Optional: Customer requests more)                              │
│                                                                         │
│  SCENE 4: EXITING                                                       │
│     ├── Waiter writes bill                                              │
│     ├── Waiter brings bill to Customer                                  │
│     ├── Customer gives money to Waiter/Cashier                          │
│     ├── Customer leaves tip                                             │
│     └── Customer leaves restaurant                                      │
│                                                                         │
│  RESULT: Customer is no longer hungry, has less money                   │
│          Restaurant has more money                                      │
│                                                                         │
└─────────────────────────────────────────────────────────────────────────┘
```

