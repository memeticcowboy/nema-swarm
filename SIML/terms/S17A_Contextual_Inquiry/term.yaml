description: Hands-on UX research method combining observation and interviewing in user's natural setting. Reveals insights surveys/lab tests miss. AEIOU framework (Activities, Environments, Interactions, Objects, Users). Low-stakes pilot approach. Think-aloud protocols. Hybrid observation + interview. Iterative reflection loops. Desensitizing anxiety through experimentation. Time-boxing sessions. Ethics-first consent.
