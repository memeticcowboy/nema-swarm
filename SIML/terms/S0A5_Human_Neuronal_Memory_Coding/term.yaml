  - ∂Φ/∂σ (distinguishing context-independent neuronal coding — where human neurons maintain stable, consistent responses to a concept regardless of the situation in which it is encountered — from context-dependent coding — where animal neurons alter their responses based on environmental and situational factors)
  - ∂Φ/∂ρ (relating concept recognition to situation decoupling — the ability to recognize the same person or object across radically different contexts — and mapping the cross-context association network that enables abstract reasoning and complex inference)
  - ∂Φ/∂λ (transforming context-bound memory — where recall is anchored to the specific situation of encoding — into abstract decontextualized thought — where concepts can be manipulated, compared, and reasoned about independently of their original context)
