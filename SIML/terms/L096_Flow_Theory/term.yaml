## Core Definition

**Flow** is a state of complete absorption in an activity, characterized by intense focus, loss of self-consciousness, and intrinsic enjoyment. Coined by Mihaly Csikszentmihalyi, the concept emerged from research on artists, athletes, musicians, and others who described their best moments as occurring when their body or mind was stretched to its limits in a voluntary effort to accomplish something difficult and worthwhile.

Flow represents the **optimal experience** — a state where people are so involved in an activity that nothing else seems to matter. The experience itself is so enjoyable that people will do it even at great cost, for the sheer sake of doing it.

