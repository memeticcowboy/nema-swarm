## Microflow vs. Deep Flow

```
FLOW DEPTH SPECTRUM
═══════════════════════════════════════════════════════════════════

MICROFLOW                                    DEEP FLOW
───────────────────────────────────────────────────────────────────
Brief moments                              Extended periods
Fleeting absorption                        Complete immersion
Everyday activities                        Challenging endeavors
Walking, washing dishes                    Rock climbing, composing
                                           surgery, chess mastery

MICROFLOW EXAMPLES:
• Getting lost in a good book
• Deep conversation with a friend
• Cooking when fully present
• Gardening with attention
• Playing with children

DEEP FLOW EXAMPLES:
• Elite athletic performance
• Musical improvisation
• Complex problem-solving
• Artistic creation
• Surgical procedures
• Meditation (advanced)

Both contribute to well-being and skill development.
Microflow sustains daily life; deep flow transforms it.
```

