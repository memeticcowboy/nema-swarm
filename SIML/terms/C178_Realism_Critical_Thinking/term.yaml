term: Realism Critical Thinking
nemetic: >-
  Φ(RealismCriticalThinking) = σ(idealism|realism) ∘
  ρ(universal_outreach|willing_recipient) ∘
  λ(external_intervention|personal_responsibility) ∘
  β(narrative_fallacy|factual_discernment) ∘
  δγ(ignorance_illusion|socratic_wisdom) ∘ μ(knowing|not_knowing) + ε | :pure
siml_encoding: >-
  ⟨IdealisticGoal|cherished⟩ ⊳ ⟨UniversalOutreach|attempted⟩ ⇄
  ⟨ResistanceEncountered|experienced⟩ ⊗ ⟨SelfReflection|initiated⟩ ⊳
  ⟨WillingLearners|engaged⟩
