elemental_emphasis:
  ∴: How is each vertex distinguished from the others?
  ≈: What resonance does belief carry when locked vs flowing?
  ▲: What direction does benefit pull the system?
  𐂷: What possibilities open through behavioral distinction?
  ☷: How does motivation cycle through collapse and renewal?
  ⛨: What boundaries contain the three vertices as a system?
context_note: 'Motivation Triangle represents a popular psychology framework that maps well to NEMETIC operators. Key insight: the foundation is circulation between vertices, not any single element. Eyal''s framework risks dimensional collapse if belief is treated as load-bearing. The triangle is diagnostic, not generative—motivation is the visible wave; nematic metabolism is what moves underneath.'
