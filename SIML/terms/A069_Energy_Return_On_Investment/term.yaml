elemental_emphasis:
  ∴: 'The cut between energy-gained and energy-invested appears simple — E_out/E_in — but the boundary selection is the entire epistemic contest. Where does ''invested'' energy begin? At the wellhead? At the refinery? At the road built to reach the drill site? At the military securing the supply route? Each boundary choice produces a different ratio, and the choice is never neutral. Air asks: What would the EROI of your energy system be if you drew the boundary around everything it actually requires to function?'
  ≈: 'What flows between extraction and civilization is not energy but surplus — the fraction remaining after the energy system feeds itself. At EROI 50:1 the flow is generous (98% surplus), but the same physics that made fossil fuels transformative makes their decline devastating: civilization''s infrastructure was built assuming a flow rate that geology will not sustain. Water asks: What emotional relationship does your society have with energy abundance — and what happens to that relationship when the flow tightens?'
  ▲: 'Declining EROI exerts directional force toward simplification whether or not anyone chooses it — the Western Roman Empire did not decide to collapse, it ran out of surplus. The same directional logic now applies at planetary scale: the weighted average EROI of all oil liquids declining from 44 to under 7 by 2050 is not a policy failure but a thermodynamic trajectory. Fire asks: Is the current pursuit of economic growth a purposeful direction or an inherited momentum that the energy physics no longer supports?'
  𐂷: 'Substitution is the growth story told at the cliff edge — renewables, nuclear, hydrogen each presented as replacement branches. But the EROI numbers complicate the narrative: solar PV at 2.5-10, wind at 18-50, nuclear at 20-80, each with different boundary assumptions and intermittency costs. The branching is real but each branch carries its own metabolic load. Wood asks: What if no single substitute can replicate what concentrated fossil surplus provided — and what forms of civilization would the actual available surplus support?'
  ☷: 'The net energy cliff is Earth''s teaching: below EROI ~8, small decreases produce exponentially larger losses of available surplus. This is not a metaphor but a mathematical function — moving from EROI 10 to 5 loses only 10 percentage points of net energy (90% to 80%), but moving from 5 to 2 loses 30 points (80% to 50%). The metabolic cost of maintaining complex civilization rises precisely as the capacity to pay it falls. Earth asks: What would your society look like if it were designed for the EROI actually available rather than the EROI it inherited?'
  ⛨: 'The boundary between viable and non-viable energy is not gradual but threshold-like — EROI 1:1 is an energy sink, and the minimum for complex civilization is estimated at 7-12 depending on methodology. Below this threshold, the boundary seals: there is not enough surplus energy to build the infrastructure needed to develop new energy sources, creating a structural trap. Metal asks: What institutional and physical boundaries would need to be redesigned now, while surplus still exists, to function under the EROI that is actually coming?'
context_note: 'Energy Return on Investment describes the ratio of usable energy delivered from a source to the energy required to obtain it (E_out/E_in). The concept reveals a structural dependency of civilizational complexity on energy surplus that conventional economics cannot see. The ''net energy cliff'' — the non-linear relationship where EROI decline below ~8:1 produces exponentially accelerating loss of available surplus — represents a thermodynamic constraint on social complexity itself. Somatic register shows energy as still flowing (abundant fuel at point of use), while systemic register reads tight (declining EROI of primary sources, increasing extraction costs, substitution gaps). This somatic/systemic divergence — abundance felt, scarcity structurally present — is diagnostically central: it explains why the energy transition feels optional to individuals while being thermodynamically mandatory at system scale.'
source: 'Wikipedia: Energy return on investment (https://en.wikipedia.org/wiki/Energy_return_on_investment); Hall, C.A.S. et al.; Homer-Dixon, T.'
