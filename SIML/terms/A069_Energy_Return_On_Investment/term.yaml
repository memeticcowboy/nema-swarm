    scale_note: Macro-level EROI ratios are useful heuristics but obscure critical micro-level variations — the EROI of Saudi light crude vs. Canadian tar sands vs. North Dakota shale differ by orders of magnitude; system-wide averages mask the micro-level resource quality dynamics that actually drive civilizational outcomes
