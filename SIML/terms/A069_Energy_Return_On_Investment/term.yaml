    phase: 'Stage 1: High-EROI Discovery (fossil fuel exploitation, EROI 50-100+) → Stage 2: Peak Surplus (maximum civilizational complexity) → Stage 3: Declining Returns (conventional sources deplete, EROI falls) → Stage 4: Substitution Attempts (renewables, unconventionals at lower EROI) → Stage 5: Cliff Approach (net energy contraction accelerates non-linearly)'
