name: energy_return_on_investment
term: Energy Return on Investment
nemetic: "Φ(EROI) = σ(energy-gained|energy-invested)\n         ∘ ρ(surplus|subsistence)\n         ∘ λ(complexity|simplification)\n         ∘ β(depletion|substitution)\n         ∘ δγ(net-energy|civilizational-cost)\n         ∘ μ(cliff-threshold|sealed)\n         + ε | :drift ∧ :submergent"
siml_encoding: "⟨Resource|energetic⟩\n    ⊳ ⟨Extraction|invested⟩\n    → ⟨Ratio|declining⟩\n    ⊗ ⟨Constraint|material⟩\n    ⇄ ⟨Civilization|complexity-dependent⟩\n    → ⟨Threshold|cliff⟩"
formalism:
  math_operators:
  - σ
  - ρ
  - λ
  - β
  - δγ
  - μ
  dim_operators:
  - ∴Air
  - ≈Water
  - ▲Fire
  - 𐂷Wood
  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between energy gained and energy invested — EROI is the ratio E_out/E_in, but this 'belies a deep methodological complexity rooted in the selection of system boundaries'; where you draw the boundary around what counts as invested energy fundamentally determines the ratio, making the cut itself a contested epistemic act rather than a neutral measurement)
  - ∂Φ/∂ρ (relation between surplus energy and civilizational subsistence — what flows between energy extraction and social complexity is net energy, the fraction remaining after the energy system feeds itself; at EROI 50:1 only 2% is self-consumed, but at 5:1 fully 20% is diverted to procurement, leaving progressively less for everything that makes civilization more than survival)
  - ∂Φ/∂λ (direction from complexity toward simplification — declining EROI exerts a directional force on civilizational structure; Thomas Homer-Dixon argues that falling EROI contributed to the collapse of the Western Roman Empire, and the same directional logic applies to any society whose complexity requires energy surplus that the available sources can no longer provide)
  - '∂Φ/∂β (feedback loop between resource depletion and attempted substitution — as conventional oil declines from EROI ~44 in 1950 toward ~7 by 2050, substitutes like shale oil at 1.4-1.5 or tar sands at ~5 cannot replicate the surplus; each substitution attempt reveals the loop: lower-EROI replacements require more energy to extract, further lowering the system-wide ratio)'
  - ∂Φ/∂δγ (metabolic cost of net energy to civilization — the 'net energy cliff' describes the non-linear relationship where small decreases in EROI below ~8:1 produce exponentially larger losses of net energy available to society; an EROI of 10 delivers 90% net energy, but dropping to 5 delivers only 80%, and to 2 only 50% — the curve steepens precisely where many alternative sources cluster)
  - ∂Φ/∂μ (cliff-threshold as sealed boundary — below EROI ~7-8, the boundary between viable and non-viable energy becomes rigid; an EROI of 1:1 is an 'energy sink' that delivers zero net energy, and the threshold between functioning complex society and forced simplification is not gradual but cliff-like, a structural boundary that seals when crossed)
  Z_state: sealed
  z_note: 'Tendency from drift toward sealed — declining EROI of conventional fuels pushes civilization toward the net energy cliff while awareness of the threshold remains low; most economic models ignore net energy entirely. Z-Closure Risk: δγ-lock — the non-linear cliff function means that by the time EROI decline becomes economically visible, the system may already be past the threshold where substitution is energetically viable.'
  tendency: complexity/simplification → :drift
  hex:
  - '#A069'
coords:
  ontology:
    primary: Its
    secondary: MoreThanHuman
  epistemics:
    dsrp:
      D: The critical distinction is between gross energy output and net energy available to society — economics tracks the former (price, GDP), while EROI tracks the latter; the two diverge precisely when it matters most, at the cliff edge where small ratio changes produce large civilizational consequences
      S: EROI operates as a meta-system governing the viability of all other systems — transportation, food production, healthcare, governance, and cultural complexity all depend on energy surplus; when the surplus contracts, every dependent system competes for a shrinking remainder
      R: The relationship between EROI and civilizational complexity is non-linear and asymmetric — high EROI enabled the explosive growth of industrial civilization, but the decline curve is steeper than the ascent because infrastructure built assuming surplus cannot easily simplify
      P: The perspective of conventional economics is locked inside price signals that cannot see net energy — EROI is invisible to markets until its effects manifest as inflation, supply disruption, or economic contraction; the biophysical perspective (Hall, Odum) sees what the financial perspective structurally cannot
    learning: L1
