coords:
  ontology: |
    Descriptive analytics is ontologically a form-extraction operation — it takes raw historical data and produces structured summaries that reveal the shape of what occurred. Core entities are Data (raw, granular events or measurements), Metric (aggregated quantities computed over data), KPI (metrics elevated to operational significance), Dashboard (presentation surface integrating multiple metrics), Pattern (regularity surfaced via data mining), and Aggregate (group-level summary). Ontologically distinct from predictive in that descriptive output makes no claim about unknowns — it speaks only of what has been observed. The temporal scope is closed: the past is given, and descriptive analytics renders it.
  epistemics: |
    Knowledge here is grounded in selection and aggregation. The choice of which metrics to compute, which time windows to aggregate over, which dimensions to slice by — all of these are epistemic acts that produce different "descriptions" of the same underlying data. Wikipedia's Prescriptive article frames descriptive as "examining historical performance through data mining to identify reasons behind past outcomes." The reasons-identification step is where descriptive analytics overlaps with diagnostic analytics (the fourth analytics category) — descriptive surfaces what happened, diagnostic asks why. In practice the boundary is fluid.
  time: |
    Descriptive analytics is fully retrospective. Time flows past → measurement → aggregation → summary. There is no projection forward (that is predictive) and no commitment to action (that is prescriptive). The "real-time" descriptive systems (live dashboards) are still retrospective at the operator level — they describe the *most recent* past, not the future. The temporal closure of the past is what makes descriptive analytics structurally stable: the field being described does not move while it is being described.
  qualia: |
    The felt texture is the satisfaction of legibility — the feeling of seeing the shape of something previously chaotic. Dashboards offer the qualia of situational awareness; data mining offers the qualia of discovery (an unexpected pattern surfaces from noise). For executives, there is the qualia of visibility — knowing what is happening across the operation. For analysts, there is the qualia of structure-finding — pattern recognition as cognitive reward. There is also a felt absence: descriptive analytics does not yet carry the weight of "should" (that is prescriptive's burden) or the uncertainty of "will" (that is predictive's burden).
  agency: |
    Descriptive analytics has agency-as-renderer — it senses, aggregates, and presents. It does not have agency-as-projector (predictive's role) or agency-as-actor (prescriptive's role). The renderer-agency is constitutive: descriptive output is an act of selection and aggregation, not a passive reflection of data. The choice of metrics, dimensions, and aggregations imposes a structure on what would otherwise be undifferentiated event-stream. This selection is often invisible to consumers of dashboards, who treat the output as simply "what happened" rather than "what was selected to be summarized."
  coherence: |
    Coherence at this layer is structural and historical. The descriptive output is internally consistent (the metrics are reproducible from the underlying data) and temporally closed (the past does not move). Coherence breaks when (a) the data quality is poor, (b) the selection is silently biased, or (c) the aggregation hides important variation. The downstream coherence question is whether descriptive output is a sufficient substrate for predictive and prescriptive layers — gaps in descriptive analytics propagate as gaps in everything built on top.
  ce: |
    Emergent properties: (1) the dashboard as cognitive-prosthesis — situational awareness extended across organizations through visual aggregation; (2) data mining as pattern-discovery surface — relationships surfaced from raw data without prior hypothesis; (3) the analytics-stack composition — descriptive analytics emerges as a separable layer that can be reused by multiple downstream consumers (predictive, prescriptive, BI, regulatory reporting). The most significant emergence is *legibility itself* — descriptive analytics is the operation by which complex event-streams become tractable to organizational decision-making, even before any prediction or prescription occurs.
elemental:
  "∴": "What happened, named. The metric is a cut through the event-stream — it makes visible by selecting, and selects by making visible."
  "≈": "The flow of past events settling into ponds we can draw from. The summary is calm water; the underlying torrent is still running."
  "▲": "The ember's glow recorded but not yet rekindled. Descriptive holds the heat of past activity without combusting forward."
  "𐂷": "Tree rings are the original descriptive analytic — the shape of what was, made readable by patient accumulation. The tree did not predict; it described, year by year."
  "☷": "The soil's strata. Each layer named, dated, characterized. The earth's descriptive analytics, written in deposition."
  "⛨": "The boundary between data and information. Cross it deliberately; the act of summarizing is also the act of choosing what does not get summarized."
summary: "Descriptive analytics is the foundational phase of the analytics triad — the first of three (descriptive → predictive → prescriptive). It answers what happened by aggregating and summarizing historical data through metrics, KPIs, dashboards, statistical summaries, and data mining. Wikipedia's Prescriptive Analytics article describes it as 'examining historical performance through data mining to identify reasons behind past outcomes.' It overlaps significantly with business intelligence but is not identical — descriptive analytics emphasizes the analytical operations, BI emphasizes the operational surfacing of those operations. NEMAtically, descriptive analytics is the μ-operator at framework-scale: the first crystallization of form from event-stream, the substrate without which neither σ (predictive) nor Ω∘λ (prescriptive) can operate. Z_state is closed-historical: the past is given; descriptive analytics renders it legible without altering it."
