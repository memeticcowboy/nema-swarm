  epistemics:
    dsrp:
      D: The paradigm distinction is between land-as-resource (substrate for extraction) and land-as-partner (living system requiring reciprocal relationship) — a cut that is not technical but ontological
      S: Industrial agricultural practice presents as a single coherent system (yield, inputs, debt, crop insurance) that makes its own continuation rational even when degrading; regenerative practice requires assembling an alternative system with different metrics
      R: The farmer-land relation in regenerative practice becomes conversational — cover crops speak soil needs, mycorrhizal networks signal plant health — rather than the asymmetric relation of human intelligence directing inert matter
      P: The perspective shift required is from producer-of-commodities to steward-of-living-systems — an identity transformation that the broader agricultural system (markets, credit, social proof) does not currently support
