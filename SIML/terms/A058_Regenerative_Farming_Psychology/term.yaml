name: regenerative_farming_psychology
term: Regenerative Farming Psychology
nemetic: "Φ(RegenFarming) = σ(extraction|relationship)\n               ∘ ρ(farmer|land)\n               ∘ λ(short-term|long-term)\n               ∘ β(identity|resistance)\n               ∘ δγ(transition|cost)\n               ∘ μ(industrial|regenerative)\n               + ε | :transforming"
siml_encoding: "⟨Identity|industrial⟩\n    ⊳ ⟨Transition|psychological⟩\n    → ⟨Stewardship|possible⟩\n    ⊗ ⟨Resistance|structural⟩\n    ⇄ ⟨Soil|living-system⟩"
formalism:
  math_operators:
  - σ
  - ρ
