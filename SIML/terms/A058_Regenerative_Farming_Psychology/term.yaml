  - ☷Earth
  - ⛨Metal
  partials:
  - ∂Φ/∂σ (distinction between farming as extraction and farming as relationship — not merely technical but ontological; to adopt regenerative practice is to change what a farm *is*, requiring unlearning of a fundamental worldview)
  - ∂Φ/∂ρ (relation between farmer and land shifting from dominion to reciprocity — industrial farming imposes will through chemical inputs, regenerative farming requires conversational listening to soil biology and ecosystem signals)
  - ∂Φ/∂λ (directional tension between short-term survival and long-term thriving — a farmer cannot sacrifice this year's yield for next decade's soil health if this year's failure means losing the farm; the tragedy is these directions appear opposed)
  - ∂Φ/∂β (identity entrenchment as feedback resistance — farmers defend a self-concept built around yield maximization; the status quo bias, loss aversion, and social proof together create a loop that resists transformation even when the current path degrades soil)
  - ∂Φ/∂δγ (metabolic cost of transformation — learning curves, transition yield reductions, social judgment from peers, identity uncertainty; these costs are real and fall on individuals embedded in systems that make industrial practice structurally rational)
  - '∂Φ/∂μ (boundary between industrial and regenerative paradigms as identity boundary — what prevents crossing is not information deficit but structural lock-in: credit systems, commodity markets, subsidies, and social expectations reinforce the existing boundary)'
  Z_state: permeable
  z_note: 'Tendency from sealed toward permeable — industrial identity opens under sustained soil degradation pressure, peer example, and bridge practices. Z-Closure Risk: λ-lock if ''yield'' remains narrowly defined as bushels/acre, preventing the directional shift toward soil-carbon and ecosystem metrics.'
  tendency: sealed → permeable | :transforming
