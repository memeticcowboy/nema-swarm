  - ∂Φ/∂σ — Distinguishes between the witness (Turiya) and the witnessed states (waking, dreaming, deep sleep), establishing that awareness itself is not identical to any of its contents.
  - ∂Φ/∂ρ — Maps the subject-object relationship within experience, showing how consciousness relates to its objects before the non-dual dissolution of that distinction.
  - ∂Φ/∂λ — Transforms the experience of apparent separation into realized oneness, the central movement of Advaita Vedanta from ignorance to liberation.
  - ∂Φ/∂β — Tracks self-inquiry as a growth path toward liberation, where questioning 'Who am I?' progressively reveals the witness behind all states.
  - ∂Φ/∂δγ — Cycles through the three ordinary states of consciousness (waking, dreaming, deep sleep) that come and go while Turiya persists as their common ground.
  - ∂Φ/∂μ — Structures the relationship between pure consciousness and personal identity, showing that the true self is not the fluctuating ego but the unchanging awareness.
