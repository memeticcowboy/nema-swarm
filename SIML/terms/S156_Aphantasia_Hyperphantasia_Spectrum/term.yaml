description: Neuroscience of visual imagination spectrum from aphantasia (no mental imagery) to hyperphantasia (vivid mental pictures). Different brain connectivity and function patterns underlie each pole. Aphantasia shows diminished object imagery but intact spatial imagery, suggesting dissociable systems. Imagination evolved to prepare for future experiences, drawing on past to simulate novel scenarios. Creativity remains possible across the entire spectrum through non-visual compensatory means.
