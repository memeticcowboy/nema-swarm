context_note: 'Prana represents Air as regulable life force—distinct from Greek Pneuma
  in being divisible (five Vayus) and controllable (Pranayama). Key insight: Prana
  is not just breath but the energy breath carries. The five Vayus (Prana, Apana,
  Samana, Udana, Vyana) show Air''s directional multiplicity—up, down, center, throat,
  diffusion. This is ρ (resonance) with anatomical specificity.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic
