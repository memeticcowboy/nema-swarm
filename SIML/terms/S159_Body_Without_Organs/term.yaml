description: "Deleuze and Guattari's BwO — state of potential and freedom beyond traditional organization. Raw potential where desire and affect operate without pre-set channels. About becoming rather than being. Practices of dismantling the organism to open to new experience. Three types: empty (chaotic), full (creative), cancerous (over-stratified). Related to smooth spaces vs striated spaces. The BwO is what remains when you take everything away."
