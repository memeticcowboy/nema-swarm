context_note: "This term encodes the Arendt-adjacent insight that most evil does not arrive as theatrical malice. Harm often persists through comfort protection, payroll protection, status protection, and the preservation of a decent self-story. Goodness is therefore not merely intention; it requires arrangements where truth, refusal, sleep, boundaries, consequences, and unsellable people can survive."
source: "Hannah Arendt quotation plus supplied commentary: 'The sad truth is that most evil is done by people who never make up their minds to be either good or evil.'"
