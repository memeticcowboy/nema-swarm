- **Where it aims:** Toward a Network Polity where governance is symbolic recursion — from decision-making to meaning-crafting, from citizen as voter to citizen as symbolic steward, from policy as output to deliberation as processual co-becoming — with risks of digital divide, attention inequality, and interface capture requiring active epistemic justice interventions

