### Meaningful vs. Rote Learning

| Dimension | Meaningful Learning | Rote Learning |
|-----------|---------------------|---------------|
| **Relationship to existing knowledge** | Non-arbitrary, substantive | Arbitrary, verbatim |
| **Cognitive process** | Subsumption into cognitive structure | Arbitrary association |
| **Retention** | Stable, long-term | Fragile, short-term |
| **Transfer** | High — applicable to new situations | Low — limited to identical contexts |
| **Element** | Metal/μ (structure) + Air/σ (distinction) | Earth/δγ (repetition without integration) |

