## Advance Organizers: The Key Mechanism

### What Are Advance Organizers?

**Advance organizers** are introductory materials presented before learning that:
- Are at a **higher level of abstraction** than the learning material
- **Bridge** the gap between what the learner knows and what they need to learn
- Provide an **anchoring structure** for subsumption

