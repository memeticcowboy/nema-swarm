## Core Definition

**Meaningful Learning Theory**, developed by **David Ausubel** (1963), posits that learning is most effective when new information is explicitly connected to existing knowledge structures. Unlike rote learning (arbitrary, verbatim memorization), meaningful learning occurs when new material is **subsumed** into relevant, pre-existing cognitive structures — what Ausubel called **advance organizers**.

