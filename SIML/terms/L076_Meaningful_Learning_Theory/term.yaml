## Elemental Pattern Analysis

### Metal/μ Dominance

Meaningful Learning is fundamentally a **Metal theory**:
- **Hierarchical organization:** Knowledge structured in inclusive levels
- **Structural anchoring:** Advance organizers provide metalanguage/framework
- **Systematic integration:** New material organized into existing architecture
- **Progressive differentiation:** Concepts become more refined over time

### Supporting Elements

| Element | Role in Meaningful Learning |
|---------|----------------------------|
| **Air/σ** | Distinction-making between new and existing concepts; differentiation |
| **Earth/δγ** | Consolidation through repetition; cycling back to strengthen subsumption |
| **Water/ρ** | Connection-making between related concepts; integrative reconciliation |
| **Fire/λ** | Directional intent toward meaningful rather than rote learning |
| **Wood/β** | Incorporation of new material; growth of cognitive structure |

