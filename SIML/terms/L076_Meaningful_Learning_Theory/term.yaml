## Connection to Related Theories

### Ausubel vs. Piaget

| Aspect | Piaget (Constructivism) | Ausubel (Meaningful Learning) |
|--------|------------------------|-------------------------------|
| **Mechanism** | Accommodation/assimilation through disequilibrium | Subsumption through advance organizers |
| **Role of existing knowledge** | Schemas transform through experience | Cognitive structures anchor new learning |
| **Instructional emphasis** | Discovery, active exploration | Reception learning with proper structure |
| **Element** | Wood (β-generation) | Metal (μ-organization) |

### Meaningful Learning and Cognitive Load Theory

```
AUSUBEL × SWELLER SYNTHESIS

Ausubel's Contribution:          CLT Contribution:
• Prior knowledge activation      • Working memory limits
• Hierarchical organization       • Load management
• Subsumption process             • Schema automation

SYNTHESIS: Optimal instruction requires BOTH:
1. Activating relevant prior knowledge (Ausubel)
2. Managing cognitive load during subsumption (Sweller)

The advance organizer reduces extraneous load by
providing a clear anchor point for new material.
```

### Connection to Concept Mapping (Novak)

**Joseph Novak**, Ausubel's student, developed **concept mapping** as a practical tool based on meaningful learning theory:
- Visual representation of hierarchical knowledge structures
- Explicit linking words show relationships
- Facilitates subsumption by making cognitive structure visible

