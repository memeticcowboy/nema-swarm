# E016 — Discursive Psychology

## Core Concept

Discursive psychology, developed by Edwards & Potter (1992), treats **psychological categories as interactional accomplishments**—not descriptions of internal states but **actions performed in discourse**.

## Key Moves

**Rhetorical analysis:** How speakers construct versions of events, manage accountability, and resist counter-claims.

**Variability as resource:** Inconsistency is not error but **strategic deployment**—different versions for different purposes.

**"Death and furniture" critique:** The appeal to "obvious reality" (death) and physical objects (furniture) to defeat relativism is itself a **rhetorical move**, not foundation.

## NEMAtic Utility

**Meta (∮) at 0.80:** Discursive psychology as **meta-analysis**—studying how discourse operates, not what it represents.

**Air (σ) at 0.75:** Rhetorical analysis reveals how **distinctions are made** to achieve interactional goals.

**Water (ρ) at 0.70:** Discourse as **flowing action**—meaning produced through rhetorical movement, not static reference.

## Diagnostic Power

Discursive psychology provides **methods for detecting usurpenic capture**:
- When does "cognition" become reified?
- When does "mental state" become MemeGrid?
- How do "scientific" categories capture agency?

