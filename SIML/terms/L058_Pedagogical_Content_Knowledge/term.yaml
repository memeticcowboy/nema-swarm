## Elemental Pattern Analysis

### Child/✶ Dominance (Integration)

PCK is fundamentally a **Child/Aether theory** — it represents the **integration** of multiple knowledge domains:

**Child/✶ (Integration/Harmony):**
- **Content + Pedagogy fusion:** The unique intersection that is neither just content nor just pedagogy
- **Knowing-in-action:** The seamless application of integrated knowledge
- **Teaching wisdom:** The holistic judgment that emerges from integration
- **Adaptive expertise:** The flexible deployment of integrated knowledge

**Air/σ (Distinction/Clarity):**
- **Content boundaries:** Knowing what belongs to the subject matter
- **Learner misconception analysis:** Distinguishing correct from incorrect understanding
- **Curricular sequencing:** Ordering content for optimal learning
- **Assessment criteria:** Standards for evaluating understanding

**Water/ρ (Resonance/Flow):**
- **Learner attunement:** Sensing where students are in their understanding
- **Misconception anticipation:** Feeling what will be difficult before teaching it
- **Feedback responsiveness:** Flowing with learner responses
- **Cultural sensitivity:** Resonating with learners' backgrounds

**Wood/β (Growth/Exploration):**
- **Representational innovation:** Creating new ways to explain concepts
- **Example generation:** Branching out with multiple illustrations
- **Analogical extension:** Finding connections to diverse prior knowledge
- **Adaptive improvisation:** Generating new approaches in the moment

