## PCK in Action: A Teaching Example

```
TEACHING FRACTIONS: PCK APPLICATION

Content Knowledge Alone:
┌─────────────────────────────────────────┐
│ "To add fractions, find a common        │
│  denominator, convert each fraction,    │
│  add numerators, keep denominator."     │
│                                         │
│  1/2 + 1/3 = 3/6 + 2/6 = 5/6           │
│                                         │
│  (Algorithm correct, but why?)          │
└─────────────────────────────────────────┘

PCK-Enriched Teaching:
┌─────────────────────────────────────────┐
│ KNOWLEDGE OF LEARNERS:                  │
│ • Students think 1/2 + 1/3 = 2/5        │
│ • They add numerators AND denominators  │
│ • This error reveals conceptual gap     │
│                                         │
│ INSTRUCTIONAL REPRESENTATION:           │
│ • Use pizza/circle diagrams             │
│ • Show why 2/5 is too small visually    │
│ • Demonstrate need for same-size pieces │
│ • Connect to "you can only add same     │
│   kinds of things" (apples to apples)  │
│                                         │
│ ASSESSMENT:                             │
│ • "Why can't we just add across?"       │
│ • "What does the denominator mean?"     │
│ • Predict: 1/4 + 1/2 = ?                │
└─────────────────────────────────────────┘

Result: Students understand WHY common 
denominators are needed, not just HOW
```

