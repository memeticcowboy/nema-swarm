## Core Definition

**Pedagogical Content Knowledge (PCK)**, introduced by Lee Shulman in 1986, represents the **intersection of content knowledge and pedagogical knowledge** — the unique domain of knowledge that distinguishes expert teachers from subject matter experts. PCK encompasses:

1. **Knowledge of Learners:** Understanding what makes specific topics easy or difficult, including conceptions and preconceptions students bring
2. **Knowledge of Instructional Strategies:** Representations, analogies, examples, explanations, and demonstrations that make content comprehensible
3. **Knowledge of Curriculum:** Understanding the vertical structure of subject matter and curricular alternatives
4. **Knowledge of Assessment:** Methods for evaluating understanding in specific content areas
5. **Knowledge of Context:** Understanding the cultural, social, and institutional settings that shape learning

