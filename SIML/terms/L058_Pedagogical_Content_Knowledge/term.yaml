## Core Insight

> Pedagogical Content Knowledge reveals that **teaching is not merely the transmission of subject matter** — it is the **transformation of content into forms that are pedagogically powerful and accessible to learners**. The expert teacher knows not just the content, but the **landscape of learner difficulties**, the **terrain of powerful representations**, and the **pathways that connect them**. PCK is the wisdom that emerges when content knowledge is filtered through the lens of learner understanding.

## One-Sentence Insight

> Pedagogical Content Knowledge represents the unique intersection of content expertise and pedagogical skill — the wisdom that enables teachers to transform subject matter into forms that are accessible, meaningful, and learnable for specific students.

## Three-Bullet Expansion

- **What:** A framework describing the specialized knowledge that enables teachers to transform subject matter content into instruction that is accessible to learners — including knowledge of learner misconceptions, powerful representations, curricular structures, and assessment methods
- **How it works:** Content knowledge intersects with pedagogical knowledge → integration produces PCK → learner attunement guides representation selection → instructional transformation bridges content and understanding → reflective practice develops teaching wisdom
- **Where it aims:** Toward expert teaching that seamlessly integrates knowing what to teach with knowing how to help diverse learners understand it

