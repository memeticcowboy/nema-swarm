description: "Hanne De Jaegher's participatory sense-making — conceptual framework for understanding intersubjectivity. Critiques mainstream social cognition as too limited in its focus on individual minds modeling other minds. Focuses on the interaction process between individuals rather than individual cognition alone. Meaning emerges through participatory engagement where the interaction itself takes on a life of its own. Recursive loops of shared understanding and autonomous interaction create dynamic sense-making that exceeds what any individual participant could achieve alone."
