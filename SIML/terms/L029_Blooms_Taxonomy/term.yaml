│                                                                 │
│  Level 1: REMEMBER ──────────────────────────────────────────  │
│  "Recall facts and basic concepts"                              │
│  • Recognizing                                                  │
│  • Identifying                                                  │
│  • Recalling                                                    │
│  • Retrieving                                                   │
│  Element: κ (Knowledge) — foundational memory                   │
│                                                                 │
└─────────────────────────────────────────────────────────────────┘

Key Changes in 2001 Revision:
• NOUNS → VERBS (Knowledge → Remember, etc.)
• SYNTHESIS moved to CREATE (highest level)
• EVALUATION moved down one level
• Added metacognitive dimension (awareness of cognition)
• Added knowledge dimension (factual, conceptual, procedural, metacognitive)
```

