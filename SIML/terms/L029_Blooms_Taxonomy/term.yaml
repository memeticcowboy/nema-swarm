## Core Definition

**Bloom's Taxonomy** is a hierarchical model used to classify educational learning objectives into levels of complexity and specificity. First published in 1956 by Benjamin Bloom and collaborators, it was revised in 2001 by Anderson and Krathwohl to better reflect active learning processes. The taxonomy provides a framework for educators to design curriculum, assessments, and learning activities that progressively develop cognitive skills.

