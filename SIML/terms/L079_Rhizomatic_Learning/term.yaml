## The Six Principles of the Rhizome (Deleuze & Guattari)

| Principle | Description | Learning Implication | Nemetic Mapping |
|-----------|-------------|---------------------|-----------------|
| **1. Connection** | Any point can connect to any other | Learning happens anywhere, from any starting point | ρ (water/connection) |
| **2. Heterogeneity** | Rhizome links diverse elements | Multi-modal, multi-domain learning | β (wood/multiplicity) |
| **3. Multiplicity** | No unity, only multiplicities | Knowledge as plural, contested, evolving | β+✶ (wood+child) |
| **4. A-signifying Rupture** | Can break and re-form elsewhere | Learning survives disruption, reconfigures | σ (air/nomadic) |
| **5. Cartography** | Map, not tracing; open to modification | Learners create knowledge maps, not follow paths | λ (fire/direction) |
| **6. Decalcomania** | No fixed structure, no pre-given form | Emergent curriculum, responsive to context | δγ (earth/cycling) |

