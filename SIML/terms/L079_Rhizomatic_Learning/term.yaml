• Hierarchical                          • Non-hierarchical
• Fixed entry point (root)              • Any point is entry/exit
• Linear progression                    • Multi-directional growth
• Unity of knowledge                    • Multiplicity without unity
• Center-periphery structure            • Decentralized network
