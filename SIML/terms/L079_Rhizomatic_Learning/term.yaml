## Core Definition

**Rhizomatic Learning** draws on Deleuze and Guattari's philosophical concept of the rhizome from *A Thousand Plateaus* (1980), applied to education by Dave Cormier (2008). It posits that knowledge is not a tree with roots and branches (arborescent) but a rhizome — a decentralized network where any point can connect to any other point, where entry and exit are arbitrary, and where growth occurs through multiplicity rather than hierarchy.

