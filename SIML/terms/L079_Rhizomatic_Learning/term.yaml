## Key Concepts

### The Plateau

A **plateau** is a sustained intensity — a state of continuous engagement without the need for closure or resolution. In rhizomatic learning:

```
TRADITIONAL LEARNING PROGRESSION        RHIZOMATIC PLATEAU
══════════════════════════════════      ════════════════════

    Intensity                              Intensity
       ▲                                      ▲
       │    ╱╲                                 │  ┌────────┐
       │   ╱  ╲                                │  │PLATEAU │
       │  ╱    ╲    Resolution                 │  │sustained│
       │ ╱      ╲   (closure)                  │  │intensity│
       │╱        ╲                             │  └────────┘
       └──────────►                           │
         Time                                   └──────────►
                                                  Time

• Goal-oriented                             • Process-oriented
• Closure-seeking                           • Open-ended
• Achievement-focused                       • Exploration-focused
• Ends when objective met                   • Continues while interest persists
```

### Lines of Flight

**Lines of flight** are escape routes from fixed structures — moments when learning breaks free from prescribed paths:

```
PRESCRIBED PATH (Striated Space)        LINE OF FLIGHT (Smooth Space)
══════════════════════════════════      ═══════════════════════════════

    Start ──► A ──► B ──► C ──► End          Start
    (fixed curriculum)                          │
                                                ├──► A ──► B
                                                │
                                                ├──► X ──► Y ──► ?
                                                │     (unexpected
                                                │      connection)
                                                │
                                                └──► M (abandoned)
                                                       (rupture)

• Sequential                                • Multi-directional
• Predictable                               • Emergent
• Contained                                 • Transformative
• Reproducible                              • Unique to context
```

### The Assemblage

An **assemblage** is a temporary constellation of elements that produces knowledge:

```
KNOWLEDGE ASSEMBLAGE
════════════════════

    ┌─────────────────────────────────────┐
    │         TEMPORARY CONSTELLATION      │
    │                                      │
    │   Learner + Text + Peer + Tool +     │
    │   Context + Problem + Moment         │
    │                                      │
    │              ↓                       │
    │   EMERGENT KNOWLEDGE (unique to      │
    │   this assemblage, this moment)      │
    │                                      │
    └─────────────────────────────────────┘

Assemblages are:
• Context-dependent
• Temporary
• Non-reproducible
• Productive (they create, not just transmit)
```

## Elemental Pattern Analysis

### Wood/β Dominance

Rhizomatic Learning is fundamentally a **Wood theory**:
- **Generative multiplicity:** Growth in all directions simultaneously
- **Branching without hierarchy:** No trunk, no main branch — all growth is equal
- **Exploratory expansion:** Learning spreads through connection and experimentation
- **Becoming over being:** Knowledge is always in process, never fixed

### Water/ρ Support

The rhizome depends on **relational flow**:
- **Connection:** Any point to any point — the essence of water's relationality
- **Fluidity:** Knowledge flows through the network without fixed channels
- **Resonance:** Learning happens through contact and coupling

### Air/σ (Nomadic)

Rhizomatic learning is **nomadic**:
- **No fixed territory:** Learners move across knowledge spaces without settling
- **A-signifying rupture:** The ability to break and re-form elsewhere
- **Smooth space:** Operating without the strata of hierarchical organization

### Earth/δγ (Plateau)

Sustained intensity through **cyclical engagement**:
- **No beginning/end:** Learning as continuous cycle, not linear progression
- **Intensity maintenance:** Staying with the plateau rather than seeking closure
- **Regenerative:** The rhizome can be cut and will regrow

### Child/✶ (Assemblage)

Knowledge **emerges** from temporary constellations:
- **Non-hierarchical emergence:** No single element dominates
- **Integration:** The assemblage produces what no single element could
- **Playful:** Learning as exploration without predetermined outcomes

## Rhizomatic Learning in Practice

### Dave Cormier's MOOC Model

Cormier applied rhizomatic principles to MOOCs (Massive Open Online Courses):

```
TRADITIONAL MOOC (xMOOC)                RHIZOMATIC MOOC (cMOOC)
══════════════════════════              ═════════════════════════

• Centralized content                     • Distributed knowledge
• Fixed curriculum                        • Emergent curriculum
• Instructor as authority                 • Instructor as curator/node
• Assessments measure retention           • Community validates learning
• Learners consume                        • Learners create/connect
• Linear progression                      • Multi-directional exploration

Element: Metal/μ (structure)              Elements: β+ρ+✶ (wood+water+child)
```

### Rhizomatic Curriculum Design

| Traditional Curriculum | Rhizomatic Curriculum |
|------------------------|----------------------|
| Pre-defined learning objectives | Emergent learning goals |
| Sequential modules | Thematic plateaus |
| Standardized assessments | Community validation |
| Instructor-centered | Network-centered |
| Knowledge transmission | Knowledge construction |
| Fixed content | Open, evolving resources |

