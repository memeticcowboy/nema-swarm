## Cross-Elemental Synthesis

### The Theoretical Move

CAMIL makes a **generalization claim**: evidence from less immersive media generalizes to IVR, but IVR has **unique affordances** that require specific methods.

| Media Level | Element | Affordance |
|-------------|---------|------------|
| **Text** | Metal/μ | Structure, control |
| **Video** | Water/ρ | Resonance, fidelity |
| **Desktop VR** | Fire/λ | Direction, immersion |
| **IVR/HMD** | Air/∴ | Distinction, presence |
| **Full CAVE** | All six | Complete immersion |

