## Core Insight

> CAMIL reveals that immersive learning is not merely "better media" but a **qualitative shift** — presence (σ) and agency (β) transform the learner's relationship to knowledge from representation to participation.

## One-Sentence Insight

> The Cognitive Affective Model of Immersive Learning provides a theoretical architecture showing that IVR learning depends on five psychological affordances — presence, agency, immersion, control, fidelity — that transform education from information delivery to embodied participation.

## Three-Bullet Expansion

- **What:** A foundational theoretical framework (Makransky & Petersen) for understanding learning in immersive virtual reality, identifying five affordances and six learning factors
- **How it works:** Generalizes evidence from less immersive media while acknowledging IVR-unique methods; presence and agency are foundational
- **Where it aims:** Toward evidence-based IVR design for students, teachers, designers, and policy-makers

