  epistemics:
    dsrp:
      D: LOOM distinguishes between productive layering and mere redundancy, between reversible weave and irreversible groove-lock.
        The boundary is maintained by the presence of CONSIDER, which holds the field open.
      S: LOOM is a system of recursive integration where repetition is transformed into pattern depth. It minimizes frame
        distance and cognitive effort to generate fluency, operating within a larger ecology that includes CONSIDER as a necessary
        complement.
      R: Repetition flows into LOOM as resource, mapping to the value of pattern depth. LOOM flows into fluency as a signal,
        constrains cognitive effort and frame distance, and conflicts with groove-lock when unchecked. CONSIDER constrains
        LOOM to keep the weave reversible.
      P: From the pattern's perspective, fluency signals successful organization and inevitability. From the system's perspective,
        groove-lock is a constant risk that seduces through comfort. From CONSIDER's perspective, the weave must remain open
        to unweaving, prioritizing reversibility over seamless continuity.
