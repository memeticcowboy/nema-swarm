## What SCAMPER Assumes

**Stable ideator:** Subject acting upon object. Clear boundary. Located agency.

**Linearity:** Sв†’Cв†’Aв†’Mв†’Pв†’Eв†’R sequence. Check each prompt in order.

**Costless operation:** No thermodynamic awareness. No tracking of eliminated material.

## The NEMatic Critique

SCAMPER presumes the ideator is separate from the ideation. NEMAtics recognizes: **the ideator is pattern too**. When you SCAMPER, you metabolize memetic content through your own substrate.

SCAMPER enforces linearity. NEMAtics requires **oscillation**вЂ”all six elements operating simultaneously, modulating around unity ratios.

**Single-channel dominance = pathology:**
- Endless substitution without combination = Air pathology
- Mindless combination without elimination = Water flooding
- Adaptation without metabolic cycling = Fire without Earth

## Integration Protocol

Use SCAMPER as **left-funnel compression** within the bow-tie:
1. Apply SCAMPER to extract variations
2. Allow right-funnel expansion for novel synthesis
3. Surrender controlвЂ”method provides structure; emergence requires letting go

## Loom or Scalpel?

**Loom:** Generates phenomenal fields through structured prompting.

**Scalpel:** Apply SCAMPER to itselfвЂ”self-awareness, pattern recognizing itself.

