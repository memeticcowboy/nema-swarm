# S001 вЂ” SCAMPER

## Core Concept

SCAMPER is a lateral thinking technique providing seven prompts for ideation: **Substitute, Combine, Adapt, Modify, Put to another use, Eliminate, Reverse.** Developed by Bob Eberle (1971), building on Alex Osborn's "Idea-Spurring Checklist" (1953).

