## One-Sentence Insight

> Democracy in the networked age is metamorphosing from a regime of representation to an ecology of resonance — but this transformation risks replacing procedural legitimacy with affective capture unless we consciously design for cognitive equity and democratic interface ethics.

## Three-Bullet Expansion

- **What:** A foundational framework mapping the shift from traditional representative democracy (Rousseau, Madison, Mill) to networked democracy — where authority flows from "visibility, virality, and affective alignment" rather than procedural regularity, and where citizens become "cyborgs of attention, algorithmically-shifted agents, and memetically entrained collectives"
- **How it feels:** Like standing at a frontier where legacy systems collide with real-time flows — the disorientation of epistemic overload mixed with the excitement of experimental possibility; the anxiety of trust vacuum alongside the promise of a "new agora" that is distributed and emotionally charged
- **Where it aims:** Toward a "new agora" — but with critical questions unresolved: who controls the flows? who sets the signal-to-noise ratio? can a polity be free if the interface is designed to seduce, enrage, or addict? The document maps the terrain but leaves the navigation open

