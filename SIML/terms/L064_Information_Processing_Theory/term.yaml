## Connection to Related Theories

### IPT and Cognitive Load Theory

| Aspect | Cognitive Load Theory | Information Processing Theory |
|--------|----------------------|-------------------------------|
| **Core concern** | Managing limited WM capacity | Understanding memory architecture |
| **Element** | σ (air/clarity) | σ + μ (air + metal) |
| **Relationship** | CLT applies IPT principles to instruction | IPT provides theoretical foundation for CLT |

**Integration:** CLT operationalizes IPT by identifying three load types (intrinsic, extraneous, germane) that affect the limited processing capacity described by IPT.

### IPT and Schema Theory

| Aspect | Schema Theory | Information Processing Theory |
|--------|---------------|-------------------------------|
| **Core concept** | Organized knowledge structures | Memory systems and processes |
| **Element** | μ (metal/structure) | μ (metal/structure) |
| **Relationship** | Schemas explain how LTM is organized | IPT explains how schemas are formed and accessed |

**Integration:** Schemas are the organizational units of long-term memory; IPT describes the processing that creates, modifies, and retrieves them.

### IPT and Levels of Processing

| Aspect | Multi-Store Model | Levels of Processing |
|--------|-------------------|----------------------|
| **Metaphor** | Computer architecture | Depth continuum |
| **Focus** | Structural stores | Processing depth |
| **Element** | μ (structural) | σ (attention depth) |

**Integration:** Both frameworks emphasize that how information is processed determines retention — the multi-store model describes where; levels of processing describes how.

