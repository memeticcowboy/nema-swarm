## Core Definition

**Information Processing Theory** models human cognition as an information-processing system analogous to computer architecture. Originating with Atkinson and Shiffrin's multi-store model (1968) and enriched by Craik and Lockhart's levels-of-processing framework (1972), the theory describes how information flows through distinct cognitive structures — sensory memory, working (short-term) memory, and long-term memory — undergoing transformation at each stage through attention, encoding, rehearsal, and retrieval processes.

### The Information Processing Model

```
    ENVIRONMENTAL
       INPUT
         │
         ▼
┌─────────────────┐
│  SENSORY        │  ← Large capacity, very brief duration (~0.5-3 sec)
│  MEMORY         │    Iconic (visual) + Echoic (auditory)
│     (σ)         │    σ: Pattern recognition, selective attention
└────────┬────────┘
         │ Attention filter
         ▼
┌─────────────────┐
│  WORKING        │  ← Limited capacity (7±2 chunks), brief duration (~20-30 sec)
│  MEMORY         │    Central executive + Phonological loop + Visuospatial sketchpad
│   (σ + μ)       │    σ: Maintenance rehearsal, chunking
└────────┬────────┘    μ: Organization, structuring
         │ Elaborative rehearsal, encoding strategies
         ▼
┌─────────────────┐
│  LONG-TERM      │  ← Virtually unlimited capacity, potentially permanent
│  MEMORY         │    Declarative (episodic + semantic) + Procedural
│     (μ)         │    μ: Hierarchical organization, schema formation
└────────┬────────┘    δγ: Consolidation, sleep-dependent reorganization
         │ Retrieval cues, reconstruction
         ▼
      OUTPUT
   (behavior, response)
```

### The Three Memory Stores

| Memory Store | Capacity | Duration | Key Processes | Element |
|--------------|----------|----------|---------------|---------|
| **Sensory** | Very large | 0.5-3 seconds | Pattern recognition, selective attention | σ (Air) |
| **Working** | 7±2 chunks | 20-30 seconds | Rehearsal, chunking, organization | σ + μ |
| **Long-Term** | Unlimited | Potentially permanent | Encoding, storage, retrieval | μ (Metal) |

## The Processing Stages

### Stage 1: Sensory Registration (σ)

**Function:** Brief retention of sensory information in modality-specific form

```
SENSORY MEMORY DYNAMICS
├── Iconic Memory (visual)
│   ├── Duration: ~250-500ms
│   ├── Capacity: Very large
│   └── Decay: Rapid fading
│
└── Echoic Memory (auditory)
    ├── Duration: ~2-4 seconds
    ├── Capacity: Large
    └── Decay: Slower than iconic
```

**Key Process:** Selective attention acts as a filter, determining what information receives further processing.

**Nemetic Mapping:** σ (distinction) — the ability to discriminate relevant from irrelevant stimuli

### Stage 2: Working Memory Processing (σ + μ)

**Function:** Temporary holding and manipulation of information for complex cognitive tasks

```
WORKING MEMORY ARCHITECTURE (Baddeley & Hitch, 1974)
┌─────────────────────────────────────────┐
│         CENTRAL EXECUTIVE               │
│    (σ: attention control, coordination) │
└──────────────┬──────────────────────────┘
               │
    ┌──────────┴──────────┐
    ▼                     ▼
┌──────────┐        ┌──────────┐
│PHONOLOGICAL│        │VISUOSPATIAL│
│   LOOP    │        │  SKETCHPAD │
│(σ: verbal)│        │(σ: visual) │
└──────────┘        └──────────┘
```

**Capacity Limitations:**
- **Magic number 7±2** (Miller, 1956): The typical capacity of working memory
- **Chunking:** Organizing information into meaningful units increases effective capacity
- **Duration:** Information decays within ~20 seconds without rehearsal

**Nemetic Mapping:** σ (maintenance, attention) + μ (organization, structure)

### Stage 3: Long-Term Storage (μ + δγ)

**Function:** Relatively permanent storage of information through organized structures

```
LONG-TERM MEMORY SYSTEMS
├── Declarative (Explicit) Memory
│   ├── Episodic: Personal experiences, events (context-bound)
│   └── Semantic: Facts, concepts, general knowledge (context-free)
│
└── Non-Declarative (Implicit) Memory
    ├── Procedural: Skills, habits, motor sequences
    ├── Priming: Unconscious influence of prior exposure
    └── Conditioning: Learned associations
```

**Organization Principles:**
- **Hierarchical structure:** Categories and subcategories
- **Schema formation:** Organized patterns of thought/behavior
- **Semantic networks:** Web of interconnected concepts
- **Spreading activation:** Retrieval triggers related concepts

**Nemetic Mapping:** μ (structural organization) + δγ (consolidation, metabolic cycling)

### Stage 4: Retrieval (σ)

**Function:** Accessing and reconstructing stored information

```
RETRIEVAL DYNAMICS
├── Recall: Generating information without cues
│   └── Free recall, cued recall, serial recall
│
├── Recognition: Identifying previously learned information
│   └── Higher accuracy than recall (more cues available)
│
└── Reconstruction: Rebuilding memories during retrieval
    └── Influenced by schemas, expectations, current context
```

**Retrieval Factors:**
- **Encoding specificity:** Context at encoding matches context at retrieval
- **State-dependent learning:** Internal state (mood, arousal) matches
- **Transfer-appropriate processing:** Type of processing at encoding matches retrieval demands

**Nemetic Mapping:** σ (distinction, pattern matching)

## Levels of Processing Framework (Craik & Lockhart, 1972)

An alternative to the stage model, emphasizing depth of processing:

```
LEVELS OF PROCESSING HIERARCHY

Shallow Processing ←─────────────────────────→ Deep Processing
       │                                          │
       ▼                                          ▼
┌──────────────┐                        ┌──────────────────┐
│ Structural   │                        │ Semantic         │
│ (physical    │    ←───────►           │ (meaning-based)  │
│  features)   │    Intermediate        │  associations)   │
└──────────────┘    Phonemic            └──────────────────┘
       │            (sound-based)                │
       │                                          │
   Lower retention                          Higher retention
   (maintenance rehearsal)                  (elaborative rehearsal)
```

| Level | Processing Type | Example | Retention |
|-------|-----------------|---------|-----------|
| **Structural** | Physical features | "Is this word in capital letters?" | Poor |
| **Phonemic** | Sound patterns | "Does this word rhyme with 'cat'?" | Moderate |
| **Semantic** | Meaning | "Does this word fit in the sentence?" | Excellent |

**Key Insight:** Depth of processing determines durability — semantic (meaning-based) encoding creates stronger traces than shallow (maintenance) rehearsal.

