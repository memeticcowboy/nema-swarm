context_note: 'The filter hypothesis, articulated by Bernardo Kastrup and others, inverts the materialist assumption that the brain generates consciousness. Instead, it proposes the brain as a localizing filter that constrains a pre-existing, unbound consciousness—analogous to how a radio receiver localizes a broadcast signal without creating it. This framework explains counter-intuitive phenomena: why reduced brain activity (NDEs, G-LOC, psychedelics) correlates with expanded rather than diminished experience; why mystical traditions emphasize ego dissolution and sensory deprivation; and why Jung''s patients accessed archetypal content not individually learned. The hypothesis challenges the hard problem of consciousness by removing the need to explain how matter generates mind, instead asking how mind becomes locally embodied.'
