context_note: 'Prithvi represents Earth as embodied structure—literally the bones
  and muscles that hold us. Unlike Gaia''s cosmic creativity, Prithvi is intimate
  and physiological. The key insight: Earth element is regulated through food and
  defecation, making it metabolically controllable. Imbalance (excess/deficiency)
  manifests physically and emotionally.'
source: The Elemental and the Ethereal — Memetic Cowboy
