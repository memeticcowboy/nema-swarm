elemental_emphasis:
  ∴: How is Prithvi distinguished from Vayu (Air) or Agni (Fire)?
  ≈: What is the felt sense of 'grounding' in the body?
  ▲: What direction does Kapha energy move when balanced?
  𐂷: What dietary possibilities emerge from Earth-element foods?
  ☷: How does the Earth element cycle through consumption and elimination?
  ⛨: What boundaries does physical structure provide against imbalance?
context_note: 'Prithvi represents Earth as embodied structure—literally the bones and muscles that hold us. Unlike Gaia''s cosmic creativity, Prithvi is intimate and physiological. The key insight: Earth element is regulated through food and defecation, making it metabolically controllable. Imbalance (excess/deficiency) manifests physically and emotionally.'
source: The Elemental and the Ethereal — Memetic Cowboy
