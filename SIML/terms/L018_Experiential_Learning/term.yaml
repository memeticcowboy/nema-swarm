## Learning Styles: The Kolb Model

Kolb identified four learning styles based on preferences within the cycle:

| Style | Dominant Stages | Characteristics | Element |
|-------|-----------------|-----------------|---------|
| **Diverging** | CE + RO | Imaginative, emotional, people-oriented | Wood + Water |
| **Assimilating** | RO + AC | Logical, analytical, idea-oriented | Air + Metal |
| **Converging** | AC + AE | Practical, problem-solving, technical | Metal + Wood |
| **Accommodating** | AE + CE | Hands-on, intuitive, risk-taking | Wood + Fire |

