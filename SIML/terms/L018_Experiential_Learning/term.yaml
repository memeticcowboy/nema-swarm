## Connection to CAMIL and IVR

Experiential Learning transforms immersive learning design:
- **Concrete Experience:** IVR provides visceral, embodied experiences
- **Reflective Observation:** Virtual environments can pause, replay, observe from multiple angles
- **Abstract Conceptualization:** Virtual models and simulations make concepts tangible
- **Active Experimentation:** Safe experimentation in virtual environments

**Evidence:** Medical simulations, flight simulators, virtual chemistry labs all follow the experiential learning cycle

**Design Implications:**
- Design for complete cycles, not just experiences
- Build in reflection prompts and spaces
- Enable experimentation without catastrophic consequences
- Support multiple learning styles

