## Elemental Pattern Analysis

### Wood/β Dominance

Experiential Learning is fundamentally a **Wood theory**:
- **Branching:** Multiple paths through the cycle; different learners emphasize different stages
- **Generation:** Each cycle generates new experiences and understandings
- **Growth:** Learning as organic development, not mechanical accumulation
- **Active Experimentation:** The return to doing that completes and renews the cycle

