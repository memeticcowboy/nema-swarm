## Core Definition

**Experiential Learning Theory** (Kolb, 1984) describes learning as "the process whereby knowledge is created through the transformation of experience." The theory proposes a four-stage cycle that must be completed for learning to occur:

1. **Concrete Experience (CE):** Direct engagement with an experience — doing or living through something
2. **Reflective Observation (RO):** Stepping back to observe and reflect on the experience from multiple perspectives
3. **Abstract Conceptualization (AC):** Creating concepts, models, and theories that integrate observations into knowledge
4. **Active Experimentation (AE):** Testing new concepts through action, generating new experiences

