## Core Insight

> Experiential Learning Theory reveals that learning is not a product to be received but a **process of transformation** — the continuous cycle of experiencing, reflecting, thinking, and acting. No single stage is sufficient; the magic happens in the movement between them. Experience alone is not enough — it must be transformed through reflection, conceptualization, and testing to become learning.

## One-Sentence Insight

> Kolb's Experiential Learning Cycle demonstrates that learning emerges from the continuous transformation of experience through four essential stages: concrete experience, reflective observation, abstract conceptualization, and active experimentation — a spiral that deepens with each rotation.

## Three-Bullet Expansion

- **What:** A theory defining learning as "the process whereby knowledge is created through the transformation of experience," organized into a four-stage cycle (concrete experience → reflective observation → abstract conceptualization → active experimentation)
- **How it works:** Direct engagement with experience → stepping back to observe and reflect → creating concepts and theories → testing through action → generating new experiences → cycle repeats at deeper levels
- **Where it aims:** Toward adaptive competence — the capacity to learn continuously from experience throughout life, developing knowledge that can respond to new and changing situations

