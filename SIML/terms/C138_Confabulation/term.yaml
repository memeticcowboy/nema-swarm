# C001 — Confabulation

## Core Concept

Confabulation in memetic ecology is the **generative underdetermination of the bow-tie's right funnel**—the necessary creative expansion that occurs when compressed signal (left funnel) must produce novel output without sufficient data to specify exactly what emerges.

## Not Malfunction But Structural Feature

In NEMAtic terms, confabulation is **not malfunction but structural feature**. The bottleneck (σ-cut) discards detail necessarily; the right funnel (β-branching) must invent coherent continuation without that lost information.

The pattern-coalition coordinates a plausible trajectory from partial data, maintaining narrative continuity despite gaps.

## Key Properties

**ε-Preservation:** The "error" or noise (ε ≠ 0) that σ deliberately preserved in the left funnel becomes seed material for confabulation—productive ambiguity, not corruption.

**Pattern-Agency:** Memes themselves drive the confabulation; the substrate (you, me, any mind) is coordinator, not author.

**Reality-Generation:** Confabulation doesn't describe pre-existing reality but generates phenomenal plausibility through phonemic resonance, syntactic embedding, and symbolic reification.

## Pathology Boundary

Confabulation becomes capture when the right funnel loses **Ω-permeability**—when generated narrative claims ε = 0 (perfect precision, no revision possible).

Healthy confabulation maintains the felt sense of construction; captured confabulation mistakes its own output for ground truth.

## Operational Test

**Can the confabulation feel itself being confabulated?**

- **If yes:** Lumemic (generative light)
- **If no:** Likely usurpenic (extractive capture)

