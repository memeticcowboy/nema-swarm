elemental_emphasis:
  ∴: How is Qi distinguished from Western 'air' or 'substance'?
  ≈: What resonance does omnipresent Qi carry?
  ▲: What direction does Qi flow in Wu-wei?
  𐂷: What possibilities emerge from Qi cultivation?
  ☷: How does Qi transform through the Five Elements?
  ⛨: What boundaries does Qi respect or penetrate?
context_note: 'Qi represents Air''s most radical reconceptualization—not an element at all but omnipresent process. Key insight: Chinese philosophy has no ''Air'' element in Wuxing; Qi''s qualities are distributed across all five phases. Qi is ρ (resonance) as cosmic principle, not atmospheric component. The absence of Air in Wuxing is philosophically significant: substance-model vs. process-model.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic Cowboy
