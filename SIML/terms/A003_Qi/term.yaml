context_note: 'Qi represents Air''s most radical reconceptualization—not an element
  at all but omnipresent process. Key insight: Chinese philosophy has no ''Air'' element
  in Wuxing; Qi''s qualities are distributed across all five phases. Qi is ρ (resonance)
  as cosmic principle, not atmospheric component. The absence of Air in Wuxing is
  philosophically significant: substance-model vs. process-model.'
source: Air Symbolism in Ancient Philosophical and Indigenous Traditions — Memetic
