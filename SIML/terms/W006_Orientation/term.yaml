ahmed_definition: To be oriented is to have a direction in space, to face some objects
  and not others
key_mechanism: Bodies take shape as they move through the world directing themselves
  toward or away from objects and others
lines_concept: Tracks laid down by repeated actions; following aligns us with others
straight_life: Literally a straightened line—inherited familial, racial, gendered
  paths
queer_as_turn: Turn away from straight lines, disorientation opening alternative contours
nematic_operation: Slow bending of bodies along lines—orientation as background vector,
  habitual directionality
history_in_gesture: History happens in the repetition of gestures
distributed_not_subjective: Tendencies not 'in' single subject; distributed across
  spaces, furnishings, kinship, institutions
key_insight: Orientation is not discrete idea transmitted but directional pattern
  emerging from countless repetitions
