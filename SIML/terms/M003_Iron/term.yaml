context_note: 'Iron represents Metal as utility and civilization—direction (λ) toward
  practical ends, structure (μ) as forged tools, cycling (δγ) through agricultural
  seasons. Unlike gold/silver''s symbolic density, iron''s value is functional. The
  African Ògún tradition captures this: iron embodies creative and destructive energies
  simultaneously. Iron is democratic—available to many, not just kings.'
source: Symbolic Meaning of Metal in Ancient Philosophical and Indigenous Traditions
  — Memetic Cowboy
