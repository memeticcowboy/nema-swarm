# A04A — Forced Continuity

## Core Mechanism

Forced Continuity is a dark pattern where subscription cancellation is made difficult while sign-up remains frictionless. The "roach motel" design: easy in, impossible out.

## Elemental Analysis

**Metal (μ) — Dominant at 0.90**
The primary element at work. Structural enforcement of retention through:
- Hidden cancellation options
- Multi-step exit processes
- Required phone calls vs. online signup
- Delayed confirmation periods

**Water (ρ) — Secondary at 0.50**
Flow is permitted at entry but blocked at exit. The emotional friction of cancellation is amplified while entry friction is minimized.

**Earth (δγ) — Cyclical Trap at 0.25**
The user is caught in cycles: "just one more month," "let me check if I still need this," preventing clean closure.

## Diagnostic Markers

- Exit requires more steps than entry
- Cancellation requires different medium than signup (phone vs. web)
- Confirmations delayed or obscured
- "Are you sure?" loops with guilt-inducing messaging

