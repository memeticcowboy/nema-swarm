| **Intrinsic** | Essential complexity | Air/∴ | σ (distinction) | The signal — what must be learned |
| **Extraneous** | Unnecessary processing | Air/∴ | σ (distinction→separation) | The noise — what must be removed |
| **Germane** | Schema construction | Air/∴ | σ (distinction→integration) | The meaning-making — deep processing |

## Working Memory Architecture

```
Working Memory (Limited: 7±2 chunks)
    ↓
┌─────────────────────────────────────┐
│  Intrinsic  │  Extraneous  │ Germane │
│   (Signal)  │    (Noise)   │ (Meaning)│
└─────────────────────────────────────┘
    ↓
Long-Term Memory (Unlimited)
    ↓
Schema Automation → Expertise
```

## Instructional Design Principles

| Principle | Target Load | Mechanism | Element |
|-----------|-------------|-----------|---------|
| **Worked Examples** | Reduce extraneous | Show solution path, reduce search | Air/σ |
| **Completion Tasks** | Transition support | Partial solution, learner completes | Air/σ+Wood/β |
| **Modality Effect** | Reduce extraneous | Split visual/auditory channels | Air/σ |
| **Redundancy Effect** | Reduce extraneous | Remove duplicate information | Air/σ |
| **Segmentation** | Manage intrinsic | Break complex material into parts | Earth/δγ |
| **Pre-training** | Reduce intrinsic | Teach components before whole | Metal/μ |

## The Expertise Reversal Effect

```
Novice Learner:
    High intrinsic load → Needs worked examples, guidance
    
Expert Learner:
    Low intrinsic load (automated schemas) → Worked examples become redundant
    → Benefits from problem-solving
```

**Insight:** Instructional methods must adapt to learner expertise — what helps beginners hinders experts.

