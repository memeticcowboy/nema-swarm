## Core Definition

**Cognitive Load Theory** posits that working memory has limited capacity, and learning is optimized when instructional design manages three types of cognitive load:

1. **Intrinsic Load:** Complexity inherent to the material (element interactivity)
2. **Extraneous Load:** Unnecessary processing demands from poor instructional design
3. **Germane Load:** Productive processing devoted to schema construction and automation

