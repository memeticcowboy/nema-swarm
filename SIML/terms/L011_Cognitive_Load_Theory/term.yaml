## Core Insight

> Cognitive Load Theory reveals that learning is not about adding more information but about **architecting attention** — designing experiences that respect working memory limits while maximizing productive processing. The goal is not "less load" but "right load" — eliminating noise while preserving and amplifying signal.

## One-Sentence Insight

> Sweller's Cognitive Load Theory shows that learning is constrained by working memory's limited bandwidth, requiring instructional design that minimizes extraneous noise, manages intrinsic complexity, and channels resources toward germane schema-building.

## Three-Bullet Expansion

- **What:** A theory of instructional design based on working memory limitations, categorizing cognitive load into intrinsic (essential), extraneous (unnecessary), and germane (productive) types
- **How it works:** Limited working memory (7±2 chunks) → load management through instructional design → schema automation in long-term memory → expertise development
- **Where it aims:** Toward efficient learning architectures that respect cognitive constraints while maximizing meaningful processing

