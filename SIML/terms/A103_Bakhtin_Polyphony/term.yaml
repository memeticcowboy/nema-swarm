description: 'Bakhtin''s polyphony: self as inherently dialogic, never singular/isolated. Psyche as novel with multiple unmerged voices, each autonomous, in ongoing unresolved conversation. Multiple independent voices coexist without subordination. Polyphony is not harmony but coexistence of diverse conflicting truths. Contrasts monologism (single authoritative meaning). Self as plural constellation/chorus. Dialogic criticism over verdicts.'
