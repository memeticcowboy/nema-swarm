taxonomy:
  ontology_position: "Process ontology grounded in metabolic transformation; being is not static but decompositional, with identity becoming soil for future growth."
  epistemic_stance: "Embodied and patient; knowledge accrues through sustained attention to process rather than extraction of conclusions."
  temporal_orientation: "Deep time and seasonal; the relevant unit is the cycle of decay and renewal, not the sprint or quarter."
  qualia_signature: "The warmth of active patience, the ache of resisted urgency, the vertigo of trusting invisible transformation."
  agency_gradient: "Distributed across gardener, microbe, and moisture; no single actor controls the outcome, yet each element is necessary."
  coherence_topology: "Rhizomatic and mycelial—decentralized networks of meaning that hold without rigid structure, robust through redundancy and connection."
  ce_potential: "Very high—the frame dissolves the false binary of fast-vs-slow, revealing different metabolisms as different intelligences."

