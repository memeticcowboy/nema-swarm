description: 'Wisdom reconceived as relational ontology rather than accumulated knowledge or internal insight — wisdom is right orientation within the web of being, emerging not in isolation but in relation; structured through five relational axes: relationship to others (empathy, compassion, attunement), relationship to self (inner alignment, shadow integration), relationship to time (discerning the long arc beyond immediate effects), relationship to systems (ecological, social, symbolic), and relationship to the unknown (reverence, curiosity, humility); wisdom contrasted with knowledge as contextual sensitivity versus solitary accumulation, characterized as the dance rather than the steps, the how and when rather than the what; relational reciprocity as core dynamic where the wise person is changed by engagement rather than merely observing wisely; wisdom as living pattern — a dynamic, evolving resonance with what is, what could be, and what ought to be.'
