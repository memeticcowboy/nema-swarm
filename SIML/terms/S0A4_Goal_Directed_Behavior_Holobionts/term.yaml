description: Goal-directed behavior in holobionts (superorganisms) — interdisciplinary research combining philosophy and mathematics to study emergence and evolution of collective goal-directed behavior in entities like coral reefs and lichens; holobionts as host organisms plus symbiotic partners functioning as single ecological units; challenge to traditional notions of biological individuality; implications for rethinking agency, intentionality, and individuality in biology; evolutionary trajectories of cooperation and competition within holobionts; funded by John Templeton Foundation; researchers Derek Skillings, Benjamin Allen, Patrick Forber, Rory Smead; broader implications for understanding humans as holobionts and for conservation ethics.
