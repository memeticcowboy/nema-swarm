## Key Concepts

- **Structural Inaudibility:** The condition where marginalized voices are present but not heard, not because they are absent but because the cognitive structure cannot process them
- **Ontological Sovereignty:** The right to define one's own reality and have that reality recognized as legitimate knowledge
- **Co-Authorship:** Not merely participating in systems designed by others, but having power to design the systems themselves
- **Symbolic Safety:** The felt-sense that a platform or space is safe for authentic expression, not just technically accessible
- **Epistemic Audit:** Systematic tracking of visibility gaps, symbolic distortion, and structural inaudibility
- **Multimodal Epistemologies:** Ways of knowing that include audio, image, affect, story, and lived experience alongside abstract data
- **Contextual Endorsement:** Trust systems that recognize knowledge as legitimate based on community validation rather than credentialing
- **Narrative Dignity:** The right to have one's stories and ways of meaning-making treated as valuable knowledge contributions
- **Memetic Repair:** Cultural regeneration rituals that heal epistemic wounds and rebuild narrative ecosystems
- **Co-Woven Tapestry:** The emergent truth that arises from pluralistic, participatory knowledge production

