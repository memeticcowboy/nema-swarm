## The Seven Components of Elaboration

Reigeluth identified seven dimensions along which content can be elaborated:

```
ELABORATION DIMENSIONS
│
├── 1. CONCEPTUAL (What)
│   └── From concrete examples to abstract principles
│
├── 2. THEORETICAL (Why)
│   └── From descriptive to explanatory frameworks
│
├── 3. PROCEDURAL (How)
│   └── From simple procedures to complex processes
│
├── 4. CONTEXTUAL (When/Where)
│   └── From limited to varied application contexts
│
├── 5. CAUSAL (What if)
│   └── From simple to complex causal relationships
│
├── 6. INTERDEPENDENT (With what)
│   └── From isolated to interconnected concepts
│
└── 7. HISTORICAL (How developed)
    └── From present understanding to historical development
```

