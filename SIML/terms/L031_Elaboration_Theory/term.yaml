| **Water/ρ** | Meaningful context — connecting new learning to existing understanding |
| **Air/σ** | Clarity of epitome — clear, simple initial presentation |
| **Fire/λ** | Directional progression — moving toward increasing complexity |
| **Child/✶** | Integration — holistic understanding of the complete structure |

