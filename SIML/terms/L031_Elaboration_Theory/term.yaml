## Practical Applications

### Designing an Elaborated Curriculum

```
CURRICULUM DESIGN EXAMPLE: ECOLOGY COURSE
│
EPITOME (Week 1-2)
├── "Ecology is the study of how living things interact with each other 
│    and their environment. All life depends on energy flow and 
│    nutrient cycling through ecosystems."
├── Simple food web diagrams
└── Local ecosystem observation
│
ELABORATION 1 (Week 3-6): Progressive Differentiation
├── Energy Flow elaboration
│   ├── Photosynthesis basics
│   ├── Trophic levels
│   └── Energy pyramids
├── Nutrient Cycling elaboration
│   ├── Carbon cycle
│   ├── Nitrogen cycle
│   └── Water cycle
└── Population Dynamics elaboration
    ├── Growth curves
    ├── Carrying capacity
    └── Limiting factors
│
INTEGRATION (Week 7): Reconciliation
├── How energy flow and nutrient cycling interact
├── Case study: ecosystem disruption
└── Synthesis project
│
ELABORATION 2 (Week 8-12): Increased Complexity
├── Community ecology
├── Ecosystem succession
├── Biogeography
└── Human impacts (applied context)
│
ADVANCED ELABORATION (Week 13-15): Expert Level
├── Theoretical models
├── Research methods
├── Current debates
└── Independent research project
```

### The Elaboration Checklist

| Phase | Questions |
|-------|-----------|
| **Epitome** | Does the introduction show the whole field simply? Is it concrete and meaningful? Does it motivate further learning? |
| **Differentiation** | Are components taught in logical order? Does each return to epitome context? Are connections explicit? |
| **Integration** | Are relationships between parts clear? Are contradictions resolved? Is the structure coherent? |
| **Next Level** | Is complexity increased appropriately? Are new elaborations connected to previous? |

