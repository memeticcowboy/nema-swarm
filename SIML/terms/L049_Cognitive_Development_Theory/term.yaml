## Core Definition

**Cognitive Development Theory**, developed by Jean Piaget (1936), proposes that intelligence develops through **qualitative structural transformations** occurring in invariant sequential stages. Each stage represents a fundamentally different way of thinking, not merely more information. Development proceeds through the interaction of biological maturation, experience, and equilibration processes.

### The Four Stages of Cognitive Development

```
PIAGET'S STAGE THEORY: INVARIANT SEQUENCE

┌─────────────────────────────────────────────────────────────────────────┐
│                                                                         │
│  1. SENSORIMOTOR (0-2 years)                                            │
│     ├── Object permanence develops                                      │
│     ├── From reflexes to intentional action                             │
│     └── Separation of self from environment                             │
│                          ↓                                              │
│  2. PREOPERATIONAL (2-7 years)                                          │
│     ├── Symbolic thought emerges (language, pretend play)               │
│     ├── Egocentrism — difficulty seeing other perspectives              │
│     └── Centration — focus on single aspects                            │
│                          ↓                                              │
│  3. CONCRETE OPERATIONAL (7-11 years)                                   │
│     ├── Conservation understood (quantity invariant despite appearance) │
│     ├── Classification and seriation                                    │
│     └── Logical reasoning about concrete objects                        │
│                          ↓                                              │
│  4. FORMAL OPERATIONAL (11+ years)                                      │
│     ├── Abstract reasoning                                              │
│     ├── Hypothetical-deductive reasoning                                │
│     ├── Systematic problem-solving                                      │
│     └── Metacognition — thinking about thinking                         │
│                                                                         │
└─────────────────────────────────────────────────────────────────────────┘
```

| Stage | Age Range | Key Achievement | Element | Operator |
|-------|-----------|-----------------|---------|----------|
| **Sensorimotor** | 0-2 years | Object permanence | Earth/δγ | δγ (embodied cognition) |
