## The Mechanisms of Development

### Three Core Processes

```
┌─────────────────────────────────────────────────────────────────────┐
│                    COGNITIVE ADAPTATION                             │
│                                                                     │
│   ┌──────────────┐              ┌──────────────┐                   │
│   │ ASSIMILATION │              │ ACCOMMODATION│                   │
│   │              │              │              │                   │
│   │  β (Wood)    │              │  β (Wood)    │                   │
│   │  Incorporate │              │  Restructure │                   │
│   │  new into    │              │  schemas to  │                   │
│   │  existing    │              │  fit reality │                   │
│   │  schemas     │              │              │                   │
│   └──────┬───────┘              └──────┬───────┘                   │
│          │                            │                            │
│          └────────────┬───────────────┘                            │
│                       ↓                                            │
│              ┌─────────────────┐                                   │
│              │  EQUILIBRATION  │                                   │
│              │                 │                                   │
│              │   δγ (Earth)    │                                   │
│              │  Active seeking │                                   │
│              │  of cognitive   │                                   │
│              │  balance        │                                   │
│              │                 │                                   │
│              │  Disequilibrium │                                   │
│              │  drives growth  │                                   │
│              └─────────────────┘                                   │
│                                                                     │
└─────────────────────────────────────────────────────────────────────┘
```

**Assimilation (β-incorporation):** Fitting new experiences into existing cognitive schemas
- *Example:* Child calls all four-legged animals "doggie" — applying existing schema broadly

**Accommodation (β-restructuring):** Modifying existing schemas or creating new ones to fit reality
- *Example:* Child learns to distinguish dogs from cats, horses, cows — schema differentiation

**Equilibration (δγ-cycling):** The active seeking of cognitive balance between assimilation and accommodation
- *Disequilibrium:* Cognitive conflict when experience doesn't fit existing schemas
- *Resolution:* Accommodation creates new equilibrium at higher level

