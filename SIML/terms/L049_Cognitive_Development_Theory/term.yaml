### Integration with Schema Theory (L041)

Piaget's concept of **schemas** as cognitive structures was developed further by Bartlett (memory schemas) and modern cognitive science. Schema Theory (L041) extends Piaget's foundational insight.

### Link to Constructivism

Piaget is the **father of constructivism** — the theory that knowledge is actively constructed by the learner rather than passively received. This foundation supports:
- Constructionism (L017) — Papert's extension
- Discovery Learning (L034) — Bruner's application
- Inquiry-Based Learning (L035)

## Critiques and Contemporary Views

### Challenges to Stage Theory

1. **Competence vs. Performance:** Children may have competencies earlier than they demonstrate
2. **Domain Specificity:** Development may proceed differently in different domains (mathematics vs. social reasoning)
3. **Cultural Variation:** Stage timing and expression vary across cultures
4. **Continuity vs. Discontinuity:** Some evidence for gradual rather than stage-like change

### Neo-Piagetian Theories

Modern researchers (Case, Fischer, Halford) have revised Piaget's framework:
- **Information processing capacity** constrains stage transitions
- **Working memory** development enables operational thinking
- **Executive function** maturation supports formal operations

## Core Insight

> Piaget's Cognitive Development Theory reveals that **cognitive growth is not additive but transformative** — each stage represents a fundamentally different way of knowing, not merely more knowledge. The child at 7 doesn't just know more than at 6; she thinks differently. Understanding these structural transformations enables educators to meet learners where they are, not where we wish them to be.

## One-Sentence Insight

> Piaget's stage theory demonstrates that cognitive development proceeds through invariant qualitative transformations — from sensorimotor action to symbolic thought to concrete operations to abstract reasoning — driven by the dialectic of assimilation and accommodation toward equilibration.

## Three-Bullet Expansion

- **What:** A stage theory of cognitive development proposing four universal, invariant sequential stages (sensorimotor, preoperational, concrete operational, formal operational) through which intelligence develops via assimilation, accommodation, and equilibration
- **How it works:** Biological maturation + experience → cognitive conflict (disequilibrium) → schema accommodation → new equilibrium at higher structural level → stage transition
- **Where it aims:** Toward operational intelligence — the capacity for systematic, logical, abstract reasoning that characterizes mature thought

