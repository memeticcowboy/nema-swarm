## Elemental Pattern Analysis

### Metal/μ Dominance (Structure)

Piaget's theory is fundamentally a **Metal theory** of cognitive architecture:
- **Invariant sequence:** Stages occur in fixed order across cultures
- **Structural wholes:** Each stage is an integrated cognitive system
- **Qualitative jumps:** Stage transitions are discontinuities, not gradual increments
- **Operational thinking:** The endpoint is systematic, rule-governed reasoning

### Wood/β Support (Growth)

- **Assimilation/accommodation:** The branching growth of schemas
- **Schema differentiation:** Increasing complexity through elaboration
- **Cognitive expansion:** Each stage enables new types of thinking

### Earth/δγ Foundation (Cycling)

- **Equilibration:** The cyclical process of balance → disequilibrium → new balance
- **Embodied origins:** Sensorimotor stage grounds cognition in physical action
- **Gradual maturation:** Biological timing constrains stage transitions

### Air/σ Emergence (Distinction)

- **Formal operations:** Abstract reasoning requires distinction-making
- **Decentration:** Moving from single-focus to multi-factor analysis
- **Hypothetical reasoning:** Distinguishing possible from actual

## Educational Implications

### Stage-Appropriate Instruction

| Stage | Instructional Approach | What to Avoid |
|-------|------------------------|---------------|
| **Sensorimotor** | Sensory exploration, physical manipulation | Abstract explanations, symbolic tasks |
| **Preoperational** | Concrete experiences, symbolic play, storytelling | Abstract logic, multiple perspectives |
| **Concrete Operational** | Hands-on materials, classification activities, concrete examples | Pure abstraction, hypothetical scenarios |
| **Formal Operational** | Abstract concepts, hypothetical problems, metacognitive reflection | Over-scaffolding, concrete-only tasks |

