## Core Definition

**Adaptive Learning** (also called Personalized Learning or AI-Enhanced Learning) refers to educational approaches that use technology to dynamically adjust the learning experience to each individual learner's needs, preferences, goals, and performance in real-time. Unlike traditional instruction where all students receive the same content at the same pace, adaptive systems continuously assess learner state and modify content difficulty, presentation format, learning pathway, and support resources accordingly.

