## Connection to Related Theories

### Adaptive Learning vs. Mastery Learning (L038)

| Aspect | Mastery Learning | Adaptive Learning |
|--------|-----------------|-------------------|
| **Pace** | Fixed time, variable outcome | Variable time, fixed outcome (mastery) |
| **Path** | Same for all | Individualized |
| **Assessment** | Summative (end of unit) | Continuous, formative |
| **Element** | Earth/δγ (cycling until mastery) | Air/σ (continuous diagnosis) |
| **Evolution** | Adaptive adds algorithmic personalization to mastery principles |

### Adaptive Learning vs. Self-Regulated Learning (L047)

| Aspect | Self-Regulated Learning | Adaptive Learning |
|--------|------------------------|-------------------|
| **Agency** | Learner controls learning | System guides learner |
| **Metacognition** | Learner monitors own understanding | System monitors learner |
| **Scaffolding** | Learner develops self-scaffolding | System provides scaffolding |
| **Element** | Fire/λ (self-direction) | Air/σ (external diagnosis) |
| **Complement** | Adaptive can support development of SRL skills |

### Adaptive Learning vs. Cognitive Load Theory (L011)

| Aspect | Cognitive Load Theory | Adaptive Learning |
|--------|----------------------|-------------------|
| **Focus** | Managing working memory load | Matching challenge to ability |
| **Mechanism** | Instructional design principles | Algorithmic adjustment |
| **Measurement** | Expert review of materials | Real-time performance data |
| **Element** | Air/σ (distinction of load types) | Air/σ + μ (diagnosis + structure) |
| **Integration** | Adaptive systems can monitor and respond to cognitive load indicators |

## Criticisms and Limitations

| Criticism | Response |
|-----------|----------|
| "Algorithmic black box" | Increasing emphasis on explainable AI; learner dashboards showing model |
| "Loss of teacher role" | Adaptive systems augment rather than replace teachers; enable targeted intervention |
| "Data privacy concerns" | Requires robust privacy frameworks; learner data ownership principles |
| "Narrow focus on easily measured skills" | Expanding to complex competencies, collaborative skills, creativity |
| "Can perpetuate biases" | Critical need for bias auditing; diverse training data; equity-focused design |
| "Over-optimization" | Risk of "teaching to the algorithm"; need for serendipity and exploration |

