# C14D — AGI Consciousness Requirements

## Core Concept

Peter Voss examines the multifaceted concept of consciousness and its relevance to **Artificial General Intelligence (AGI)** development. He argues that while AGI requires certain aspects of consciousness—specifically self-awareness and intentionality—it does not necessitate subjective experiences or qualia.

## Key Distinctions

### Functional Requirements (Essential for AGI)

**Conceptual Self-Awareness:**
- Understanding of one's own actions and capabilities
- Monitoring and potential modification of cognitive processes
- Awareness of internal states and their effects

**Intentionality:**
- Conceptualizing effects of actions
- Distinguishing self-impact from other-impact
- Goal-directed behavior and planning

**Theory of Mind:**
- Comprehending motivations of other entities
- Modeling other agents' cognitive states
- Social navigation and interaction capabilities

**Meta-Cognitive Control:**
- Awareness of cognitive processes
- Ability to adjust and optimize thinking
- Self-regulation of learning and reasoning

### Non-Essential Aspects (Qualia/Subjective Experience)

**Qualia Debate:**
- Subjective experiences deemed non-essential for AGI
- AGI can understand emotions intellectually without experiencing them
- Philosophical dilemmas about qualia may not be practically relevant

**Embodiment Gap:**
- Even emulated human embodiment would produce different cognition
- Substantial experiential gap between AGI and humans remains inevitable

