### 2. Formative Assessment (Air/σ)

Unlike summative assessment (grading), formative assessment:
- **Diagnoses** learning gaps
- **Guides** corrective instruction
- **Occurs** during learning, not at the end
- **Is** non-punitive (information, not evaluation)

