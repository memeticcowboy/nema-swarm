## Core Definition

**Mastery Learning**, developed by Benjamin Bloom in 1968, is an instructional approach based on the radical premise that **most students (perhaps 95%) can learn whatever the school has to teach**—if given sufficient time and appropriate instruction. This directly challenges the traditional model where time is fixed and achievement varies.

