## Connection to Related Theories

### Mastery Learning and Behaviorism (L021)

| Aspect | Behaviorism | Mastery Learning |
|--------|-------------|------------------|
| **Focus** | Observable behavior | Demonstrated competence |
| **Mechanism** | Stimulus-response | Feedback-corrective loops |
| **Element** | Metal/μ (conditioning) | Earth/δγ (cycling) + Metal/μ (criterion) |
| **Difference** | External control | Internal mastery orientation |

Bloom was influenced by Skinner's programmed instruction but shifted focus from behavioral control to **cognitive mastery**.

### Mastery Learning and Self-Determination Theory (L015)

Mastery Learning supports SDT's three needs:
- **Autonomy:** Choice in corrective activities, self-paced
- **Competence:** Clear feedback, achievable goals, mastery experience
- **Relatedness:** Peer tutoring, study groups

### Mastery Learning and Cognitive Load Theory (L011)

| Aspect | Cognitive Load Theory | Mastery Learning |
|--------|----------------------|------------------|
| **Focus** | Working memory capacity | Time and feedback |
| **Element** | Air/σ (distinction) | Metal/μ (structure) + Earth/δγ (cycling) |
| **Integration** | CLT explains why some need more time (higher element interactivity) |

### Mastery Learning and Zone of Proximal Development (L022)

Bloom's "corrective instruction" parallels Vygotsky's "scaffolding":
- Both recognize learners need support
- Both emphasize appropriate challenge
- Both see learning as social (peer tutoring, group work)

## Research Evidence

### The 1 Sigma Effect

Meta-analyses show Mastery Learning produces:
- **Effect size ~1.0** (one standard deviation above traditional instruction)
- **Reduced variation** in achievement
- **Improved attitudes** toward subject and self

