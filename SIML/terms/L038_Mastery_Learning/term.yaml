- **Nemetic String:** Φ(Mastery) = μ(criterion|fixed-standard) ∘ δγ(cycling|formative-feedback) ∘ λ(persistence|time-variable) → [β(competence|hierarchical-buildup)] → [κ(mastery-achievement)] + ε | :competence-based
