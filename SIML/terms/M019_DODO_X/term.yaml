## Diagnostic

**Compact test:**

> When quantified abstractions colonize decision-making to the point where rest itself is measured for recovery speed, the loop has achieved recursive closure.

**Indicators:**
- Rest measured for recovery speed
- Identity fused with metrics
- Solidarity networks fragmented by competition
- Biological consequences accumulating
- No energy to seek alternatives

## Escape Vectors

To break DODO-X, restore the elemental functions:

1. **Restore ε** — Productive ambiguity in metrics
2. **Reopen Ω** — Maintain permeability to alternatives
3. **Unblock δγ** — Metabolic cycling through genuine rest
4. **Sever metric-identity fusion** — Distinguish proxy-self from lived self
5. **Rebuild lateral bonds** — Restore relational water (ρ) severed by ranking

