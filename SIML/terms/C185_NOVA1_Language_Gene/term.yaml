elemental_emphasis:
  ∴: How does a single amino acid substitution distinguish speech from silence?
  ≈: What flows between genetic simplicity and communicative complexity?
  ▲: What transforms biological substrate into the capacity for symbolic language?
  𐂷: How does the speech-squeak branching reveal evolutionary trajectories?
  ☷: What grounds the NOVA1 variant in the deep evolutionary soil of hominins?
  ⛨: Where does the boundary between human and Neanderthal speech capacity lie?
context_note: The NOVA1 gene's human-specific I197V variant, when inserted into mice via CRISPR, produced higher-pitched squeaks and more complex mating calls. This single amino acid substitution (isoleucine to valine at position 197) may have been pivotal in human speech evolution. Neanderthals and Denisovans lacked this variant, raising questions about communication's role in Homo sapiens' success.
source: IFLScience — Scientists Put a Human Language Gene Into Mice (2025)
