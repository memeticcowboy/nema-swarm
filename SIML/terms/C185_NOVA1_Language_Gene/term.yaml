context_note: >-
  The NOVA1 gene's human-specific I197V variant, when inserted into mice via
  CRISPR, produced higher-pitched squeaks and more complex mating calls. This
  single amino acid substitution (isoleucine to valine at position 197) may
  have been pivotal in human speech evolution. Neanderthals and Denisovans
  lacked this variant, raising questions about communication's role in Homo
  sapiens' success.
