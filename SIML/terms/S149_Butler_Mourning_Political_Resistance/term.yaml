description: "Judith Butler's reframing of mourning as a transformative political act. Selective grievability reveals power dynamics — who is deemed grievable exposes hierarchies of recognition. Shared vulnerability and interdependence foster solidarity. Public grief as resource for political transformation, challenging norms of recognition and critiquing state manipulation of grief for nationalist and militaristic purposes. Links mourning to an ethics of nonviolence."
