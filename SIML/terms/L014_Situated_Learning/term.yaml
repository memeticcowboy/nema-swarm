## The Problem of Transfer

### The Traditional Paradox

```
School Learning:
    Math word problems → Abstract algorithms → ??? → Real life
    
    The "transfer problem": Students can solve equations 
    but cannot apply math to grocery shopping
```

### Situated Learning Solution

```
Authentic Learning:
    Grocery shopping → Math emerges from activity → 
    Immediate application → Meaningful competence
    
    Learning is always already "transferred" because 
    it was learned in the context of use
```

## Legitimate Peripheral Participation (Revisited)

While LPP is detailed in L013_Social_Learning_Theory, Situated Learning emphasizes its **contextual dimensions**:

| Aspect | Traditional Classroom | Situated Learning |
|--------|----------------------|-------------------|
| **Location** | School building | Workplace, community, authentic setting |
| **Activity** | Simulated exercises | Real practice with real consequences |
| **Tools** | Textbooks, worksheets | Professional tools, cultural artifacts |
| **Goals** | Grades, credentials | Solving real problems, contributing value |
| **Identity** | Student | Apprentice, novice practitioner |

