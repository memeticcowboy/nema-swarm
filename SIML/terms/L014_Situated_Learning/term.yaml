## Connection to Related Theories

### Situated Learning vs. Social Learning Theory

| Aspect | Social Learning (Bandura) | Situated Learning (Lave & Wenger) |
|--------|---------------------------|-----------------------------------|
| **Focus** | Individual learning from models | Collective practice and identity |
| **Knowledge** | Can be decontextualized | Always tied to context |
| **Mechanism** | Observation → imitation → reinforcement | Legitimate peripheral participation |
| **Outcome** | Behavioral/skill acquisition | Identity transformation |
| **Element** | Air-Fire (attention-motivation) | Water-Earth (context-cycling) |

### Situated Learning and 4E Cognition

Strong alignment:
- **Embedded:** Cognition is context-dependent
- **Enactive:** Knowledge emerges from action in environment
- **Extended:** Tools and community resources are constitutive
- **Embodied:** Physical participation is essential

