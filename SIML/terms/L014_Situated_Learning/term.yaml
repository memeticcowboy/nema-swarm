## Core Insight

> Situated Learning reveals that knowledge is not a transferable substance but a **relational achievement** — it exists in the dynamic coupling between learner, activity, and context. The "transfer problem" dissolves when we recognize that learning must happen where knowledge lives: in authentic practice.

## One-Sentence Insight

> Lave & Wenger's Situated Learning demonstrates that knowledge is inseparable from the contexts of its use — meaningful learning emerges not from abstract study but from participation in authentic practice where competence develops through engagement with real problems, tools, and communities.

## Three-Bullet Expansion

- **What:** A theory arguing that learning is fundamentally embedded in specific contexts of activity, culture, and social practice — knowledge cannot be separated from the situations in which it is developed and used
- **How it works:** Authentic activity context → legitimate peripheral participation → tool-mediated engagement → gradual competence development → identity transformation within practice
- **Where it aims:** Toward learning environments that preserve the contextual richness of authentic practice, solving the "transfer problem" by embedding learning where knowledge lives

