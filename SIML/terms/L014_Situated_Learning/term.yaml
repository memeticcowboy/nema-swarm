## Core Definition

**Situated Learning** (Lave & Wenger, 1991) argues that learning is not the acquisition of abstract, decontextualized knowledge but rather a process of **legitimate peripheral participation** in communities of practice. Knowledge is fundamentally tied to the contexts and activities in which it is developed and used.

### Key Principles

1. **Knowledge is Situated:** Learning is inseparable from the contexts and cultures in which it occurs
2. **Learning is Social:** It happens through participation in communities, not individual cognition
3. **Authentic Practice:** Learning occurs through engagement in meaningful, real-world activities
4. **Identity Transformation:** Learning changes who you are, not just what you know

## The Situated Learning Architecture

```
Traditional View (Decontextualized):
    ┌─────────┐      ┌─────────────┐      ┌─────────┐
    │ Abstract│  →   │  Transfer   │  →   │ Applied │
    │Knowledge│      │  Problem    │      │ Context │
    └─────────┘      └─────────────┘      └─────────┘
         ↑                                    ↓
         └────────────── GAP ────────────────┘
    
Situated View (Context-Embedded):
    ┌─────────────────────────────────────────────┐
    │           Community of Practice             │
    │                                             │
    │    ┌─────────────────────────────────┐      │
    │    │      Authentic Activity         │      │
    │    │  (meaningful, real-world task)  │      │
    │    └─────────────────────────────────┘      │
    │                   ↑                         │
    │    ┌──────────────┼──────────────┐          │
    │    │              │              │          │
    │    ↓              ↓              ↓          │
    │ ┌──────┐    ┌──────────┐    ┌────────┐      │
    │ │Context│    │ Learner  │    │Context │      │
    │ │Knowledge│   │(becoming)│   │Identity│      │
    │ └──────┘    └──────────┘    └────────┘      │
    │                                             │
    │    Learning = Participation in Practice     │
    └─────────────────────────────────────────────┘
```

## Legitimate Peripheral Participation (LPP)

The central mechanism of situated learning:

| Stage | Position | Participation | Knowledge Form |
|-------|----------|---------------|----------------|
| **Newcomer** | Peripheral | Limited, scaffolded tasks | Context-dependent, implicit |
| **Journeyer** | Moving inward | Increasing responsibility | Articulated, transferable within community |
| **Old-timer** | Central | Full participation | Mastery, can teach/represent |

### The LPP Process

```
Legitimate: The learner is granted access to the community
      ↓
Peripheral: Initial participation is limited but meaningful
      ↓
Participation: Learning occurs through doing, not receiving
      ↓
Increasing centrality: Gradual movement toward full membership
      ↓
Identity transformation: Becoming a practitioner
```

## Situated vs. Decontextualized Learning

| Dimension | Traditional (Decontextualized) | Situated Learning |
|-----------|-------------------------------|-------------------|
| **Knowledge location** | In the individual head | Distributed in practice |
| **Learning mechanism** | Information transmission | Participation in activity |
| **Context role** | Application site | Constitutive of knowledge |
| **Expertise marker** | Abstract test performance | Competence in practice |
| **Teacher role** | Knowledge transmitter | Master practitioner |
| **Curriculum** | Pre-defined content | Emerges from practice |

## Classic Examples from Lave & Wenger

### 1. Vai and Gola Tailors (Liberia)

```
Apprenticeship Structure:
    ┌─────────────────────────────────────────┐
    │           Master Tailors                │
    │         (full participation)            │
    └─────────────────┬───────────────────────┘
                      │
    ┌─────────────────┼───────────────────────┐
    ↓                 ↓                       ↓
┌─────────┐    ┌───────────┐          ┌───────────┐
│Journeymen│    │ Apprentices│          │ Apprentices│
│(advanced)│    │ (sewing)   │          │ (cutting)  │
└─────────┘    └───────────┘          └───────────┘
    │                 │                       │
    └─────────────────┴───────────────────────┘
              Peripheral Participation
              
Learning: Through legitimate access to practice,
          gradually taking on more complex tasks
```

### 2. Yucatec Midwives (Mexico)

Knowledge transmitted through:
- Observation during actual births
- Gradual assumption of responsibility
- Participation in the community's shared repertoire
- Identity shift from "girl" to "midwife"

### 3. Butchers (US Supermarkets)

Even in modern contexts:
- Novices start with simple tasks (wrapping, cleaning)
- Learn through watching and doing alongside experts
- Knowledge is tied to specific cuts, tools, customer interactions
- Cannot be fully captured in manuals

