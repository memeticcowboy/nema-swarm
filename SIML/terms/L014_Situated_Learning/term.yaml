## Core Insight

> Situated Learning reveals that knowledge is not a transferable commodity but a **relational achievement** — it exists in the dynamic coupling between people, practices, and contexts. You cannot extract knowledge from its situation and expect it to remain the same. Learning is not about acquiring information; it is about **becoming a certain kind of person** through participation in authentic practice.

## One-Sentence Insight

> Lave & Wenger's Situated Learning demonstrates that knowledge is inseparable from the contexts and communities in which it is practiced — we learn not by receiving information but by gradually becoming full participants in authentic activities.

## Three-Bullet Expansion

- **What:** A theory arguing that learning is fundamentally situated in specific contexts and cultures, occurring through legitimate peripheral participation in communities of practice rather than through abstract knowledge transmission
- **How it works:** Newcomers enter communities through scaffolded, meaningful participation → gradually take on more central roles → develop context-dependent competence → undergo identity transformation from outsider to practitioner
- **Where it aims:** Toward understanding learning as social practice — the transformation of identity through increasing participation in authentic activities within meaningful communities

