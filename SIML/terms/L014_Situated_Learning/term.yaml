## Core Definition

**Situated Learning** (Lave & Wenger, 1991) argues that learning is not the acquisition of abstract, decontextualized knowledge but is fundamentally **situated** — embedded in specific contexts of activity, culture, and social practice. Knowledge is inseparable from the situations in which it is developed and used.

### Key Principles

1. **Learning is Situated:** Knowledge and learning are embedded in specific contexts — they cannot be separated from the activity, culture, and social relations in which they occur
2. **Learning is Social:** Learning happens through participation in communities of practice
3. **Learning is Authentic:** Meaningful learning occurs through engagement with real-world problems and practices, not abstract exercises
4. **Tools Mediate Learning:** Cultural tools (physical and conceptual) shape what and how we learn

