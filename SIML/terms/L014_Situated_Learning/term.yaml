## Context-Mediated Learning

### The Five Dimensions of Situation

```
         ┌─────────────────┐
         │   ACTIVITY      │
         │ (what is done)  │
         └────────┬────────┘
                  │
    ┌─────────────┼─────────────┐
    ↓             ↓             ↓
┌───────┐   ┌───────────┐   ┌───────────┐
│SOCIAL │   │  CULTURAL │   │ PHYSICAL  │
│(who)  │   │ (meaning) │   │ (where)   │
└───────┘   └───────────┘   └───────────┘
    │             │             │
    └─────────────┴─────────────┘
                  │
         ┌─────────────────┐
         │   TEMPORAL      │
         │ (when, rhythm)  │
         └─────────────────┘
```

1. **Activity:** The actual doing — what practices are being learned
2. **Social:** The people involved — masters, peers, newcomers
3. **Cultural:** The meanings, values, and interpretations shared by the community
4. **Physical:** The material environment — tools, spaces, artifacts
5. **Temporal:** The timing, pacing, and rhythm of practice

## Connection to Related Theories

### Situated vs. Social Learning

| Dimension | Social Learning (L013) | Situated Learning (L014) |
|-----------|------------------------|--------------------------|
| **Focus** | Observation, modeling, identity | Context, authenticity, participation |
| **Key Process** | Vicarious experience | Direct participation in practice |
| **Element** | Water/ρ (resonance between people) | Water/ρ (resonance with context) |
| **Question** | Who do you learn from? | Where and how does learning happen? |

### Situated Learning and 4E Cognition (L012)

Situated Learning is the **educational expression** of 4E principles:
- **Embedded:** Cognition depends on environmental context
- **Embodied:** Learning involves physical engagement with tools and practices
- **Extended:** Cultural tools extend cognitive capabilities
- **Enactive:** Understanding emerges through action in context

### Situated Learning and Cognitive Load (L011)

**Tension:** Situated Learning emphasizes authentic complexity; CLT emphasizes managing complexity.

**Resolution:** 
- Authentic contexts provide **meaning** that reduces extraneous load
- Scaffolding manages intrinsic load while preserving situated authenticity
- The goal: situated learning with optimized cognitive architecture

