## Core Definition

**4E Cognition** represents a paradigm shift in cognitive science, challenging the traditional view that cognition is purely internal, computational, and representational. Instead, cognitive processes are understood as **distributed across brain, body, and environment**, emerging from dynamic coupling between these elements. The four E's — Embodied, Extended, Embedded, and Enactive — offer complementary perspectives on how cognition transcends the boundaries of the skull.

