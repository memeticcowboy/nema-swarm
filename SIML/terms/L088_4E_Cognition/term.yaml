### Connection to CAMIL

4E Cognition is foundational to **Context-Aware Multimodal Immersive Learning (CAMIL)**:
- **Embodied:** XR uses body tracking and spatial interaction
- **Extended:** Virtual tools become cognitive extensions
- **Embedded:** Learning happens in meaningful virtual contexts
- **Enactive:** Users learn through action in virtual environments

