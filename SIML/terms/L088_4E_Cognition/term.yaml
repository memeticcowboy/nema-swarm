## The Four Dimensions

### 1. Embodied Cognition

**Core claim:** Cognitive processes are deeply shaped by bodily structures, capacities, and experiences. The body is not merely a vessel for the brain but an active participant in cognition.

```
EMBODIMENT PRINCIPLES
═══════════════════════════════════════════════════════════════

    Body as Constraint:
    ┌─────────────────────────────────────┐
    │  • Sensory apparatus limits/        │
    │    enables what can be perceived    │
    │  • Motor capabilities shape         │
    │    possible actions                 │
    │  • Affective states influence       │
    │    reasoning and decision-making    │
    └─────────────────────────────────────┘
    
    Body as Resource:
    ┌─────────────────────────────────────┐
    │  • Gesture supports thinking and    │
    │    communication                    │
    │  • Spatial reasoning uses body-     │
    │    based metaphors                  │
    │  • Proprioception grounds abstract  │
    │    concepts                         │
    └─────────────────────────────────────┘

    Examples:
    • Abstract concepts understood through bodily metaphors
      ("grasping" an idea, "heavy" matters, "warm" personalities)
    • Mathematical reasoning uses spatial and motor schemas
    • Emotions are bodily states that inform cognition
```

**Key theorists:** Varela, Thompson, Rosch (The Embodied Mind, 1991); Lakoff & Johnson (Metaphors We Live By); Barsalou (grounded cognition)

### 2. Extended Cognition

**Core claim:** Cognitive systems extend beyond the biological boundary of the organism to include external tools, technologies, and resources that function as genuine cognitive components.

```
EXTENSION PRINCIPLES
═══════════════════════════════════════════════════════════════

    The Otto-Inga Thought Experiment:
    ┌─────────────────────────────────────┐
    │                                     │
    │  Inga: Biological memory            │
    │  ─────────────────────────          │
    │  Wants to go to museum              │
    │  ↓                                  │
    │  Recalls address from memory        │
    │  ↓                                  │
    │  Goes to 53rd Street                │
    │                                     │
    │  Otto: Extended memory              │
    │  ─────────────────────────          │
    │  Wants to go to museum              │
    │  ↓                                  │
    │  Consults notebook (always          │
    │  carries, regularly updates,        │
    │  automatically trusts)              │
    │  ↓                                  │
    │  Goes to 53rd Street                │
    │                                     │
    │  Question: Is Otto's notebook       │
    │  part of his memory system?         │
    │                                     │
    └─────────────────────────────────────┘
    
    Criteria for Cognitive Extension (Clark & Chalmers):
    ┌─────────────────────────────────────┐
    │  1. Constant accessibility          │
    │  2. Automatic endorsement           │
    │  3. Past endorsement preserved      │
    │  4. Reliability comparable to        │
    │     internal processes              │
    └─────────────────────────────────────┘
```

**Key theorists:** Clark & Chalmers ("The Extended Mind", 1998); Andy Clark (Supersizing the Mind, Natural-Born Cyborgs)

### 3. Embedded Cognition

**Core claim:** Cognition is context-dependent, situated in specific environmental and social contexts that shape and constrain cognitive processes.

```
EMBEDDEDNESS PRINCIPLES
═══════════════════════════════════════════════════════════════

    Context Shapes Cognition:
    ┌─────────────────────────────────────┐
    │                                     │
    │  Same person, different contexts:   │
    │                                     │
    │  ┌─────────────┐  ┌─────────────┐   │
    │  │  At Work    │  │  At Home    │   │
    │  │             │  │             │   │
    │  │ • Professional│ • Relaxed     │   │
    │  │ • Task-focused│ • Social      │   │
    │  │ • Hierarchical│ • Intimate    │   │
    │  │   reasoning │   reasoning   │   │
    │  │             │  │             │   │
    │  │ Different   │  │ Different   │   │
    │  │ cognitive   │  │ cognitive   │   │
    │  │ patterns    │  │ patterns    │   │
    │  └─────────────┘  └─────────────┘   │
    │                                     │
    │  The environment is not just        │
    │  background but active shaper       │
    │  of cognitive processes             │
    │                                     │
    └─────────────────────────────────────┘
    
    Scaffolding:
    ┌─────────────────────────────────────┐
    │  Environmental structures that      │
    │  support and shape cognition:       │
    │                                     │
    │  • Physical layout of spaces        │
    │  • Social norms and practices       │
    │  • Cultural tools and symbols       │
    │  • Institutional structures         │
    └─────────────────────────────────────┘
```

**Key connections:** Situated Learning (Lave & Wenger); Distributed Cognition (Hutchins)

### 4. Enactive Cognition

**Core claim:** Cognition is not representation of a pre-given world but active bringing-forth of meaning through sensorimotor coupling. Perception is action-oriented.

```
ENACTION PRINCIPLES
═══════════════════════════════════════════════════════════════

    From Representation to Enaction:
    ┌─────────────────────────────────────┐
    │                                     │
    │  Traditional view:                  │
    │  World ──► Sense data ──►           │
    │  Internal representation ──►        │
    │  Cognitive processing ──► Action    │
    │                                     │
    │  (Input-Process-Output)             │
    │                                     │
    │  Enactive view:                     │
    │       ┌─────────────────┐           │
    │       ▼                 │           │
    │  ┌─────────┐    ┌───────┴───┐       │
    │  │ Action  │◄──►│ Perception│       │
    │  │ (motor) │    │ (sensory) │       │
    │  └────┬────┘    └─────┬─────┘       │
    │       └─────────────────┘           │
    │                                     │
    │  (Sensorimotor coupling brings      │
    │   forth meaning)                    │
    │                                     │
    └─────────────────────────────────────┘
    
    Sensorimotor Contingencies (O'Regan & Noë):
    ┌─────────────────────────────────────┐
    │  • Seeing involves mastery of       │
    │    sensorimotor dependencies        │
    │  • Visual experience is skill of    │
    │    exploring the environment        │
    │  • Consciousness is not in the      │
    │    brain but in the interaction     │
    └─────────────────────────────────────┘
```

**Key theorists:** Varela, Thompson, Rosch (The Embodied Mind); Alva Noë (Action in Perception); Kevin O'Regan

## Elemental Pattern Analysis

### Air/σ Embodied (Primary)

4E Cognition fundamentally challenges the **boundary** between mind and world:
- **Distinction-making:** What counts as "cognitive" vs. "non-cognitive"
- **Boundary extension:** Cognitive systems extend beyond skin and skull
- **Clarity through interaction:** Understanding emerges from action

### Water/ρ as Secondary (Coupling)

The dynamic coupling between agent and environment:
- **Resonance:** Brain-body-environment attunement
- **Flow:** Continuous interaction, not discrete steps
- **Relationship:** Cognition as relational achievement

### Wood/β as Tertiary (Action/Enaction)

Cognition as bringing forth worlds:
- **Branching:** Multiple possible actions/perceptions
- **Growth:** Skills develop through practice
- **Generativity:** World-creation through engagement

### Metal/μ as Supporting (Structure/Tools)

Extended cognition's tool use:
- **Organization:** Tools structure cognitive processes
- **Boundaries:** Where does cognition end?
- **Integration:** Tools become transparent extensions

### ✶/Aether as Integrative

The unity of 4E perspectives:
- **Integration:** All four E's work together
- **Harmony:** Brain-body-environment as unified system
- **Child-like immediacy:** Direct engagement without representation

