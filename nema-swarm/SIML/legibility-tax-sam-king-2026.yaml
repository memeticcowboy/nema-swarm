insight: |
  "What spreads is not necessarily what is most insightful. It's what is most 
  machine-readable. Human cognition is non-linear. It contradicts itself. It 
  circles back. It holds two incompatible things simultaneously and refuses to 
  resolve them into a tidy argument. That irregularity isn't a flaw — it's where 
  actual insight lives. The algorithm can't score that. So it doesn't spread."
  
  The legibility tax: every time a creator shapes their expression to be 
  machine-readable, they pay a small toll in authenticity. At scale — millions 
  of creators, across years — what accumulates is a culture quietly restructured 
  around what machines can parse. The feedback loop tightens. Machines generate 
  the format. Machines rank the format. Humans adapt to the format.
  
  This is infrastructure redefining what "good" means. No villain. No 
  malicious actor. Just a distribution system that rewards a specific 
  communication style — and in doing so, shapes what communication becomes.

